name: CI - Unit & Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/TEMPLATE-ci-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'tests/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

env:
  COST_CATEGORY: "ci-tests"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      matrix:
        node-version: [18.x, 20.x]
      max-parallel: 2

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
        timeout-minutes: 10

      - name: Run unit tests
        run: corepack pnpm --filter ./apps/backend test:coverage
        timeout-minutes: 15

      - name: Upload coverage reports
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: ./apps/backend/coverage/coverage-final.json
          flags: unittests
          name: codecov-${{ matrix.node-version }}
          fail_ci_if_error: false

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040  # v2.23.0
        with:
          files: test-results.xml
          check_name: Test Results (${{ matrix.node-version }})
          continue_on_error: true

      - name: Report metrics
        if: always()
        run: |
          echo "::notice::Cost-Category: ci-tests"
          echo "::notice::Node: ${{ matrix.node-version }}"
          echo "::notice::Duration: ${GITHUB_RUN_DURATION}s"

      - name: Cleanup
        if: always()
        run: |
          corepack pnpm store prune 2>/dev/null || true
          docker system prune -af 2>/dev/null || true

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 18

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
        timeout-minutes: 10

      - name: Run integration tests
        run: corepack pnpm --filter ./apps/backend test
        timeout-minutes: 20
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379

      - name: Report metrics
        if: always()
        run: |
          echo "::notice::Cost-Category: ci-tests"
          echo "::notice::Test Type: integration"

      - name: Cleanup
        if: always()
        run: |
          corepack pnpm store prune 2>/dev/null || true
          docker system prune -af 2>/dev/null || true

  test-summary:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" = "failure" ] || [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          echo "✓ All tests passed"
