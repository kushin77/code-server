global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'code-server-enterprise-prod'
    environment: 'production'
    region: 'us-east-1'

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Alert rules
rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Self-scrape Prometheus metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Docker engine metrics
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Code Server metrics
  - job_name: 'code-server'
    scheme: http
    static_configs:
      - targets: ['code-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Ollama metrics
  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: '/api/metrics'
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 15s

  # OAuth2-Proxy metrics
  - job_name: 'oauth2-proxy'
    static_configs:
      - targets: ['oauth2-proxy:4180']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Caddy metrics
  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:2019']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node exporter (if available)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s
    scrape_timeout: 10s

  # Falco runtime security metrics
  - job_name: 'falco'
    static_configs:
      - targets: ['falco:8765']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
