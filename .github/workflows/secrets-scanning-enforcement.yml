name: GOV-012 - Secrets Scanning & Enforcement
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  security-events: write
  pull-requests: write
  checks: write

env:
  TRUFFLEOG_TIMEOUT: 600
  SEVERITY_THRESHOLD: high

jobs:
  secrets-audit:
    name: Comprehensive Secrets Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install scanning tools
        run: |
          set -e
          echo "Installing secret detection tools..."
          
          # Install TruffleHog
          pip install truffleHog
          
          # Install ripgrep for fast scanning
          cargo install ripgrep --quiet || apt-get update && apt-get install -y ripgrep
          
          echo "✓ Tools installed"

      - name: Run TruffleHog filesystem scan
        id: truffleHog-fs
        continue-on-error: true
        run: |
          set -e
          echo "::group::TruffleHog Filesystem Scan"
          
          # Scan for secrets in entire repo
          truffleHog filesystem . \
            --json \
            --regex \
            --entropy=True \
            --max-depth=3 \
            --timeout=${{ env.TRUFFLEOG_TIMEOUT }} \
            > /tmp/truffleHog-fs.json || true
          
          # Count findings
          FINDINGS=$(jq 'length' /tmp/truffleHog-fs.json 2>/dev/null || echo "0")
          echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          
          if [[ $FINDINGS -gt 0 ]]; then
            echo "::error::Found $FINDINGS potential secrets in filesystem"
            jq '.[].sourceFile' /tmp/truffleHog-fs.json | sort -u
          else
            echo "✓ No secrets found in filesystem"
          fi
          
          echo "::endgroup::"

      - name: Run TruffleHog git history scan
        id: truffleHog-git
        continue-on-error: true
        run: |
          set -e
          echo "::group::TruffleHog Git History Scan"
          
          # Scan git history for secrets
          truffleHog git file://. \
            --json \
            --regex \
            --entropy=True \
            --timeout=${{ env.TRUFFLEOG_TIMEOUT }} \
            > /tmp/truffleHog-git.json || true
          
          # Count findings
          FINDINGS=$(jq 'length' /tmp/truffleHog-git.json 2>/dev/null || echo "0")
          echo "findings=$FINDINGS" >> $GITHUB_OUTPUT
          
          if [[ $FINDINGS -gt 0 ]]; then
            echo "::warning::Found $FINDINGS potential secrets in git history"
            echo "These may require git history cleanup"
            jq '.[0:3]' /tmp/truffleHog-git.json
          else
            echo "✓ No secrets in git history"
          fi
          
          echo "::endgroup::"

      - name: Scan for hardcoded credentials patterns
        id: pattern-scan
        run: |
          set -e
          echo "::group::Pattern-Based Credential Scanning"
          
          # Use ripgrep for fast pattern matching
          PATTERNS=(
            'password\s*=\s*["\x27]([^"\x27]*)["\x27]'
            'api[_-]?key\s*=\s*["\x27]([^"\x27]*)["\x27]'
            'secret\s*=\s*["\x27]([^"\x27]*)["\x27]'
            'token\s*=\s*["\x27]([^"\x27]*)["\x27]'
            'Bearer\s+[A-Za-z0-9\-_.]+'
            'AKIA[0-9A-Z]{16}'  # AWS Access Key
            'AIza[0-9A-Za-z\-_]{35}'  # GCP Key
          )
          
          VIOLATION_COUNT=0
          
          for pattern in "${PATTERNS[@]}"; do
            echo "Checking pattern: ${pattern:0:40}..."
            if rg --type yaml --type json --type env --type conf \
               "$pattern" . --max-count=5 2>/dev/null; then
              VIOLATION_COUNT=$((VIOLATION_COUNT + 1))
            fi
          done
          
          echo "violations=$VIOLATION_COUNT" >> $GITHUB_OUTPUT
          
          if [[ $VIOLATION_COUNT -gt 0 ]]; then
            echo "::warning::Found $VIOLATION_COUNT pattern violations"
          else
            echo "✓ No hardcoded credentials patterns found"
          fi
          
          echo "::endgroup::"

      - name: Check .env file commitments
        id: env-check
        run: |
          set -e
          echo "::group::.env File Validation"
          
          # Verify .env not in repo
          if git ls-files | grep -E '\.env$' | grep -v "\.env\.example"; then
            echo "::error::.env file should not be committed"
            echo "Add to .gitignore and delete from repo"
            exit 1
          fi
          
          echo "✓ .env files properly excluded from version control"
          echo "::endgroup::"

      - name: Verify secrets documentation
        id: docs-check
        run: |
          set -e
          echo "::group::Secrets Documentation Check"
          
          # Verify SECRETS-MANAGEMENT.md exists and is up to date
          if [[ ! -f "docs/SECRETS-MANAGEMENT.md" ]]; then
            echo "::warning::docs/SECRETS-MANAGEMENT.md not found"
            echo "Create with: cp docs/SECRETS-MANAGEMENT-TEMPLATE.md docs/SECRETS-MANAGEMENT.md"
          else
            echo "✓ Secrets documentation exists"
            
            # Check if inventory section is populated
            if grep -q "Managed Secrets Inventory" docs/SECRETS-MANAGEMENT.md; then
              echo "✓ Secrets inventory documented"
            fi
          fi
          
          echo "::endgroup::"

      - name: Summary and failure decision
        if: always()
        run: |
          set -e
          echo "::group::Audit Summary"
          
          FS_FINDINGS=${{ steps.truffleHog-fs.outputs.findings || '0' }}
          GIT_FINDINGS=${{ steps.truffleHog-git.outputs.findings || '0' }}
          PATTERNS=${{ steps.pattern-scan.outputs.violations || '0' }}
          
          TOTAL=$((FS_FINDINGS + GIT_FINDINGS))
          
          echo "Secrets Audit Results:"
          echo "  - Filesystem findings: $FS_FINDINGS"
          echo "  - Git history findings: $GIT_FINDINGS"
          echo "  - Pattern violations: $PATTERNS"
          echo "  - Total issues: $TOTAL"
          
          if [[ $FS_FINDINGS -gt 0 ]]; then
            echo "::error::Secrets found in filesystem. Commit/merge blocked."
            exit 1
          fi
          
          echo "✓ Secrets audit passed"
          echo "::endgroup::"

  gitLeaks-scan:
    name: GitLeaks Duplicate Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        with:
          source: .
          verbose: true
          redact: true
          exit-code: 1

  publish-scan-results:
    name: Publish Secret Scan Results
    runs-on: ubuntu-latest
    needs: [secrets-audit]
    if: always()
    steps:
      - name: Create GitHub check
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## GOV-012 Secrets Scanning Report
          
          | Check | Status |
          |-------|--------|
          | TruffleHog Filesystem | ${{ needs.secrets-audit.result }} |
          | GitLeaks Scan | ${{ needs.secrets-audit.result }} |
          | Pattern Matching | ${{ needs.secrets-audit.result }} |
          | .env Validation | Passed ✓ |
          
          **Policy**: Secrets detected in committed code will block merges.
          
          See: [SECRETS-MANAGEMENT.md](docs/SECRETS-MANAGEMENT.md)
          EOF

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚨 Secret Detected in Commit",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Secrets Scanning Failed*\nCommit may contain sensitive data\nRepository: ${{ github.repository }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Scan Results>"
                  }
                }
              ]
            }

  document-secrets-rotation:
    name: Document Secrets Rotation Schedule
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Create rotation reminder
        run: |
          cat > /tmp/rotation-reminder.md <<'EOF'
          # Secrets Rotation Reminder
          
          Date: $(date -u +%Y-%m-%d)
          
          ## Secrets Due for Rotation (90+ days)
          
          - [ ] WIREGUARD_CONFIG (last rotated: check logs)
          - [ ] GRAFANA_ADMIN_PASSWORD
          - [ ] DATABASE_PASSWORD
          
          ## Secrets Due for Rotation (180+ days)
          
          - [ ] OAUTH_CLIENT_SECRET
          - [ ] SLACK_WEBHOOK_URL
          
          ## Action Items
          
          1. Review docs/SECRETS-MANAGEMENT.md inventory
          2. Rotate expired secrets
          3. Update rotation timestamps
          4. Commit changelog
          5. Notify team
          
          See: [SECRETS-MANAGEMENT.md](docs/SECRETS-MANAGEMENT.md#secret-rotation-procedures)
          EOF
          
          echo "Rotation reminder created"

      - name: Publish rotation schedule
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "📋 Weekly Secrets Rotation Check",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Secrets Rotation Reminder*\nTime to check and rotate secrets per schedule\nView rotation policy: docs/SECRETS-MANAGEMENT.md"
                  }
                }
              ]
            }
