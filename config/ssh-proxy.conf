# SSH Proxy Configuration - Infrastructure as Code
# Immutable configuration for Phase 13 SSH proxy deployment
# Version: 1.0
# Last Updated: April 13, 2026

# ─────────────────────────────────────────────────────────────────────────────
# CONTAINER RUNTIME CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────

[docker]
image = "code-server-ssh-proxy:latest"
container_name = "ssh-proxy"
restart_policy = "unless-stopped"
network_mode = "host"
expose_ports = ["2222:22"]

# Resource limits (immutable)
memory_limit = "256M"
memory_reservation = "128M"
cpu_shares = 512
cpus = "0.5"

# ─────────────────────────────────────────────────────────────────────────────
# PROXY CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────

[proxy]
listen_host = "0.0.0.0"
listen_port = 2222
listen_protocol = "TCP"

# Forward to code-server SSH service
forward_host = "code-server"
forward_port = 22
forward_protocol = "TCP"

# Connection settings (immutable defaults)
connection_timeout = 30
read_timeout = 300
write_timeout = 300
max_connections = 100
keepalive_interval = 60

# ─────────────────────────────────────────────────────────────────────────────
# AUDIT LOGGING CONFIGURATION (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────────────────

[audit_logging]
enabled = true
immutable = true

# Log destinations (multiple sinks for redundancy)
[[audit_logging.sinks]]
type = "file"
path = "/var/log/code-server-audit.log"
format = "json"
max_size_mb = 1024
max_backups = 5
max_age_days = 90
compression = "gzip"

[[audit_logging.sinks]]
type = "sqlite"
path = "/var/lib/code-server/audit.db"
table = "ssh_access_audit"
retention_days = 90
backup_enabled = true
backup_path = "/var/lib/code-server/audit.db.backups"

[[audit_logging.sinks]]
type = "syslog"
facility = "LOG_AUTH"
priority = "LOG_NOTICE"
format = "rfc5424"
tag = "ssh-proxy"

# Audit event fields (comprehensive)
[audit_logging.event_fields]
timestamp = true
event_type = true
user = true
source_ip = true
source_port = true
dest_ip = true
dest_port = true
connection_id = true
duration_seconds = true
bytes_sent = true
bytes_received = true
auth_method = true
key_fingerprint = true
status = true
error_message = true

# Audit event types
[audit_logging.event_types]
types = [
  "SSH_CONNECT",           # New connection established
  "SSH_AUTH_REQUEST",      # Authentication attempt
  "SSH_AUTH_SUCCESS",      # Successful authentication
  "SSH_AUTH_FAILURE",      # Failed authentication
  "SSH_KEY_FINGERPRINT",   # Key fingerprint recorded
  "SSH_COMMAND_ATTEMPT",   # Command/session request
  "SSH_CHANNEL_OPEN",      # Channel opened (shell/subsystem)
  "SSH_CLOSE",             # Connection closed
  "SSH_DISCONNECT",        # Unexpected disconnection
  "SSH_TIMEOUT",           # Connection timeout
  "SSH_ERROR",             # Error during session
]

# ─────────────────────────────────────────────────────────────────────────────
# AUTHENTICATION & AUTHORIZATION (IMMUTABLE DEFAULTS)
# ─────────────────────────────────────────────────────────────────────────────

[auth]
# Methods allowed (order matters - first match wins)
methods = ["publickey", "password"]
publickey_enabled = true
password_enabled = false  # Disable password auth for security
keyboard_interactive_enabled = false

# Key management
authorized_keys_file = "~/.ssh/authorized_keys"
strict_modes = true
ignore_user_known_hosts = true

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY POLICIES (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────────────────

[security]
protocol_version = "2"
tls_version_min = "1.3"
cipher_suites = [
  "aes-256-gcm@openssh.com",
  "aes-128-gcm@openssh.com",
  "chacha20-poly1305@openssh.com",
]
key_exchange_algorithms = [
  "curve25519-sha256",
  "curve25519-sha256@libssh.org",
  "diffie-hellman-group-exchange-sha256",
]
mac_algorithms = [
  "umac-128-etm@openssh.com",
  "umac-64-etm@openssh.com",
  "hmac-sha2-512-etm@openssh.com",
]

# Access control
permit_root_login = "no"
permit_empty_passwords = "no"
permit_user_environment = "no"
compression = "delayed"
client_alive_interval = 60
client_alive_count_max = 3
max_auth_tries = 3
max_sessions = 10

# ─────────────────────────────────────────────────────────────────────────────
# HEALTH CHECKING (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────────────────

[health_check]
enabled = true
endpoint = "http://localhost:9000/health"
interval_seconds = 10
timeout_seconds = 5
unhealthy_threshold = 3
healthy_threshold = 2

# Health check response schema
[health_check.response]
status = "healthy"
uptime_seconds = 0
connections_active = 0
audit_entries_today = 0
last_audit_timestamp = ""

# ─────────────────────────────────────────────────────────────────────────────
# MONITORING & METRICS (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────────────────

[metrics]
enabled = true
expose_endpoint = "http://localhost:9001/metrics"
collection_interval_seconds = 60

# Metrics to collect
[[metrics.gauges]]
name = "ssh_proxy_active_connections"
help = "Number of active SSH connections"

[[metrics.gauges]]
name = "ssh_proxy_memory_bytes"
help = "Memory usage in bytes"

[[metrics.counters]]
name = "ssh_proxy_total_connections"
help = "Total connections since startup"

[[metrics.counters]]
name = "ssh_proxy_auth_attempts"
help = "Total authentication attempts"

[[metrics.counters]]
name = "ssh_proxy_auth_failures"
help = "Total authentication failures"

[[metrics.histograms]]
name = "ssh_proxy_connection_duration_seconds"
help = "SSH connection duration distribution"
buckets = [1, 5, 10, 60, 300, 3600]

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────

[env]
# Logging
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

# Audit
AUDIT_LOG_PATH = "/var/log/code-server-audit.log"
AUDIT_DB_PATH = "/var/lib/code-server/audit.db"
AUDIT_ENABLED = "true"
AUDIT_IMMUTABLE = "true"

# Proxy
SSH_LISTEN_PORT = "2222"
SSH_FORWARD_HOST = "code-server"
SSH_FORWARD_PORT = "22"

# Health
HEALTH_CHECK_ENABLED = "true"
HEALTH_CHECK_PORT = "9000"

# Metrics
METRICS_ENABLED = "true"
METRICS_PORT = "9001"

# Resources
MAX_CONNECTIONS = "100"
CONNECTION_TIMEOUT = "30"
READ_TIMEOUT = "300"
WRITE_TIMEOUT = "300"

# ─────────────────────────────────────────────────────────────────────────────
# VOLUME MOUNTS (IMMUTABLE)
# ─────────────────────────────────────────────────────────────────────────────

[[volumes]]
host_path = "/var/log"
container_path = "/var/log"
mode = "rw"
propagation = "rprivate"

[[volumes]]
host_path = "/var/lib/code-server"
container_path = "/var/lib/code-server"
mode = "rw"
propagation = "rprivate"

[[volumes]]
host_path = "/root/.ssh"
container_path = "/root/.ssh"
mode = "ro"
propagation = "rprivate"

# ─────────────────────────────────────────────────────────────────────────────
# SUCCESS CRITERIA (IaC VALIDATION)
# ─────────────────────────────────────────────────────────────────────────────

[success_criteria]
# All must be true for deployment to succeed
proxy_listening = true
forward_connection_working = true
audit_logging_enabled = true
audit_logging_immutable = true
health_endpoint_responding = true
metrics_endpoint_responding = true
all_events_logged = true
zero_data_loss = true
secure_cipher_suites_only = true
