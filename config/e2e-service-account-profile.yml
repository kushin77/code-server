# @file        config/e2e-service-account-profile.yml
# @module      testing/e2e
# @description Dedicated E2E service account feature profile.
#              Maps all product capabilities to required E2E scenarios.
#              Every feature enhancement must add/update coverage here before merge.
#
# Usage: Referenced by E2E test runner and release gate checks.
# CI gate: scripts/ci/validate-e2e-profile-coverage.sh

version: "1"
profile_id: "code-server-e2e-service-account"
account: "e2e-service@kushnir.cloud"  # Dedicated service account — NOT a human user
vpn_required: true
updated: "2026-04-18"

# ── Coverage matrix ────────────────────────────────────────────────────────────
# Format: capability_id: { scenarios: [...], assertions: [...], owners: [...] }
capabilities:

  oauth-login:
    description: "OAuth2-proxy login with Google account"
    scenarios:
      - fresh_login_google_account
      - login_with_gmail_account
      - login_with_org_account
      - login_rejected_for_non_allowlisted_email
    assertions:
      - redirect_to_oauth_provider
      - callback_returns_session_cookie
      - code_server_loads_after_login
    owners: ["platform"]
    critical: true

  credential-provisioning:
    description: "Workspace credentials auto-provisioned at session start"
    scenarios:
      - github_token_available_after_login
      - gsm_secret_fetched_without_prompt
      - credential_not_available_when_gsm_unreachable
    assertions:
      - GITHUB_TOKEN_set_in_environment
      - git_fetch_succeeds_without_credentials_prompt
    owners: ["platform"]
    critical: true

  auth-keepalive:
    description: "Auth keepalive daemon running and refreshing"
    scenarios:
      - daemon_starts_at_session_begin
      - no_duplicate_daemon_instances
      - health_command_reports_correct_state
      - daemon_survives_workspace_change
    assertions:
      - pidfile_present_while_running
      - last_refresh_within_active_interval
    owners: ["platform"]
    critical: true

  policy-gate:
    description: "Cross-repo policy gate blocks unknown repos"
    scenarios:
      - mutating_action_blocked_for_unknown_repo
      - mutating_action_allowed_for_allowlisted_repo
      - break_glass_requires_reason
      - all_mutations_appear_in_audit_log
    assertions:
      - policy_file_loaded_at_startup
      - audit_log_written_on_mutation
    owners: ["platform"]
    critical: false

  ide-settings-merge:
    description: "Enterprise settings merged into user settings at startup"
    scenarios:
      - locked_keys_not_overrideable_by_user
      - user_settings_preserved_for_unlocked_keys
      - merge_is_idempotent_across_restarts
    assertions:
      - policy_version_key_present_after_merge
      - user_theme_preference_preserved
    owners: ["platform"]
    critical: false

  root-hygiene:
    description: "Root-level file hygiene enforced"
    scenarios:
      - blocked_pattern_file_at_root_triggers_warn
      - allowed_entrypoints_pass_check
    assertions:
      - check_exits_0_on_clean_root
    owners: ["platform"]
    critical: false

# ── Release gate ──────────────────────────────────────────────────────────────
release_gate:
  require_all_critical: true
  require_coverage_for_new_features: true
  block_release_on_uncovered_critical: true
