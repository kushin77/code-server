name: E2E Authenticated Failover Continuity

on:
  workflow_dispatch:
    inputs:
      failover_wait_ms:
        description: "Wait window during failover event (milliseconds)"
        required: false
        default: "45000"
        type: string
      failover_trigger_cmd:
        description: "Optional shell command to trigger failover during test"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  continuity-auth:
    name: Run authenticated continuity check
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Decode authenticated storage state
        shell: bash
        env:
          PLAYWRIGHT_STORAGE_STATE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_STATE_B64 }}
        run: |
          set -euo pipefail
          if [[ -z "${PLAYWRIGHT_STORAGE_STATE_B64:-}" ]]; then
            echo "PLAYWRIGHT_STORAGE_STATE_B64 secret is not set" >&2
            exit 1
          fi

          mkdir -p /tmp/e2e-auth
          # Accept either base64-encoded JSON (preferred) or raw JSON to avoid silent format drift.
          if [[ "${PLAYWRIGHT_STORAGE_STATE_B64#\{}" != "$PLAYWRIGHT_STORAGE_STATE_B64" ]]; then
            printf '%s' "$PLAYWRIGHT_STORAGE_STATE_B64" > /tmp/e2e-auth/storage-state.json
          else
            if ! printf '%s' "$PLAYWRIGHT_STORAGE_STATE_B64" | tr -d '\r\n\t ' | base64 -d > /tmp/e2e-auth/storage-state.json 2>/tmp/e2e-auth/decode.err; then
              echo "Failed to decode PLAYWRIGHT_STORAGE_STATE_B64 as base64" >&2
              cat /tmp/e2e-auth/decode.err >&2
              exit 1
            fi
          fi

          test -s /tmp/e2e-auth/storage-state.json
          node - <<'NODE'
          const fs = require('fs');
          const path = '/tmp/e2e-auth/storage-state.json';
          const raw = fs.readFileSync(path, 'utf8');

          try {
            JSON.parse(raw);
            console.log('storage-state JSON validated');
            process.exit(0);
          } catch (_) {
            // Fallbacks for legacy secret formats.
            const candidates = [raw, `{${raw}}`];

            for (const candidate of candidates) {
              try {
                const obj = Function(`"use strict"; return (${candidate});`)();
                fs.writeFileSync(path, JSON.stringify(obj, null, 2));
                JSON.parse(fs.readFileSync(path, 'utf8'));
                console.log('storage-state normalized from JS object literal to JSON');
                process.exit(0);
              } catch (_) {
                // try next candidate
              }

              try {
                const normalized = candidate
                  .replace(/([{,]\s*)([A-Za-z_][A-Za-z0-9_-]*)(\s*:)/g, '$1"$2"$3')
                  .replace(/'/g, '"');
                const obj = JSON.parse(normalized);
                fs.writeFileSync(path, JSON.stringify(obj, null, 2));
                console.log('storage-state normalized from loose JSON format');
                process.exit(0);
              } catch (_) {
                // try next candidate
              }
            }

            console.error('storage-state parse/normalize failed: unsupported secret format');
            process.exit(1);
          }
          NODE

      - name: Setup Playwright for E2E
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/ci/setup-e2e-playwright.sh

      - name: Run authenticated session persistence tests
        shell: bash
        env:
          TEST_BASE_URL: https://ide.kushnir.cloud
          PLAYWRIGHT_STORAGE_STATE: /tmp/e2e-auth/storage-state.json
        run: |
          set -euo pipefail
          cd tests/e2e
          npx playwright test specs/authenticated-session-persistence.spec.ts

      - name: Run authenticated failover continuity tests
        shell: bash
        env:
          CONTINUITY_MODE: auth
          TEST_BASE_URL: https://ide.kushnir.cloud
          PLAYWRIGHT_STORAGE_STATE: /tmp/e2e-auth/storage-state.json
          FAILOVER_WAIT_MS: ${{ inputs.failover_wait_ms }}
          FAILOVER_TRIGGER_CMD: ${{ inputs.failover_trigger_cmd }}
        run: |
          set -euo pipefail
          cd tests/e2e
          npx playwright test specs/failover-session-continuity.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: playwright-report
          path: tests/e2e/artifacts/html/
          retention-days: 7
