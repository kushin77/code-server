apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: code-server-ha
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: code-server-ha
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

---
# code-server pods network rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: code-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From Load Balancer
  - from:
    - podSelector:
        matchLabels:
          app: haproxy
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  # Kubernetes apiserver
  - from:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 10250
  egress:
  # To PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # To Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # To Jaeger
  - to:
    - podSelector:
        matchLabels:
          app: jaeger
    ports:
    - protocol: UDP
      port: 6831
  # To Prometheus
  - to:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
  # To Consul
  - to:
    - podSelector:
        matchLabels:
          app: consul
    ports:
    - protocol: TCP
      port: 8500

---
# PostgreSQL network rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From code-server
  - from:
    - podSelector:
        matchLabels:
          app: code-server
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 5433  # Replication
  # PostgreSQL to PostgreSQL (replication)
  - from:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 5433
  # Prometheus exporter
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9187
  egress:
  # To other PostgreSQL instances
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 5433

---
# Redis network rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From code-server
  - from:
    - podSelector:
        matchLabels:
          app: code-server
    ports:
    - protocol: TCP
      port: 6379
  # Redis to Redis (cluster)
  - from:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 16379  # Cluster bus
  # Prometheus exporter
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9121
  egress:
  # To other Redis instances
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 16379

---
# Jaeger network rules (for tracing)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaeger-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: jaeger
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From code-server
  - from:
    - podSelector:
        matchLabels:
          app: code-server
    ports:
    - protocol: UDP
      port: 6831
  # Prometheus scraping
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 16686
  egress:
  # Allow external connections for storage
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: TCP
      port: 443

---
# Prometheus network rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From Grafana
  - from:
    - podSelector:
        matchLabels:
          app: grafana
    ports:
    - protocol: TCP
      port: 9090
  # From AlertManager
  - from:
    - podSelector:
        matchLabels:
          app: alertmanager
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # To scrape endpoints
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 9090
    - protocol: TCP
      port: 9187
    - protocol: TCP
      port: 9121
    - protocol: TCP
      port: 8080

---
# HAProxy Load Balancer network rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: haproxy-network-policy
  namespace: code-server-ha
spec:
  podSelector:
    matchLabels:
      app: haproxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # From external (internet)
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
  egress:
  # To code-server pods
  - to:
    - podSelector:
        matchLabels:
          app: code-server
    ports:
    - protocol: TCP
      port: 8080
