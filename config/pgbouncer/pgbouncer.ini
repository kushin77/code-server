; ─────────────────────────────────────────────────────────────────────────────
; PgBouncer Connection Pooler — Phase 8 Post-HA Performance Tuning
; Mode: transaction pooling (best for short-lived queries, stateless services)
; Target: reduce PG connection overhead, support 100+ concurrent app clients
; ─────────────────────────────────────────────────────────────────────────────

[databases]
; Route all connections through pgbouncer to the postgres container
; DSN format: host=<container-name> port=5432 dbname=<db>
codeserver = host=postgres port=5432 dbname=${POSTGRES_DB:-codeserver}
* = host=postgres port=5432

[pgbouncer]
; ── Listener ─────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =

; ── Pooling mode ─────────────────────────────────────────────────────────────
; transaction: connection returned to pool on each COMMIT/ROLLBACK
; ideal for stateless app clients (oauth2-proxy, backend services)
pool_mode = transaction

; ── Connection limits ────────────────────────────────────────────────────────
; max_client_conn: max total frontend (app → pgbouncer) connections
max_client_conn = 100

; default_pool_size: max backend (pgbouncer → postgres) connections per database/user pair
default_pool_size = 20

; min_pool_size: maintain this many idle server connections for faster pickup
min_pool_size = 5

; reserve_pool_size: extra connections for load spikes
reserve_pool_size = 5

; reserve_pool_timeout: seconds before using reserve pool
reserve_pool_timeout = 3.0

; max_db_connections: hard cap on backend connections per database (all pools combined)
max_db_connections = 50

; ── Authentication ───────────────────────────────────────────────────────────
; md5: compatible with postgres:15-alpine default auth
auth_type = md5
; HBA-style auth file (populated from environment at startup by entrypoint)
auth_file = /etc/pgbouncer/userlist.txt

; ── Timeouts ─────────────────────────────────────────────────────────────────
; server_idle_timeout: idle server connections closed after N seconds
server_idle_timeout = 600

; client_idle_timeout: idle client connections closed after N seconds
client_idle_timeout = 0

; query_timeout: max time a query can run (0 = disabled)
query_timeout = 0

; connect_timeout: seconds to wait for server connection
server_connect_timeout = 15

; login_timeout: seconds to wait for client authentication
client_login_timeout = 60

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 1
stats_period = 60

; ── Admin console ────────────────────────────────────────────────────────────
; Use: psql -p 6432 -U pgbouncer pgbouncer
admin_users = pgbouncer
stats_users = pgbouncer

; ── TLS (disabled — internal network only, caddy handles TLS externally) ─────
; server_tls_sslmode = disable
; client_tls_sslmode = disable
