repos:
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.11.0.1
  hooks:
  - id: shellcheck
    name: Bash script lint (shellcheck)
    args:
    - --severity=error
    exclude: "(?x)(\n  scripts/|\n  archived/|\n  kubernetes/|\n  phase-|\n  gpu-\n\
      )\n"
    enabled: false
- repo: https://github.com/adrienverge/yamllint
  rev: v1.35.1
  hooks:
  - id: yamllint
    name: YAML lint (yamllint)
    args:
    - --config-data
    - '{extends: default, rules: {line-length: {max: 120}}}'
    files: \.(yaml|yml)$
    exclude: archived/|docs/|kubernetes/
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    exclude: scripts/nas-ingress\.yaml|kubernetes/phase-12/routing/geo-routing-config\.yaml
- repo: https://github.com/antonbabenko/pre-commit-terraform
  rev: v1.74.0
  hooks:
  - id: terraform_fmt
    stages:
    - manual
  - id: terraform_validate
    stages:
    - manual
