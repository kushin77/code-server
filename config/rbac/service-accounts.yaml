# config/rbac/service-accounts.yaml
# P1 #388 Phase 2: Service Account Registration for JWT Token Issuance
# Defines which services can request JWT tokens and what scopes they have

---
# Code-Server Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-service-account
  namespace: default
data:
  client_id: "code-server"
  service_name: "code-server"
  scopes: |
    - read:secrets
    - write:config
    - read:metrics
    - write:audit_log
  allowed_targets: |
    - postgresql
    - redis
    - ollama
    - prometheus
    - grafana
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# PostgreSQL Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-service-account
  namespace: default
data:
  client_id: "postgresql"
  service_name: "postgresql"
  scopes: |
    - read:pg_identity
    - write:audit_log
    - read:metrics
  allowed_targets: |
    - code-server
    - grafana
    - prometheus
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Redis Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-service-account
  namespace: default
data:
  client_id: "redis"
  service_name: "redis"
  scopes: |
    - read:cache
    - write:cache
    - read:metrics
  allowed_targets: |
    - code-server
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Grafana Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-service-account
  namespace: default
data:
  client_id: "grafana"
  service_name: "grafana"
  scopes: |
    - read:metrics
    - read:logs
    - read:traces
    - write:annotations
  allowed_targets: |
    - prometheus
    - loki
    - jaeger
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Prometheus Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-service-account
  namespace: default
data:
  client_id: "prometheus"
  service_name: "prometheus"
  scopes: |
    - read:metrics
    - write:metrics
  allowed_targets: |
    - code-server
    - grafana
    - alertmanager
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# AlertManager Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-service-account
  namespace: default
data:
  client_id: "alertmanager"
  service_name: "alertmanager"
  scopes: |
    - read:alerts
    - write:alerts
    - read:notifications
  allowed_targets: |
    - prometheus
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Ollama Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-service-account
  namespace: default
data:
  client_id: "ollama"
  service_name: "ollama"
  scopes: |
    - read:models
    - write:models
    - read:metrics
  allowed_targets: |
    - code-server
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Loki Service Account (Logging)
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-service-account
  namespace: default
data:
  client_id: "loki"
  service_name: "loki"
  scopes: |
    - write:logs
    - read:logs
    - read:metrics
  allowed_targets: |
    - grafana
    - prometheus
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# Jaeger Service Account (Tracing)
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-service-account
  namespace: default
data:
  client_id: "jaeger"
  service_name: "jaeger"
  scopes: |
    - write:traces
    - read:traces
    - read:metrics
  allowed_targets: |
    - grafana
    - prometheus
  token_ttl_minutes: "15"
  refresh_window_minutes: "5"

---
# OAuth2-Proxy Service Account
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-service-account
  namespace: default
data:
  client_id: "oauth2-proxy"
  service_name: "oauth2-proxy"
  scopes: |
    - read:oidc_config
    - write:session_tokens
    - read:user_profile
  allowed_targets: |
    - code-server
    - grafana
  token_ttl_minutes: "30"
  refresh_window_minutes: "10"

---
# Service Accounts Secret (Stored in Vault in production)
apiVersion: v1
kind: Secret
metadata:
  name: service-account-secrets
  namespace: default
type: Opaque
stringData:
  code-server-secret: "${CODE_SERVER_CLIENT_SECRET}"
  postgresql-secret: "${POSTGRESQL_CLIENT_SECRET}"
  redis-secret: "${REDIS_CLIENT_SECRET}"
  grafana-secret: "${GRAFANA_CLIENT_SECRET}"
  prometheus-secret: "${PROMETHEUS_CLIENT_SECRET}"
  alertmanager-secret: "${ALERTMANAGER_CLIENT_SECRET}"
  ollama-secret: "${OLLAMA_CLIENT_SECRET}"
  loki-secret: "${LOKI_CLIENT_SECRET}"
  jaeger-secret: "${JAEGER_CLIENT_SECRET}"
  oauth2-proxy-secret: "${OAUTH2_PROXY_CLIENT_SECRET}"

---
# RBAC Permissions: Service Account can request JWT tokens
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jwt-token-requester
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["service-account-secrets"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
  selector:
    matchLabels:
      type: "service-account"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jwt-token-requester
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jwt-token-requester
subjects:
- kind: ServiceAccount
  name: code-server
  namespace: default
- kind: ServiceAccount
  name: postgresql
  namespace: default
- kind: ServiceAccount
  name: redis
  namespace: default
- kind: ServiceAccount
  name: grafana
  namespace: default
- kind: ServiceAccount
  name: prometheus
  namespace: default
- kind: ServiceAccount
  name: alertmanager
  namespace: default
- kind: ServiceAccount
  name: ollama
  namespace: default
- kind: ServiceAccount
  name: loki
  namespace: default
- kind: ServiceAccount
  name: jaeger
  namespace: default
- kind: ServiceAccount
  name: oauth2-proxy
  namespace: default
