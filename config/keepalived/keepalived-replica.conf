# Keepalived Configuration — REPLICA HOST (192.168.168.42)
# =========================================================
# VRRP Virtual IP: 192.168.168.30/24
# Role: BACKUP (priority 100)
#
# Install on replica:
#   sudo apt-get install -y keepalived
#   sudo cp config/keepalived/keepalived-replica.conf /etc/keepalived/keepalived.conf
#   sudo cp config/keepalived/notify.sh /etc/keepalived/notify.sh
#   sudo chmod +x /etc/keepalived/notify.sh
#   sudo systemctl enable --now keepalived

global_defs {
    router_id REPLICA_42
    script_user root
    enable_script_security
    log_unknown_host_entries
}

# ─── Health Check Script ──────────────────────────────────────────────────────

vrrp_script chk_code_server {
    script "docker inspect -f '{{.State.Running}}' code-server 2>/dev/null | grep -q true"
    interval 2
    timeout 3
    weight -20
    fall 2
    rise 2
}

vrrp_script chk_caddy {
    script "docker inspect -f '{{.State.Running}}' caddy 2>/dev/null | grep -q true"
    interval 5
    timeout 3
    weight -15
    fall 2
    rise 2
}

# ─── VRRP Instance ───────────────────────────────────────────────────────────

vrrp_instance PROD_VIP {
    state BACKUP                   # This node starts as BACKUP
    interface eth0                 # Network interface (verify: ip route | grep default)
    virtual_router_id 51           # MUST match primary's virtual_router_id
    priority 100                   # Lower priority = secondary preference
    advert_int 1
    # NOTE: nopreempt is NOT set here — if replica becomes master and primary
    # recovers, primary will NOT auto-reclaim (because primary has nopreempt).
    # This is intentional to prevent flapping.

    authentication {
        auth_type PASS
        auth_pass $VRRP_AUTH_PASS   # Must match primary's auth_pass exactly
    }

    virtual_ipaddress {
        192.168.168.30/24 dev eth0 label eth0:vip
    }

    track_script {
        chk_code_server
        chk_caddy
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
    notify_stop    "/etc/keepalived/notify.sh STOP"
}
