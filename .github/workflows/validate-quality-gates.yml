name: Validate Quality Gate Compliance

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read
  checks: write
  issues: write

jobs:
  validate-pr-template:
    name: Check PR Template Completion
    runs-on: ubuntu-latest
    steps:
      - name: Check Phase 1 (Design Certification)
        id: phase1
        run: |
          cat > /tmp/pr_body.txt <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          PR_BODY="$(cat /tmp/pr_body.txt)"
          if [[ "$PR_BODY" =~ "Phase 1: Design Certification" ]]; then
            echo "✓ Phase 1 section found"
            # Count checked items in Phase 1
            PHASE1_CHECKED=$(echo "$PR_BODY" | grep -o "\[x\]" | head -20 | wc -l)
            echo "phase1_checked=$PHASE1_CHECKED" >> $GITHUB_OUTPUT
          else
            echo "✗ Phase 1 section missing"
            echo "phase1_checked=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Phase 2 (Code Review)
        id: phase2
        run: |
          cat > /tmp/pr_body.txt <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          PR_BODY="$(cat /tmp/pr_body.txt)"
          if [[ "$PR_BODY" =~ "Phase 2: Code & Quality Review" ]]; then
            echo "✓ Phase 2 section found"
            PHASE2_CHECKED=$(echo "$PR_BODY" | grep -o "\[x\]" | wc -l)
            echo "phase2_checked=$PHASE2_CHECKED" >> $GITHUB_OUTPUT
          else
            echo "✗ Phase 2 section missing"
            echo "phase2_checked=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Phase 3 (Performance)
        id: phase3
        run: |
          cat > /tmp/pr_body.txt <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          PR_BODY="$(cat /tmp/pr_body.txt)"
          if [[ "$PR_BODY" =~ "Phase 3: Performance & Load Testing" ]]; then
            echo "✓ Phase 3 section found"
            # Phase 3 can be skipped for non-critical changes
            if [[ "$PR_BODY" =~ "skip Phase 3" ]]; then
              echo "  (skipped for non-critical change)"
              echo "phase3_status=skipped" >> $GITHUB_OUTPUT
            else
              PHASE3_CHECKED=$(echo "$PR_BODY" | grep -o "\[x\]" | wc -l)
              echo "phase3_checked=$PHASE3_CHECKED" >> $GITHUB_OUTPUT
            fi
          else
            echo "✗ Phase 3 section missing"
            echo "phase3_checked=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Phase 4 (Operations)
        id: phase4
        run: |
          cat > /tmp/pr_body.txt <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          PR_BODY="$(cat /tmp/pr_body.txt)"
          if [[ "$PR_BODY" =~ "Phase 4: Operational Readiness" ]]; then
            echo "✓ Phase 4 section found"
            PHASE4_CHECKED=$(echo "$PR_BODY" | grep -o "\[x\]" | wc -l)
            echo "phase4_checked=$PHASE4_CHECKED" >> $GITHUB_OUTPUT
          else
            echo "✗ Phase 4 section missing"
            echo "phase4_checked=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Issue Linkage (Closes/Fixes required)
        id: issues
        run: |
          cat > /tmp/pr_body.txt <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          PR_BODY="$(cat /tmp/pr_body.txt)"
          if [[ "$PR_BODY" =~ "Closes #"  ]] || [[ "$PR_BODY" =~ "Fixes #" ]] || [[ "$PR_BODY" =~ "Resolves #" ]]; then
            echo "✓ Issue linkage found"
            echo "linked=true" >> $GITHUB_OUTPUT
          else
            echo "⚠ No issue linkage (Closes/Fixes/Resolves)"
            echo "linked=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Compliance Report
        id: report
        run: |
          cat > /tmp/report.md <<'EOF'
          ## Production Readiness Framework Validation

          ### Phase Completion Status
          - Phase 1 (Design): ${{ steps.phase1.outputs.phase1_checked || 0 }} items checked
          - Phase 2 (Code): ${{ steps.phase2.outputs.phase2_checked || 0 }} items checked
          - Phase 3 (Performance): ${{ steps.phase3.outputs.phase3_status == 'skipped' && '⊘ Skipped' || format('{0} items checked', steps.phase3.outputs.phase3_checked || 0) }}
          - Phase 4 (Operations): ${{ steps.phase4.outputs.phase4_checked || 0 }} items checked

          ### Issue Tracking
          - Issue linkage: ${{ steps.issues.outputs.linked == 'true' && '✓ Found' || '⚠ Missing (Closes #N required)' }}

          ### Recommendations
          - Ensure ALL 4 phases are completed before merge
          - Link related GitHub issues using "Closes #N" in PR description
          - Architecture review required for design changes (Phase 1)
          - Runbook must be updated for operational changes (Phase 4)

          See [PR Template](/.github/pull_request_template.md) for complete phase details.
          EOF
          cat /tmp/report.md

      - name: Upload compliance report artifact
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4.3.3
        with:
          name: quality-gate-compliance-report
          path: /tmp/report.md
          if-no-files-found: warn
