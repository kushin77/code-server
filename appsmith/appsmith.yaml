---
# Appsmith Configuration for RBAC Portal
# Authenticates users via RBAC API with JWT tokens
# Low-code platform for admin panels and internal tools

# Application metadata
appName: "RBAC Admin Portal"
primaryColor: "#0066CC"
favicon: ""

# Authentication configuration
auth:
  enabled: true
  
  # Custom authentication via RBAC API
  provider: "jwt"
  
  jwtConfig:
    # Our RBAC API provides JWT tokens
    issuer: "https://ide.kushnir.cloud"
    audience: "appsmith"
    secret: "${JWT_SECRET}"
    
    # Claims configuration
    userIdClaim: "userId"
    userEmailClaim: "email"
    userNameClaim: "email"
    
    # Token validation
    validateExpiry: true
    validateNotBefore: true
  
  # SSO configuration (optional)
  sso:
    enabled: false
    # Can be configured for additional providers

# Database configuration
database:
  type: "postgresql"
  host: "postgres"
  port: 5432
  name: "appsmith"
  username: "appsmith"
  password: "${APPSMITH_DB_PASSWORD}"
  
  # Connection pool settings for performance
  pool:
    min: 2
    max: 10

# API server configuration
api:
  host: "0.0.0.0"
  port: 8080
  
  # Rate limiting for security
  rateLimiting:
    enabled: true
    windowMs: 60000  # 1 minute
    maxRequests: 100
  
  # CORS configuration - allow from RBAC frontend
  cors:
    enabled: true
    origin: ["https://ide.kushnir.cloud", "http://localhost:3000"]
    credentials: true
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]

# Plugin marketplace configuration
plugins:
  enabled: true
  
  # Pre-installed plugins for data sources
  preInstalled:
    - postgres
    - rest-api
    - graphql
    - javascript
    - s3
    - mongo

# Feature flags for Appsmith
features:
  # Enable collaborative editing
  collaboration: true
  
  # Advanced features
  advancedFeatures:
    customSnippets: true
    jsEditor: true
    workspacePermissions: true
  
  # AI features (optional)
  aiFeatures:
    codeGeneration: true
    docGeneration: true

# Logging configuration
logging:
  level: "info"
  format: "json"
  
  # Sentry integration for error tracking (optional)
  sentry:
    enabled: false
    dsn: "${SENTRY_DSN:-}"
    environment: "production"

# Security configuration
security:
  # Content Security Policy
  csp:
    enabled: true
    directives:
      defaultSrc: ["'self'"]
      scriptSrc: ["'self'", "'unsafe-inline'"]
      imgSrc: ["'self'", "data:", "https:"]
  
  # HSTS
  hsts:
    enabled: true
    maxAge: 31536000

# Storage configuration
storage:
  type: "local"
  path: "/appsmith-stacks"

# Email configuration (for user invitations, notifications)
email:
  enabled: false
  provider: "smtp"
  # Configure based on your SMTP server
  # smtp:
  #   host: "${SMTP_HOST}"
  #   port: ${SMTP_PORT}
  #   secure: true
  #   auth:
  #     user: "${SMTP_USER}"
  #     pass: "${SMTP_PASSWORD}"

# Workspace configuration
workspace:
  maxAppsPerUser: 50
  maxDashboards: 100
  
  # Governance settings
  governance:
    enforceDataSecurity: true
    requireSSL: true
