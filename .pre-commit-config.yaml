repos:
  - repo: local
    hooks:
      - id: mandatory-redeploy
        name: mandatory-redeploy
        entry: pwsh -NoProfile -File ./scripts/mandatory-redeploy.ps1
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.74.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
