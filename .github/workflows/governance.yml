name: Governance Bot

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  duplicate-detection:
    name: Code Duplication Detection (jscpd)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jscpd globally
        run: npm install -g jscpd

      - name: Run jscpd duplicate detection
        continue-on-error: true
        id: jscpd
        run: |
          mkdir -p /tmp/jscpd-report
          jscpd --config .jscpdrc.json 2>&1 | tee /tmp/jscpd-console.log
          exit_code=$?
          
          # Parse report
          if [[ -f /tmp/jscpd-report/report.json ]]; then
            duplication_pct=$(jq '.statistics.duplicates' /tmp/jscpd-report/report.json 2>/dev/null || echo "0")
            clones=$(jq '.duplicates | length' /tmp/jscpd-report/report.json 2>/dev/null || echo "0")
            echo "duplication_pct=${duplication_pct}" >> $GITHUB_OUTPUT
            echo "clones=${clones}" >> $GITHUB_OUTPUT
          fi
          
          exit $exit_code

      - name: Comment PR with duplicate detection results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const duplication = '${{ steps.jscpd.outputs.duplication_pct }}' || '0';
            const clones = '${{ steps.jscpd.outputs.clones }}' || '0';
            const log = fs.readFileSync('/tmp/jscpd-console.log', 'utf8');
            
            const comment = `## 📊 Code Quality Report
            
            ### Duplication Analysis
            - **Duplication Rate**: ${duplication}%
            - **Clone Pairs Found**: ${clones}
            - **Threshold**: 3% (${duplication > 3 ? '❌ EXCEEDED' : '✅ PASS'})
            
            ${duplication > 3 ? '**⚠️ WARNING**: Duplication threshold exceeded. Consider consolidating duplicate code blocks.' : ''}
            
            ### jscpd Output
            \`\`\`
            ${log.split('\n').slice(0, 30).join('\n')}
            \`\`\`
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if duplication exceeds threshold
        if: steps.jscpd.outcome == 'failure'
        run: |
          echo "::error::Code duplication exceeds 3% threshold — consolidate duplicate blocks"
          exit 1

  governance-score:
    name: Calculate Governance Score
    runs-on: ubuntu-latest
    needs: [duplicate-detection]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y make bash jq

      - name: Calculate governance score (0-100)
        id: score
        run: |
          score=100
          violations=0
          
          # Check for jscpd violations (weight: -5 per violation)
          jscpd_violations=$(jq '.duplicates | length' /tmp/jscpd-report/report.json 2>/dev/null || echo "0")
          if [[ $jscpd_violations -gt 0 ]]; then
            penalty=$((jscpd_violations * 5))
            score=$((score - penalty))
            echo "- jscpd violations: $jscpd_violations (penalty: -$penalty points)"
            violations=$((violations + jscpd_violations))
          fi
          
          # Check for missing @file headers (weight: -2 per violation)
          missing_headers=$(grep -r "^#!/bin/bash" scripts/*.sh 2>/dev/null | grep -v "^# @file" | wc -l || echo "0")
          if [[ $missing_headers -gt 0 ]]; then
            penalty=$((missing_headers * 2))
            score=$((score - penalty))
            echo "- missing @file headers: $missing_headers (penalty: -$penalty points)"
            violations=$((violations + missing_headers))
          fi
          
          # Check for hardcoded IPs (weight: -10 per violation)
          hardcoded_ips=$(grep -rl "192\.168\.168\." scripts/ 2>/dev/null | grep -v "_common/" | wc -l || echo "0")
          if [[ $hardcoded_ips -gt 0 ]]; then
            penalty=$((hardcoded_ips * 10))
            score=$((score - penalty))
            echo "- hardcoded IPs: $hardcoded_ips (penalty: -$penalty points)"
            violations=$((violations + hardcoded_ips))
          fi
          
          # Ensure score is within 0-100
          if [[ $score -lt 0 ]]; then score=0; fi
          
          echo "score=$score" >> $GITHUB_OUTPUT
          echo "violations=$violations" >> $GITHUB_OUTPUT
          echo "Governance Score: **$score/100**"

      - name: Set check status based on score
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.score.outputs.score }}';
            const violations = '${{ steps.score.outputs.violations }}';
            const status = score >= 80 ? 'success' : score >= 60 ? 'neutral' : 'failure';
            const message = `Governance Score: ${score}/100 (${violations} violations)`;
            
            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Governance Score',
              head_sha: context.sha,
              status: 'completed',
              conclusion: status,
              output: {
                title: 'Governance Compliance',
                summary: message,
                text: `Score components:\n- Code duplication: checked\n- Metadata headers: checked\n- Hardcoded values: checked`
              }
            });

      - name: Create GitHub issue if violations found
        if: steps.score.outputs.violations > 0
        uses: actions/github-script@v7
        with:
          script: |
            const violations = '${{ steps.score.outputs.violations }}';
            const score = '${{ steps.score.outputs.score }}';
            const pr_number = context.payload.pull_request?.number || 'main';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `GOV: Governance violations in PR #${pr_number} (Score: ${score}/100)`,
              body: `Automated governance scan detected ${violations} violation(s).\n\n- Check the PR governance score check for details\n- PR #${pr_number}\n- Governance Score: **${score}/100**`,
              labels: ['governance-debt', 'automated']
            });
