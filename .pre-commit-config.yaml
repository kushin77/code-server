repos:
  # Linting: Bash script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: Bash script lint (shellcheck)
        args: ['--severity=error']
        exclude: |
          (?x)(
            scripts/_archive/|
            archived/|
            ^phase-|
            ^gpu-
          )
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: YAML lint (yamllint)
        args: [--config-data, '{extends: default, rules: {line-length: {max: 120}}}']
        files: '\.(yaml|yml)$'
        exclude: 'archived/|docs/|kubernetes/'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # These are valid multi-document YAML files (Kubernetes manifests)
        exclude: 'scripts/nas-ingress\.yaml|kubernetes/phase-12/routing/geo-routing-config\.yaml'
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.74.0
    hooks:
      - id: terraform_fmt
        # Only run when terraform is available locally — not enforced in CI
        stages: [manual]
      - id: terraform_validate
        stages: [manual]
