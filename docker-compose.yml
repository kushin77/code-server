version: '3.9'
# code-server enterprise stack — domain/ide with Google OAuth
# All config via .env (copy from .env.template, populate via scripts/fetch-gsm-secrets.sh)
# Portable: docker compose up on any host with a valid .env — no hardcoded IPs or paths

services:
  # ─── code-server ────────────────────────────────────────────────────────────
  code-server:
    image: codercom/code-server:4.115.0
    container_name: code-server
    restart: unless-stopped
    networks:
      - enterprise
    # NOT exposed to host — traffic comes only through oauth2-proxy
    expose:
      - "8080"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SERVICE_URL=https://open-vsx.org/vscode/gallery
      - ITEM_URL=https://open-vsx.org/vscode/item
      - CS_DISABLE_FILE_DOWNLOADS=false
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"           # TLS handled by Caddy externally
      - "--auth=none"            # Auth handled by oauth2-proxy
    volumes:
      - ${CODER_DATA_PATH:-/mnt/nas-56/code-server}:/home/coder
      - ${WORKSPACE_PATH:-/mnt/nas-56/kushin77/applications/code-server-enterprise}:/home/coder/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── oauth2-proxy ───────────────────────────────────────────────────────────
  # OAuth2/OIDC sidecar for zero-trust authentication via Google
  # Validates Google OAuth tokens before passing to code-server
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4180"
    environment:
      # Credentials from GSM (injected by scripts/fetch-gsm-secrets.sh)
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      # Provider
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      # Redirect configuration — domain driven by DOMAIN env var
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/oauth2/callback"
      # Upstream: code-server serves /ide (cert:false inside Docker)
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      # Access control — only allow specific email
      OAUTH2_PROXY_EMAIL_DOMAINS: ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      # Cookie settings
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_DOMAIN: ".kushnir.cloud"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "false"
      OAUTH2_PROXY_COOKIE_SAMESITE: "none"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      # Proxy behaviour
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"     # code-server requires WebSocket
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Headers
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      # Logging
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      # Skip auth for health checks and static assets (prevents CSRF cookie race condition)
      # Service worker + favicon requests in background overwrite CSRF nonce while user is on Google OAuth screen
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "^/health$$|^/oauth2/|^/_static/|^/favicon\\.ico$$|^/manifest\\.json$$|^/service-worker\\.js$$|^/robots\\.txt$$"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4180/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    depends_on:
      - code-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Caddy ──────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.9.1
    container_name: caddy
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy reads DOMAIN via {$DOMAIN} in Caddyfile
      DOMAIN: "${DOMAIN}"
      # GoDaddy DNS-01 challenge credentials (KEY:SECRET format, from GSM via .env)
      GODADDY_API_TOKEN: "${GODADDY_KEY}:${GODADDY_SECRET}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - oauth2-proxy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  coder-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CODER_DATA_PATH:-/mnt/nas-56/code-server}
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.8.0/24
