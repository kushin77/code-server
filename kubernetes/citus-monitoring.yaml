apiVersion: v1
kind: ConfigMap
metadata:
  name: citus-monitoring-config
  namespace: citus
data:
  prometheus-citus-rules.yml: |
    groups:
      - name: citus_cluster
        interval: 30s
        rules:
          # Cluster Health Metrics
          - alert: CitusCoordinatorDown
            expr: up{instance=~"citus-coordinator.*"} == 0
            for: 2m
            labels:
              severity: critical
              component: citus
            annotations:
              summary: "Citus coordinator unreachable"
              description: "Coordinator {{ $labels.instance }} is down for > 2 minutes"

          - alert: CitusWorkerDown
            expr: up{instance=~"citus-worker.*"} == 0
            for: 2m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus worker unreachable"
              description: "Worker {{ $labels.instance }} is down for > 2 minutes"

          # Storage Alerts
          - alert: CitusWorkerDiskFull
            expr: node_filesystem_avail_bytes{device=~"/dev/.*"} / node_filesystem_size_bytes{device=~"/dev/.*"} < 0.1
            for: 5m
            labels:
              severity: critical
              component: citus
            annotations:
              summary: "Citus worker {{ $labels.instance }} disk < 10%"
              description: "Worker disk space critically low. Rebalancing may fail."

          # Replication Lag
          - alert: CitusReplicationLag
            expr: pg_replication_lag_seconds{application_name=~"citus.*"} > 30
            for: 5m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus replication lag high"
              description: "{{ $labels.application_name }} lagging by {{ $value }}s"

          # Connection Pool Saturation
          - alert: CitusConnectionPoolSaturation
            expr: pg_stat_activity_max_used_connections / (250) > 0.8
            for: 5m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus connection pool > 80% used"
              description: "{{ $value | humanizePercentage }} of 250 connections in use"

          # Transaction Queuing
          - alert: CitusHighQueryQueueDepth
            expr: pg_stat_activity_query_queuedepth > 50
            for: 2m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "High query queue depth on {{ $labels.instance }}"
              description: "{{ $value }} queries queued, possible contention"

          # Distributed Transaction Failures
          - alert: CitusDistributedTransactionFailureRate
            expr: increase(pg_distributed_transaction_failures_total[5m]) > 10
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "High distributed transaction failure rate"
              description: "{{ $value }} failures in last 5 minutes"

          # Shard Rebalancing Issues
          - alert: CitusShardImbalance
            expr: (max(shard_data_size) - min(shard_data_size)) / avg(shard_data_size) > 0.2
            for: 10m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus shard distribution imbalanced"
              description: "Data skew > 20%, run rebalance_table_shards()"

      - name: citus_performance
        interval: 30s
        rules:
          # Slow Queries
          - alert: CitusSlowQueryDetected
            expr: pg_slow_query_count > 5
            for: 5m
            labels:
              severity: info
              component: citus
            annotations:
              summary: "{{ $value }} slow queries detected on {{ $labels.instance }}"
              description: "Review pg_stat_statements for slow queries"

          # High CPU on Workers
          - alert: CitusWorkerHighCPU
            expr: rate(process_cpu_seconds_total[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus worker {{ $labels.instance }} CPU > 80%"
              description: "Consider scaling or optimizing queries"

          # Memory Pressure
          - alert: CitusWorkerHighMemory
            expr: (container_memory_working_set_bytes / container_spec_memory_limit_bytes) > 0.85
            for: 5m
            labels:
              severity: warning
              component: citus
            annotations:
              summary: "Citus worker memory > 85%"
              description: "{{ $labels.instance }} approaching OOM"

  citus-dashboard.json: |
    {
      "dashboard": {
        "title": "Citus Distributed PostgreSQL",
        "panels": [
          {
            "title": "Cluster Health Status",
            "targets": [
              {
                "expr": "up{job=~\"citus-coordinator|citus-worker.*\"}"
              }
            ]
          },
          {
            "title": "Data Distribution Across Shards",
            "targets": [
              {
                "expr": "shard_data_size by (shard_id, node)"
              }
            ]
          },
          {
            "title": "Coordinator QPS (Queries Per Second)",
            "targets": [
              {
                "expr": "rate(pg_stat_statements_calls_total[5m])"
              }
            ]
          },
          {
            "title": "Replication Lag (Seconds)",
            "targets": [
              {
                "expr": "pg_replication_lag_seconds"
              }
            ]
          },
          {
            "title": "Worker Connection Pool Usage",
            "targets": [
              {
                "expr": "pg_stat_activity_max_used_connections / 250"
              }
            ]
          },
          {
            "title": "Distributed Transaction Success Rate",
            "targets": [
              {
                "expr": "rate(pg_distributed_transaction_success_total[5m]) / (rate(pg_distributed_transaction_success_total[5m]) + rate(pg_distributed_transaction_failures_total[5m]))"
              }
            ]
          }
        ]
      }
    }

  citus-postgres-config.yaml: |
    # PostgreSQL Configuration for Citus Coordinator
    postgresql:
      parameters:
        # Connection settings
        max_connections: 200
        max_prepared_transactions: 100
        
        # Shared memory
        shared_buffers: 256MB
        effective_cache_size: 512MB
        maintenance_work_mem: 64MB
        work_mem: 2MB
        
        # Query planning
        random_page_cost: 1.1  # SSD cost (lower for fast I/O)
        effective_io_concurrency: 200
        
        # Logging
        log_min_duration_statement: 1000  # Log queries > 1s
        log_connections: on
        log_disconnections: on
        log_statement: 'all'
        
        # Replication
        wal_level: replica
        max_wal_senders: 5
        max_replication_slots: 5
        wal_keep_size: 1GB
        
        # Citus-specific
        citus.shard_replication_factor: 2
        citus.shard_count: 4
        citus.shard_placement_policy: 'round-robin'
        citus.rebalance_strategy: 'by_disk_size'
        citus.enable_distributed_transactions: on
        citus.enable_split_and_merge: on
        citus.max_client_connections: 150
        citus.max_intermediate_result_size: 1GB
        
        # Analytics queries (OLAP)
        citus.pull_intervals_on_worker: off
        citus.enable_repartition_joins: on

---
apiVersion: v1
kind: Service
metadata:
  name: citus-prometheus-exporter
  namespace: citus
  labels:
    app: citus-prometheus-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: 9187
      protocol: TCP
      name: metrics
  selector:
    app: citus-prometheus-exporter

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citus-prometheus-exporter
  namespace: citus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: citus-prometheus-exporter
  template:
    metadata:
      labels:
        app: citus-prometheus-exporter
    spec:
      serviceAccountName: citus-exporter
      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:v0.13.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@citus-coordinator.citus.svc.cluster.local:5432/code_server?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: citus-credentials
                  key: password
          command:
            - /postgres_exporter
            - --web.listen-address=:9187
            - --web.telemetry-path=/metrics
            - --extend.query-path=/config/queries.yaml
          volumeMounts:
            - name: exporter-config
              mountPath: /config
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9187
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: exporter-config
          configMap:
            name: citus-exporter-queries

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: citus-exporter-queries
  namespace: citus
data:
  queries.yaml: |
    # Custom Citus metrics for Prometheus exporter
    pg_distributed_transaction_success:
      query: "SELECT COUNT(*) as count FROM citus_stat_transactions WHERE status = 'success'"
      metrics:
        - { name: pg_distributed_transaction_success_total, help: "Total successful distributed transactions", type: gauge }
    
    pg_distributed_transaction_failures:
      query: "SELECT COUNT(*) as count FROM citus_stat_transactions WHERE status = 'failed'"
      metrics:
        - { name: pg_distributed_transaction_failures_total, help: "Total failed distributed transactions", type: gauge }
    
    pg_slow_query_count:
      query: "SELECT COUNT(*) as count FROM pg_stat_statements WHERE mean_exec_time > 1000"
      metrics:
        - { name: pg_slow_query_count, help: "Number of queries with mean execution > 1000ms", type: gauge }
    
    shard_data_distribution:
      query: "SELECT shardid, shardstate, count(*) as shard_count FROM pg_dist_placement GROUP BY shardid, shardstate"
      metrics:
        - { name: shard_node_count, help: "Number of shard placements per node", type: gauge, labels: [shardid, shardstate] }
    
    citus_rebalance_status:
      query: "SELECT CASE WHEN is_sharded THEN 1 ELSE 0 END FROM citus_statistics LIMIT 1"
      metrics:
        - { name: citus_rebalance_needed, help: "1 if rebalancing is needed", type: gauge }

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: citus-exporter
  namespace: citus

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: citus-exporter
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: citus-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: citus-exporter
subjects:
  - kind: ServiceAccount
    name: citus-exporter
    namespace: citus

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: citus-exporter
  namespace: citus
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: citus-prometheus-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
