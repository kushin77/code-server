# Phase 12.5: Monitoring and Alerting Configuration
# Prometheus-based monitoring for multi-region federation

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'federation'
    environment: 'production'

# Alert Manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Alert Rule Files
rule_files:
  - /etc/prometheus/rules/federation_alerts.yml
  - /etc/prometheus/rules/sla_alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Federation API server metrics
  - job_name: 'federation-api'
    static_configs:
      - targets: ['fed-api-us-west:8080', 'fed-api-eu-west:8080', 'fed-api-eu-central:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme
    metrics_path: '/metrics'

  # GeoRouter metrics
  - job_name: 'geo-router'
    static_configs:
      - targets: ['fed-router-us-west:8081', 'fed-router-eu-west:8081']
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: instance

  # Kubernetes metrics
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # Node exporter for infrastructure metrics
  - job_name: 'node-exporter'
    kubernetes_sd_configs:
      - role: endpoints
    relabel_configs:
      - source_labels: [__meta_kubernetes_endpoints_name]
        regex: 'node-exporter'
        action: keep

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['fed-db-us-west:9187', 'fed-db-eu-west:9187', 'fed-db-eu-central:9187']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Load balancer metrics from Cloud Load Balancing
  - job_name: 'gcp-load-balancer'
    static_configs:
      - targets: ['fed-lb-primary:8082']

  # Application custom metrics
  - job_name: 'federation-metrics'
    static_configs:
      - targets: ['fed-metrics-collector:8080']
    scrape_interval: 30s

  # Tracing metrics (if using distributed tracing)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger-collector:14269']

---
# Alert Rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  federation_alerts.yml: |
    groups:
      - name: federation_alerts
        interval: 15s
        rules:
          # Region availability alerts
          - alert: RegionDown
            expr: up{job="federation-api"} == 0
            for: 2m
            labels:
              severity: critical
              service: federation
            annotations:
              summary: "Region {{ $labels.instance }} is down"
              description: "Region {{ $labels.instance }} has been unreachable for 2 minutes"

          # Latency alerts
          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(request_duration_seconds_bucket[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
              service: federation
            annotations:
              summary: "High request latency in {{ $labels.region }}"
              description: "P95 latency is {{ $value }}s (threshold: 0.5s)"

          # Error rate alerts
          - alert: HighErrorRate
            expr: rate(request_errors_total[5m]) > 0.01
            for: 5m
            labels:
              severity: warning
              service: federation
            annotations:
              summary: "High error rate in {{ $labels.region }}"
              description: "Error rate is {{ $value }}% (threshold: 1%)"

          # Circuit breaker open alert
          - alert: CircuitBreakerOpen
            expr: circuit_breaker_state{state="open"} == 1
            for: 1m
            labels:
              severity: critical
              service: federation
            annotations:
              summary: "Circuit breaker open for {{ $labels.region }}"
              description: "Circuit breaker for {{ $labels.region }} has been open for 1 minute"

          # Database replication lag alert
          - alert: ReplicationLagHigh
            expr: pg_replication_lag_seconds > 1
            for: 2m
            labels:
              severity: warning
              service: database
            annotations:
              summary: "High replication lag in {{ $labels.instance }}"
              description: "Replication lag is {{ $value }}s (threshold: 1s)"

          # Connection pool exhaustion alert
          - alert: ConnectionPoolExhausted
            expr: db_connection_pool_available{} < 10
            for: 1m
            labels:
              severity: critical
              service: database
            annotations:
              summary: "Connection pool exhausted on {{ $labels.instance }}"
              description: "Only {{ $value }} connections available"

          # Memory usage alert
          - alert: HighMemoryUsage
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
            for: 5m
            labels:
              severity: warning
              service: infrastructure
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Memory usage is {{ $value | humanizePercentage }}"

          # Disk space alert
          - alert: LowDiskSpace
            expr: node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes < 0.15
            for: 5m
            labels:
              severity: warning
              service: infrastructure
            annotations:
              summary: "Low disk space on {{ $labels.instance }}"
              description: "{{ $value | humanizePercentage }} space remaining"

          # Cascading failure detection
          - alert: CascadingFailure
            expr: count(up{job="federation-api"} == 0) > 2
            for: 3m
            labels:
              severity: critical
              service: federation
            annotations:
              summary: "Cascading failure detected"
              description: "{{ $value }} regions are down simultaneously"

  sla_alerts.yml: |
    groups:
      - name: sla_alerts
        interval: 30s
        rules:
          # Availability SLA violation
          - alert: AvailabilitySLAViolation
            expr: (1 - (sum(rate(requests_errors_total[1h])) / sum(rate(requests_total[1h])))) < 0.999
            for: 60m
            labels:
              severity: critical
              sla_type: availability
            annotations:
              summary: "Availability SLA violated (99.9% target)"
              description: "Current availability: {{ $value | humanizePercentage }}"

          # Latency SLA violation
          - alert: LatencySLAViolation
            expr: histogram_quantile(0.99, rate(request_duration_seconds_bucket[1h])) > 0.1
            for: 60m
            labels:
              severity: critical
              sla_type: latency
            annotations:
              summary: "Latency SLA violated (100ms P99 target)"
              description: "P99 latency: {{ $value | humanizeDuration }}"

          # Throughput capacity alert
          - alert: ThroughputCapacityWarning
            expr: rate(requests_total[5m]) > 8000  # 80% of 10k RPS capacity
            for: 10m
            labels:
              severity: warning
              sla_type: throughput
            annotations:
              summary: "Operating near throughput capacity"
              description: "Current throughput: {{ $value }} RPS (capacity: 10k)"
