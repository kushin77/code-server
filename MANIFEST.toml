[services.redis]
version = "7.2.4"
image_sha = "sha256:redis:7.2.4"
healthcheck = "redis-cli ping"
critical = true
persistence = "volumes/redis_data"
source = "docker-compose.yml:L381-L430"
last_verified = "2026-04-15T20:00:00Z"

[services.prometheus]
version = "2.48.0"
image_sha = "sha256:prometheus:2.48.0"
healthcheck = "http://localhost:9090/-/healthy"
config_file = "alert-rules.yml"
source = "docker-compose.yml:L431-L490"
last_verified = "2026-04-15T20:00:00Z"

[services.grafana]
version = "10.2.3"
image_sha = "sha256:grafana:10.2.3"
healthcheck = "http://localhost:3000/api/health"
source = "docker-compose.yml:L491-L550"
provisioning_dir = "grafana/provisioning"
last_verified = "2026-04-15T20:00:00Z"

[services.alertmanager]
version = "0.26.0"
image_sha = "sha256:alertmanager:0.26.0"
healthcheck = "http://localhost:9093/-/healthy"
config_file = "alertmanager.yml"
source = "docker-compose.yml:L551-L590"
last_verified = "2026-04-15T20:00:00Z"

[services.jaeger]
version = "1.50.0"
image_sha = "sha256:jaeger:1.50.0"
healthcheck = "http://localhost:16686"
source = "docker-compose.yml:L591-L630"
last_verified = "2026-04-15T20:00:00Z"

[services.ollama]
version = "latest"
image_sha = "sha256:ollama:latest"
profile = "ollama"
optional = true
