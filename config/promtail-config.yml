server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          env: production
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_image_name']
        target_label: 'image'
    pipeline_stages:
      - json:
          expressions:
            output: log
      - regex:
          expression: '(?P<json_log>.*)'
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            level: level
