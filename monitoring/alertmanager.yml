global:
  resolve_timeout: 5m
  slack_api_url: ''
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

route:
  receiver: 'default'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      continue: true
    - match:
        severity: warning
      receiver: 'warning'
      continue: true

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

  - name: 'critical'
    pagerduty_configs:
      - service_key: ''
        description: '{{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#critical-alerts'

  - name: 'warning'
    slack_configs:
      - channel: '#warnings'
