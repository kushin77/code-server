{
  "version": "1.0",
  "description": "Phase 13 Audit Logging Configuration - Immutable",
  "timestamp": "2026-04-13T13:15:00Z",
  "immutable": true,
  "sinks": {
    "file": {
      "type": "file",
      "path": "/var/log/code-server-audit.log",
      "max_size": "1GB",
      "max_backups": 5,
      "max_age_days": 30,
      "format": "json",
      "fields": [
        "timestamp",
        "event_type",
        "user",
        "source_ip",
        "command",
        "key_fingerprint",
        "status"
      ]
    },
    "sqlite": {
      "type": "sqlite",
      "path": "/var/lib/code-server/audit.db",
      "table": "ssh_access_audit",
      "index_on": [
        "timestamp",
        "user",
        "event_type"
      ],
      "retention": {
        "days": 90
      }
    },
    "syslog": {
      "type": "syslog",
      "facility": "LOG_AUTH",
      "priority": "LOG_NOTICE",
      "format": "rfc5424"
    }
  },
  "event_types": [
    "SSH_CONNECT",
    "SSH_AUTH_SUCCESS",
    "SSH_AUTH_FAILURE",
    "SSH_COMMAND",
    "SSH_DISCONNECT",
    "SSH_KEY_ADDED",
    "SSH_KEY_REMOVED"
  ],
  "success_criteria": {
    "all_events_logged": true,
    "zero_data_loss": true,
    "queryable_audit_trail": true
  }
}
