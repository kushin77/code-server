name: Build & Push Docker Images

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - 'extensions/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For OIDC to GCP

    strategy:
      matrix:
        service:
          - name: code-server
            dockerfile: Dockerfile.code-server
            context: .
          - name: agent-api
            dockerfile: services/agent-api/Dockerfile
            context: services/agent-api
          - name: rbac-api
            dockerfile: services/rbac-api/Dockerfile
            context: services/rbac-api
            registry: ghcr.io
          - name: caddy
            dockerfile: Dockerfile.caddy
            context: .

    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      - name: Fetch Docker credentials from GSM
        id: gsm-docker
        run: |
          # If OIDC auth succeeded, fetch from GSM
          if [ -n "${{ steps.auth.outputs.access_token }}" ]; then
            gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
            DOCKER_USER=$(gcloud secrets versions access latest --secret="prod-ghcr-username" 2>/dev/null || echo "")
            DOCKER_PAT=$(gcloud secrets versions access latest --secret="prod-ghcr-pat" 2>/dev/null || echo "")
            [ -n "$DOCKER_USER" ] && echo "::add-mask::$DOCKER_USER"
            [ -n "$DOCKER_PAT" ] && echo "::add-mask::$DOCKER_PAT"
            echo "docker_user=$DOCKER_USER" >> $GITHUB_OUTPUT
            echo "docker_pat=$DOCKER_PAT" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.gsm-docker.outputs.docker_user || github.actor }}
          password: ${{ steps.gsm-docker.outputs.docker_pat || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        image:
          - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/code-server:latest
          - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/agent-api:latest
          - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rbac-api:latest

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ matrix.image }}'

  notify:
    runs-on: ubuntu-latest
    needs: [ build, scan ]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## Docker Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Build Status: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scan: ${{ needs.scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- Images pushed to: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
