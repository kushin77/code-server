name: VPN Service Account Endpoint Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-auth-endpoints:
    name: Validate oauth2 auth endpoints
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate IDE and portal auth endpoints with QA token
        shell: bash
        env:
          E2E_OAUTH_TOKEN: ${{ secrets.E2E_OAUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${E2E_OAUTH_TOKEN:-}" ]]; then
            echo "E2E_OAUTH_TOKEN secret is not set" >&2
            exit 1
          fi

          AUTH_HEADER="Authorization: Bearer ${E2E_OAUTH_TOKEN}"

          ide_status="$(curl -ksS -o /dev/null -w '%{http_code}' -H "$AUTH_HEADER" 'https://ide.kushnir.cloud/oauth2/auth')"
          portal_status="$(curl -ksS -o /dev/null -w '%{http_code}' -H "$AUTH_HEADER" 'https://kushnir.cloud/oauth2/auth')"

          echo "ide oauth2/auth status: ${ide_status}"
          echo "portal oauth2/auth status: ${portal_status}"

          if [[ "$ide_status" != "202" ]]; then
            echo "Expected ide oauth2/auth status 202, got ${ide_status}" >&2
            exit 1
          fi

          if [[ "$portal_status" != "202" ]]; then
            echo "Expected portal oauth2/auth status 202, got ${portal_status}" >&2
            exit 1
          fi

          echo "VPN service-account endpoint validation passed"
