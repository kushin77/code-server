name: "Phase 7d: Cloudflare Tunnel Validation (P1 #351)"

on:
  push:
    branches: [ main, feat/p1-351-cloudflare-tunnel-setup ]
    paths:
      - 'scripts/setup-cloudflare-tunnel.sh'
      - '.github/workflows/phase-7d-cloudflare-validation.yml'
      - 'terraform/modules/dns/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/setup-cloudflare-tunnel.sh'
      - '.github/workflows/phase-7d-cloudflare-validation.yml'
      - 'terraform/modules/dns/**'

permissions:
  contents: read

jobs:
  validate-scripts:
    name: "Validate Setup Scripts"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
      
      - name: "Lint bash scripts"
        run: |
          shellcheck scripts/setup-cloudflare-tunnel.sh

  validate-terraform:
    name: "Validate Terraform Config"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
      
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@97f030cf6dc0b4f5e0da352c7bca9cca34579800 # v3.1.0
      
      - name: "Terraform Init & Validate"
        run: |
          cd terraform/modules/dns
          terraform init -backend=false
          terraform validate

  security-scan:
    name: "Security Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
      
      - name: "Checkov analysis"
        uses: bridgecrewio/checkov-action@4fa90328619ebe2a5396c7f16308c17a7a4b5dc3 # v12.2858.0
        with:
          directory: terraform/modules/dns
          quiet: true
          framework: terraform
          soft_fail: true

  on-prem-check:
    name: "On-Prem Connectivity & Binary Check"
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3
      
      - name: "Validate cloudflared binary installation"
        run: |
          if ! command -v cloudflared &> /dev/null; then
             echo "❌ cloudflared binary not found on on-prem host"
             exit 1
          fi
          cloudflared --version

      - name: "Check systemd service status"
        run: |
          if systemctl is-active --quiet cloudflared; then
            echo "✅ cloudflared service is ACTIVE"
          else
            echo "⚠️ cloudflared service is INACTIVE or NOT FOUND"
            # This is non-blocking until Phase 7d is fully merged and active
            exit 0
          fi

  portal-oauth-redeploy:
    name: "Portal OAuth Callback Redeploy"
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.3

      - name: "Resolve deployment directory"
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "/home/akushnir/code-server-enterprise" ]]; then
            echo "DEPLOY_DIR=/home/akushnir/code-server-enterprise" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          fi

      - name: "Validate callback split"
        shell: bash
        run: |
          set -euo pipefail
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_IDE_REDIRECT_URL:-${OAUTH2_REDIRECT_URL:-https://ide.kushnir.cloud/oauth2/callback}}"' docker-compose.yml
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_PORTAL_REDIRECT_URL:-https://kushnir.cloud/oauth2/callback}"' docker-compose.yml

      - name: "Sync compose and redeploy portal services"
        shell: bash
        run: |
          set -euo pipefail
          install -m 0644 docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"
          cd "$DEPLOY_DIR"
          COMPOSE_PROFILES=portal docker compose up -d --remove-orphans oauth2-proxy-portal caddy appsmith

      - name: "Verify apex and IDE callbacks"
        shell: bash
        run: |
          set -euo pipefail
          apex_location="$(curl -skI 'https://kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          ide_location="$(curl -skI 'https://ide.kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          echo "$apex_location"
          echo "$ide_location"
          echo "$apex_location" | grep -qi 'redirect_uri=https%3A%2F%2Fkushnir.cloud%2Foauth2%2Fcallback'
          echo "$ide_location" | grep -qi 'redirect_uri=https%3A%2F%2Fide.kushnir.cloud%2Foauth2%2Fcallback'
