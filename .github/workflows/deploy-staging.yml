name: Deploy to Staging

on:
  push:
    branches: [develop]
    paths:
      - 'terraform/**'
      - 'services/**'
      - 'extensions/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - staging-canary

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TF_VERSION: 1.5.7
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  validate:
    name: Validate Before Deploy
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: Check Terraform Drift
        run: |
          cd terraform
          terraform plan \
            -var-file=terraform.tfvars.example \
            -detailed-exitcode || [ $? -eq 2 ]

  security-scan:
    name: Security Gate
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on Critical
        run: |
          if grep -q '"level": "CRITICAL"' trivy-results.sarif; then
            echo "Critical vulnerabilities found!"
            exit 1
          fi

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: staging
      url: https://staging.code-server.internal
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -upgrade

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan \
            -var-file=terraform.tfvars.staging \
            -var="code_server_image=${{ needs.build.outputs.image-tag }}" \
            -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply tfplan

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/code-server -n code-server --timeout=5m
          kubectl rollout status deployment/grafana -n monitoring --timeout=5m

      - name: Health Checks
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh staging

      - name: Run Smoke Tests
        run: |
          npm run test:smoke:staging || true
        continue-on-error: true

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Staging Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deploy* ${{ job.status }}\n*Branch:* develop\n*Commit:* ${{ github.sha }}\n*Image:* ${{ needs.build.outputs.image-tag }}"
                  }
                }
              ]
            }

permissions:
  contents: read
  packages: write
  id-token: write
