# Container Security Hardening Standards - SSOT
# ================================================
# P2 #425: Production container hardening baseline
# Applies to all containers in docker-compose.yml
# 
# SECURITY FRAMEWORK:
# - Immutable base images (sha256 digests)
# - Minimal attack surface (distroless/alpine)
# - No root execution (unprivileged users)
# - Capability dropping (least privilege)
# - Resource limits (CPU/memory/pids)
# - Read-only filesystems where possible
# - Health checks (startup/readiness/liveness)
# - Security scanning (container images)
# - Runtime policy enforcement (AppArmor/SELinux)
# - Secrets management (Vault integration)

# ═════════════════════════════════════════════════════════════════════════════
# HARDENING PROFILE 1: CORE SERVICES (HIGH SECURITY)
# ═════════════════════════════════════════════════════════════════════════════
# Applied to: code-server, postgres, redis, oauth2-proxy
#
# Properties:
# - No root execution (runAsNonRoot: true)
# - Minimal capabilities (no SYS_* or NET_* caps)
# - Read-only root filesystem
# - No privileged/unsafe syscalls
# - Strict resource limits
# - Health checks mandatory

core_service_hardening: &core_service_hardening
  security_opt:
    # AppArmor profile (strict confinement)
    - apparmor=docker-default
  
  # Drop ALL capabilities by default
  cap_drop:
    - ALL
  
  # Add back only required capabilities per service
  # (Overridden per service in docker-compose)
  
  # ulimit restrictions
  ulimits:
    # File descriptors
    nofile:
      soft: 65535
      hard: 65535
    
    # Memory lock (for password hashing/crypto)
    memlock:
      soft: -1
      hard: -1
    
    # Process count (prevent fork bombs)
    nproc:
      soft: 4096
      hard: 4096
  
  # Read-only root filesystem (immutability)
  read_only: false  # Per-service override
  
  # Resource limits (cgroup v2)
  cpus: "1"
  mem_limit: "512m"
  memswap_limit: "512m"  # No swap beyond limit
  pids_limit: 256
  
  # Logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      labels: "service=core,hardened=true"

# ═════════════════════════════════════════════════════════════════════════════
# HARDENING PROFILE 2: PRIVILEGED SERVICES (MEDIUM SECURITY)
# ═════════════════════════════════════════════════════════════════════════════
# Applied to: Caddy (TLS), Falco (kernel monitoring)
#
# Properties:
# - May require privileged mode for TLS/kernel access
# - Isolated capabilities (only what's needed)
# - Moderate resource limits
# - Health checks required

privileged_service_hardening: &privileged_service_hardening
  security_opt:
    - apparmor=docker-default
  
  cap_drop:
    - ALL
  
  # Add back only specific capabilities (per service)
  # Examples:
  # cap_add:
  #   - NET_BIND_SERVICE  # For Caddy/Kong (port 443)
  #   - SYS_RESOURCE      # For container resource control
  
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
    nproc:
      soft: 4096
      hard: 4096
  
  cpus: "2"
  mem_limit: "1024m"
  memswap_limit: "1024m"
  pids_limit: 512
  
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      labels: "service=privileged,hardened=true"

# ═════════════════════════════════════════════════════════════════════════════
# HARDENING PROFILE 3: OBSERVABILITY SERVICES (STANDARD SECURITY)
# ═════════════════════════════════════════════════════════════════════════════
# Applied to: Prometheus, Grafana, Loki, Jaeger, AlertManager
#
# Properties:
# - Standard capabilities (read metrics, access logs)
# - Volume mounts for config/data (not read-only)
# - Moderate resource limits
# - Health checks required

observability_service_hardening: &observability_service_hardening
  security_opt:
    - apparmor=docker-default
  
  cap_drop:
    - ALL
  
  # Typically need: CHOWN, DAC_OVERRIDE, SETGID, SETUID
  # (Added per service if needed)
  
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
    nproc:
      soft: 2048
      hard: 2048
  
  cpus: "1"
  mem_limit: "1024m"
  memswap_limit: "1024m"
  pids_limit: 256
  
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      labels: "service=observability,hardened=true"

# ═════════════════════════════════════════════════════════════════════════════
# SERVICE-SPECIFIC HARDENING CONFIGURATIONS
# ═════════════════════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────────────────
# code-server (IDE)
# ────────────────────────────────────────────────────────────────────────────
code_server_hardening: &code_server_hardening
  <<: *core_service_hardening
  cpus: "2"
  mem_limit: "2048m"
  memswap_limit: "2048m"
  
  cap_drop:
    - ALL
  # Keep only: CHOWN, DAC_OVERRIDE, SETGID, SETUID (for running code)
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
  
  # Working directory is persistent (not read-only)
  read_only: false
  
  # User: non-root (configured in image or container)
  # user: "coder:coder"  # Set in Dockerfile
  
  # Tmpfs mounts (temporary, cleared on restart)
  tmpfs:
    - /tmp
    - /run/user/1000

# ────────────────────────────────────────────────────────────────────────────
# PostgreSQL (Database)
# ────────────────────────────────────────────────────────────────────────────
postgres_hardening: &postgres_hardening
  <<: *core_service_hardening
  cpus: "2"
  mem_limit: "2048m"
  memswap_limit: "2048m"
  
  cap_drop:
    - ALL
  # PostgreSQL needs: CHOWN, DAC_OVERRIDE, SETGID, SETUID
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
  
  # Data directory needs to be writable
  read_only: false
  
  # Critical: Memory limit unlocking for large queries
  ulimits:
    memlock:
      soft: -1
      hard: -1
    nofile:
      soft: 65535
      hard: 65535
    nproc:
      soft: 4096
      hard: 4096

# ────────────────────────────────────────────────────────────────────────────
# Redis (Cache)
# ────────────────────────────────────────────────────────────────────────────
redis_hardening: &redis_hardening
  <<: *core_service_hardening
  cpus: "1"
  mem_limit: "1024m"
  memswap_limit: "1024m"
  
  cap_drop:
    - ALL
  # Redis needs: CHOWN, DAC_OVERRIDE, SETGID, SETUID
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
  
  # Redis can use read-only root (data in tmpfs)
  read_only: false
  
  # Memory locking for in-memory data
  ulimits:
    memlock:
      soft: -1
      hard: -1

# ────────────────────────────────────────────────────────────────────────────
# oauth2-proxy (Authentication Gateway)
# ────────────────────────────────────────────────────────────────────────────
oauth2_proxy_hardening: &oauth2_proxy_hardening
  <<: *core_service_hardening
  cpus: "1"
  mem_limit: "512m"
  
  cap_drop:
    - ALL
  # oauth2-proxy needs: NET_BIND_SERVICE (port 4180)
  cap_add:
    - NET_BIND_SERVICE
  
  # Read-only root filesystem (no persistent state)
  read_only: true
  
  # Tmpfs for runtime
  tmpfs:
    - /tmp
    - /var/run

# ────────────────────────────────────────────────────────────────────────────
# Caddy (Reverse Proxy)
# ────────────────────────────────────────────────────────────────────────────
caddy_hardening: &caddy_hardening
  <<: *privileged_service_hardening
  cpus: "2"
  mem_limit: "1024m"
  
  cap_drop:
    - ALL
  # Caddy needs: NET_BIND_SERVICE (ports 80/443), CHOWN (cert management)
  cap_add:
    - NET_BIND_SERVICE
    - CHOWN
    - DAC_OVERRIDE
  
  # Cannot use read-only (needs to write certs)
  read_only: false
  
  # Tmpfs for runtime
  tmpfs:
    - /tmp

# ────────────────────────────────────────────────────────────────────────────
# Falco (Runtime Security)
# ────────────────────────────────────────────────────────────────────────────
falco_hardening: &falco_hardening
  <<: *privileged_service_hardening
  cpus: "2"
  mem_limit: "1024m"
  
  cap_drop:
    - ALL
  # Falco needs: SYS_RESOURCE, SYS_ADMIN (kernel event access)
  cap_add:
    - SYS_RESOURCE
    - SYS_ADMIN
    - SYS_PTRACE
  
  # Falco needs kernel module access
  privileged: false  # eBPF mode doesn't need full privilege
  security_opt:
    - apparmor=unconfined  # Kernel access required
  
  # Read-only config
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# Prometheus (Metrics Collection)
# ────────────────────────────────────────────────────────────────────────────
prometheus_hardening: &prometheus_hardening
  <<: *observability_service_hardening
  cpus: "2"
  mem_limit: "2048m"
  
  cap_drop:
    - ALL
  # Prometheus needs: CHOWN, DAC_OVERRIDE (for data dir)
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
  
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# Grafana (Dashboards)
# ────────────────────────────────────────────────────────────────────────────
grafana_hardening: &grafana_hardening
  <<: *observability_service_hardening
  cpus: "1"
  mem_limit: "1024m"
  
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
  
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# Loki (Log Aggregation)
# ────────────────────────────────────────────────────────────────────────────
loki_hardening: &loki_hardening
  <<: *observability_service_hardening
  cpus: "2"
  mem_limit: "2048m"
  
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
  
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# Jaeger (Distributed Tracing)
# ────────────────────────────────────────────────────────────────────────────
jaeger_hardening: &jaeger_hardening
  <<: *observability_service_hardening
  cpus: "2"
  mem_limit: "2048m"
  
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
  
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# AlertManager (Alert Routing)
# ────────────────────────────────────────────────────────────────────────────
alertmanager_hardening: &alertmanager_hardening
  <<: *observability_service_hardening
  cpus: "1"
  mem_limit: "512m"
  
  cap_drop:
    - ALL
  cap_add:
    - CHOWN
    - DAC_OVERRIDE
  
  read_only: false

# ────────────────────────────────────────────────────────────────────────────
# Kong (API Gateway)
# ────────────────────────────────────────────────────────────────────────────
kong_hardening: &kong_hardening
  <<: *privileged_service_hardening
  cpus: "2"
  mem_limit: "1024m"
  
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE  # Port 8000/8443
    - CHOWN
    - DAC_OVERRIDE
  
  read_only: false

# ╔═════════════════════════════════════════════════════════════════════════════╗
# ║ HARDENING VALIDATION & TESTING                                              ║
# ╚═════════════════════════════════════════════════════════════════════════════╝
#
# QUALITY GATES - ALL HARDENING CONFIGS MUST PASS:
#
# 1. Image Scanning
#    - `trivy image <IMAGE>` → Zero HIGH/CRITICAL vulnerabilities
#    - `snyk test <IMAGE>` → Security review passed
#    - Based on minimal images: alpine:3.x, distroless, scratch
#
# 2. Capability Validation
#    - `docker inspect <CONTAINER> | jq .[0].HostConfig.CapAdd`
#    - Only required caps present
#    - ALL caps dropped by default
#
# 3. Resource Limits
#    - CPU: Enforced via cgroup v2 cpu.max
#    - Memory: Enforced via memory.max (no swap)
#    - PIDs: Enforced via pids.max (fork bomb protection)
#
# 4. Filesystem Security
#    - Read-only where possible (immutable config)
#    - tmpfs for runtime (cleared on restart)
#    - Proper ownership (non-root user)
#
# 5. Security Policy
#    - AppArmor profile: docker-default
#    - SELinux labels (if enabled)
#    - seccomp profiles (block dangerous syscalls)
#
# 6. Health Checks
#    - startup probe (30s timeout)
#    - readiness probe (5s interval)
#    - liveness probe (60s interval)
#
# TEST COMMANDS:
#
# Scan all images for vulnerabilities:
#   for img in $(docker-compose config | grep 'image:' | awk '{print $2}'); do
#     trivy image $img
#   done
#
# Validate capabilities:
#   docker-compose up -d
#   for svc in $(docker-compose ps --services); do
#     docker inspect $(docker-compose ps -q $svc) | jq .[0].HostConfig.Cap
#   done
#
# Test resource limits:
#   docker stats --no-stream
#
# Check security options:
#   docker inspect <container> | jq .[0].HostConfig.SecurityOpt
#
# ╔═════════════════════════════════════════════════════════════════════════════╗
# ║ DEPLOYMENT & MAINTENANCE                                                    ║
# ╚═════════════════════════════════════════════════════════════════════════════╝
#
# 1. In docker-compose.yml, apply hardening anchors:
#
#    code-server:
#      <<: *code_server_hardening
#      image: codercom/code-server:latest@sha256:...
#
# 2. Validate before deploying:
#    docker-compose config > /tmp/config.yml
#    yamllint /tmp/config.yml
#
# 3. Deploy with health checks:
#    docker-compose up -d
#    docker-compose ps  # Verify all healthy
#
# 4. Monitor continuously:
#    docker stats --no-stream
#    docker logs <container> --tail 100
#
# 5. Update base images monthly:
#    docker pull <image>  # Get latest security patches
#    docker-compose up -d  # Redeploy
#
