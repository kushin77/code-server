server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          env: production
    syslog_sd_configs:
      - listen_address: 127.0.0.1:5140
    relabel_configs:
      - source_labels: ['__syslog_message_hostname']
        target_label: 'hostname'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'app'
    pipeline_stages:
      - json:
          expressions:
            output: log
          skip_parse_error_log: true
      - regex:
          expression: '(?P<json_log>.*)'
          skip_parse_error_log: true
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            level: level
          skip_parse_error_log: true
      - timestamp:
          format: RFC3339
          source: time
          skip_parse_error_log: true
