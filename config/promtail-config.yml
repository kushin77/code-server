# Promtail configuration — log shipper for Loki
# Collects logs from:
# 1. Docker containers (via Docker daemon)
# 2. Application stdout/stderr (via Docker logging driver)
# 3. System logs (optional: /var/log/*)

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn
  log_format: json

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ''

scrape_configs:
  # Docker containers
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          __path__: /var/lib/docker/containers/*/*.log
          job: docker
          env: production
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      # Container name as label
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      # Image name as label
      - source_labels: ['__meta_docker_image_name']
        target_label: 'image'
      # Service name (extract from container name)
      - source_labels: ['container']
        regex: '([a-z0-9-]+)(_[0-9]+)?'
        target_label: 'service'
      # Add environment label
      - source_labels: ['container']
        target_label: 'environment'
        replacement: 'production'
    pipeline_stages:
      # Parse JSON Docker log lines
      - json:
          expressions:
            output: log
      # Extract timestamp
      - timestamp:
          source: time
          format: RFC3339Nano
      # Drop Docker metadata fields
      - regex:
          expression: '(?P<json_log>.*)'
      # Parse application-level JSON
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            level: level
            message: msg
            service: service
            error: error
      # Add labels for structured fields
      - labels:
          trace_id: ''
          span_id: ''
          level: ''
          service: ''

  # System logs (optional, can be disabled if docker logs are sufficient)
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          __path__: /var/log/syslog
          job: syslog
          env: production
    pipeline_stages:
      - regex:
          expression: '(?P<timestamp>.*) (?P<hostname>\S+) (?P<program>\S+)(?:\[(?P<pid>\d+)\])?:(?P<message>.*)'
      - timestamp:
          source: timestamp
          format: 'Jan  2 15:04:05'
      - labels:
          hostname: ''
          program: ''
          pid: ''

  # Application logs (JSON format)
  - job_name: application
    static_configs:
      - targets:
          - localhost
        labels:
          __path__: /var/log/application/*.log
          job: application
          env: production
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            trace_id: trace_id
            span_id: span_id
            message: message
            service: service
            error: error
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          trace_id: ''
          span_id: ''
          level: ''
          service: ''
