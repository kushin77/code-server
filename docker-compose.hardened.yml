# Container Hardening Overlay (Issue #425)
# Network Segmentation, Security Contexts, Resource Limits, Digest Pinning
#
# Usage: docker-compose -f docker-compose.yml -f docker-compose.hardened.yml up -d
#
# This overlay applies elite security hardening:
# - Network segmentation (frontend/app/data/monitoring/gateway)
# - Read-only root filesystems where possible
# - Non-root user execution
# - Resource limits (memory/CPU)
# - Capability dropping
# - Security contexts

version: "3.8"

# ════════════════════════════════════════════════════════════════════════════════
# Network Segmentation by Trust Tier
# ════════════════════════════════════════════════════════════════════════════════

networks:
  frontend:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.0.0/24
  
  app:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
  
  data:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
  
  monitoring:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/24
  
  gateway:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.24.0.0/24

# ════════════════════════════════════════════════════════════════════════════════
# Hardened Service Configuration Overrides
# ════════════════════════════════════════════════════════════════════════════════

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Caddy: Frontend Reverse Proxy (External Traffic)
  # ────────────────────────────────────────────────────────────────────────────

  caddy:
    networks:
      - frontend
      - app
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /run:noexec,nosuid,size=100m
      - /home/caddy:noexec,nosuid,size=500m
    user: "1000:1000"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
          cpus: '0.25'

  # ────────────────────────────────────────────────────────────────────────────
  # oauth2-proxy: Authentication Gateway
  # ────────────────────────────────────────────────────────────────────────────

  oauth2-proxy:
    networks:
      - frontend
      - app
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "65534:65534"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
        reservations:
          memory: 128m
          cpus: '0.25'

  # ────────────────────────────────────────────────────────────────────────────
  # code-server: IDE Application
  # ────────────────────────────────────────────────────────────────────────────

  code-server:
    networks:
      - app
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "1000:1000"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2'
        reservations:
          memory: 2g
          cpus: '1'

  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL: Data Tier (No External Access)
  # ────────────────────────────────────────────────────────────────────────────

  postgresql:
    networks:
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "999:999"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4'
        reservations:
          memory: 2g
          cpus: '2'

  # ────────────────────────────────────────────────────────────────────────────
  # Redis: Cache/Session Store (Data Tier)
  # ────────────────────────────────────────────────────────────────────────────

  redis:
    networks:
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "999:999"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'
        reservations:
          memory: 1g
          cpus: '1'

  # ────────────────────────────────────────────────────────────────────────────
  # Prometheus: Metrics Collection (Monitoring Tier)
  # ────────────────────────────────────────────────────────────────────────────

  prometheus:
    networks:
      - monitoring
      - data
      - app
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
      - /prometheus:noexec,nosuid,size=2g
    user: "65534:65534"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'
        reservations:
          memory: 512m
          cpus: '0.5'

  # ────────────────────────────────────────────────────────────────────────────
  # Grafana: Visualization Dashboard (Monitoring Tier)
  # ────────────────────────────────────────────────────────────────────────────

  grafana:
    networks:
      - monitoring
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "472:472"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
          cpus: '0.25'

  # ────────────────────────────────────────────────────────────────────────────
  # Loki: Log Aggregation (Monitoring Tier)
  # ────────────────────────────────────────────────────────────────────────────

  loki:
    networks:
      - monitoring
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
      - /loki:noexec,nosuid,size=5g
    user: "10000:10000"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1'
        reservations:
          memory: 1g
          cpus: '0.5'

  # ────────────────────────────────────────────────────────────────────────────
  # Jaeger: Distributed Tracing (Monitoring Tier)
  # ────────────────────────────────────────────────────────────────────────────

  jaeger:
    networks:
      - monitoring
      - app
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "10001:10001"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1'
        reservations:
          memory: 512m
          cpus: '0.5'

  # ────────────────────────────────────────────────────────────────────────────
  # AlertManager: Alert Routing and Management (Monitoring Tier)
  # ────────────────────────────────────────────────────────────────────────────

  alertmanager:
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "65534:65534"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
        reservations:
          memory: 128m
          cpus: '0.125'

  # ────────────────────────────────────────────────────────────────────────────
  # Kong: API Gateway (Gateway Tier)
  # ────────────────────────────────────────────────────────────────────────────

  kong:
    networks:
      - gateway
      - app
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "1000:1000"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1'
        reservations:
          memory: 256m
          cpus: '0.5'

  # ────────────────────────────────────────────────────────────────────────────
  # Vault: Secrets Management (Isolated)
  # ────────────────────────────────────────────────────────────────────────────

  vault:
    networks:
      - data
      - app
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    user: "100:100"
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 256m
          cpus: '0.25'

  # ────────────────────────────────────────────────────────────────────────────
  # MinIO: Object Storage (Data Tier)
  # ────────────────────────────────────────────────────────────────────────────

  minio:
    networks:
      - data
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
    user: "1000:1000"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2'
        reservations:
          memory: 1g
          cpus: '1'

  # ────────────────────────────────────────────────────────────────────────────
  # Ollama: Local LLM (App Tier, GPU-enabled)
  # ────────────────────────────────────────────────────────────────────────────

  ollama:
    networks:
      - app
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: '4'
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 4g
          cpus: '2'
