groups:
  - name: slo_metrics
    interval: 15s
    rules:
      - record: slo:availability:ratio
        expr: sum(rate(http_requests_total{status=~"2.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)
      
      - record: slo:latency:p99
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service))
      
      - record: slo:error_rate:ratio
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service)
      
      - record: slo:throughput:rps
        expr: sum(rate(http_requests_total[5m])) by (service)
      
      - record: slo:availability:error_budget
        expr: (0.0005 * 86400) - count(ALERTS{alertname=~"SLOAvailabilityBreach"}) * 5
      
      - record: slo:burn_rate:daily
        expr: (1 - slo:availability:ratio) / 0.0005
