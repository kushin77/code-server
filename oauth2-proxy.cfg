# oauth2-proxy reference config — NOT mounted into the container
# All values are set via OAUTH2_PROXY_* environment variables in docker-compose.yml
# This file documents all available options for manual/non-Docker deployments
# Provider: Google OAuth2

# ─── Provider ─────────────────────────────────────────────────────────────────
provider = "google"
client-id = ""              # Set via OAUTH2_PROXY_CLIENT_ID env var
client-secret = ""          # Set via OAUTH2_PROXY_CLIENT_SECRET env var

# Google OAuth discovery — use standard OIDC discovery
oidc-issuer-url = "https://accounts.google.com"
skip-oidc-discovery = false

# ─── Upstream ─────────────────────────────────────────────────────────────────
# In Docker Compose, code-server is reachable via its service name
# (env var: OAUTH2_PROXY_UPSTREAMS=http://code-server:8080/)
upstreams = ["http://code-server:8080/"]
# ssl-upstream-insecure-skip-verify not needed — code-server runs HTTP internally

# ─── Redirect URL ─────────────────────────────────────────────────────────────
# In docker-compose, use surface-specific callback env vars:
# - OAUTH2_PROXY_IDE_REDIRECT_URL=https://ide.kushnir.cloud/oauth2/callback
# - OAUTH2_PROXY_PORTAL_REDIRECT_URL=https://kushnir.cloud/oauth2/callback
redirect-url = "https://kushnir.cloud/oauth2/callback"

# ─── Email / Access Control ───────────────────────────────────────────────────
# Restrict to specific email(s) or domain(s):
#   email-domains = ["yourdomain.com"]   (all users in domain)
#   authenticated-emails-file = "/etc/oauth2-proxy/allowed-emails.txt"
# In this repo, the mounted authenticated-emails file is authoritative.
email-domains = ["bioenergystrategies.com"]

# ─── Cookie ───────────────────────────────────────────────────────────────────
cookie-secret = ""          # Set via OAUTH2_PROXY_COOKIE_SECRET env var (32+ bytes base64)
cookie-name = "_oauth2_proxy_ide"
cookie-secure = true
cookie-httponly = true
cookie-samesite = "strict"
cookie-expire = "24h"
cookie-refresh = "15m"

# ─── Proxy behaviour ──────────────────────────────────────────────────────────
proxy-prefix = "/oauth2"
skip-provider-button = false
# code-server uses WebSocket for terminal/live editing — must be proxied
proxy-websockets = true

# ─── Headers passed downstream ────────────────────────────────────────────────
set-xauthrequest = true
pass-user-headers = true
pass-basic-auth = false
prefer-email-to-user = true
set-authorization-header = false

# ─── Listen address ───────────────────────────────────────────────────────────
http-address = "0.0.0.0:4180"

# ─── Logging ──────────────────────────────────────────────────────────────────
request-logging = true
auth-logging = true
standard-logging = true

# ─── Security ─────────────────────────────────────────────────────────────────
insecure-oidc-allow-unverified-email = false
# Skip auth for health-check paths
skip-auth-route = ["^/oauth2/", "^/health$"]
