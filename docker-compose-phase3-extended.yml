# Phase 3 Extended Services - Docker Compose (No k3s Required)
# Deploy additional services for CI/CD, artifact management, and developer tools
# Extensions to docker-compose.yml for on-prem infrastructure

version: "3.9"

services:
  # ============================================================================
  # Issue #175: Nexus Repository Manager - Artifact & Dependency Caching
  # ============================================================================
  nexus:
    image: sonatype/nexus3:3.60.0
    container_name: nexus
    restart: unless-stopped
    hostname: nexus
    ports:
      - "8081:8081"  # Nexus UI
      - "8082:8082"  # Docker registry (hosted)
      - "8083:8083"  # NPM proxy
    environment:
      NEXUS_CONTEXT: "/"
      NEXUS_PORT: "8081"
      JAVA_MAX_MEM: "2048M"
      JAVA_MIN_MEM: "512M"
    volumes:
      - nexus-data:/nexus-data
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  # ============================================================================
  # Issue #174: Docker BuildKit - 5-10x Faster Builds with Layer Caching
  # ============================================================================
  buildkit:
    image: moby/buildkit:latest
    container_name: buildkit
    restart: unless-stopped
    hostname: buildkit
    ports:
      - "1234:1234"  # BuildKit gRPC API
    volumes:
      - buildkit-state:/var/lib/buildkit
      - /var/run/docker.sock:/var/run/docker.sock
      - buildkit-cache:/cache
      - /etc/timezone:/etc/timezone:ro
    environment:
      BUILDKIT_CACHE_SIZE_MB: "10000"
      BUILDKIT_MAX_PARALLELISM: "8"
    command: |
      --addr unix:///run/buildkit/buildkitd.sock
      --tlscacert=/etc/buildkit/ca.pem
      --tlscert=/etc/buildkit/cert.pem
      --tlskey=/etc/buildkit/key.pem
    healthcheck:
      test: ["CMD", "buildctl", "build", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local

  # ============================================================================
  # Issue #176: Developer Dashboard - Real-time Metrics & Status Monitor
  # ============================================================================
  dev-dashboard-api:
    image: node:20-alpine
    container_name: dev-dashboard-api
    restart: unless-stopped
    hostname: dev-dashboard-api
    ports:
      - "3001:3001"  # API server
    volumes:
      - ./scripts/dashboard-api:/app
      - /etc/timezone:/etc/timezone:ro
    working_dir: /app
    command: |
      sh -c "npm install && node server.js"
    environment:
      NODE_ENV: production
      PORT: 3001
      PROMETHEUS_URL: http://prometheus:9090
      GRAFANA_URL: http://grafana:3000
      DOCKER_HOST: unix:///var/run/docker.sock
      LOG_LEVEL: info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  dev-dashboard-ui:
    image: node:20-alpine
    container_name: dev-dashboard-ui
    restart: unless-stopped
    hostname: dev-dashboard-ui
    ports:
      - "3002:3000"  # React frontend
    volumes:
      - ./scripts/dashboard-ui:/app
      - /etc/timezone:/etc/timezone:ro
    working_dir: /app
    command: |
      sh -c "npm install && REACT_APP_API_URL=http://localhost:3001 npm start"
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: http://localhost:3001
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  # ============================================================================
  # Issue #170: OPA/Kyverno - Policy Enforcement (Docker-based)
  # ============================================================================
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    restart: unless-stopped
    hostname: opa
    ports:
      - "8181:8181"  # OPA API
    volumes:
      - ./kubernetes/opa-policies:/policies:ro
      - opa-data:/data
      - /etc/timezone:/etc/timezone:ro
    command: |
      run --server --log-level=info --addr=0.0.0.0:8181 /policies
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local

  # ============================================================================
  # Issue #169: Dagger CI/CD - Language-Agnostic Build Pipeline
  # ============================================================================
  dagger-engine:
    image: dagger/engine:v0.9.11
    container_name: dagger-engine
    restart: unless-stopped
    hostname: dagger-engine
    ports:
      - "5000:5000"  # Dagger Engine API
    volumes:
      - dagger-cache:/cache
      - dagger-state:/state
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
    environment:
      DAGGER_CACHE_SIZE: "50gb"
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  # ============================================================================
  # Phase 3 Supporting Services
  # ============================================================================

  # Registry mirror - speeds up container pulls
  registry-mirror:
    image: registry:2.8
    container_name: registry-mirror
    restart: unless-stopped
    hostname: registry-mirror
    ports:
      - "5555:5000"
    volumes:
      - registry-mirror-data:/var/lib/registry
      - ./kubernetes/registry-mirror-config.yml:/etc/docker/registry/config.yml:ro
      - /etc/timezone:/etc/timezone:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v2/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local

  # ArgoCD - GitOps control plane (Docker version)
  argocd-server:
    image: quay.io/argoproj/argocd:latest
    container_name: argocd-server
    restart: unless-stopped
    hostname: argocd-server
    ports:
      - "8443:8080"  # ArgoCD UI
    volumes:
      - argocd-data:/home/argocd/.local/share
      - argocd-config:/home/argocd/.config
      - /etc/timezone:/etc/timezone:ro
    environment:
      ARGOCD_SERVER: "argocd-server"
      ARGOCD_INSECURE: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  argocd-repo-server:
    image: quay.io/argoproj/argocd:latest
    container_name: argocd-repo-server
    restart: unless-stopped
    hostname: argocd-repo-server
    ports:
      - "8081:8081"
    volumes:
      - argocd-cache:/home/argocd/.cache
      - argocd-data:/home/argocd/.local/share
      - /etc/timezone:/etc/timezone:ro
    command: argocd-repo-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - local

  # ============================================================================
  # Monitoring & Observability Enhancements
  # ============================================================================

  # Log aggregator for Phase 3 services
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    hostname: loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - /etc/timezone:/etc/timezone:ro
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - local

  # Promtail - log shipper
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    hostname: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
    command: -config.file=/etc/promtail/config.yaml
    environment:
      HOSTNAME: "192.168.168.31"
      LOG_LEVEL: info
    networks:
      - local

volumes:
  # Phase 3 Service Volumes
  nexus-data:
    driver: local
  buildkit-state:
    driver: local
  buildkit-cache:
    driver: local
  opa-data:
    driver: local
  dagger-cache:
    driver: local
  dagger-state:
    driver: local
  registry-mirror-data:
    driver: local
  argocd-data:
    driver: local
  argocd-config:
    driver: local
  argocd-cache:
    driver: local
  loki-data:
    driver: local

networks:
  local:
    driver: bridge
