# ════════════════════════════════════════════════════════════════════════════
# code-server Configuration
# 
# Deploy location: ~/.config/code-server/config.yaml
# Generated by Terraform — managed in terraform/main.tf
# ════════════════════════════════════════════════════════════════════════════

bind-addr: 0.0.0.0:8080
auth: password
password: ${CODE_SERVER_PASSWORD}
cert: false  # Let reverse proxy (Caddy) handle TLS

# Security: Proxy domains whitelisted for secure context
proxy-domain:
  - localhost
  - 127.0.0.1
  - 192.168.168.31
  - 192.168.168.32
  - ide.kushnir.cloud

# Logging for audit trail (set via LOG_LEVEL from Terraform)
logging: ${LOG_LEVEL:-info}

# Extension gallery disabled (use pre-installed VSIX bundles)
# GitHub Copilot Chat not available on Open VSX

# Compliance: Disable telemetry
disable-telemetry: true

# Rate limiting
max-connections: 100

# Session timeout: 30 minutes
session-timeout: 1800000
