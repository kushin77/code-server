apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: code-server

resources:
  # Namespace and core infrastructure
  - namespace.yaml
  
  # Configuration
  - configmaps.yaml
  
  # Deployments and Services
  - code-server-deployment.yaml
  - code-server-service.yaml
  - agent-api-deployment.yaml
  - agent-api-service.yaml
  - embeddings-deployment.yaml
  - embeddings-service.yaml
  - redis-statefulset.yaml
  - redis-service.yaml
  - prometheus-deployment.yaml
  - prometheus-service.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml
  
  # Scaling and reliability
  - hpa.yaml
  - pdb.yaml
  
  # Monitoring and metrics
  - monitoring.yaml
  
  # Security
  - network-policies.yaml

commonLabels:
  app.kubernetes.io/version: "phase-8"
  app.kubernetes.io/managed-by: "kustomize"

commonAnnotations:
  repository: "code-server"
  environment: "shared"
