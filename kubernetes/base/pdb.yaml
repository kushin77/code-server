apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: code-server-pdb
  namespace: code-server
  labels:
    app: code-server
    component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: code-server
  unhealthyPodEvictionPolicy: AlwaysAllow
---
