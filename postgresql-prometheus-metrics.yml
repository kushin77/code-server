# PostgreSQL Metrics Configuration for Prometheus
# 
# Queries PostgreSQL for performance metrics and exports them
# in Prometheus text format
#
# Generated by: Phase 3 observability spine - TASK 7 (PostgreSQL Query Tracing)

# PostgreSQL Exporter Configuration
# Install: pip install prometheus-client psycopg2

---
# To use with Prometheus:
# Add this to prometheus.yml:

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'postgres-metrics'
    static_configs:
      - targets: ['localhost:9187']  # postgres_exporter default port
    scrape_interval: 30s
    scrape_timeout: 10s

# The queries below should be run by postgres_exporter or equivalent tool

---
# PostgreSQL Queries for Metrics Export

# 1. Cache Hit Ratio
SELECT
  CASE WHEN (sum(heap_blks_hit) + sum(heap_blks_read)) = 0 THEN 0
       ELSE sum(heap_blks_hit) / (sum(heap_blks_hit) + sum(heap_blks_read))
  END AS cache_hit_ratio
FROM pg_statio_user_tables;

# 2. Slow Query Count (1s+)
SELECT
  COUNT(*) as slow_query_count
FROM pg_stat_statements
WHERE mean_exec_time > 1000
  AND query NOT LIKE 'autovacuum%'
  AND query NOT LIKE 'EXPLAIN%';

# 3. Average Query Duration (ms)
SELECT
  ROUND(AVG(mean_exec_time)::numeric, 2) as avg_query_duration_ms
FROM pg_stat_statements
WHERE query NOT LIKE 'autovacuum%'
  AND query NOT LIKE 'EXPLAIN%';

# 4. Max Query Duration (ms)
SELECT
  ROUND(MAX(max_exec_time)::numeric, 2) as max_query_duration_ms
FROM pg_stat_statements
WHERE query NOT LIKE 'autovacuum%'
  AND query NOT LIKE 'EXPLAIN%';

# 5. Deadlock Count
SELECT
  SUM(deadlocks) as total_deadlocks
FROM pg_stat_database;

# 6. Connection Count
SELECT
  COUNT(*) as active_connections
FROM pg_stat_activity
WHERE state = 'active';

# 7. Idle Connection Count
SELECT
  COUNT(*) as idle_connections
FROM pg_stat_activity
WHERE state = 'idle';

# 8. Transaction Wraparound
SELECT
  2147483647 - MAX(age(datfrozenxid)) as xid_wraparound_danger_threshold
FROM pg_database;

# 9. Database Size (bytes)
SELECT
  SUM(pg_database_size(datname)) as total_database_size_bytes
FROM pg_database;

# 10. Table Bloat (dead tuples ratio)
SELECT
  schemaname,
  tablename,
  ROUND(100.0 * n_dead_tup / NULLIF(n_live_tup + n_dead_tup, 0), 2) as dead_ratio
FROM pg_stat_user_tables
WHERE n_dead_tup > 1000
  AND n_live_tup > 0
ORDER BY dead_ratio DESC
LIMIT 10;

# 11. Index Usage
SELECT
  schemaname,
  tablename,
  indexname,
  idx_scan,
  idx_tup_read,
  idx_tup_fetch,
  CASE WHEN idx_scan = 0 THEN 'UNUSED'
       WHEN idx_tup_read = 0 THEN 'UNUSED'
       ELSE 'USED'
  END as status
FROM pg_stat_user_indexes
ORDER BY idx_scan DESC;

# 12. Lock Contention
SELECT
  COUNT(*) as blocked_queries
FROM pg_locks l
  JOIN pg_stat_activity a ON l.pid = a.pid
WHERE l.granted = false;

# 13. Replication Lag (for replicas)
SELECT
  EXTRACT(EPOCH FROM (NOW() - pg_last_xact_replay_timestamp())) as replication_lag_seconds;

# 14. Autovacuum Status
SELECT
  schemaname,
  tablename,
  last_vacuum,
  last_autovacuum,
  last_analyze,
  last_autoanalyze,
  EXTRACT(EPOCH FROM (NOW() - last_autovacuum)) as since_last_autovacuum_seconds
FROM pg_stat_user_tables
ORDER BY last_autovacuum DESC;

# 15. Queries with Trace Context
SELECT
  COUNT(*) as queries_with_trace_context,
  COUNT(*) FILTER (WHERE mean_exec_time > 1000) as slow_queries_with_trace_context
FROM pg_stat_statements
WHERE query LIKE '%trace_id=%';

---
# Prometheus Alerting Rules (alert-rules-postgresql.yml)

groups:
  - name: postgresql
    interval: 30s
    rules:
      # Alert: Cache hit ratio low
      - alert: PostgreSQLLowCacheHitRatio
        expr: pg_cache_hit_ratio < 0.95
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL cache hit ratio low (< 95%)"
          description: "Cache hit ratio is {{ $value }}, queries reading from disk"

      # Alert: Slow queries detected
      - alert: PostgreSQLSlowQueries
        expr: pg_slow_query_count > 10
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL has {{ $value }} slow queries (> 1s)"
          description: "High number of slow queries detected"

      # Alert: High query duration
      - alert: PostgreSQLHighQueryDuration
        expr: pg_max_query_duration_ms > 5000
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL max query duration > 5s"
          description: "Max query duration: {{ $value }}ms"

      # Alert: Deadlocks detected
      - alert: PostgreSQLDeadlocksDetected
        expr: rate(pg_deadlocks[5m]) > 0
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL deadlocks detected"
          description: "{{ $value }} deadlocks per second"

      # Alert: Too many connections
      - alert: PostgreSQLHighConnections
        expr: pg_active_connections > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL connection count high"
          description: "Active connections: {{ $value }}"

      # Alert: Transaction wraparound risk
      - alert: PostgreSQLTransactionWraparound
        expr: pg_xid_wraparound_danger_threshold < 1000000
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL transaction wraparound risk"
          description: "XID wraparound in {{ $value }} transactions"

      # Alert: Table bloat
      - alert: PostgreSQLTableBloat
        expr: pg_table_bloat_ratio > 0.50
        for: 30m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL table bloat detected"
          description: "{{ $labels.tablename }} bloat: {{ $value }}%"

      # Alert: Lock contention
      - alert: PostgreSQLLockContention
        expr: pg_blocked_queries > 0
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL lock contention detected"
          description: "{{ $value }} blocked queries"

      # Alert: Replication lag (optional, for replicas)
      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL replication lag > 30s"
          description: "Lag: {{ $value }}s"

---
# Grafana Dashboard JSON (partial)

# PostgreSQL Performance Dashboard
# - Cache hit ratio trend
# - Query duration (min/max/avg)
# - Slow query count and operations
# - Connection pool utilization
# - Lock contention
# - Autovacuum activity
# - Trace-correlated queries

# To import into Grafana:
# 1. Dashboard → Import
# 2. Paste JSON from GRAFANA-POSTGRESQL-DASHBOARD.json
# 3. Select Prometheus data source
# 4. Import

dashboard:
  title: "PostgreSQL Performance"
  panels:
    - title: "Cache Hit Ratio"
      type: "graph"
      targets:
        - expr: "pg_cache_hit_ratio"
          legendFormat: "Hit Ratio"
    
    - title: "Query Duration"
      type: "graph"
      targets:
        - expr: "pg_max_query_duration_ms"
          legendFormat: "Max (ms)"
        - expr: "pg_avg_query_duration_ms"
          legendFormat: "Avg (ms)"
    
    - title: "Slow Queries"
      type: "graph"
      targets:
        - expr: "pg_slow_query_count"
          legendFormat: "Count"
    
    - title: "Active Connections"
      type: "gauge"
      targets:
        - expr: "pg_active_connections"
    
    - title: "Queries with Trace Context"
      type: "stat"
      targets:
        - expr: "pg_queries_with_trace_context"
          legendFormat: "Total"
        - expr: "pg_slow_queries_with_trace_context"
          legendFormat: "Slow"

---
# Integration with OpenTelemetry

# OpenTelemetry can consume PostgreSQL metrics:
# 1. prometheus_receiver scrapes PostgreSQL metrics
# 2. prometheus_exporter exports to Prometheus backend
# 3. Jaeger can correlate with trace data

# Example otel-collector-config.yaml:
receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'postgres-metrics'
          static_configs:
            - targets: ['localhost:9090']  # Prometheus scraping PostgreSQL

exporters:
  prometheus:
    endpoint: "0.0.0.0:8888"

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      exporters: [prometheus]
