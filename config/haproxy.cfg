global
  maxconn 4096
  log /dev/log local0 info
  log /dev/log local0 notice
  stats socket /run/haproxy/admin.sock mode 660 level admin
  stats timeout 30s
  user haproxy
  group haproxy
  daemon
  
  # Default SSL material locations
  ca-base /etc/ssl/certs
  crt-base /etc/ssl/private

  # SSL configuration
  ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
  ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11 no-tlsv12
  ssl-default-server-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
  ssl-default-server-options no-sslv3 no-tlsv10 no-tlsv11 no-tlsv12

defaults
  log global
  mode http
  option httplog
  option dontlognull
  option forwardfor
  timeout connect 5s
  timeout client 30m
  timeout server 30m
  timeout tunnel 1h
  timeout http-keep-alive 60s
  
  # Error pages
  errorfile 400 /usr/local/etc/haproxy/errors/400.http
  errorfile 403 /usr/local/etc/haproxy/errors/403.http
  errorfile 408 /usr/local/etc/haproxy/errors/408.http
  errorfile 500 /usr/local/etc/haproxy/errors/500.http
  errorfile 502 /usr/local/etc/haproxy/errors/502.http
  errorfile 503 /usr/local/etc/haproxy/errors/503.http
  errorfile 504 /usr/local/etc/haproxy/errors/504.http

frontend main_lb
  bind *:80
  # bind *:443 ssl crt /etc/haproxy/certs/ide.pem
  
  # Health check for external status
  monitor-uri /healthz
  
  # Stats endpoint
  stats enable
  stats uri /haproxy-stats
  stats refresh 30s
  # Credentials must come from runtime env; do not hardcode in repository.
  stats auth ${HAPROXY_STATS_USER}:${HAPROXY_STATS_PASSWORD}

  default_backend code_server_backend

backend code_server_backend
  # Auth path should stay single-origin by default; replica is failover-only.
  balance roundrobin

  # Session affinity based on oauth2-proxy IDE session cookie.
  stick-table type string len 128 size 200k expire 24h
  stick on req.cook(_oauth2_proxy_ide)

  # Fallback stickiness for first unauthenticated request before oauth2 cookie exists.
  cookie IDE_NODE insert indirect nocache secure httponly

  # oauth2-proxy exposes /ping for readiness; this is safer than probing app paths.
  http-check send meth GET uri /ping ver HTTP/1.1 hdr Host ide.kushnir.cloud
  http-check expect status 200

  # Active-passive routing: primary handles auth/session path, replica is backup-only.
  server primary primary.prod.internal:4180 check inter 10s fall 3 rise 2 weight 100 cookie p31
  server replica replica.prod.internal:4180 check inter 10s fall 3 rise 2 backup weight 0 cookie r42

  # Observable backend selection for drills and continuity tests.
  http-response set-header X-LB-Backend %[srv_name]

  # Backend-specific log-format is unsupported in recent HAProxy; keep default httplog.
