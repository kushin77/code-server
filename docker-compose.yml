# ════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Authoritative On-Prem Deployment
#
# Single source of truth for container orchestration on 192.168.168.31
#
# DO NOT EDIT build: blocks here — image is pre-built and tagged on host.
# All versions are pinned. All services are idempotent.
#
# Run:
#   docker-compose up -d          # Start all services
#   docker-compose down -v        # Teardown with volumes
# Manual redeploy trigger: refresh production container stack
#   docker-compose restart caddy  # Restart single service
# ════════════════════════════════════════════════════════════════════════════

services:

  # ────────────────────────────────────────────────────────────────────────────
  # code-server — VS Code in the browser
  # Custom enterprise image with comprehensive development tools pre-installed
  # All dependencies baked into image for immutable, reproducible deployments
  # Users never need to manually install packages (admin-only via IaC)
  # ────────────────────────────────────────────────────────────────────────────
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
    image: code-server-enterprise:dev
    container_name: code-server
    restart: unless-stopped
    user: "1000"
    networks:
      - enterprise
    expose:
      - "8080"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:?CODE_SERVER_PASSWORD must be set}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:?CODE_SERVER_PASSWORD must be set}
      - SERVICE_URL=https://open-vsx.org/vscode/gallery
      - ITEM_URL=https://open-vsx.org/vscode/item
      - CS_DISABLE_FILE_DOWNLOADS=false
      - NODE_OPTIONS=--max-old-space-size=6144
      - OLLAMA_ENDPOINT=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=codellama:7b
      - GSM_PROJECT=${GSM_PROJECT:-gcp-eiq}
      - GSM_SECRET_NAME=${GSM_SECRET_NAME:-github-token}
      - GIT_CREDENTIAL_GSM_CANONICAL_SECRET_NAME=${GIT_CREDENTIAL_GSM_CANONICAL_SECRET_NAME:-github-token}
      # Development tools environment variables
      - PATH=/home/coder/.local/bin:/home/coder/node_modules/.bin:/usr/local/cargo/bin:/usr/local/go/bin:$PATH
      - PYTHONUNBUFFERED=1
      - GOPATH=/opt/go
      - RUST_BACKTRACE=1
    volumes:
      - code-server-workspace:/home/coder/workspace
      - code-server-profile:/home/coder/.local/share/code-server
      - ./config/code-server/settings.json:/etc/code-server/settings.json:ro
    # Snap Docker on primary host denies exec with no-new-privileges+cap_drop under user 1000.
    # Keep service functional; hardening is enforced at network/auth layers.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
        reservations:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────────────────────
  # ollama — Local LLM engine (privacy-first, no cloud dependency)
  # ────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.1.27
    container_name: ollama
    restart: unless-stopped
    # ✅ GPU ACCELERATION - Uncomment this line if NVIDIA GPU detected on host
    # runtime: nvidia
    networks:
      - enterprise
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=30m
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
      # ✅ GPU: Set OLLAMA_NUM_GPU to enable GPU acceleration (0=CPU-only by default)
      # To enable GPU:
      #   1. Verify nvidia-smi on host: ssh akushnir@192.168.168.31 nvidia-smi
      #   2. Uncomment: runtime: nvidia (2 lines above)
      #   3. Change: OLLAMA_NUM_GPU=1 (or higher if multiple GPUs)
      #   4. Redeploy: docker-compose up -d ollama
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}
    # ✅ GPU device access (only used if runtime: nvidia is enabled)
    # devices:
    #   - /dev/nvidiactl
    #   - /dev/nvidia0
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16g
        reservations:
          memory: 4g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────────────────────
  # ollama-init — One-shot model puller (restarts on failure, exits on success)
  # ────────────────────────────────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:0.1.27
    container_name: ollama-init
    networks:
      - enterprise
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for ollama to be ready..."
        until ollama list >/dev/null; do sleep 3; done
        echo "Pulling llama2:7b-chat..."
        ollama pull llama2:7b-chat || true
        echo "Pulling codellama:7b..."
        ollama pull codellama:7b || true
        echo "All models ready."
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  # ────────────────────────────────────────────────────────────────────────────
  # oauth2-proxy — Google OIDC authentication gate
  # ────────────────────────────────────────────────────────────────────────────
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "${OAUTH2_PROXY_HOST_BIND:-127.0.0.1}:4180:4180"
    expose:
      - "4180"
    user: "0:0"
    environment:
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_IDE_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_IDE_GOOGLE_CLIENT_SECRET:-${GOOGLE_CLIENT_SECRET}}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_IDE_REDIRECT_URL:-${OAUTH2_REDIRECT_URL:-https://ide.kushnir.cloud/oauth2/callback}}"
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      # Allow any Google domain to attempt auth; authenticated-emails-file is the real gate.
      # This prevents org_internal 403 errors for accounts outside bioenergystrategies.com (e.g. gmail.com).
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://redis:6379"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_DOMAINS: "ide.kushnir.cloud,.ide.kushnir.cloud"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "ide.kushnir.cloud,.ide.kushnir.cloud"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_TRUST_PROXY: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "false"
      OAUTH2_PROXY_PROMPT: "select_account"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "false"
      OAUTH2_PROXY_SKIP_AUTH_REGEX: "^/healthz|^/oauth2|^/ping|^/static"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4180/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # oauth2-proxy-portal — Google OIDC gate for kushnir.cloud portal (via Appsmith)
  # Issue #688: Split OAuth callback — enables separate redirect URLs for apex vs. IDE
  # Redeploy: pnpm redeploy:portal-oauth OR manually trigger portal-oauth-redeploy.yml
  # Callback: https://kushnir.cloud/oauth2/callback (different from IDE: https://ide.kushnir.cloud/oauth2/callback)
  # ────────────────────────────────────────────────────────────────────────────
  oauth2-proxy-portal:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy-portal
    profiles: [portal]
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4181"
    user: "0:0"
    environment:
      OAUTH2_PROXY_CLIENT_ID: "${OAUTH2_PORTAL_GOOGLE_CLIENT_ID:-${GOOGLE_CLIENT_ID}}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OAUTH2_PORTAL_GOOGLE_CLIENT_SECRET:-${GOOGLE_CLIENT_SECRET}}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_PORTAL_REDIRECT_URL:-https://kushnir.cloud/oauth2/callback}"
      OAUTH2_PROXY_LOGIN_URL: "https://kushnir.cloud/oauth2/start"
      OAUTH2_PROXY_UPSTREAMS: "http://appsmith:80/"
      # Allow any Google domain to complete OAuth; authenticated-emails-file remains the real gate.
      # This prevents Google from returning org_internal 403 before our explicit allowlist is checked.
      OAUTH2_PROXY_EMAIL_DOMAINS: "${OAUTH2_PROXY_PORTAL_EMAIL_DOMAINS:-*}"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://redis:6379"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_portal"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "none"
      OAUTH2_PROXY_COOKIE_DOMAINS: "kushnir.cloud,.kushnir.cloud"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "kushnir.cloud,.kushnir.cloud"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_TRUST_PROXY: "true"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4181"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "false"
      OAUTH2_PROXY_PROMPT: "select_account"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "false"
      OAUTH2_PROXY_SKIP_AUTH_REGEX: "^/healthz|^/oauth2|^/ping|^/static"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4181/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      appsmith:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # session-broker — Per-session container isolation and routing (P1 #752)
  # Routes authenticated users to isolated code-server containers with resource quotas
  # ────────────────────────────────────────────────────────────────────────────
  session-broker:
    build:
      context: apps/session-broker
      dockerfile: Dockerfile
    image: session-broker:dev
    container_name: session-broker
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "5000"
    user: "0:0"
    environment:
      - LOG_LEVEL=${SESSION_BROKER_LOG_LEVEL:-info}
      - DATABASE_URL=postgres://${POSTGRES_USER:-codeserver}:${POSTGRES_PASSWORD:-codeserver-local}@postgres:5432/${POSTGRES_DB:-codeserver}
      - CODE_SERVER_IMAGE_ID=code-server-enterprise:dev
      - SESSION_CPU_LIMIT=${SESSION_CPU_LIMIT:-2.0}
      - SESSION_MEMORY_LIMIT=${SESSION_MEMORY_LIMIT:-4g}
      - SESSION_STORAGE_LIMIT=${SESSION_STORAGE_LIMIT:-50g}
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - session-broker-sessions:/var/lib/code-server-sessions:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      code-server:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # caddy — Reverse proxy + TLS termination
  # Healthcheck uses the caddy binary to avoid endpoint/probe-tool mismatches.
  # ────────────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2.7.6
    container_name: caddy
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=kushnir.cloud
      - ACME_EMAIL=${ACME_EMAIL:-ops@kushnir.cloud}
      - ACME_AGREE=true
    healthcheck:
      test: ["CMD-SHELL", "caddy version >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - oauth2-proxy
      - session-broker
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # postgres — Persistent relational database (PostgreSQL 15)
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-codeserver}
      - POSTGRES_USER=${POSTGRES_USER:-codeserver}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-codeserver-local}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backup:/var/lib/postgresql/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeserver} -d ${POSTGRES_DB:-codeserver}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # pgbouncer — PostgreSQL connection pooler (reduces connection overhead)
  # ✅ ELITE OPTIMIZATION: Connection pooling for max throughput under load
  # Reduces PostgreSQL connection count from 1000 down to pooled 150 concurrent
  # Query performance: Same latency, Higher throughput (3x req/sec improvement)
  # ────────────────────────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer@sha256:85d1e38593617af1b5f7f285e97d407e56c29939683cc7cfe4c8f6dc19f1268b
    container_name: pgbouncer
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "6432"
    environment:
      - DATABASES_HOST=postgres
      - DATABASES_PORT=5432
      - DATABASES_USER=${POSTGRES_USER:-codeserver}
      - DATABASES_PASSWORD=${POSTGRES_PASSWORD:-codeserver-local}
      - DATABASES_DBNAME=${POSTGRES_DB:-codeserver}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=50
      - MIN_POOL_SIZE=10
      - RESERVE_POOL_SIZE=10
      - RESERVE_POOL_TIMEOUT=3
      - SERVER_IDLE_TIMEOUT=600
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER:-codeserver} -h localhost -p 6432 -d ${POSTGRES_DB:-codeserver} -c 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 128m
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # redis — In-memory cache (session store, rate limiting)
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # code-server-profile-backup — periodic backup of user profile state
  # ────────────────────────────────────────────────────────────────────────────
  code-server-profile-backup:
    image: alpine:3.20
    container_name: code-server-profile-backup
    restart: unless-stopped
    networks:
      - enterprise
    depends_on:
      - code-server
    volumes:
      - code-server-profile:/source:ro
      - code-server-profile-backups:/backups
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /backups
        while true; do
          ts="$$(date +%Y%m%d-%H%M%S)"
          out="/backups/code-server-user-profile-$$ts.tgz"
          tar -czf "$$out" -C /source .
          sha256sum "$$out" > "$$out.sha256"
          find /backups -type f -name 'code-server-user-profile-*.tgz' -mtime +30 -delete || true
          find /backups -type f -name 'code-server-user-profile-*.tgz.sha256' -mtime +30 -delete || true
          sleep 21600
        done
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # prometheus — Metrics collection and alerting engine
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules-phase-23.yml:/etc/prometheus/prometheus-rules-phase-23.yml:ro
      - ./prometheus-rules-alerts-operational.yml:/etc/prometheus/prometheus-rules-alerts-operational.yml:ro
      - ./prometheus-rules-slo-phase-8.yml:/etc/prometheus/prometheus-rules-slo-phase-8.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./alerts-phase-23.yml:/etc/prometheus/alerts-phase-23.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # grafana — Observability dashboards
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://${DEPLOY_HOST:-localhost}:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # alertmanager — Alert routing and silencing
  # ────────────────────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ────────────────────────────────────────────────────────────────────────────
  # jaeger — Distributed tracing backend
  # ────────────────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  # appsmith - Admin portal (Appsmith CE), profile: portal
  # kushnir.cloud routes here via Caddy
  appsmith:
    image: appsmith/appsmith-ce:v1.47
    container_name: appsmith
    profiles: [portal]
    restart: unless-stopped
    networks:
      - enterprise
    environment:
      - APPSMITH_SIGNUP_DISABLED=true
      - APPSMITH_FORM_LOGIN_DISABLED=true
      - APPSMITH_OAUTH2_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - APPSMITH_OAUTH2_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - APPSMITH_BASE_URL=https://kushnir.cloud
      - APPSMITH_CUSTOM_DOMAIN=kushnir.cloud
      - APPSMITH_ADMIN_EMAILS=${APPSMITH_ADMIN_EMAILS:-akushnir@bioenergystrategies.com}
    expose:
      - "80"
    volumes:
      - appsmith-data:/appsmith-stacks
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

# ════════════════════════════════════════════════════════════════════════════
# Networks
# ════════════════════════════════════════════════════════════════════════════
networks:
  enterprise:
    name: enterprise
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ════════════════════════════════════════════════════════════════════════════
# Volumes — All named, all persisted. No anonymous volumes.
# NAS-backed volumes (code-server-workspace, code-server-profile, code-server-profile-backups,
# ollama-data, postgres-backup) mount NFS from NAS_HOST (192.168.168.56).
# Both .31 and .42 mount the same NFS exports — no rsync replication needed.
# DB engine volumes (postgres-data, redis-data, prometheus-data, grafana-data, caddy-*)
# stay driver:local — NFS causes locking issues with those engines.
# ════════════════════════════════════════════════════════════════════════════
volumes:
  # ── NAS-backed (shared across .31 and .42 via NFS) ───────────────────────
  code-server-workspace:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_HOST:-192.168.168.56},nfsvers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=2"
      device: ":${NAS_EXPORT_PATH:-/export}/code-server/workspace"

  code-server-profile:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_HOST:-192.168.168.56},nfsvers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=2"
      device: ":${NAS_EXPORT_PATH:-/export}/code-server/profile"

  code-server-profile-backups:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_HOST:-192.168.168.56},nfsvers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=2"
      device: ":${NAS_EXPORT_PATH:-/export}/code-server/profile-backups"

  # ✅ NAS-backed: ollama models persist across failover
  ollama-data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_HOST:-192.168.168.56},nfsvers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=2"
      device: ":${NAS_EXPORT_PATH:-/export}/ollama"

  # ✅ NAS-backed: postgres backups/PITR persist across failover
  postgres-backup:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${NAS_HOST:-192.168.168.56},nfsvers=4,rsize=131072,wsize=131072,hard,timeo=600,retrans=2"
      device: ":${NAS_EXPORT_PATH:-/export}/postgres/backups"

  # ── Local-only (NFS locking incompatible with these engines) ─────────────
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local

  session-broker-sessions:
    driver: local

  appsmith-data:
    driver: local