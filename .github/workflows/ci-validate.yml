name: CI Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Code Quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Global Quality Gate
        run: |
          chmod +x scripts/lib/global-quality-gate.sh
          GATE_MODE=incremental bash scripts/lib/global-quality-gate.sh

      - name: Lint Shell Scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          format: gcc
        continue-on-error: false

      - name: Validate YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint
          file_or_dir: '.'

      - name: Validate Terraform
        working-directory: ./terraform
        run: |
          terraform init -backend=false 2>/dev/null
          terraform validate
          terraform fmt -check -recursive

      - name: Lint Markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .

      - name: Check Docker Files
        run: |
          if [ -f Dockerfile ]; then
            docker run --rm -i hadolint/hadolint < Dockerfile
          fi

      - name: Validate JSON
        run: |
          find . -name "*.json" -type f ! -path "./node_modules/*" ! -path "./.git/*" | while read f; do
            python3 -m json.tool "$f" > /dev/null || (echo "Invalid JSON: $f" && exit 1)
          done

      - name: Security - Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
