apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: dataclassificationrequired
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    policy-type: compliance
  annotations:
    description: "Resources must be labeled with data classification"
spec:
  crd:
    spec:
      names:
        kind: DataClassificationRequired
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package dataclassificationrequired
        violation[{"msg": msg}] {
          labels := object.get(input.review.object, ["metadata", "labels"], {})
          not labels["data-classification"]
          msg := "Resource must have data-classification label"
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: encryptionrequired
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    policy-type: compliance
  annotations:
    description: "PersistentVolumes must have encryption enabled"
spec:
  crd:
    spec:
      names:
        kind: EncryptionRequired
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package encryptionrequired
        violation[{"msg": msg}] {
          input.review.kind.kind == "PersistentVolume"
          annotations := object.get(input.review.object, ["metadata", "annotations"], {})
          not annotations["encryption-enabled"]
          msg := "PersistentVolume must have encryption-enabled annotation"
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: auditloggingrequired
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    policy-type: compliance
  annotations:
    description: "Resources must have audit logging configured"
spec:
  crd:
    spec:
      names:
        kind: AuditLoggingRequired
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package auditloggingrequired
        violation[{"msg": msg}] {
          annotations := object.get(input.review.object, ["metadata", "annotations"], {})
          kind := input.review.object.kind
          kind in ["StatefulSet", "Deployment"]
          not annotations["audit-logging"]
          msg := sprintf("%v must have audit-logging annotation", [kind])
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: accesscontrolpolicy
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    policy-type: compliance
  annotations:
    description: "Sensitive resources must define access control labels"
spec:
  crd:
    spec:
      names:
        kind: AccessControlPolicy
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package accesscontrolpolicy
        violation[{"msg": msg}] {
          ns := input.review.object.metadata.namespace
          sensitive_ns := ["database-tier", "ml-ai-platform"]
          ns in sensitive_ns
          annotations := object.get(input.review.object, ["metadata", "annotations"], {})
          not annotations["access-control-level"]
          msg := "Resources in sensitive namespaces must define access-control-level"
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: deletionprotection
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    policy-type: compliance
  annotations:
    description: "Critical resources must have deletion protection"
spec:
  crd:
    spec:
      names:
        kind: DeletionProtection
      validation:
        openAPIV3Schema:
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package deletionprotection
        violation[{"msg": msg}] {
          kind := input.review.object.kind
          protected := ["StatefulSet", "Deployment", "PersistentVolume"]
          kind in protected
          annotations := object.get(input.review.object, ["metadata", "annotations"], {})
          not annotations["deletion-protection"]
          msg := sprintf("%v must have deletion-protection annotation", [kind])
        }
