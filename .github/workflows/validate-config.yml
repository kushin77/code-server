name: Validate Configuration Files

on:
  pull_request:
    paths:
      - 'docker-compose*.yml'
      - 'Caddyfile*'
      - 'alertmanager*.yml'
      - 'prometheus*.yml'
      - '*.tf'
      - '.env*'
      - 'scripts/**/*.sh'
      - 'scripts/**/*.ps1'

permissions:
  contents: read
  pull-requests: write

jobs:
  docker-compose:
    name: Validate docker-compose
    uses: ./.github/workflows/TEMPLATE-validate-compose.yml

  caddyfile:
    name: Validate Caddyfile
    uses: ./.github/workflows/TEMPLATE-validate-caddyfile.yml

  iac:
    name: Validate IaC
    uses: ./.github/workflows/TEMPLATE-validate-iac.yml
    with:
      check_terraform: true
      check_docker_compose: false
      check_caddyfile: false

  shell-script-validate:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Check bash script syntax
        run: |
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              if [ "$script" = "scripts/automated-iac-validation.sh" ]; then
                echo "⊘ Skipping legacy script: $script"
                continue
              fi
              if [ "$script" = "scripts/deploy.sh" ]; then
                echo "⊘ Skipping legacy script: $script"
                continue
              fi
              bash -n "$script" && echo "✓ $script syntax OK" || exit 1
            fi
          done
      
      - name: Run ShellCheck
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"

          mapfile -t changed_scripts < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'scripts/*.sh' | sort)
          if [[ ${#changed_scripts[@]} -eq 0 ]]; then
            echo "No changed root-level scripts in this PR"
            exit 0
          fi

          filtered_scripts=()
          for script in "${changed_scripts[@]}"; do
            if [[ "$script" == "scripts/automated-iac-validation.sh" || "$script" == "scripts/deploy.sh" ]]; then
              echo "⊘ Skipping legacy script: $script"
              continue
            fi
            filtered_scripts+=("$script")
          done

          if [[ ${#filtered_scripts[@]} -eq 0 ]]; then
            echo "No shellcheck-target scripts remain after legacy exclusions"
            exit 0
          fi

          shellcheck --severity=error "${filtered_scripts[@]}"

  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6  # v3.94.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --only-verified
      
      - name: Manual secret pattern check
        run: |
          echo "Checking for hardcoded secrets in .env files..."
          if grep -r '(password|secret|token|key|api_key)\s*[=:]\s*[^${}"]' .env* --include='*.env' 2>/dev/null; then
            echo "❌ FAILED: Potential hardcoded secrets detected in .env files"
            exit 1
          else
            echo "✓ No obvious hardcoded secrets found"
          fi

  no-obsolete-files:
    name: Check for Obsolete Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      
      - name: Check for phase-specific files at root
        run: |
          OBSOLETE_PATTERNS=(
            'phase-[0-9]*-iac.tf'
            'docker-compose-phase-*.yml'
            'execute-phase-*.sh'
            'Dockerfile.code-server'
          )
          
          FOUND=0
          for pattern in "${OBSOLETE_PATTERNS[@]}"; do
            if find . -maxdepth 1 -name "$pattern" 2>/dev/null | grep -q .; then
              echo "⚠ Found obsolete file pattern: $pattern"
              find . -maxdepth 1 -name "$pattern"
              FOUND=1
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "These files should be in archived/ directory. See CODE-REVIEW-OVERLAP-GAPS-INCOMPLETE.md"
          else
            echo "✓ No obsolete files at root level"
          fi

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [docker-compose-validate, caddyfile-validate, terraform-validate, shell-script-validate, secrets-scan, no-obsolete-files]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "Configuration Validation Complete"
          echo "=================================="
          echo "All checks completed. Review results above."
          
          if [ "${{ needs.docker-compose-validate.result }}" == "failure" ] || \
             [ "${{ needs.caddyfile-validate.result }}" == "failure" ] || \
             [ "${{ needs.terraform-validate.result }}" == "failure" ] || \
             [ "${{ needs.shell-script-validate.result }}" == "failure" ]; then
            echo ""
            echo "❌ Validation failures detected - blocking"
            exit 1
          else
            echo ""
            echo "✓ All validations passed"
          fi
