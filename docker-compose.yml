services:
  # ─── code-server ────────────────────────────────────────────────────────────
  # VS Code running in the browser with Copilot Chat support
  # Image pinned to specific base + extensions freeze at build time
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
      args:
        # ALL VERSIONS FROZEN HERE FOR IMMUTABILITY
        CODE_SERVER_VERSION: "4.115.0"
        COPILOT_VERSION: "1.388.0"
        COPILOT_CHAT_VERSION: "0.43.2026040705"
    image: code-server-patched:4.115.0
    container_name: code-server
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "8080"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SERVICE_URL=https://open-vsx.org/vscode/gallery
      - ITEM_URL=https://open-vsx.org/vscode/item
      - CS_DISABLE_FILE_DOWNLOADS=false
      # Navigator shim patched out at build time (see Dockerfile.code-server)
      - NODE_OPTIONS=--enable-source-maps
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_ENDPOINT=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=llama2:70b-chat
      # ─── OpenTelemetry Instrumentation (Phase 24-A) ───────────────────
#      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=code-server
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=4.115.0,hostname=code-server
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=none"
    volumes:
      - code-server-enterprise-data:/home/coder
      - ./workspace:/home/coder/workspace
      - ./config/settings.json:/etc/code-server/settings.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── ollama ─────────────────────────────────────────────────────────────────
  # Local LLM server (pinned to 0.1.27)
  ollama:
    image: ollama/ollama:0.1.27
    container_name: ollama
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}
    volumes:
      - ollama-data:/root/.ollama
      - ./workspace:/home/coder/workspace:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/localhost/11434"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 32g
        reservations:
          memory: 8g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── ollama-init ────────────────────────────────────────────────────────────
  # One-time service that pulls models on startup
  ollama-init:
    image: ollama/ollama:0.1.27
    container_name: ollama-init
    networks:
      - enterprise
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "🚀 Pulling elite LLM models..."
        echo "⏳ Pulling llama2:70b-chat..."
        ollama pull llama2:70b-chat || true
        echo "⏳ Pulling codegemma..."
        ollama pull codegemma || true
        echo "⏳ Pulling neural-chat..."
        ollama pull neural-chat || true
        echo "⏳ Pulling mistral..."
        ollama pull mistral || true
        echo "✅ All models ready"
        sleep infinity
    depends_on:
      - ollama
    restart: on-failure

  # ─── oauth2-proxy ───────────────────────────────────────────────────────────
  # Authentication sidecar (pinned to v7.5.1)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4180"
    user: "0:0"
    env_file:
      - .env
    environment:
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      OAUTH2_PROXY_EMAIL_DOMAINS: ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX: "^/healthz|^/oauth2"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── caddy ──────────────────────────────────────────────────────────────────
  # Reverse proxy + TLS (pinned to 2.7.6)
  caddy:
    image: caddy:2.7.6
    container_name: caddy
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    environment:
      # ─── DNS & TLS Configuration (Phase 21+) ──────────────────────────
      # For production: DOMAIN=kushnir.cloud (real DNS + Let's Encrypt)
      # For on-prem: DOMAIN=192.168.168.31.nip.io (nip.io or static IP)
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      - ACME_AGREE=true
      # ─── OpenTelemetry Instrumentation (Phase 24-A) ───────────────────
#      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=caddy-proxy
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=2.7.6,hostname=caddy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      - oauth2-proxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── cloudflared ────────────────────────────────────────────────────────────
  # Cloudflare Tunnel for HTTPS access to ide.kushnir.cloud
  # Requires: CLOUDFLARE_TUNNEL_TOKEN from Cloudflare Dashboard
  # (See CLOUDFLARE-TOKEN-SETUP.md for instructions)
  # Conditional: Only starts if CLOUDFLARE_TUNNEL_TOKEN is non-empty
  # Fallback: Use HTTP via nip.io if token unavailable (e.g., http://code-server.192.168.168.31.nip.io:8080)
  cloudflared:
    image: cloudflare/cloudflared:2024.12.0
    container_name: cloudflared
    restart: unless-stopped
    networks:
      - enterprise
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    command:
      - tunnel
      - run
      - --token=${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./config/cloudflare/config.yml:/etc/cloudflared/config.yml:ro
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - caddy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Only run if CLOUDFLARE_TUNNEL_TOKEN is set; skip if empty
    profiles:
      - ""  # Default profile - always loaded
      # To disable: use 'docker-compose --profile disabled up'

# ─────────────────────────────────────────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  code-server-enterprise-data:
    driver: local
  ollama-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local
