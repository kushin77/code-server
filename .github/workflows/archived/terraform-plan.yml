name: Terraform Plan

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_run:
    workflows: ["Terraform Validate"]
    types: [completed]
    branches:
      - phase-7-deployment

jobs:
  plan-primary:
    name: Terraform Plan (Primary - 192.168.168.31)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success'
    
    defaults:
      run:
        working-directory: ./terraform
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
      
      - name: Initialize Terraform
        run: terraform init -backend=false -upgrade
        env:
          TF_LOG: WARN
      
      - name: Validate Terraform
        run: terraform validate
      
      - name: Plan Terraform (Production)
        run: |
          terraform plan \
            -var-file=production.tfvars \
            -out=tfplan-primary \
            -no-color
        env:
          TF_LOG: INFO
        continue-on-error: true
      
      - name: Generate Plan Summary
        run: |
          terraform show -json tfplan-primary > plan-primary.json
          terraform show tfplan-primary > plan-primary.txt
        continue-on-error: true
      
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan-primary
          path: |
            terraform/tfplan-primary
            terraform/plan-primary.json
            terraform/plan-primary.txt
          retention-days: 30
        continue-on-error: true
      
      - name: Post Plan Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const planFile = './terraform/plan-primary.txt';
            if (fs.existsSync(planFile)) {
              const plan = fs.readFileSync(planFile, 'utf8');
              const summary = plan.split('\n').slice(-10).join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Terraform Plan (Primary - 192.168.168.31)\n\n\`\`\`\n${summary}\n\`\`\``
              });
            }
        continue-on-error: true

  plan-replica:
    name: Terraform Plan (Replica - 192.168.168.42)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success'
    
    defaults:
      run:
        working-directory: ./terraform
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
      
      - name: Initialize Terraform
        run: terraform init -backend=false -upgrade
        env:
          TF_LOG: WARN
      
      - name: Plan Terraform (Replica)
        run: |
          terraform plan \
            -var-file=staging.tfvars \
            -out=tfplan-replica \
            -no-color
        env:
          TF_LOG: INFO
        continue-on-error: true
      
      - name: Generate Plan Summary
        run: |
          terraform show -json tfplan-replica > plan-replica.json
          terraform show tfplan-replica > plan-replica.txt
        continue-on-error: true
      
      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan-replica
          path: |
            terraform/tfplan-replica
            terraform/plan-replica.json
            terraform/plan-replica.txt
          retention-days: 30
        continue-on-error: true
