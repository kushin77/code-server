name: Config Drift Detector

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - '.env.template'
      - 'environments/production/hosts.yml'
      - 'terraform/variables.tf'
      - 'docker-compose*.yml'
      - 'Caddyfile'
      - 'config/**'
      - 'scripts/**'
      - '.github/workflows/config-drift-detector.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  config-drift-check:
    name: Detect Configuration Drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run config drift detection
        id: drift
        run: |
          bash scripts/dev/check-config-drift.sh 2>&1 | tee drift-output.log
          exit_code=${PIPESTATUS[0]}
          echo "drift_exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Comment on PR if drift found
        if: failure() && steps.drift.outcome == 'failure'
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const driftLog = fs.readFileSync('drift-output.log', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Configuration Drift Detected\n\n\`\`\`\n${driftLog}\n\`\`\`\n\n### How to Fix\n\n1. **For hardcoded IPs**: Replace with DNS names or environment variable references\n   - Primary: Use \`primary.prod.internal\` or \$DEPLOY_HOST env var\n   - Replica: Use \`replica.prod.internal\` or \$REPLICA_HOST env var\n   - VIP: Use \`vip.prod.internal\` or \$VIP_HOST env var\n\n2. **For hardcoded domains**: Add to \`.env.template\` and reference via variable\n   - Example: \`DOMAIN=kushnir.cloud\` in .env.template\n\n3. **For environment variables**: Document in \`.env.template\` as SSOT\n\n4. **For Terraform variables**: Ensure alignment with \`.env.template\`\n\nSee \`environments/production/hosts.yml\` and \`.env.template\` as configuration SSOT.\n`
            });

      - name: Report drift detection
        if: always()
        run: |
          echo "## Config Drift Detection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Exit Code: ${{ steps.drift.outputs.drift_exit_code || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Result: $([ '${{ steps.drift.outcome }}' = 'success' ] && echo '✓ PASS - No drift detected' || echo '✗ FAIL - Drift detected')" >> $GITHUB_STEP_SUMMARY
