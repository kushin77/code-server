# Prometheus Configuration for Error Fingerprinting Metrics - Phase 1 Implementation
# Implements: docs/ERROR-FINGERPRINTING-SCHEMA.md
# Status: PRODUCTION - Ready for deployment to 192.168.168.31
# Date: April 16, 2026

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'code-server-enterprise'
    environment: 'production'
    region: 'on-prem-192.168.168.31'

# Alerting Rules for Error Fingerprinting
rule_files:
  - '/etc/prometheus/rules/error-fingerprinting-alerts.yml'
  - '/etc/prometheus/rules/error-fingerprinting-slos.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metric_path: '/metrics'

  - job_name: 'loki'
    static_configs:
      - targets: ['localhost:3100']
    metric_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'code-server'
    static_configs:
      - targets: ['localhost:8080']
    metric_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:5432']
    metric_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'oauth2-proxy'
    static_configs:
      - targets: ['localhost:4180']
    metric_path: '/metrics'
    scrape_interval: 15s

---
# Prometheus Remote Write Configuration (for long-term storage)
remote_write:
  - url: http://localhost:3100/loki/api/v1/push
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'error_fingerprint_.*'
        action: keep

---
# Error Fingerprinting Metrics
# These metrics track error patterns and should be generated by application instrumentation

# METRIC: error_fingerprint_count
# Description: Total errors observed for a specific fingerprint
# Type: COUNTER
# Labels: service, error_type, fingerprint, severity
# Example:
# error_fingerprint_count{service="code-server", error_type="PostgreSQL::ConnectionError", fingerprint="3a5f2b8c...", severity="error"} 1523

# METRIC: error_fingerprint_rate
# Description: Rate of errors per fingerprint (errors/sec)
# Type: GAUGE
# Labels: service, error_type, fingerprint, severity
# Calculation: rate(error_fingerprint_count[5m])
# Example:
# error_fingerprint_rate{service="code-server", error_type="PostgreSQL::ConnectionError", fingerprint="3a5f2b8c...", severity="error"} 0.35

# METRIC: error_fingerprint_last_seen
# Description: Timestamp of last occurrence of a specific fingerprint
# Type: GAUGE (Unix timestamp)
# Labels: service, error_type, fingerprint
# Example:
# error_fingerprint_last_seen{service="code-server", error_type="PostgreSQL::ConnectionError", fingerprint="3a5f2b8c..."} 1713278625.123

# METRIC: error_fingerprint_affected_services
# Description: Count of unique services affected by a fingerprint
# Type: GAUGE
# Labels: fingerprint, error_type
# Example:
# error_fingerprint_affected_services{fingerprint="3a5f2b8c...", error_type="PostgreSQL::ConnectionError"} 3

# METRIC: error_fingerprint_user_impact
# Description: Count of unique users affected by errors with this fingerprint (last 24h)
# Type: GAUGE
# Labels: service, fingerprint, error_type
# Example:
# error_fingerprint_user_impact{service="code-server", fingerprint="3a5f2b8c...", error_type="PostgreSQL::ConnectionError"} 42

# METRIC: error_detection_latency_ms
# Description: Time between error occurrence and fingerprint calculation/indexing
# Type: HISTOGRAM
# Labels: service, error_type
# Buckets: [1, 5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000]
# Example:
# error_detection_latency_ms_bucket{service="code-server", le="100", error_type="PostgreSQL::ConnectionError"} 1234
# error_detection_latency_ms_sum{service="code-server", error_type="PostgreSQL::ConnectionError"} 567890
# error_detection_latency_ms_count{service="code-server", error_type="PostgreSQL::ConnectionError"} 1523

# METRIC: fingerprinting_deduplication_ratio
# Description: Ratio of deduplicated errors to total errors (shows effectiveness)
# Type: GAUGE
# Labels: service, time_window
# Formula: (total_errors - unique_fingerprints) / total_errors
# Example:
# fingerprinting_deduplication_ratio{service="code-server", time_window="1h"} 0.94

