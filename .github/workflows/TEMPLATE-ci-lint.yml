name: CI - Lint & Format

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/TEMPLATE-ci-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

env:
  COST_CATEGORY: "ci-lint"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile --ignore-scripts
        timeout-minutes: 5

      - name: Run linter
        run: corepack pnpm lint
        timeout-minutes: 5

      - name: Format check
        run: corepack pnpm -r --if-present format:check || corepack pnpm -r --if-present prettier -- --check . || true
        timeout-minutes: 5

      - name: Report metrics
        if: always()
        run: |
          echo "::notice::Cost-Category: ci-lint"
          echo "::notice::Runner: ${{ runner.os }}-${{ runner.arch }}"

      - name: Cleanup
        if: always()
        run: |
          corepack pnpm store prune 2>/dev/null || true
          docker system prune -af 2>/dev/null || true

  spell-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Spell check
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83  # v1.45.1
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true
