version: '3.9'

# Phase 15: Advanced Performance & Observability
# Architecture: 
#   - Reuses Phase 14 Redis (6379) - no duplication
#   - Adds Prometheus observability (9090)
#   - Adds Grafana visualization (3000)
#   - Adds Locust load testing (8089)
#   - Parallel execution with Phase 16 enabled

services:
  # Phase 15: Prometheus Observability Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-phase15
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus-phase15.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-phase15-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-15-network

  # Phase 15: Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-phase15
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-phase15-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-15-network

  # Phase 15: Load Testing - Locust
  locust:
    image: locustio/locust:latest
    container_name: locust-phase15
    ports:
      - "8089:8089"
    environment:
      LOCUST_HOST: http://code-server:8080
      LOCUST_HEADLESS: "false"
      LOCUST_USERS: 300
      LOCUST_SPAWN_RATE: 30
      LOGLEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-15-network

  # Phase 15: Redis Metrics Exporter (Prometheus integration)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter-phase15
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9121/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-15-network

volumes:
  prometheus-phase15-data:
    driver: local
  grafana-phase15-data:
    driver: local

networks:
  phase-15-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
