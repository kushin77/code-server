name: Code Quality & Security Scan

on:
  push:
    branches: [ main, develop, 'feat/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily security scan at 2 AM UTC

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Code Lint & Format Check

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./extensions/agent-farm

      - name: Run ESLint
        run: npm run lint 2>&1 | tee lint-report.txt
        working-directory: ./extensions/agent-farm
        continue-on-error: true

      - name: Check code formatting
        run: npm run format:check 2>&1 | tee format-report.txt
        working-directory: ./extensions/agent-farm
        continue-on-error: true

      - name: Lint Report
        if: always()
        run: |
          echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ESLint Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -10 extensions/agent-farm/lint-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          skip-dirs: 'node_modules,.git'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-filesystem'

      - name: Run npm audit
        run: |
          npm audit --json > npm-audit-report.json 2>&1 || true
        working-directory: ./extensions/agent-farm
        continue-on-error: true

      - name: Check npm audit results
        if: always()
        run: |
          npm audit --audit-level=moderate 2>&1 | head -20
        working-directory: ./extensions/agent-farm
        continue-on-error: true

      - name: Secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Run Safety check for Python
        run: |
          pip install safety
          safety check --json > safety-report.json 2>&1 || true
        working-directory: ./services/rbac-api
        continue-on-error: true

      - name: Node dependency vulnerabilities check
        run: |
          npx snyk test --json > snyk-report.json 2>&1 || true
        working-directory: ./extensions/agent-farm
        continue-on-error: true

      - name: Dependency report
        if: always()
        run: |
          echo "## Dependency Security" >> $GITHUB_STEP_SUMMARY
          echo "- Python Safety: Checked" >> $GITHUB_STEP_SUMMARY
          echo "- Node Dependencies: Checked" >> $GITHUB_STEP_SUMMARY

  pylint:
    runs-on: ubuntu-latest
    name: Python Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black
        working-directory: ./services/rbac-api
        continue-on-error: true

      - name: Run pylint
        run: |
          pylint --exit-zero src/ > pylint-report.txt 2>&1 || true
        working-directory: ./services/rbac-api
        continue-on-error: true

      - name: Run flake8
        run: |
          flake8 src/ --format=json > flake8-report.json 2>&1 || true
        working-directory: ./services/rbac-api
        continue-on-error: true

      - name: Check formatting with black
        run: |
          black --check src/ 2>&1 | tee black-report.txt || true
        working-directory: ./services/rbac-api
        continue-on-error: true

  sast:
    runs-on: ubuntu-latest
    name: Static Application Security Testing (SAST)
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/javascript
            p/python
          generateSarif: true
        continue-on-error: true

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'semgrep.sarif'
          category: 'semgrep-sast'

  quality-summary:
    runs-on: ubuntu-latest
    name: Quality Summary
    needs: [ lint, security-scan, dependency-check, pylint, sast ]
    if: always()

    steps:
      - name: Generate quality report
        run: |
          echo "## Code Quality & Security Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Completed" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript Linting: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Scanning: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python Linting: ${{ needs.pylint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAST Analysis: ${{ needs.sast.result }}" >> $GITHUB_STEP_SUMMARY
