name: CI Validate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  pre-commit:
    name: Pre-commit hooks (shellcheck, yamllint, governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pre-commit + shellcheck
        run: |
          python -m pip install --upgrade pip pre-commit
          sudo apt-get install -y shellcheck

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: mandatory-redeploy,terraform_fmt,terraform_validate

  governance:
    name: Governance audit (library adoption + MANIFEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install make + bash
        run: sudo apt-get install -y make bash

      - name: Library adoption audit (make lib-check)
        run: make lib-check

      - name: MANIFEST registry validation (make index)
        run: |
          make index
          # Fail if any active script is unregistered
          violations=$(make index 2>&1 | grep -c '✗' || true)
          if [[ "$violations" -gt 0 ]]; then
            echo "::error::$violations script(s) not registered in scripts/MANIFEST.toml"
            echo "Run: make manifest-init to regenerate, then commit"
            exit 1
          fi

      - name: Zero active log_info() governance violations
        run: |
          count=$(grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
            | grep -vE "_common/|logging\.sh|common-functions\.sh" | wc -l || echo 0)
          echo "Active log_info() violations: $count"
          if [[ "$count" -gt 0 ]]; then
            grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
              | grep -vE "_common/|logging\.sh|common-functions\.sh" | sed 's/^/  /'
            echo "::error::$count script(s) define inline log_info() — migrate to _common/init.sh"
            exit 1
          fi
          echo "✅ Zero governance violations"

  user-lifecycle:
    name: User lifecycle regression tests (QA-001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bash + jq + docker
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq
          # Note: docker is pre-installed on ubuntu-latest

      - name: Run manage-users.sh regression tests
        run: |
          bash tests/test-manage-users-lifecycle.sh
        continue-on-error: false

      - name: Dry-run manage-users.sh help
        run: |
          bash scripts/manage-users.sh help 2>&1 | head -30
          echo "✅ Script loads successfully"

      - name: Validate manage-users.sh for common errors
        run: |
          echo "Checking for filename typos (allowed-emails.tx)..."
          if grep -n 'allowed-emails\.tx[^t]' scripts/manage-users.sh >/dev/null 2>&1; then
            echo "::error::Found 'allowed-emails.tx' typo in manage-users.sh"
            grep -n 'allowed-emails\.tx[^t]' scripts/manage-users.sh
            exit 1
          fi
          echo "✅ No filename typos detected"
          
          echo "Checking for atomic_write usage..."
          if grep -q 'atomic_write' scripts/manage-users.sh; then
            echo "✅ atomic_write function in use"
          else
            echo "::warning::atomic_write function not found"
          fi
          
          echo "Checking for audit logging..."
          if grep -q 'audit/user-provisioning.log' scripts/manage-users.sh; then
            echo "✅ Audit logging configured"
          else
            echo "::warning::Audit logging not found"
          fi

  qa-identity:
    name: QA service account (QA-IDENTITY-003)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash jq curl

      - name: Validate QA service account configuration
        run: |
          echo "Checking QA service account setup..."
          
          # Check qa-service in allowed-emails.txt
          if grep -q "^qa-service@ide.kushnir.cloud$" allowed-emails.txt; then
            echo "✅ QA service email in allowlist"
          else
            echo "::error::QA service email missing from allowed-emails.txt"
            exit 1
          fi
          
          # Check qa-service metadata
          if [[ -f "config/user-settings/qa-service/user-metadata.json" ]]; then
            role=$(jq -r '.role' config/user-settings/qa-service/user-metadata.json)
            echo "✅ QA service account configured (role: $role)"
          else
            echo "::error::QA service metadata not found"
            exit 1
          fi

      - name: Test QA authentication fixture
        run: |
          echo "Testing QA auth fixture..."
          
          # Validate account
          bash scripts/test-auth.sh validate
          
          # Bootstrap session
          token=$(bash scripts/test-auth.sh token)
          if [[ -z "$token" ]]; then
            echo "::error::Failed to generate QA auth token"
            exit 1
          fi
          echo "✅ QA auth token generated: ${token:0:20}..."
          
          # Export context
          source scripts/test-auth.sh
          export_qa_auth_context
          
          # Verify context
          if [[ -z "${QA_AUTH_TOKEN:-}" ]]; then
            echo "::error::QA auth context not exported"
            exit 1
          fi
          echo "✅ QA auth context ready (email: $QA_AUTH_EMAIL, role: $QA_AUTH_ROLE)"

      - name: Verify QA role permissions
        run: |
          echo "Verifying QA role permissions..."
          
          # QA should have developer role (code editing, no terminal)
          role=$(jq -r '.role' config/user-settings/qa-service/user-metadata.json)
          
          if [[ "$role" != "developer" ]]; then
            echo "::warning::QA role is '$role' (expected 'developer')"
          fi
          
          # Verify permissions
          features=$(jq '.features' config/user-settings/qa-service/user-metadata.json)
          
          if jq -e '.codeEditing == true' <<< "$features" >/dev/null; then
            echo "✅ QA can edit code"
          else
            echo "❌ QA code editing disabled"
          fi
          
          if jq -e '.terminal == false' <<< "$features" >/dev/null; then
            echo "✅ QA terminal access disabled (expected)"
          else
            echo "⚠️  QA terminal access enabled"
          fi

      - name: Verify QA audit logging
        run: |
          echo "Checking QA audit logging..."
          
          # Check audit directory exists
          if [[ -d "audit" ]]; then
            echo "✅ Audit directory exists"
          else
            echo "⚠️  Audit directory not found (will be created at runtime)"
          fi
          
          # Verify audit log references QA identity
          if grep -q 'qa-service' audit/user-provisioning.log 2>/dev/null || \
             grep -q 'qa-service' audit/qa-test-runs.log 2>/dev/null; then
            echo "✅ QA audit entries found"
          else
            echo "ℹ️  No QA audit entries yet (normal for first run)"
          fi
