# prometheus-telemetry.yml
#
# Prometheus configuration for OpenTelemetry Collector metrics
# Monitors the health and performance of the telemetry pipeline
#
# Targets:
# - otel-collector:8888 (OpenTelemetry Collector metrics)
# - jaeger:14269 (Jaeger internal metrics, if enabled)
#
# Generated by: Phase 3 observability spine implementation

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: 'telemetry-monitoring'
    environment: 'development'

scrape_configs:
  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    metric_relabel_configs:
      # Keep only key metrics related to trace processing
      - source_labels: [__name__]
        regex: '(otel_.*|process_.*|go_.*)'
        action: keep

  # Jaeger metrics (if enabled)
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    scrape_interval: 30s
    scrape_timeout: 10s
    metric_relabel_configs:
      # Filter for Jaeger-specific metrics
      - source_labels: [__name__]
        regex: '(jaeger_.*|process_.*)'
        action: keep

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

rule_files:
  - '/etc/prometheus/alert-rules-telemetry.yml'
