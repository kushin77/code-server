apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-workspace
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-server
  labels:
    app.kubernetes.io/name: code-server

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: code-server
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: code-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: code-server
subjects:
- kind: ServiceAccount
  name: code-server
  namespace: code-server
