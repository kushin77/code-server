name: Portal OAuth Redeploy

# Issue #692: Production portal OAuth callback redeploy execution path
# Syncs docker-compose.yml to production host and redeploysvservices with split redirect URLs
# Apex (kushnir.cloud) vs. IDE (ide.kushnir.cloud) share cookie domain but use distinct OAuth callbacks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry-run only (no docker compose changes)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: portal-oauth-redeploy-production
  cancel-in-progress: false

jobs:
  redeploy-portal-oauth:
    name: Redeploy portal OAuth routing
    runs-on: self-hosted
    environment: production
    env:
      DEPLOY_HOST: 192.168.168.31
      DEPLOY_USER: akushnir
      DEPLOY_DIR: /home/akushnir/code-server-enterprise
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install SSH key
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::error::Missing required secret DEPLOY_SSH_PRIVATE_KEY"
            exit 1
          fi

          SSH_KEY_PATH="${RUNNER_TEMP}/deploy_key"
          SSH_KNOWN_HOSTS="${RUNNER_TEMP}/known_hosts"

          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > "$SSH_KEY_PATH"
          chmod 600 "$SSH_KEY_PATH"

          if [[ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]]; then
            printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$SSH_KNOWN_HOSTS"
          else
            ssh-keyscan -H "$DEPLOY_HOST" > "$SSH_KNOWN_HOSTS"
          fi
          chmod 644 "$SSH_KNOWN_HOSTS"

          echo "SSH_OPTS=-i $SSH_KEY_PATH -o UserKnownHostsFile=$SSH_KNOWN_HOSTS -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10" >> "$GITHUB_ENV"

      - name: Validate callback split in source compose
        shell: bash
        run: |
          set -euo pipefail
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_IDE_REDIRECT_URL:-${OAUTH2_REDIRECT_URL:-https://ide.kushnir.cloud/oauth2/callback}}"' docker-compose.yml
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_PORTAL_REDIRECT_URL:-https://kushnir.cloud/oauth2/callback}"' docker-compose.yml

      - name: Dry-run portal OAuth redeploy
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/deploy/redeploy-portal-oauth-routing.sh --dry-run

      - name: Redeploy portal services
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/deploy/redeploy-portal-oauth-routing.sh

      - name: Verify live redirects
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          apex_location="$(curl -skI 'https://kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          ide_location="$(curl -skI 'https://ide.kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          echo "$apex_location"
          echo "$ide_location"
          echo "$apex_location" | grep -qi 'redirect_uri=https%3A%2F%2Fkushnir.cloud%2Foauth2%2Fcallback'
          echo "$ide_location" | grep -qi 'redirect_uri=https%3A%2F%2Fide.kushnir.cloud%2Foauth2%2Fcallback'

      - name: Summarize deployment mode
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Portal OAuth Redeploy"
            echo "- Runner: self-hosted"
            echo "- Execution: scripts/deploy/redeploy-portal-oauth-routing.sh"
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "- Mode: dry-run"
            else
              echo "- Mode: apply"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
