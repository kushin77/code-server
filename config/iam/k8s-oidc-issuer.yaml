# Kubernetes OIDC Issuer Configuration (Phase 2.1)
# Enables JWT token generation for service-to-service authentication

apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-issuer-config
  namespace: default
data:
  issuer: "https://oidc.kushnir.cloud:8080"
  client_id: "code-server-services"
  audiences: "code-server,prometheus,loki,grafana,redis,postgresql"
  subject_claim: "sub"
  username_claim: "preferred_username"
  groups_claim: "groups"
  token_ttl: "3600"  # 1 hour
  refresh_leeway: "300"  # 5 minutes before expiry

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oidc-issuer
  namespace: default
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: oidc-issuer
  namespace: default
rules:
# Allow reading service accounts
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch"]
# Allow reading secrets for token generation
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["default-token"]
# Allow reading configmaps for OIDC configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
  resourceNames: ["oidc-issuer-config"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: oidc-issuer
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: oidc-issuer
subjects:
- kind: ServiceAccount
  name: oidc-issuer
  namespace: default

---
# ClusterRole for reading cluster-wide OIDC issuer configuration
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oidc-issuer-reader
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-issuer-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oidc-issuer-reader
subjects:
- kind: ServiceAccount
  name: oidc-issuer
  namespace: default
