# ════════════════════════════════════════════════════════════════
# Loki Configuration - On-Prem Production
# Version: 2.9.4 single-node (common config pattern)
# Date: April 15, 2026
# ════════════════════════════════════════════════════════════════

auth_enabled: true  # Enable authentication (X-Scope-OrgID header or basic auth required)

# ════════════════════════════════════════════════════════════════
# Authentication Configuration
# ════════════════════════════════════════════════════════════════
# Loki enforces X-Scope-OrgID header (tenant ID) for multi-tenancy
# For single-tenant on-prem: all requests must include X-Scope-OrgID: default
# Recommended: proxy through oauth2-proxy for OIDC/password auth
auth_backend: default  # Use default backend (X-Scope-OrgID enforcement)

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 15
  max_streams_per_user: 10000
  max_entries_limit_per_second: 10000
  # Retention policy: keep logs for 30 days
  retention_period: 720h

analytics:
  reporting_enabled: false

# Compaction and retention cleanup
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 100
  delete_request_cancel_period: 24h
