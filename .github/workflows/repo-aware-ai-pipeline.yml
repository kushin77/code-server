name: Repo-Aware AI Pipeline

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/code-server/ai/repo-rag-pipeline.yml'
      - 'docs/ai/REPO-KNOWLEDGE-CORPUS-POLICY.md'
      - 'docs/AI-REPO-PIPELINE-628.md'
      - 'scripts/ci/validate-repo-aware-ai-pipeline.sh'
      - '.github/workflows/repo-aware-ai-pipeline.yml'
  push:
    branches:
      - main
    paths:
      - 'config/code-server/ai/repo-rag-pipeline.yml'
      - 'docs/ai/REPO-KNOWLEDGE-CORPUS-POLICY.md'
      - 'docs/AI-REPO-PIPELINE-628.md'
      - 'scripts/ci/validate-repo-aware-ai-pipeline.sh'
      - '.github/workflows/repo-aware-ai-pipeline.yml'

permissions:
  contents: read

jobs:
  validate-pipeline:
    name: Validate repo-aware AI pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate repository-aware AI evidence
        shell: bash
        run: bash scripts/ci/validate-repo-aware-ai-pipeline.sh