apiVersion: v1
kind: Namespace
metadata:
  name: code-server-ha
  labels:
    name: code-server-ha

---
apiVersion: v1
kind: Service
metadata:
  name: code-server
  namespace: code-server-ha
  labels:
    app: code-server
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: code-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: code-server-lb
  namespace: code-server-ha
  labels:
    app: code-server
spec:
  type: LoadBalancer
  selector:
    app: code-server
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: code-server
  namespace: code-server-ha
spec:
  serviceName: code-server
  replicas: 3
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - code-server
            topologyKey: kubernetes.io/hostname
      
      terminationGracePeriodSeconds: 30
      
      containers:
      - name: code-server
        image: kushin77/code-server:phase-11
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        # HA Configuration
        - name: HA_ENABLED
          value: "true"
        - name: HA_NODE_COUNT
          value: "3"
        - name: CONSUL_HOST
          value: "consul-cluster:8500"
        - name: CONSUL_SERVICE_NAME
          value: "code-server"
        
        # Database Connection
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: connection-url
        - name: DB_REPLICA_MODE
          value: "false"
        - name: DB_CONNECTION_POOL_SIZE
          value: "20"
        - name: DB_REPLICA_CONNECTIONS
          value: "postgres-replica-1:5432,postgres-replica-2:5432"
        
        # Cache Configuration
        - name: REDIS_CLUSTER_ENABLED
          value: "true"
        - name: REDIS_CLUSTER_NODES
          value: "redis-0.redis:6379,redis-1.redis:6379,redis-2.redis:6379,redis-3.redis:6379,redis-4.redis:6379,redis-5.redis:6379"
        - name: REDIS_CONNECTION_POOL_SIZE
          value: "50"
        - name: REDIS_FAILOVER_ENABLED
          value: "true"
        
        # Resilience Configuration
        - name: CIRCUIT_BREAKER_ENABLED
          value: "true"
        - name: CIRCUIT_BREAKER_DATABASE_THRESHOLD
          value: "5"
        - name: CIRCUIT_BREAKER_DATABASE_RESET_TIMEOUT
          value: "30000"
        - name: CIRCUIT_BREAKER_CACHE_THRESHOLD
          value: "10"
        - name: CIRCUIT_BREAKER_CACHE_RESET_TIMEOUT
          value: "10000"
        
        # Observability
        - name: JAEGER_AGENT_HOST
          value: "jaeger:6831"
        - name: PROMETHEUS_ENABLED
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
          successThreshold: 1
        
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        
        volumeMounts:
        - name: config
          mountPath: /etc/code-server
          readOnly: true
        - name: cache
          mountPath: /var/cache/code-server
      
      volumes:
      - name: config
        configMap:
          name: code-server-config

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: code-server-pdb
  namespace: code-server-ha
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: code-server

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: code-server-hpa
  namespace: code-server-ha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: code-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-config
  namespace: code-server-ha
data:
  ha-config.json: |
    {
      "ha": {
        "enabled": true,
        "nodeCount": 3,
        "healthCheckInterval": 5000,
        "failureThreshold": 3,
        "leaderElection": {
          "enabled": true,
          "lockName": "code-server-leader",
          "leaseDuration": 15
        }
      },
      "database": {
        "primary": "postgres-primary:5432",
        "replicas": ["postgres-replica-1:5432", "postgres-replica-2:5432"],
        "replication": "streaming",
        "syncCommit": true,
        "connectionPooling": {
          "minConnections": 5,
          "maxConnections": 20,
          "connectionTimeout": 30000
        }
      },
      "cache": {
        "cluster": {
          "enabled": true,
          "hashSlots": 16384
        },
        "failover": true,
        "connectionPooling": {
          "minConnections": 10,
          "maxConnections": 50,
          "idleTimeout": 600000
        }
      },
      "circuitBreaker": {
        "enabled": true,
        "database": {
          "threshold": 5,
          "resetTimeout": 30000,
          "failureWindow": 60000,
          "halfOpenRequests": 3
        },
        "cache": {
          "threshold": 10,
          "resetTimeout": 10000,
          "failureWindow": 60000
        }
      },
      "monitoring": {
        "enabled": true,
        "metricsInterval": 60000,
        "alertThresholds": {
          "latencyP99": 500,
          "errorRate": 0.01,
          "cpuUtilization": 0.80,
          "memoryUtilization": 0.85
        }
      }
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: code-server-ha
type: Opaque
stringData:
  connection-url: "postgresql://app_user:CHANGEME@postgres-primary:5432/code-server?sslmode=require"
  username: "app_user"
  password: "CHANGEME"
