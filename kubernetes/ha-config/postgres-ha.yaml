apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: code-server-ha
  labels:
    app: postgres
    role: primary
spec:
  type: ClusterIP
  selector:
    app: postgres
    role: primary
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP
  - name: replication
    port: 5433
    targetPort: 5433
    protocol: TCP
  - name: metrics
    port: 9187
    targetPort: 9187
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: code-server-ha
  labels:
    app: postgres
    role: replica
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
    role: replica
  ports:
  - name: postgresql
    port: 5432
    targetPort: 5432
    protocol: TCP
  - name: metrics
    port: 9187
    targetPort: 9187
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-primary
  namespace: code-server-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: db-optimized
                operator: In
                values:
                - "true"

      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP
        - name: replication
          containerPort: 5433
          protocol: TCP

        env:
        - name: POSTGRES_DB
          value: "code-server"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"

        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: postgres-config
          mountPath: /etc/postgresql
          readOnly: true
        - name: backup
          mountPath: /backup

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi

      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:latest
        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
        env:
        - name: DATA_SOURCE_NAME
          value: "postgres://postgres:CHANGEME@localhost:5432/code-server?sslmode=disable"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-primary-pvc
      - name: postgres-config
        configMap:
          name: postgres-config
      - name: backup
        persistentVolumeClaim:
          claimName: postgres-backup-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-primary-pvc
  namespace: code-server-ha
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ssd
  resources:
    requests:
      storage: 200Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: code-server-ha
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 500Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: code-server-ha
spec:
  serviceName: postgres-replica
  replicas: 2
  selector:
    matchLabels:
      app: postgres
      role: replica
  template:
    metadata:
      labels:
        app: postgres
        role: replica
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - postgres
            topologyKey: kubernetes.io/hostname

      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP

        env:
        - name: POSTGRES_DB
          value: "code-server"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        - name: PGUSER
          value: "replication"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: replication-password

        command:
        - /bin/sh
        - -c
        - |
          until pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replication -v -P
          do
            echo 'Waiting for primary to be available...'
            sleep 1s
          done

          echo "primary_conninfo = 'postgres://replication:CHANGEME@postgres-primary:5432/code-server'" >> /var/lib/postgresql/data/pgdata/recovery.conf

          /usr/local/bin/docker-entrypoint.sh postgres

        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:latest
        ports:
        - name: metrics
          containerPort: 9187
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

      volumeClaimTemplates:
      - metadata:
          name: postgres-data
        spec:
          accessModes: [ "ReadWriteOnce" ]
          storageClassName: ssd
          resources:
            requests:
              storage: 200Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: code-server-ha
data:
  postgresql.conf: |
    # Connection settings
    max_connections = 1000
    superuser_reserved_connections = 10

    # Replication settings
    wal_level = replica
    max_wal_senders = 10
    max_replication_slots = 10
    wal_keep_size = 1GB
    hot_standby = on
    hot_standby_feedback = on

    # Synchronous replication
    synchronous_commit = on
    synchronous_standby_names = '*'

    # Performance
    shared_buffers = 2GB
    effective_cache_size = 6GB
    maintenance_work_mem = 512MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 10MB

    # Logging
    logging_collector = on
    log_directory = 'pg_log'
    log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
    log_min_duration_statement = 1000
    log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

    # Archiving for PITR
    archive_mode = on
    archive_command = 'test ! -f /backup/wal_archive/%f && cp %p /backup/wal_archive/%f'
    archive_timeout = 300
