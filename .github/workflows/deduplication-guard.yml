name: "Governance — Deduplication Guard"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "scripts/**/*.sh"
      - "docker-compose*.yml"
      - "docker-compose*.yaml"
      - ".github/workflows/deduplication-guard.yml"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  dedup-detect:
    name: "Detect Duplicate Helpers"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run duplicate helper detection
        id: detect
        run: |
          bash scripts/ci/detect-duplicate-helpers.sh 2>&1 | tee /tmp/detect-output.txt
          echo "DETECT_EXIT_CODE=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate check output
        if: always()
        run: |
          if [[ "${{ steps.detect.outputs.DETECT_EXIT_CODE }}" -eq 0 ]]; then
            echo "✓ No duplicate helpers detected" > /tmp/check-result.txt
          else
            cat /tmp/detect-output.txt >> /tmp/check-result.txt
          fi

      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('/tmp/check-result.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deduplication Guard Report\n\n${result}`
            });

      - name: Fail if duplicates found
        if: steps.detect.outputs.DETECT_EXIT_CODE != 0
        run: |
          echo "Duplicate helpers detected. See report above."
          exit 1

  dedup-score:
    name: "Calculate Deduplication Score"
    runs-on: ubuntu-latest
    needs: [dedup-detect]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Calculate dedup score
        id: score
        run: |
          bash scripts/ci/dedup-score-report.sh 2>&1 | tee /tmp/score-output.txt
          source /tmp/dedup-score.txt
          echo "DEDUP_SCORE=$DEDUP_SCORE" >> $GITHUB_OUTPUT
          echo "DEDUP_LEVEL=$DEDUP_LEVEL" >> $GITHUB_OUTPUT

      - name: Comment with score
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/score-output.txt', 'utf8');
            const score = '${{ steps.score.outputs.DEDUP_SCORE }}' || '?';
            const level = '${{ steps.score.outputs.DEDUP_LEVEL }}' || 'UNKNOWN';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Deduplication Score\n\n**Score**: ${score}/100 (${level})\n\n\`\`\`\n${output}\n\`\`\``
            });

      - name: Fail if score too low
        if: steps.score.outputs.DEDUP_SCORE < 60
        run: |
          echo "Deduplication score too low: ${{ steps.score.outputs.DEDUP_SCORE }}/100"
          echo "Required: 60+. See score report above."
          exit 1

permissions:
  contents: read
