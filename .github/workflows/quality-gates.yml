name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest pytest-cov

      - name: Run Tests with Coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html --junitxml=test-results.xml || true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Check Coverage Threshold
        run: |
          coverage report --fail-under=80 || (echo "Coverage below 80%" && exit 1)

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let coverage = 'N/A';
            try {
              const report = fs.readFileSync('coverage/.coverage', 'utf8');
              // Parse coverage summary
              coverage = report.match(/(\d+)%/)?.[1] || 'N/A';
            } catch (e) {
              console.log('Could not parse coverage');
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Coverage: ${coverage}%\n✅ Coverage checks complete`
            });

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SonarQube Scanner
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  lint-results:
    name: Lint Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/super-linter@v4
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_DOCKERFILE: true
          VALIDATE_TERRAFORM: true
          VALIDATE_BASH: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Builds
        run: |
          for dockerfile in Dockerfile Dockerfile.* ; do
            if [ -f "$dockerfile" ]; then
              echo "Building $dockerfile..."
              docker build -f "$dockerfile" -t test:latest . --no-cache || exit 1
            fi
          done

  gate-summary:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [test-coverage, code-quality, lint-results, build]
    if: always()
    steps:
      - name: Check All Gates Passed
        run: |
          if [[ "${{ needs.test-coverage.result }}" == "failure" ]] || \
             [[ "${{ needs.code-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.lint-results.result }}" == "failure" ]] || \
             [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ One or more quality gates failed"
            exit 1
          else
            echo "✅ All quality gates passed"
          fi

      - name: Comment Gate Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const status = `
            ## Quality Gates Report
            
            | Check | Status |
            |-------|--------|
            | Test Coverage | ${{ needs.test-coverage.result }} |
            | Code Quality | ${{ needs.code-quality.result }} |
            | Linting | ${{ needs.lint-results.result }} |
            | Build | ${{ needs.build.result }} |
            
            ${{ needs.test-coverage.result == 'failure' && '❌ **Coverage requirement not met**' || '✅ Coverage OK' }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: status
            });
