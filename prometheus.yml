---
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'production'
    env: 'prod'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: 'prometheus'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'code-server'
    static_configs:
      - targets: ['code-server:8080']

  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:2019']
        labels:
          instance: caddy-proxy

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          instance: grafana

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          instance: alertmanager

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
        labels:
          instance: jaeger-backend
