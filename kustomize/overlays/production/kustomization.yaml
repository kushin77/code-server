apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: code-server-production

bases:
- ../../base/code-server

namePrefix: prod-

commonLabels:
  environment: production
  tier: backend

replicas:
- name: code-server
  count: 5

patchesJson6902:
- target:
    group: apps
    version: v1
    kind: StatefulSet
    name: code-server
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: 2Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 8Gi
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: 1000m
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 4000m

patchesStrategicMerge:
- |-
  apiVersion: v1
  kind: Service
  metadata:
    name: code-server
  spec:
    type: LoadBalancer

configMapGenerator:
- name: environment-config
  literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=info
  - ENABLE_METRICS=true
  - METRICS_PORT=8080
  - BACKUP_ENABLED=true
  - BACKUP_INTERVAL=3600s

secretGenerator:
- name: production-secrets
  literals:
  - DATABASE_URL=postgresql://user:pass@db.production:5432/codeserver
  - AUTH_TOKEN_SECRET=production-secret-key
  behavior: create

images:
- name: codercom/code-server
  newTag: "4.21.0"
  digest: sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890

resources:
- ingress.yaml
- networkpolicy.yaml
- poddisruptionbudget.yaml
- backup.yaml

patchesStrategicMerge:
- patch-hpa.yaml
