# Keepalived Configuration — PRIMARY HOST (192.168.168.31)
# =========================================================
# VRRP Virtual IP: 192.168.168.30/24
# Role: MASTER (priority 110)
# Interface: confirm with `ip route | grep default` on the host
#
# Install on primary:
#   sudo apt-get install -y keepalived
#   sudo cp config/keepalived/keepalived-primary.conf /etc/keepalived/keepalived.conf
#   sudo cp config/keepalived/notify.sh /etc/keepalived/notify.sh
#   sudo chmod +x /etc/keepalived/notify.sh
#   sudo systemctl enable --now keepalived
#
# VRRP auth secret: set VRRP_AUTH_PASS in /etc/keepalived/keepalived.env
#   (created by scripts/bootstrap-node.sh from SOPS-encrypted secrets)

# Global settings
global_defs {
    router_id PRIMARY_31
    script_user root
    enable_script_security
    # Send VRRP state change notifications to syslog
    log_unknown_host_entries
}

# ─── Health Check Script ──────────────────────────────────────────────────────
# Checks if code-server container is running on this host.
# If it fails (fall=2), subtract weight from priority → BACKUP takes over.

vrrp_script chk_code_server {
    script "docker inspect -f '{{.State.Running}}' code-server 2>/dev/null | grep -q true"
    interval 2         # Run check every 2 seconds
    timeout 3          # Script must complete within 3 seconds
    weight -20         # Subtract 20 from priority if check fails (110-20=90 < backup 100 → failover)
    fall 2             # Consecutive failures before marking unhealthy
    rise 2             # Consecutive successes before marking healthy again
}

vrrp_script chk_caddy {
    script "docker inspect -f '{{.State.Running}}' caddy 2>/dev/null | grep -q true"
    interval 5
    timeout 3
    weight -15
    fall 2
    rise 2
}

# ─── VRRP Instance ───────────────────────────────────────────────────────────

vrrp_instance PROD_VIP {
    state MASTER                   # This node starts as MASTER
    interface eth0                 # Network interface (verify: ip route | grep default)
    virtual_router_id 51           # Must match on ALL nodes in this VRRP group
    priority 110                   # Higher priority = preferred MASTER (replica has 100)
    advert_int 1                   # VRRP advertisement interval (seconds)
    nopreempt                      # After failover, do NOT auto-reclaim MASTER on recovery
                                   # (prevents flapping if primary was unstable)

    # VRRP multicast authentication
    # Auth password sourced from environment file (managed by bootstrap-node.sh)
    authentication {
        auth_type PASS
        auth_pass $VRRP_AUTH_PASS   # Replaced by bootstrap-node.sh from SOPS secrets
    }

    # Virtual IP that floats between nodes
    virtual_ipaddress {
        192.168.168.30/24 dev eth0 label eth0:vip
    }

    # Track health check scripts defined above
    track_script {
        chk_code_server
        chk_caddy
    }

    # Notification hooks — fire on every state transition
    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
    notify_stop    "/etc/keepalived/notify.sh STOP"
}
