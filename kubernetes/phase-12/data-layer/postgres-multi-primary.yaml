---
# Phase 12.2: PostgreSQL Multi-Primary StatefulSet for Data Replication
# Implements PostgreSQL with streaming replication and CRDT support across regions

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: phase-12
spec:
  postgresql-wal.conf: |
    # Write-Ahead Log Configuration for Multi-Primary Replication
    wal_level = logical
    max_wal_senders = 5
    wal_keep_size = 1GB
    hot_standby = on
    max_replication_slots = 5

    # CRDT-compatible settings
    synchronous_commit = remote_apply
    synchronous_standby_names = '*'

    # Logical replication for CRDT data types
    logical_decoding_work_mem = 64MB
    max_logical_replication_workers = 4

    # Performance tuning
    shared_buffers = 4GB
    effective_cache_size = 12GB
    work_mem = 20MB
    maintenance_work_mem = 1GB

  postgresql-init.sql: |
    -- Enable required extensions for CRDT support
    CREATE EXTENSION IF NOT EXISTS pgcrypto;
    CREATE EXTENSION IF NOT EXISTS hstore;
    CREATE EXTENSION IF NOT EXISTS uuid-ossp;
    CREATE EXTENSION IF NOT EXISTS "uuid";

    -- Create replication user
    CREATE USER replication WITH REPLICATION ENCRYPTED PASSWORD 'CHANGE_ME_SECURE_PASSWORD';
    GRANT CONNECT ON DATABASE postgres TO replication;

    -- Create monitor user for health checks
    CREATE USER monitor WITH PASSWORD 'CHANGE_ME_MONITOR_PASSWORD';
    GRANT CONNECT ON DATABASE postgres TO monitor;

    -- Create logical replication slot for CRDT synchronization
    SELECT pg_create_logical_replication_slot('crdt_sync_slot', 'test_decoding');

    -- Create schema for CRDT data types
    CREATE SCHEMA crdt;

    -- CRDT Counter type (Last-Write-Wins)
    CREATE TABLE crdt.crdt_counters (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      key TEXT NOT NULL,
      value BIGINT NOT NULL DEFAULT 0,
      timestamp TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
      replica_id TEXT NOT NULL,
      UNIQUE(key, replica_id)
    );

    -- CRDT Set type (Add-Wins)
    CREATE TABLE crdt.crdt_sets (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      key TEXT NOT NULL,
      element TEXT NOT NULL,
      timestamp TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
      replica_id TEXT NOT NULL,
      is_added BOOLEAN DEFAULT TRUE,
      UNIQUE(key, element, replica_id)
    );

    -- CRDT Register type (Last-Write-Wins)
    CREATE TABLE crdt.crdt_registers (
      id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
      key TEXT NOT NULL,
      value TEXT,
      timestamp TIMESTAMPTZ DEFAULT CURRENT_TIMESTAMP,
      replica_id TEXT NOT NULL,
      version BIGINT DEFAULT 1,
      PRIMARY KEY(key, replica_id)
    );

    -- Create indexes for performance
    CREATE INDEX idx_crdt_counters_key ON crdt.crdt_counters(key);
    CREATE INDEX idx_crdt_sets_key ON crdt.crdt_sets(key);
    CREATE INDEX idx_crdt_registers_key ON crdt.crdt_registers(key);

    -- Grant replication permissions
    GRANT ALL PRIVILEGES ON SCHEMA crdt TO replication;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA crdt TO replication;

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: phase-12
type: Opaque
stringData:
  postgres-password: "CHANGE_ME_POSTGRES_PASSWORD"
  replication-password: "CHANGE_ME_REPLICATION_PASSWORD"
  monitor-password: "CHANGE_ME_MONITOR_PASSWORD"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: phase-12
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgresql
    - port: 9187
      name: metrics

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: phase-12
  labels:
    app: postgres
spec:
  type: LoadBalancer
  selector:
    app: postgres
    role: primary
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-readonly
  namespace: phase-12
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: phase-12
spec:
  serviceName: postgres-headless
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - postgres
              topologyKey: kubernetes.io/hostname

      initContainers:
        - name: init-permissions
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - mkdir -p /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5432
              name: postgresql
            - containerPort: 9187
              name: metrics

          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REPLICA_ID
              value: $(POD_NAME)

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -h localhost -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres -h localhost -p 5432
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi

        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@localhost:5432/postgres?sslmode=disable"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
        - name: postgres-init
          configMap:
            name: postgres-config
            items:
              - key: postgresql-init.sql
                path: init.sql

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: phase-12
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: postgres

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: postgres-monitor
  namespace: phase-12
spec:
  selector:
    matchLabels:
      app: postgres
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
