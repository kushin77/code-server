# PgBouncer Configuration for Connection Pooling
# Phase 6a: Database Performance Optimization

[databases]
postgres = host=postgres port=5432 dbname=postgres

[pgbouncer]
# NETWORK
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
listen_port = 6432
listen_addr = 0.0.0.0

# AUTHENTICATION
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# POOL SETTINGS
# Maximum number of client connections
max_client_conn = 500

# Number of backend connections per database
default_pool_size = 100

# Minimum number of idle backend connections
min_pool_size = 25

# Number of extra connections to allow when pool is full
reserve_pool_size = 5

# Timeout for reserve pool
reserve_pool_timeout = 3

# Maximum number of connections per user
max_db_connections = 200
max_user_connections = 200

# CONNECTION POOLING MODE
# session: One server connection per client session
# transaction: One server connection per transaction
# statement: One server connection per query
pool_mode = transaction

# Timeout settings
client_idle_timeout = 600
server_idle_timeout = 600
server_lifetime = 3600
server_connect_timeout = 15
query_timeout = 0

# PERFORMANCE
statement_timeout = 0
idle_in_transaction_session_timeout = 0

# LOGGING
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

# ADMIN
admin_users = postgres
stats_users = postgres
