name: E2E Service Account Coverage

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/e2e-service-account-profile.yml'
      - 'scripts/ci/validate-e2e-profile-coverage.sh'
      - '.github/workflows/e2e-profile-coverage.yml'
  push:
    branches:
      - main
    paths:
      - 'config/e2e-service-account-profile.yml'
      - 'scripts/ci/validate-e2e-profile-coverage.sh'
      - '.github/workflows/e2e-profile-coverage.yml'

permissions:
  contents: read

jobs:
  validate-e2e-profile:
    name: Validate E2E service-account coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate profile coverage contract
        shell: bash
        run: bash scripts/ci/validate-e2e-profile-coverage.sh
