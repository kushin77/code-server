name: CI - Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2 AM UTC

env:
  COST_CATEGORY: "ci-security"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178fba73407ddcba470dacbef  # v4.0.0
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Audit dependencies
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true

  sast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SemGrep
        uses: returntocorp/semgrep-action@5a5b4e89a1a4d7dcdb0e9a1a0fa5f5f5f5f5f5f0  # v1.0.0
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
          generateSarif: true
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true

  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@d43c1f16525ea8161add6e3baa4e3fba018190a1  # master (SHA)
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@ec6ed3e0ede5b8ddbaf27ebf10bca729e4b2d4e6  # main (SHA based)
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true

  report-metrics:
    needs: [dependency-check, sast-scan, container-scan, secret-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Security scan summary
        run: |
          echo "::notice::Cost-Category: ci-security"
          echo "::notice::Dependency Check: ${{ needs.dependency-check.result }}"
          echo "::notice::SAST Scan: ${{ needs.sast-scan.result }}"
          echo "::notice::Container Scan: ${{ needs.container-scan.result }}"
          echo "::notice::Secret Scan: ${{ needs.secret-scan.result }}"
