name: PR Quality Gates - Phase 1-2 Validation

on:
  pull_request:
    branches: [main, phase-7-deployment]
    types: [opened, edited, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  phase1-design-review:
    name: Phase 1 - Design Review Check (If Applicable)
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Body for Design Review Completion
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          # Check if this is a design-requiring change
          if echo "$PR_BODY" | grep -q "🔴 New feature\|🔴 Breaking change\|🔴 Architecture"; then
            echo "Design review required for this change"
            
            if echo "$PR_BODY" | grep -q "ADR Created"; then
              echo "✅ Phase 1: ADR documented"
            else
              echo "⚠️ WARNING: Design review required but ADR not marked as created"
              exit 0  # Non-blocking for now (gradual rollout)
            fi
          else
            echo "✅ Phase 1: Design review skipped (not applicable for this change type)"
          fi

  phase2-code-review-checklist:
    name: Phase 2 - Code Review Checklist
    runs-on: ubuntu-latest
    steps:
      - name: Validate Code Review Checklist
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          CHECKED_ITEMS=0
          REQUIRED_ITEMS=0
          
          # Parse Phase 2 checklist items
          if echo "$PR_BODY" | grep -q "PHASE 2 (Code):"; then
            # Count checked items (✅ or [x])
            CHECKED_ITEMS=$(echo "$PR_BODY" | grep -c -E "\[x\]|\[X\]|✅" || true)
            
            echo "Code Review Checklist: $CHECKED_ITEMS items checked"
            
            if [ "$CHECKED_ITEMS" -lt 5 ]; then
              echo "⚠️ WARNING: Only $CHECKED_ITEMS Phase 2 items checked (typical: 8-12)"
              echo "Please complete the full code review checklist"
            else
              echo "✅ Phase 2: Code review checklist adequately completed"
            fi
          fi
        continue-on-error: true

  testing-quality:
    name: Phase 2 - Testing & Quality (CI Integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Linting
        run: |
          echo "Running shell script validation..."
          find scripts -name "*.sh" -type f ! -path "*/deprecated/*" | head -20 | while read f; do
            bash -n "$f" 2>&1 || echo "❌ Lint error: $f"
          done || true
          echo "✅ Basic shell validation complete"
        continue-on-error: true

      - name: Check for Security Issues
        run: |
          echo "Checking for common security issues..."
          
          # Check for hardcoded secrets patterns
          if grep -r -i "password.*=\|api.*key.*=\|secret.*=" --include="*.tf" --include="*.yml" --include="*.yaml" . 2>/dev/null | grep -v ".env\|test"; then
            echo "⚠️ WARNING: Possible hardcoded secrets found"
          else
            echo "✅ No obvious hardcoded secrets detected"
          fi
        continue-on-error: true

  deployment-readiness:
    name: Phase 3 - Deployment Readiness (Automated Checks)
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'deployment') || contains(github.event.pull_request.title, 'deploy')
    steps:
      - uses: actions/checkout@v4

      - name: Validate Terraform (If Changed)
        run: |
          if git diff --name-only origin/main... | grep -q "\.tf$"; then
            echo "Terraform files detected, checking syntax..."
            find terraform -name "*.tf" -type f | head -5 | while read f; do
              echo "Checking: $f"
              # Basic terraform syntax check (requires terraform installed)
              # For now, just validate JSON-like structure
            done || true
            echo "✅ Terraform files present"
          fi
        continue-on-error: true

      - name: Check for Rollback Strategy
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          
          if echo "$PR_BODY" | grep -q "Rollback command"; then
            echo "✅ Rollback strategy documented"
          else
            echo "⚠️ WARNING: Deployment change detected but rollback strategy not documented"
          fi
        continue-on-error: true

  pr-comment-summary:
    name: PR Quality Gates Summary
    runs-on: ubuntu-latest
    needs: [phase1-design-review, phase2-code-review-checklist, testing-quality, deployment-readiness]
    if: always()
    steps:
      - name: Post Quality Gates Summary
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const phase1 = '${{ needs.phase1-design-review.result }}' === 'success' ? '✅' : '⏭️';
            const phase2 = '${{ needs.phase2-code-review-checklist.result }}' === 'success' ? '✅' : '⚠️';
            const testing = '${{ needs.testing-quality.result }}' === 'success' ? '✅' : '⚠️';
            const deployment = '${{ needs.deployment-readiness.result }}' === 'skipped' ? '⏭️' : '${{ needs.deployment-readiness.result }}' === 'success' ? '✅' : '⚠️';
            
            const comment = `## 🚀 Quality Gates Status

| Phase | Status | Details |
|-------|--------|---------|
| **Phase 1** (Design) | ${phase1} | Architecture review (if applicable) |
| **Phase 2** (Code) | ${phase2} | Code quality, testing, security |
| **Phase 3** (Operations) | ${deployment} | Deployment readiness (if applicable) |
| **Phase 4** (Production) | ⏳ | Final sign-off before merge |

### Next Steps
1. Complete checklist items marked with ⚠️
2. Request code review (2 approvals required)
3. Address any CI/CD failures
4. Obtain Phase 4 sign-off from on-call engineer before merge

---
*This PR follows the [Production Readiness Framework](../../docs/PRODUCTION-READINESS-FRAMEWORK.md). For details, see the PR template.*`;
            
            github.rest.issues.createComment({
              issue_number: pr.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
