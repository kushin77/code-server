# NOTE: This file is GENERATED by Terraform from docker-compose.tpl
# DO NOT EDIT MANUALLY — all changes go in main.tf
# Regenerate: terraform apply
# ════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:
  # ─── code-server ────────────────────────────────────────────────────────────
  # VS Code running in the browser with Copilot Chat support
  # Image pinned to specific base + extensions freeze at build time
  code-server:
    # Production-ready upstream image
    image: codercom/code-server:4.115.0
    container_name: code-server
    restart: always
    networks:
      - enterprise
    # Expose directly for direct IDE access + route through Caddy for proxy
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      # Use strong password from .env, not defaults
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_ENDPOINT=http://ollama:11434
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=password"
    volumes:
      - code-server-enterprise-data:/home/coder
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  # ─── ollama ─────────────────────────────────────────────────────────────────
  # Local LLM server (pinned to 0.1.27)
  # Usage: COMPOSE_PROFILES=ai docker compose up -d
  ollama:
    image: ollama/ollama:0.1.45
    container_name: ollama
    profiles: [ai]
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "0.0.0.0:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-16}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-1}
      - OLLAMA_GPU_LAYERS=${OLLAMA_GPU_LAYERS:-99}
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-4}
      - CUDA_VISIBLE_DEVICES=1
    volumes:
      - ollama-data:/root/.ollama
      - /mnt/nas-56/ollama:/root/.ollama/models
    healthcheck:
      # ollama container healthcheck using wget
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 32g
          cpus: '8.0'
        reservations:
          memory: 16g
          cpus: '4.0'
    runtime: nvidia
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─── ollama-init ────────────────────────────────────────────────────────────
  # One-time service that pulls models on startup
  ollama-init:
    image: ollama/ollama:0.1.45
    container_name: ollama-init
    profiles: [ai]
    networks:
      - enterprise
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "🚀 Pulling elite LLM models..."
        echo "⏳ Pulling llama2:70b-chat..."
        ollama pull llama2:70b-chat || true
        echo "⏳ Pulling codegemma..."
        ollama pull codegemma || true
        echo "⏳ Pulling neural-chat..."
        ollama pull neural-chat || true
        echo "⏳ Pulling mistral..."
        ollama pull mistral || true
        echo "✅ All models ready"
        sleep infinity
    depends_on:
      - ollama
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─── oauth2-proxy ───────────────────────────────────────────────────────────
  # Authentication sidecar (pinned to v7.5.1)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      OAUTH2_PROXY_EMAIL_DOMAINS: ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX: "^/healthz|^/oauth2"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4180/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── caddy ──────────────────────────────────────────────────────────────────
  # Reverse proxy + TLS (pinned to 2.9.1-alpine for elite best practices)
  caddy:
    # Production TLS termination - immutable, pinned version
    image: caddy:2.9.1-alpine
    container_name: caddy
    restart: always
    networks:
      - enterprise
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    environment:
      - ACME_AGREE=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    # Allow binding to privileged ports (80, 443) without full root
    cap_add:
      - NET_BIND_SERVICE
    # Note: snap Docker + no-new-privileges causes "operation not permitted" on binary exec
    # Removed no-new-privileges:true for snap compatibility
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  # ─── OpenTelemetry Collector ────────────────────────────────────────────────
  # Collects traces, metrics, logs from all services
  # Usage: COMPOSE_PROFILES=tracing docker compose up -d
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    container_name: otel-collector
    profiles: [tracing]
    restart: always
    networks:
      - enterprise
    ports:
      - "4317:4317"  # gRPC receiver
      - "4318:4318"  # HTTP receiver
      - "9411:9411"  # Zipkin receiver
      - "8888:8888"  # Prometheus metrics
    volumes:
      - ./otel-config.yml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      - GOGC=80
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Jaeger (Distributed Tracing) ───────────────────────────────────────────
  # Stores and visualizes traces from OTel Collector
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    profiles: [tracing]
    restart: always
    networks:
      - enterprise
    ports:
      - "5775:5775/udp"   # Zipkin compact thrift
      - "6831:6831/udp"   # Jaeger compact thrift
      - "6832:6832/udp"   # Jaeger binary thrift
      - "5778:5778"       # trace collector HTTP
      - "16686:16686"     # UI dashboard
      - "14268:14268"     # jaeger collector HTTP
      - "14250:14250"     # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=prometheus
    volumes:
      - jaeger-data:/badger
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  # Persistent relational store (audit log, session data, RBAC)
  # Core service — always starts (no profile)
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-codeserver}"
      POSTGRES_USER: "${POSTGRES_USER:-codeserver}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me-in-env}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeserver}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ──────────────────────────────────────────────────────────────────
  # Cache and session store for oauth2-proxy
  # Core service — always starts (no profile)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "6379"
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD:-change-me-in-env}"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--save"
      - "900"
      - "1"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-in-env}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Prometheus ─────────────────────────────────────────────────────────────
  # Metrics collection and alerting
  # Usage: COMPOSE_PROFILES=monitoring docker compose up -d
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    profiles: [monitoring]
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "0.0.0.0:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./config/alert-rules-audit-phase4.yml:/etc/prometheus/alert-rules-audit-phase4.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Grafana ────────────────────────────────────────────────────────────────
  # Dashboards and visualisation
  # Usage: COMPOSE_PROFILES=monitoring docker compose up -d
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    profiles: [monitoring]
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-change-me-in-env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: "warn"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── AlertManager ───────────────────────────────────────────────────────────
  # Alert routing and silencing
  # Usage: COMPOSE_PROFILES=monitoring docker compose up -d
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    profiles: [monitoring]
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "0.0.0.0:9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager.default.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Loki ───────────────────────────────────────────────────────────────────
  # Centralized log aggregation (Grafana's log database)
  # Usage: COMPOSE_PROFILES=tracing docker compose up -d
  loki:
    image: grafana/loki:2.9.3
    container_name: loki
    profiles: [tracing]
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "3100"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Promtail ───────────────────────────────────────────────────────────────
  # Log shipping agent — scrapes Docker container logs → Loki
  # Usage: COMPOSE_PROFILES=tracing docker compose up -d
  promtail:
    image: grafana/promtail:2.9.3
    container_name: promtail
    profiles: [tracing]
    restart: unless-stopped
    networks:
      - enterprise
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    depends_on:
      - loki
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  code-server-enterprise-data:
    driver: local
  ollama-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local
  jaeger-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local
