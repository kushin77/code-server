---
groups:
  - name: production_slos
    interval: 30s
    rules:
      # Error rate alerts
      - alert: HighErrorRate
        expr: (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) > 0.001
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected ({{ $value | humanizePercentage }})"
          description: "Error rate is above 0.1% on {{ $labels.instance }}"

      # Latency alerts
      - alert: HighP99Latency
        expr: histogram_quantile(0.99, http_request_duration_seconds_bucket) > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High p99 latency detected ({{ $value }}s)"
          description: "p99 latency is above 100ms on {{ $labels.instance }}"

      # CPU alerts
      - alert: HighCPUUsage
        expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage detected ({{ $value | humanize }}%)"
          description: "CPU usage is above 80% on {{ $labels.instance }}"

      # Memory alerts
      - alert: HighMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage detected"
          description: "Available memory is below 10% on {{ $labels.instance }}"

      # Service availability
      - alert: ServiceDown
        expr: up{job!="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been unreachable for 2 minutes"

      # Disk space
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs|vfat"} / node_filesystem_size_bytes) < 0.1
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Low disk space warning"
          description: "Available disk space is below 10% on {{ $labels.device }}"

      # Redis memory
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          team: cache
        annotations:
          summary: "Redis memory usage high ({{ $value | humanizePercentage }})"
          description: "Redis memory usage is above 90%"

      # Prometheus targets down
      - alert: PrometheusTargetsDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Prometheus scrape target down"
          description: "Target {{ $labels.instance }} (job: {{ $labels.job }}) is down"
