---
# Phase 26-D: Webhook Dispatcher Service Deployment
# Production-ready Python service for reliable webhook event delivery

apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-dispatcher
  namespace: code-server
  labels:
    app: webhook-dispatcher
    phase: 26-d

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-dispatcher-config
  namespace: code-server
  labels:
    app: webhook-dispatcher
data:
  LOG_LEVEL: "info"
  DB_CONNECTION_TIMEOUT_MS: "2000"
  DB_POOL_MIN_SIZE: "5"
  DB_POOL_MAX_SIZE: "20"
  WEBHOOK_TIMEOUT_SECONDS: "30"
  WEBHOOK_MAX_RETRIES: "3"
  WEBHOOK_BATCH_SIZE: "1000"
  WEBHOOK_BACKOFF_MULTIPLIER: "2.0"
  WEBHOOK_MAX_DELAY_MS: "60000"
  HEALTH_CHECK_INTERVAL_SECONDS: "30"
  METRICS_PORT: "8002"

---
apiVersion: v1
kind: Service
metadata:
  name: webhook-dispatcher
  namespace: code-server
  labels:
    app: webhook-dispatcher
    phase: 26-d
spec:
  type: ClusterIP
  selector:
    app: webhook-dispatcher
  ports:
    - name: metrics
      port: 8002
      targetPort: 8002
      protocol: TCP
  # No external traffic, internal metrics only

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-dispatcher
  namespace: code-server
  labels:
    app: webhook-dispatcher
    phase: 26-d
spec:
  replicas: 3  # Run 3 dispatcher instances for HA (matches webhook_services.dispatcher.replicas)
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: webhook-dispatcher

  template:
    metadata:
      labels:
        app: webhook-dispatcher
        phase: 26-d
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: webhook-dispatcher

      # Anti-affinity to spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - webhook-dispatcher
                topologyKey: kubernetes.io/hostname

      securityContext:
        fsGroup: 1000

      containers:
        - name: webhook-dispatcher
          image: "python:3.11-slim"  # Base image (override with custom in production)
          imagePullPolicy: IfNotPresent

          # Command to run dispatcher
          command:
            - python
            - main.py

          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000

          ports:
            - name: metrics
              containerPort: 8002
              protocol: TCP

          env:
            # PostgreSQL connection
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: name
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password

            # Dispatcher configuration
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: LOG_LEVEL
            - name: DB_CONNECTION_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: DB_CONNECTION_TIMEOUT_MS
            - name: DB_POOL_MIN_SIZE
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: DB_POOL_MIN_SIZE
            - name: DB_POOL_MAX_SIZE
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: DB_POOL_MAX_SIZE
            - name: WEBHOOK_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: WEBHOOK_TIMEOUT_SECONDS
            - name: WEBHOOK_MAX_RETRIES
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: WEBHOOK_MAX_RETRIES
            - name: WEBHOOK_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: webhook-dispatcher-config
                  key: WEBHOOK_BATCH_SIZE

          # Resource allocation
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Startup probe (give service time to initialize)
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -f http://localhost:8002/metrics 2>/dev/null || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30

          # Liveness probe (restart if hung)
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "curl -f http://localhost:8002/metrics 2>/dev/null || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Graceful shutdown

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-dispatcher
  namespace: code-server
  labels:
    app: webhook-dispatcher
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook-dispatcher

  minReplicas: 3
  maxReplicas: 10  # Scale with org/webhook growth

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: webhook-dispatcher
  namespace: code-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: webhook-dispatcher

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: webhook-dispatcher
  namespace: code-server
  labels:
    app: webhook-dispatcher
spec:
  selector:
    matchLabels:
      app: webhook-dispatcher
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
