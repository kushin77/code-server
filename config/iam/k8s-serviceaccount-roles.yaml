# P1 #388 Phase 2 - K8s ServiceAccount to IAM Role Mapping
# Defines which K8s ServiceAccounts map to which application roles

apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-sa-role-mapping
  namespace: code-server-iam
data:
  
  # YAML structure: namespace/serviceaccount -> role + permissions
  mapping.yaml: |
    service_accounts:
      
      # Code-Server (IDE)
      - namespace: prod
        name: code-server
        role: workload/viewer
        permissions:
          - code-server:execute
          - logs:write
          - metrics:export
        identity_type: workload
        token_ttl_seconds: 3600
      
      # Backstage (Catalog)
      - namespace: prod
        name: backstage
        role: workload/operator
        permissions:
          - backstage:catalog
          - github:api
          - kubernetes:services
          - metrics:read
        identity_type: workload
        token_ttl_seconds: 3600
      
      # Appsmith (Workflows)
      - namespace: prod
        name: appsmith
        role: workload/operator
        permissions:
          - appsmith:workflows
          - deployments:execute
          - incidents:view
        identity_type: workload
        token_ttl_seconds: 3600
      
      # Ollama (AI)
      - namespace: prod
        name: ollama
        role: workload/viewer
        permissions:
          - ollama:inference
          - metrics:export
        identity_type: workload
        token_ttl_seconds: 7200
      
      # Prometheus (Monitoring)
      - namespace: monitoring
        name: prometheus
        role: workload/viewer
        permissions:
          - prometheus:scrape
          - kubernetes:pods
        identity_type: workload
        token_ttl_seconds: 3600
      
      # Loki (Logging)
      - namespace: monitoring
        name: loki
        role: workload/viewer
        permissions:
          - loki:write
          - kubernetes:pods
        identity_type: workload
        token_ttl_seconds: 3600
