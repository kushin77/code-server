apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-config
  namespace: code-server
  labels:
    app: code-server
    component: config
data:
  # Workspace configuration
  WORKSPACE_DIR: "/home/coder/workspace"
  SHELL: "/bin/bash"
  
  # IDE settings
  CODE_SERVER_PORT: "8443"
  CODE_SERVER_BIND_ADDR: "0.0.0.0"
  CODE_SERVER_LOG_LEVEL: "info"
  
  # Agent configuration
  AGENT_API_URL: "http://agent-api:3000"
  EMBEDDINGS_API_URL: "http://embeddings:5000"
  
  # Redis configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_RETRIES: "3"
  
  # Prometheus configuration
  PROMETHEUS_URL: "http://prometheus:9090"
  
  # Feature flags
  FEATURE_SEMANTIC_SEARCH: "true"
  FEATURE_REAL_TIME_COLLABORATION: "false"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-api-config
  namespace: code-server
  labels:
    app: agent-api
    component: config
data:
  # FastAPI configuration
  AGENT_API_PORT: "3000"
  AGENT_API_HOST: "0.0.0.0"
  AGENT_API_LOG_LEVEL: "info"
  
  # LangGraph configuration
  LANGGRAPH_DEBUG: "false"
  
  # Ollama integration
  OLLAMA_HOST: "http://localhost:11434"
  OLLAMA_TIMEOUT: "300"
  
  # Redis configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  
  # Embeddings service
  EMBEDDINGS_SERVICE_URL: "http://embeddings:5000"
  
  # Database configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_DATABASE: "code_server"
  DB_POOL_SIZE: "20"
  DB_POOL_TIMEOUT: "30"
  
  # Prometheus metrics
  PROMETHEUS_MULTIPROC_DIR: "/tmp"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  
  # Logging
  LOG_STRUCTURED: "true"
  TRACE_ENABLED: "false"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: embeddings-config
  namespace: code-server
  labels:
    app: embeddings
    component: config
data:
  # FastAPI configuration
  EMBEDDINGS_PORT: "5000"
  EMBEDDINGS_HOST: "0.0.0.0"
  EMBEDDINGS_LOG_LEVEL: "info"
  
  # Model configuration
  EMBEDDINGS_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  MODEL_CACHE_DIR: "/home/app/.cache/huggingface/hub"
  MODEL_MAX_BATCH_SIZE: "32"
  
  # Redis cache
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_CACHE_TTL: "3600"
  
  # Processing configuration
  MAX_WORKERS: "8"
  TIMEOUT_SECONDS: "300"
  
  # Prometheus metrics
  METRICS_ENABLED: "true"
  METRICS_PORT: "9091"
  
  # Logging
  LOG_LEVEL: "info"
  UVICORN_LOG_LEVEL: "info"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: code-server
  labels:
    app: prometheus
    component: config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s
      external_labels:
        cluster: 'code-server'
        namespace: 'code-server'
    
    scrape_configs:
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
    
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
    
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: 'true'
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
    
    - job_name: 'code-server'
      static_configs:
      - targets: ['code-server:8443']
      metrics_path: /metrics
    
    - job_name: 'agent-api'
      static_configs:
      - targets: ['agent-api:3000']
      metrics_path: /metrics
    
    - job_name: 'embeddings'
      static_configs:
      - targets: ['embeddings:5000']
      metrics_path: /metrics
    
    - job_name: 'redis'
      static_configs:
      - targets: ['redis-exporter:9121']

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: code-server
  labels:
    app: grafana
    component: config
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus:9090
      isDefault: true
      editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: code-server
  labels:
    app: redis
    component: config
data:
  redis.conf: |
    # Redis configuration for code-server
    port 6379
    bind 0.0.0.0
    
    # Memory management
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    
    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec
    
    # Replication
    min-slaves-to-write 0
    min-slaves-max-lag 10
    
    # General
    databases 16
    loglevel notice
    logfile ""
    
    # Slow log
    slowlog-log-slower-than 10000
    slowlog-max-len 128
