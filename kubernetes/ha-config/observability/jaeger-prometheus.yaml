apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: code-server-ha
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
  - name: jaeger-agent-zipkin-thrift
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: jaeger-agent-compact
    port: 6832
    targetPort: 6832
    protocol: UDP
  - name: jaeger-agent-binary
    port: 6833
    targetPort: 6833
    protocol: UDP
  - name: jaeger-ui
    port: 16686
    targetPort: 16686
    protocol: TCP
  - name: jaeger-collector
    port: 14268
    targetPort: 14268
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: code-server-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        ports:
        - name: jaeger-agent-zipkin-thrift
          containerPort: 6831
          protocol: UDP
        - name: jaeger-agent-compact
          containerPort: 6832
          protocol: UDP
        - name: jaeger-agent-binary
          containerPort: 6833
          protocol: UDP
        - name: jaeger-ui
          containerPort: 16686
          protocol: TCP
        - name: jaeger-collector
          containerPort: 14268
          protocol: TCP
        
        env:
        - name: COLLECTOR_ZIPKIN_HTTP_PORT
          value: "9411"
        - name: MEMORY_MAX_TRACES
          value: "100000"
        - name: SAMPLING_STRATEGIES_FILE
          value: /etc/jaeger/sampling_strategies.json
        
        volumeMounts:
        - name: sampling-config
          mountPath: /etc/jaeger
          readOnly: true
        
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 5
      
      volumes:
      - name: sampling-config
        configMap:
          name: jaeger-sampling-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-sampling-config
  namespace: code-server-ha
data:
  sampling_strategies.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      },
      "service_strategies": [
        {
          "service": "code-server",
          "type": "probabilistic",
          "param": 0.5
        },
        {
          "service": "postgres",
          "type": "const",
          "param": 1
        },
        {
          "service": "redis",
          "type": "const",
          "param": 1
        }
      ]
    }

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: code-server-ha
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - name: prometheus
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: code-server-ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --storage.tsdb.retention.time=30d
        - --web.enable-lifecycle
        ports:
        - name: prometheus
          containerPort: 9090
          protocol: TCP
        
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
          readOnly: true
        - name: storage
          mountPath: /prometheus
        
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
      
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir:
          sizeLimit: 20Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: code-server-ha
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'code-server-ha'
        environment: 'production'
    
    scrape_configs:
    - job_name: 'prometheus'
      static_configs:
      - targets: ['localhost:9090']
    
    - job_name: 'code-server'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - code-server-ha
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: code-server
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
    
    - job_name: 'postgresql'
      static_configs:
      - targets: ['postgres-primary:9187']
      - targets: ['postgres-replica-0:9187']
      - targets: ['postgres-replica-1:9187']
    
    - job_name: 'redis'
      static_configs:
      - targets: ['redis-0:9121']
      - targets: ['redis-1:9121']
      - targets: ['redis-2:9121']
      - targets: ['redis-3:9121']
      - targets: ['redis-4:9121']
      - targets: ['redis-5:9121']
    
    - job_name: 'jaeger'
      static_configs:
      - targets: ['jaeger:16686']
    
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https
    
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: code-server-ha

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: code-server-ha
