name: Validate Issue Governance

on:
  pull_request:
    paths:
      - .github/workflows/autonomous-issue-triage.yml
      - .github/workflows/validate-issue-governance.yml
      - AGENT-EXEC-QUICKSTART.md
      - AGENT-TRIAGE-APRIL-18-2026.md
      - AUTONOMOUS-OPEN-ISSUE-STATUS-2026-04-18.md
      - config/issues/**
      - package.json
      - scripts/ci/validate-issue-linkage.sh
      - scripts/ops/issue_execution_manifest.py
      - scripts/ops/triage-issues-autonomous.sh
  push:
    branches:
      - main
    paths:
      - .github/workflows/autonomous-issue-triage.yml
      - .github/workflows/validate-issue-governance.yml
      - AGENT-EXEC-QUICKSTART.md
      - AGENT-TRIAGE-APRIL-18-2026.md
      - AUTONOMOUS-OPEN-ISSUE-STATUS-2026-04-18.md
      - config/issues/**
      - package.json
      - scripts/ci/validate-issue-linkage.sh
      - scripts/ops/issue_execution_manifest.py
      - scripts/ops/triage-issues-autonomous.sh

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate issue execution manifest
        run: |
          set -euo pipefail
          python3 scripts/ops/issue_execution_manifest.py validate

      - name: Show actionable queue
        run: |
          set -euo pipefail
          python3 scripts/ops/issue_execution_manifest.py queue

      - name: Validate issue linkage
        run: |
          set -euo pipefail
          bash scripts/ci/validate-issue-linkage.sh
