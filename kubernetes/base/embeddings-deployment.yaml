apiVersion: apps/v1
kind: Deployment
metadata:
  name: embeddings
  namespace: agents
  labels:
    app: embeddings
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: embeddings
  template:
    metadata:
      labels:
        app: embeddings
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: embeddings
          image: code-server/embeddings:latest
          ports:
            - containerPort: 8001
          env:
            - name: MODEL_TYPE
              value: "sentence-transformers/all-MiniLM-L6-v2"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 10
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: embeddings-pdb
  namespace: agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: embeddings
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embeddings
  namespace: agents
  labels:
    app: embeddings
    component: vector-search
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: embeddings
  template:
    metadata:
      labels:
        app: embeddings
        component: vector-search
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: embeddings
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: embeddings
          image: code-server/embeddings:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
            - name: metrics
              containerPort: 9090

          env:
            - name: MODEL_TYPE
              value: "sentence-transformers/all-MiniLM-L6-v2"
            - name: CACHE_TTL_SECONDS
              value: "86400"
            - name: MAX_CACHE_SIZE_MB
              value: "512"
            - name: WORKERS
              value: "4"

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: model-cache
              mountPath: /models

      affinity:
        podDistribution:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - embeddings
                topologyKey: kubernetes.io/hostname
              weight: 100

      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 2Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: embeddings
  namespace: agents

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: embeddings
  namespace: agents
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: embeddings
  namespace: agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: embeddings
subjects:
  - kind: ServiceAccount
    name: embeddings
    namespace: agents
