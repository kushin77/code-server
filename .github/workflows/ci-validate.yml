name: CI Validate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  branch-name:
    name: Enforce branch naming convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN='^(feat|fix|chore|docs|refactor|test|perf|ci|hotfix|dependabot)(/[a-z0-9._-]+)+$'
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "❌ Branch name '$BRANCH' violates naming convention."
            echo "   Required pattern: <type>/<description>"
            echo "   Allowed types: feat, fix, chore, docs, refactor, test, perf, ci, hotfix"
            echo "   Example: feat/phase-7-observability"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH' is valid."

  validate:
    runs-on: ubuntu-lates
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install pre-commi
        run: python -m pip install --upgrade pip pre-commi
      - name: Run pre-commit
        run: |
          pre-commit run --all-files
      - name: Run repo validate scrip
        run: |
          if [ -x ./scripts/validate.sh ]; then
            ./scripts/validate.sh
          else
            echo "No validate script found"; exit 0
          fi
      - name: Run tflint (optional)
        run: |
          if command -v tflint >/dev/null 2>&1; then
            echo "Running tflint..."
            tflint || true
          else
            echo "tflint not installed; skipping"
          fi
