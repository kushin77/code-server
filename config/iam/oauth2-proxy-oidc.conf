# oauth2-proxy Configuration - OIDC Mode
# Phase 1: Production-Ready (April 22, 2026)
#
# Usage:
# 1. Copy this file to /etc/oauth2-proxy/oauth2-proxy.conf
# 2. Populate environment variables from .env
# 3. Reload oauth2-proxy: docker exec oauth2-proxy /oauth2-proxy -reload

# ==============================================================================
# AUTHENTICATION PROVIDER CONFIGURATION
# ==============================================================================

# Enable OIDC authentication
auth_provider = "oidc"

# OIDC Issuer (Google or Keycloak)
# Override via environment variable: OAUTH2_OIDC_ISSUER_URL
oidc_issuer_url = "${OAUTH2_OIDC_ISSUER_URL:-https://accounts.google.com}"

# OAuth2 Client credentials
client_id = "${OAUTH2_CLIENT_ID}"
client_secret = "${OAUTH2_CLIENT_SECRET}"

# OIDC JWKS (auto-discovered from issuer if not specified)
# oidc_jwks_url = ""

# Skip OIDC issuer verification (dev only; use false in production)
insecure_oidc_allow_unverified_email = false

# ==============================================================================
# REQUEST ROUTING & SECURITY
# ==============================================================================

# Redirect URL for OAuth callback
redirect_url = "${OAUTH2_REDIRECT_URL:-http://192.168.168.31:4180/oauth2/callback}"

# Session cookie configuration
cookie_name = "oauth2_proxy"
cookie_secret = "${OAUTH2_COOKIE_SECRET}"  # Must be 16, 24, or 32 bytes (hex-encoded)
cookie_domains = ["192.168.168.31", ".192.168.168.31.nip.io", "${APEX_DOMAIN:-.example.com}"]
cookie_expire = 168h           # 1 week session
cookie_refresh = 1h            # Refresh token daily
cookie_httponly = true         # No JavaScript access
cookie_samesite = "Strict"     # CSRF protection
cookie_secure = false          # Set to true in production (HTTPS only)

# ==============================================================================
# OAUTH2 SCOPES & CLAIMS
# ==============================================================================

# OIDC scopes to request
scope = "openid profile email"

# Request groups/roles claim (provider-dependent)
# Google: requires special setup
# Keycloak: automatically includes if configured
# scope = "openid profile email groups"

# Email claim validation
email_domains = ["*"]                          # Allow any email domain
skip_auth_strip_headers = false                # Strip auth headers for upstreams

# ==============================================================================
# AUTHORIZED ACCESS CONTROL
# ==============================================================================

# Email whitelist (optional; if not set, allow all authenticated users)
# authenticated_emails_file = /etc/oauth2-proxy/allowed-emails.txt
authenticated_emails_file = ""

# GitHub team enforcement (requires scope: read:org)
# github_org = "acme-corp"
# github_team = "platform"

# OIDC group claims (Keycloak: add to token mapper)
# oidc_groups_claim = "groups"
# required_groups = ["admin", "platform"]

# ==============================================================================
# UPSTREAM SERVICES
# ==============================================================================

# Upstream backend (code-server)
upstream = "http://code-server:8080"

# HTTP header injection (pass user info to upstream)
set_xauthrequest = true         # Sets X-Auth-Request-* headers
# Custom headers
pass_basic_auth = false         # Don't pass HTTP Basic auth
pass_user_headers = true        # Pass X-Remote-User, X-Remote-Name, X-Remote-Email

# Pass access token to upstream (for service-to-service auth)
pass_access_token = true        # Includes Authorization: Bearer <token> header
pass_id_token = false           # ID tokens usually not needed upstream
pass_refresh_token = false      # Don't pass refresh tokens downstream

# ==============================================================================
# REVERSE PROXY & SESSION MANAGEMENT
# ==============================================================================

# Listen address
http_address = "0.0.0.0:4180"

# Skip auth paths (endpoints that don't require authentication)
skip_auth_routes = [
  "^/health$",                  # Health check
  "^/api/v1/status$"            # Status endpoint
]

# Force HTTPS redirect (when reverse proxy handles TLS)
redirect_url_scheme = "http"    # Change to "https" in production
# In production with Caddy TLS termination:
# redirect_url_scheme = "https"
# redirect_url_path = "/oauth2/"

# ==============================================================================
# SESSION MANAGEMENT
# ==============================================================================

# Session timeout and refresh
session_store_type = "cookie"              # Use encrypted cookies (no server state)
# Alternative: session_store_type = "redis" for distributed sessions
# redis_connection_url = "redis://redis:6379"

# Token refresh strategy
token_secret = "${OAUTH2_TOKEN_SECRET}"    # For encrypting tokens in session

# ==============================================================================
# LOGGING & DEBUGGING
# ==============================================================================

# Log level: info, warning, error, debug
logging_level = "info"
logging_format = "json"        # JSON structured logging for production

# Request/response logging
request_logging = true
request_id_header = "X-Correlation-ID"     # Propagate correlation IDs

# Silence specific logs
silence_ping_logging = true

# ==============================================================================
# METRICS & HEALTH CHECKS
# ==============================================================================

# Prometheus metrics
metrics_address = "0.0.0.0:44180"
metrics_secure_address = ""

# Health check endpoint
healthz_path = "/health"

# ==============================================================================
# VALIDATION & TIMEOUTS
# ==============================================================================

# OIDC validation
validate_url = ""               # Usually auto-discovered
skip_oidc_discovery = false     # Use OIDC discovery endpoint

# Timeouts
request_timeout = 30s
flush_interval = 1s

# ==============================================================================
# ADVANCED SECURITY
# ==============================================================================

# Rate limiting (basic; use reverse proxy for production)
# rate_limit_requests = 1000
# rate_limit_window = 1m

# Security headers (usually handled by reverse proxy/Caddy)
# add_headers_frame = "DENY"
# add_headers_xss = "1; mode=block"

# CORS configuration (if needed)
# cors_allow_methods = "GET,POST,PUT,DELETE,OPTIONS"
# cors_allow_headers = "Authorization,Content-Type"

# ==============================================================================
# PROVIDER-SPECIFIC SETTINGS
# ==============================================================================

# For Google OAuth2:
# oidc_issuer_url = "https://accounts.google.com"
# scope = "openid profile email"
# client_id = "<google-client-id>"
# client_secret = "<google-client-secret>"

# For Keycloak:
# oidc_issuer_url = "http://192.168.168.31:8180/realms/acme-corp"
# client_id = "code-server-web"
# client_secret = "<keycloak-client-secret>"
# scope = "openid profile email roles"
# oidc_groups_claim = "groups"

# ==============================================================================
# NOTES
# ==============================================================================
#
# 1. REQUIRED ENVIRONMENT VARIABLES (set in .env):
#    - OAUTH2_CLIENT_ID
#    - OAUTH2_CLIENT_SECRET
#    - OAUTH2_OIDC_ISSUER_URL
#    - OAUTH2_REDIRECT_URL
#    - OAUTH2_COOKIE_SECRET (must be 16, 24, or 32 bytes in hex)
#    - OAUTH2_TOKEN_SECRET
#
# 2. COOKIE SECRET GENERATION:
#    # Generate 16-byte hex cookie secret
#    openssl rand -hex 16  # Example output: a3c1b2e4f5d6c7a8b9c0d1e2f3a4b5c6
#
# 3. TESTING:
#    # Check OIDC discovery
#    curl https://<issuer>/.well-known/openid-configuration
#
#    # Test OIDC flow
#    curl -L http://192.168.168.31:4180/
#
#    # Get current user info (after authentication)
#    curl -b "oauth2_proxy_<domain>=<cookie>" http://192.168.168.31:4180/oauth2/userinfo
#
# 4. PRODUCTION CHECKLIST:
#    [ ] Use HTTPS (redirect_url_scheme = "https")
#    [ ] Enable cookie_secure = true
#    [ ] Set cookie_samesite = "Strict"
#    [ ] Store secrets in GCP Secret Manager or similar
#    [ ] Configure rate limiting at reverse proxy level
#    [ ] Enable request logging for audit trail
#    [ ] Set up monitoring/alerting for auth failures
#    [ ] Test token refresh logic
#    [ ] Plan for key rotation (OIDC key refresh)
#
