# Checkov Configuration for kushin77/code-server
# Repository: Infrastructure-as-Code Security Scanning
# Purpose: Define acceptable security findings and suppressions
# Last Updated: April 16, 2026

framework:
  - terraform

# Suppress checks with documented justifications
# Format: Checkov expects check_id and file as required fields
suppressions:
  # On-Premises Deployment - No Cloud Resources
  - check_id: CKV_AWS_1
    file: terraform/iam.tf
    comment: On-premises only, no AWS resources
  
  - check_id: CKV2_TERRAFORM_6
    file: terraform/rbac.tf
    comment: On-premises RBAC design, intentional
  
  - check_id: CKV_TERRAFORM_1
    file: terraform/audit.tf
    comment: Documentation file, not resources
  
  - check_id: CKV_GCP_1
    file: "terraform/phase-*.tf"
    comment: On-premises deployment, no GCP
  
  - check_id: CKV_K8S_1
    file: "terraform/**/*.tf"
    comment: Docker Compose on-premises, no K8s

# Disable cloud-specific frameworks
skip-framework:
  - dockerfile
  - helm
  - kustomize
  - openapi

# Scan configuration
scan:
  # Include all Terraform files in terraform/ directory
  framework:
    - terraform
  
  # Skip specific directories (non-IaC)
  skip-directories:
    - terraform/.terraform
    - terraform/.terraform/**
    - terraform/test
    - terraform/docs
  
  # Hard fail on these severities
  hard-fail-checks:
    - CKV_TERRAFORM_5     # Example: AWS S3 encryption
    - CKV2_TERRAFORM_12   # Example: KMS key rotation
  
  # Soft fail (warn only) on these
  soft-fail-checks:
    - CKV_TERRAFORM_1
    - CKV2_TERRAFORM_6

# Reporting
report:
  # Output format
  format: sarif
  
  # Include all results (not just failures)
  include-passed-checks: false
  
  # Compress output
  compact: true

# Logging
log-level: warning
