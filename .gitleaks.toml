# .gitleaks.toml - allowlist for gitleaks secret scanning
# Documentation files contain example secret patterns as illustration — not real credentials.
# Kubernetes manifests use CHANGEME placeholder values — not real credentials.

[allowlist]
  description = "Documentation, build artifacts, and Kubernetes placeholder credentials are not real secrets"
  paths = [
    '''CODE_SECURITY_HARDENING\.md''',
    '''SECURITY_IMPLEMENTATION.*\.md''',
    '''START_HERE_SECURITY\.md''',
    '''IDE_SECURITY_AND_USER_MANAGEMENT\.md''',
    '''RUNBOOKS\.md''',
    '''kubernetes/ha-config/.*secret.*\.ya?ml''',
    '''extensions/agent-farm/package-lock\.json''',
    '''\.env\.example''',
    '''CONTRIBUTING\.md''',
    '''archived/''',
    '''\.archived/''',
  ]
  regexes = [
    '''CHANGEME''',
    '''changeme''',
    '''replace-me''',
    '''replace-me-in-production''',
    '''example\.com''',
    '''test-password''',
    '''placeholder.*password''',
  ]
