# oauth2-proxy Hardening Configuration - Phase 1 Implementation
# Implements: docs/IAM-STANDARDIZATION-PHASE-1.md
# Status: PRODUCTION - Ready for deployment to 192.168.168.31
# Date: April 16, 2026

# Main oauth2-proxy configuration (port 4180) - Upstream router
upstream "code-server"
  1.0.0.0 http://code-server:8080

upstream "api"
  1.0.0.0 http://localhost:9000

# Server configuration
server_address = "0.0.0.0:4180"
reverse_proxy = true

# OIDC Provider Configuration
oauth_provider = "oidc"
oidc_issuer_url = "https://accounts.google.com"
client_id = "${GOOGLE_CLIENT_ID}"
client_secret = "${GOOGLE_CLIENT_SECRET}"
redirect_url = "http://192.168.168.31:4180/oauth2/callback"

# Email/domain authorization
email_domains = [
  "internal.example.com",
  "gmail.com"
]

# Cookie Configuration (SECURITY: HARDENED)
cookie_name = "_oauth2_proxy"
cookie_secret = "${OAUTH2_COOKIE_SECRET}"
cookie_secure = true                    # HTTPS only
cookie_httponly = true                  # Prevent JavaScript access
cookie_samesite = "Strict"              # Prevent CSRF
cookie_expire = 86400                   # 24h sliding window
cookie_refresh = 3600                   # Refresh if > 1h old
cookie_domain = "192.168.168.31"
cookie_path = "/"

# PKCE (Proof Key for Authorization Code Exchange) - OAuth2 security
code_challenge_method = "S256"          # Use SHA256 for PKCE

# Session Storage (Redis)
session_store_type = "redis"
redis_connection_url = "redis://redis:6379/0"
redis_sentinel_connection_url = ""      # Enable Sentinel for HA
redis_use_sentinel = false              # Phase 2: Enable Sentinel

# Session data encryption
redis_session_max_idle = 300            # Timeout idle sessions
redis_password = "${REDIS_PASSWORD}"
redis_db = 0

# Request headers and authentication
set_xauthrequest = true                 # Set X-Auth-Request headers
pass_access_token = true                # Pass access token to upstream
pass_refresh_token = true               # Pass refresh token for service use
pass_user_headers = true                # Pass user info headers

# Header forwarding for upstream services
custom_header = [
  "X-Forwarded-Proto: https",
  "X-Forwarded-Host: 192.168.168.31",
  "X-Real-IP: \$remote_addr",
  "X-Forwarded-For: \$remote_addr",
  "X-Auth-Request-User: \$user",
  "X-Auth-Request-Email: \$email",
  "X-Auth-Request-Groups: \$groups"
]

# HTTP Client Timeout
http_client_timeout = 30

# Logging (structured)
logging_format = "json"
log_level = "info"
error_log = "/var/log/oauth2-proxy/error.log"
access_log = "/var/log/oauth2-proxy/access.log"

# Rate Limiting (Per IP)
flush_interval = "1s"
rate_limit = 10                         # 10 req/sec per IP
rate_limit_enforced_on = "domain"

# Skip Authentication for Specific Routes
skip_auth_regex = [
  "^/health",
  "^/ready",
  "^/metrics",
  "^/oauth2/callback"
]

# Allowed Routes (all others require auth)
# "/" → requires auth

# OIDC Scopes
scopes = [
  "openid",
  "profile",
  "email"
]

# JWT Audience Claim
audiences = ["${GOOGLE_CLIENT_ID}"]

# User Info Verification
verify_jwt = true
jwt_key = "${GOOGLE_OIDC_PUBLIC_KEY}"

# Grace Period for Token Refresh (background refresh)
token_grace_period = 60s

# Logging for audit trail
auth_logging = true
auth_logging_format = "json"

# Group Extraction from OIDC Claims (if using Google Workspace)
# Requires admin consent and group claim setup in OIDC
groups_key = "groups"                   # Groups claim name
groups_separator = ","

# Allowed Groups (Phase 2: implement RBAC groups)
# allowed_groups = [
#   "developers@internal.example.com",
#   "devops@internal.example.com",
#   "admins@internal.example.com"
# ]

# Account Creation
allow_unverified_email = false
user_id_claim = "sub"

# Session Invalidation
logout_url = "https://accounts.google.com/logout"

# X-Frame-Options for Click-jacking protection
secure_headers = true

# Timezone
time_zone = "UTC"

---
# Service-Specific oauth2-proxy Instances

# OAuth2-proxy for Grafana (port 4181)
# Separate instance for better isolation and debugging
# Configuration file: /etc/oauth2-proxy/grafana-config.cfg

upstream "grafana"
  1.0.0.0 http://grafana:3000

server_address = "0.0.0.0:4181"
reverse_proxy = true
oauth_provider = "oidc"
oidc_issuer_url = "https://accounts.google.com"
client_id = "${GRAFANA_OAUTH_CLIENT_ID}"
client_secret = "${GRAFANA_OAUTH_CLIENT_SECRET}"
redirect_url = "http://192.168.168.31:4181/oauth2/callback"

cookie_name = "_grafana_session"
cookie_secret = "${GRAFANA_COOKIE_SECRET}"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "Strict"

session_store_type = "redis"
redis_connection_url = "redis://redis:6379/1"  # Different DB for isolation

# OAuth2-proxy for Loki (port 4182)
upstream "loki"
  1.0.0.0 http://loki:3100

server_address = "0.0.0.0:4182"
reverse_proxy = true
oauth_provider = "oidc"
oidc_issuer_url = "https://accounts.google.com"
client_id = "${LOKI_OAUTH_CLIENT_ID}"
client_secret = "${LOKI_OAUTH_CLIENT_SECRET}"
redirect_url = "http://192.168.168.31:4182/oauth2/callback"

cookie_name = "_loki_session"
cookie_secret = "${LOKI_COOKIE_SECRET}"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "Strict"

session_store_type = "redis"
redis_connection_url = "redis://redis:6379/2"  # Different DB

# Skip auth for Loki health endpoints
skip_auth_regex = [
  "^/ready",
  "^/metrics"
]

