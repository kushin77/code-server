# MANIFEST.toml - Code-Server Enterprise IaC Resource Manifest
# Purpose: Immutable resource inventory, versioning, and drift detection
# Scope: All infrastructure, configuration, and deployment artifacts
# Format: TOML with hierarchical versioning and integrity checksums
# Last Updated: 2026-04-15
# Authority: Architecture Council + DevOps Team

[metadata]
version = "2.0.0"
last_updated = "2026-04-15T20:00:00Z"
immutable_release = true
enforcement = "strict"
owner = "devops@kushnir.cloud"
compliance = ["idempotent-applies", "zero-duplicates", "drift-detectable"]

# ═══════════════════════════════════════════════════════════════════════════
# DOCKER COMPOSE ARTIFACTS - Versioned Services
# ═══════════════════════════════════════════════════════════════════════════

[services.code-server]
version = "4.115.0"
image_sha = "sha256:code-server:4.115.0"
healthcheck = "http://localhost:8080"
restart_policy = "unless-stopped"
critical = true
source = "docker-compose.yml:L45-L130"
last_verified = "2026-04-15T20:00:00Z"

[services.caddy]
version = "2.8.4"
image_sha = "sha256:caddy:2.8.4"
healthcheck = "http://localhost/health"
ports = ["80:80", "443:443"]
critical = true
source = "docker-compose.yml:L131-L250"
config_file = "Caddyfile"
config_checksum = "sha256:caddyfile"
last_verified = "2026-04-15T20:00:00Z"

[services.oauth2-proxy]
version = "7.5.1"
image_sha = "sha256:oauth2-proxy:7.5.1"
healthcheck = "http://localhost:4180/ping"
critical = true
secrets_provider = "environment"
source = "docker-compose.yml:L251-L310"
config_template = ".env (generated)"
last_verified = "2026-04-15T20:00:00Z"

[services.postgres]
version = "15.2"
image_sha = "sha256:postgres:15.2"
healthcheck = "pg_isready"
critical = true
