name: VPN Service Account Endpoint Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-auth-endpoints:
    name: Validate oauth2 auth endpoints
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Validate IDE and portal auth endpoints over VPN via host service-account tokens
        shell: bash
        run: |
          set -euo pipefail

          HOSTS="192.168.168.31 192.168.168.42"
          REMOTE_REPO_DIR="~/code-server-enterprise"

          for host in $HOSTS; do
            echo "[validate] host=${host}"

            output="$(ssh "akushnir@${host}" "set -euo pipefail; cd ${REMOTE_REPO_DIR}; set -a; source .env; set +a; AUTH_HEADER=\"Authorization: Bearer \$E2E_OAUTH_TOKEN\"; IDE_STATUS=\"\$(curl -ksS -o /dev/null -w '%{http_code}' -H \"\$AUTH_HEADER\" 'https://ide.kushnir.cloud/oauth2/auth')\"; PORTAL_STATUS=\"\$(curl -ksS -o /dev/null -w '%{http_code}' -H \"\$AUTH_HEADER\" 'https://kushnir.cloud/oauth2/auth')\"; echo \"IDE_STATUS=\$IDE_STATUS PORTAL_STATUS=\$PORTAL_STATUS\"")"

            echo "[validate] ${host} ${output}"

            ide_status="$(echo "$output" | sed -n 's/.*IDE_STATUS=\([0-9]*\).*/\1/p')"
            portal_status="$(echo "$output" | sed -n 's/.*PORTAL_STATUS=\([0-9]*\).*/\1/p')"

            if [[ "$ide_status" != "202" ]]; then
              echo "Expected ide oauth2/auth status 202 on ${host}, got ${ide_status}" >&2
              exit 1
            fi

            if [[ "$portal_status" != "202" ]]; then
              echo "Expected portal oauth2/auth status 202 on ${host}, got ${portal_status}" >&2
              exit 1
            fi
          done

          echo "VPN service-account endpoint validation passed on all hosts"
