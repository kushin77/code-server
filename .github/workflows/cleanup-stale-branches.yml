name: Cleanup Stale Branches

on:
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Automation"
          git config --global user.email "noreply@github.com"

      - name: Identify and Delete Merged Branches
        run: |
          # Get default branch
          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | cut -d' ' -f5)
          
          echo "🔍 Scanning for merged branches (default: $DEFAULT_BRANCH)..."
          
          # Find branches merged into default branch (excluding protected branches)
          MERGED_BRANCHES=$(git branch -r --merged origin/$DEFAULT_BRANCH | \
            grep -v "origin/$DEFAULT_BRANCH" | \
            grep -v "origin/main" | \
            grep -v "origin/develop" | \
            grep -v "origin/release" | \
            sed 's|origin/||')
          
          if [ -z "$MERGED_BRANCHES" ]; then
            echo "✅ No merged branches to clean up"
          else
            echo "🗑️  Deleting merged branches:"
            echo "$MERGED_BRANCHES" | while read branch; do
              echo "  - Deleting: $branch"
              git push origin --delete "$branch" 2>/dev/null || echo "    ⚠️  Failed to delete (may be protected)"
            done
          fi

      - name: Delete Old Feature Branches
        run: |
          echo "🔍 Scanning for old feature branches (>30 days inactive)..."
          
          CUTOFF_DATE=$(date -d "30 days ago" +%s)
          DELETED_COUNT=0
          
          # Get all remote branches
          git for-each-ref --sort=-committerdate refs/remotes/origin/ --format='%(refname:short)|%(committerdate:unix)' | while IFS='|' read branch date; do
            BRANCH_NAME="${branch#origin/}"
            
            # Skip protected branches
            if [[ "$BRANCH_NAME" =~ ^(main|develop|release|hotfix)/ ]]; then
              continue
            fi
            
            # Check if branch is older than cutoff
            if [ "$date" -lt "$CUTOFF_DATE" ]; then
              echo "  - Deleting old branch: $BRANCH_NAME (last commit: $(date -d @$date '+%Y-%m-%d'))"
              git push origin --delete "$BRANCH_NAME" 2>/dev/null || echo "    ⚠️  Failed to delete"
              ((DELETED_COUNT++))
            fi
          done
          
          echo "✅ Cleanup complete ($DELETED_COUNT branches)"

      - name: Cleanup Local Branches
        run: |
          echo "🔍 Cleaning up local branch references..."
          git remote prune origin
          echo "✅ Local references updated"

      - name: Report Cleanup Status
        run: |
          echo "📊 Branch Cleanup Summary"
          echo "========================"
          echo ""
          echo "Remaining remote branches:"
          git branch -r | grep -v HEAD | sort
          echo ""
          echo "Total branches: $(git branch -r | grep -v HEAD | wc -l)"

      - name: Create Cleanup Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## 🗑️ Branch Cleanup Report
            
            **Date**: ${new Date().toISOString().split('T')[0]}
            **Status**: ✅ Completed
            
            ### Summary
            - Removed: Merged branches from default branch
            - Removed: Feature branches inactive >30 days
            - Pruned: Local references to deleted remote branches
            
            ### Protected Branches (Not Deleted)
            - main
            - develop
            - release/*
            - hotfix/*
            
            ### Next Run
            Scheduled for next Monday at 2:00 AM UTC
            
            [View Workflow Run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;
            
            core.summary.addRaw(summary);
