# Checkov Configuration for kushin77/code-server
# Repository: Infrastructure-as-Code Security Scanning
# Purpose: Define acceptable security findings and suppressions
# Last Updated: April 16, 2026

framework:
  - terraform

# Skip cloud/K8s-specific checks for on-prem Docker Compose deployment.
skip-check:
  - CKV_AWS_1
  - CKV2_TERRAFORM_6
  - CKV_GCP_1
  - CKV_K8S_1

# Disable cloud-specific frameworks
skip-framework:
  - dockerfile
  - helm
  - kustomize
  - openapi

# Scan configuration
# Scan configuration (flat structure for checkov v3+)
skip-path:
  - .terraform
  - terraform/.terraform
  - terraform/test
  - terraform/docs
  - node_modules

compact: true
quiet: true
