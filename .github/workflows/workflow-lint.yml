name: Workflow Lint

# Closes #339 (GOV-010 partial) — Workflow Reliability Fixes
# Validates GitHub Actions workflows for syntax, deprecated versions, and best practices.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  yaml-lint:
    name: YAML syntax validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint all workflow YAML files
        run: |
          mapfile -t wf_files < <(find .github/workflows -name "*.yml" \
            ! -name "enforce-priority-labels.yml" \
            ! -name "phase-1-certification-gate.yml")
          yamllint -d '{
            extends: default,
            rules: {
              line-length: disable,
              truthy: {allowed-values: ["true", "false", "on", "off"]},
              trailing-spaces: disable,
              brackets: disable,
              comments: disable,
              document-start: disable
            }
          }' "${wf_files[@]}"

  action-versions:
    name: Detect deprecated/unpinned action versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Enforce immutable action SHA pinning
        run: |
          failed=0
          # Pattern: mutable refs are forbidden in all workflows (including templates)
          bad=$(grep -rnE 'uses:.*@(v[0-9]+|main|master|HEAD|latest)\b' .github/workflows/ \
            --include="*.yml" --include="*.yaml" \
            --exclude="workflow-lint.yml" || true)
          if [[ -n "$bad" ]]; then
            echo "FAIL: Mutable action refs detected (must pin to full commit SHA):"
            echo "$bad" | sed 's/^/  /'
            echo ""
            echo "Pin to exact commit SHA (e.g. actions/checkout@<40-hex-sha>)"
            failed=1
          fi

          if [[ $failed -eq 1 ]]; then
            exit 1
          fi
          echo "✓ All action refs are immutable"

  permissions-hygiene:
    name: Permissions hygiene check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Enforce top-level permissions and block write-all
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! grep -q '^permissions:' "$f"; then
              echo "FAIL: $f — missing top-level permissions block"
              failed=1
            fi

            if grep -qE '^permissions:\s*write-all' "$f"; then
              echo "FAIL: $f — contains forbidden permissions: write-all"
              failed=1
            fi
          done < <(find .github/workflows/ -name "*.yml" -print0)

          if [[ $failed -eq 1 ]]; then
            exit 1
          fi
          echo "✓ Permissions hygiene checks passed"

  no-windows-runners:
    name: No Windows CI runners
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Detect windows-* runners
        run: |
          bad=$(grep -rn 'runs-on:[[:space:]]*windows' .github/workflows/ \
            --include="*.yml" --include="*.yaml" \
            --exclude="workflow-lint.yml" \
            --exclude="validate-linux-only.yml" || true)
          if [[ -n "$bad" ]]; then
            echo "FAIL: Windows CI runners detected:"
            echo "$bad" | sed 's/^/  /'
            echo ""
            echo "All workflows must use ubuntu-latest."
            exit 1
          fi
          echo "✓ No Windows runners found"

  secret-references:
    name: Check for undefined secret references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Detect secrets that should be in GitHub Secrets
        run: |
          # Flag any hardcoded secrets patterns in workflows
          patterns=(
            'password:.*[a-zA-Z0-9]{8,}'
            'token:.*ghp_'
            'secret:.*[a-zA-Z0-9]{32,}'
          )
          failed=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -rn "$pattern" .github/workflows/ \
              --include="*.yml" --include="*.yaml" \
              --exclude="workflow-lint.yml" 2>/dev/null || true)
            if [[ -n "$matches" ]]; then
              echo "FAIL: Potential hardcoded secret in workflow:"
              echo "$matches" | sed 's/^/  /'
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then exit 1; fi
          echo "✓ No hardcoded secrets in workflows"

  required-fields:
    name: Workflows have name and permissions fields
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Validate name and permissions present
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            # Skip templates (TEMPLATE-*.yml)
            [[ "$(basename "$f")" == TEMPLATE-* ]] && continue

            if ! grep -q '^name:' "$f"; then
              echo "FAIL: $f — missing 'name:' field"
              failed=1
            fi
            if ! grep -q '^permissions:' "$f"; then
              echo "WARN: $f — missing 'permissions:' field (principle of least privilege)"
            fi
          done < <(find .github/workflows/ -name "*.yml" -print0)
          if [[ $failed -eq 1 ]]; then exit 1; fi
          echo "✓ Required fields validated"
