# Global Orchestration Configuration
# ✅ Immutable Configuration - YAML Format

phase: production
component: global-orchestration-framework
environment: staging
version: '1.0'
created_date: 2026-04-15
immutable: true

# ========================================
# Global Orchestration Settings
# ========================================
orchestration:
  enabled: true
  mode: active-active
  cycle_interval: 60  # seconds
  health_check_interval: 30  # seconds
  failover_timeout: 30  # seconds
  max_concurrent_failovers: 1
  enable_metrics: true
  metrics_port: 9205
  api_port: 8000
  health_port: 8001

# ========================================
# Regional Configuration - Immutable
# ========================================
regions:
  primary:
    name: us-east-1
    host: 192.168.168.31
    port: 22
    priority: 100
    weight: 1.0
    enabled: true
    health_threshold: 3
    failover_threshold: 5
    endpoints:
      orchestrator: http://orchestrator-us-east-1:8000
      prometheus: http://prometheus-us-east-1:9090
      api_gateway: http://api-gateway-us-east-1:8000

    # Health check configuration
    health_check:
      enabled: true
      interval: 30
      timeout: 10
      path: /health
      expected_status: 200

    # Monitoring configuration
    monitoring:
      enabled: true
      metrics_scrape_interval: 15
      alert_severity: critical
      failover_action: promote_secondary

  secondary:
    name: us-west-2
    host: 192.168.168.32
    port: 22
    priority: 50
    weight: 0.75
    enabled: true
    health_threshold: 3
    failover_threshold: 5
    endpoints:
      orchestrator: http://orchestrator-us-west-2:8000
      prometheus: http://prometheus-us-west-2:9090
      api_gateway: http://api-gateway-us-west-2:8000

    health_check:
      enabled: true
      interval: 30
      timeout: 10
      path: /health
      expected_status: 200

    monitoring:
      enabled: true
      metrics_scrape_interval: 15
      alert_severity: warning
      failover_action: escalate_to_tertiary

  tertiary:
    name: eu-west-1
    host: 192.168.168.33
    port: 22
    priority: 25
    weight: 0.5
    enabled: true
    health_threshold: 3
    failover_threshold: 5
    endpoints:
      orchestrator: http://orchestrator-eu-west-1:8000
      prometheus: http://prometheus-eu-west-1:9090
      api_gateway: http://api-gateway-eu-west-1:8000

    health_check:
      enabled: true
      interval: 30
      timeout: 10
      path: /health
      expected_status: 200

    monitoring:
      enabled: true
      metrics_scrape_interval: 15
      alert_severity: info
      failover_action: escalate_alert

# ========================================
# Service Discovery Configuration
# ========================================
service_discovery:
  enabled: true
  mode: registry  # registry, dns, direct

  registry:
    ttl: 30  # seconds
    max_cache_size: 10000
    automatic_cleanup: true
    cleanup_interval: 300  # seconds

  service_registry:
    code-server:
      port: 8080
      protocol: http
      health_check_path: /health
      regions:
        - primary
        - secondary
        - tertiary

    api-gateway:
      port: 8000
      protocol: http
      health_check_path: /health
      regions:
        - primary
        - secondary

# ========================================
# Configuration Management
# ========================================
config_management:
  enabled: true
  mode: distributed  # centralized, distributed, hybrid

  distribution:
    # Version-tracked updates
    versioning: true
    max_versions: 50

    # Atomic updates across regions
    atomic_updates: true
    rollback_on_failure: true

    # Update strategy
    strategy: rolling  # rolling, blue-green, canary
    canary_percentage: 5  # if canary
    rollback_timeout: 600  # seconds

  feature_flags:
    multi_region_failover: true
    cross_cloud_routing: false
    predictive_failover: false
    cost_optimization: true
    ml_based_routing: false

    # Gradual rollout configuration
    gradual_rollout:
      enabled: true
      increments: [10, 25, 50, 75, 100]
      interval: 300  # seconds per increment

# ========================================
# Monitoring & Observability
# ========================================
monitoring:
  enabled: true

  # Prometheus configuration
  prometheus:
    enabled: true
    scrape_interval: 15
    evaluation_interval: 15
    retention: 30  # days

    # Exported metrics
    metrics:
      - region_health
      - region_latency
      - region_error_rate
      - failover_events
      - service_discovery_latency
      - config_distribution_status

  # Health metrics
  health_metrics:
    enabled: true
    collect_interval: 30
    report_unhealthy: true

    thresholds:
      latency_p99: 100  # milliseconds
      error_rate: 0.1  # percentage
      availability: 99.9  # percentage

  # Alerting rules
  alerting:
    enabled: true
    notify_channels:
      - slack
      - email
      - pagerduty

    rules:
      # Critical alerts
      critical:
        - name: region_down
          threshold: 60  # seconds
          duration: 1m
          severity: critical

        - name: failover_failed
          threshold: 1
          duration: 30s
          severity: critical

      # Warning alerts
      warning:
        - name: high_latency
          threshold: 200  # milliseconds P99
          duration: 5m
          severity: warning

        - name: high_error_rate
          threshold: 1.0  # percentage
          duration: 5m
          severity: warning

      # Info alerts
      info:
        - name: failover_executed
          threshold: 1
          duration: 1m
          severity: info

# ========================================
# Failover & High Availability
# ========================================
failover:
  enabled: true

  # Failover decision logic
  decisions:
    # Health-based failover
    health:
      enabled: true
      consecutive_failures: 3
      health_check_timeout: 10

    # Latency-based failover
    latency:
      enabled: true
      threshold_p99: 200  # milliseconds
      window: 300  # seconds

    # Error rate-based failover
    error_rate:
      enabled: true
      threshold: 5.0  # percentage
      window: 300  # seconds

  # Failover execution
  execution:
    pre_flight_checks: true
    backup_primary: true
    verify_secondary: true
    record_events: true
    notify_ops: true

  # Recovery configuration
  recovery:
    auto_recover_primary: true
    recovery_check_interval: 60  # seconds
    recovery_threshold: 3  # successful checks
    promote_back_delay: 300  # seconds

# ========================================
# Performance Targets
# ========================================
performance_targets:
  failover_rto: 30  # seconds
  service_discovery_latency: 5  # milliseconds
  config_distribution_time: 5  # seconds
  regional_latency_p99: 100  # milliseconds
  health_check_cycle: 60  # seconds
  metrics_export_latency: 100  # milliseconds

# ========================================
# Security Configuration
# ========================================
security:
  tls:
    enabled: true
    verify_certificates: true
    min_version: "1.2"

  authentication:
    enabled: false  # For staging
    type: mutual_tls

  rate_limiting:
    enabled: true
    requests_per_second: 1000
    burst_size: 2000

  audit:
    enabled: true
    log_all_actions: true
    retention_days: 90

# ========================================
# Logging Configuration
# ========================================
logging:
  level: INFO
  format: json

  outputs:
    - type: file
      path: /var/log/orchestrator/orchestrator.log
      max_size_mb: 100
      max_retain_files: 10

    - type: stdout
      format: json

# ========================================
# Integration Points
# ========================================
integrations:
  # Prometheus integration
  prometheus:
    enabled: true
    host: prometheus
    port: 9090
    scrape_interval: 30

  # Grafana integration
  grafana:
    enabled: true
    host: grafana
    port: 3000
    dashboard_uid: "phase-20-a1-global"

  # External systems integration
  external_systems:
    # Cloud provider integrations
    aws:
      enabled: false  # Staging only
      region: us-east-1

    azure:
      enabled: false
      tenant_id: ""

    gcp:
      enabled: false
      project_id: ""

# ========================================
# Deployment Configuration
# ========================================
deployment:
  # Deployment strategy
  strategy: rolling-update

  # Health checks during deployment
  health_checks: true

  # Rollback on failure
  auto_rollback: true
  rollback_timeout: 600  # seconds

  # Post-deployment validation
  validation:
    enabled: true
    checks:
      - service_health
      - metrics_collection
      - config_consistency
      - failover_readiness

# ========================================
# Metadata
# ========================================
metadata:
  owner: DevOps Team
  team: Platform Engineering
  cost_center: Infrastructure
  compliance_tags:
    - phase-20-a1
    - global-operations
    - staging
    - immutable-iac
