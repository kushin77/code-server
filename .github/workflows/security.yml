name: Security Scans

# Closes #342 (GOV-012 partial) — Fail-closed secrets and IaC scanning.
# ALL jobs must pass before merging. No || true bypasses in critical paths.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  security-scans:
    name: TruffleHog + Gitleaks
    uses: ./.github/workflows/TEMPLATE-security-scans.yml

  credential-helper-hardening:
    name: git-credential-gsm hardening tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Validate deterministic fallback and strict mode behavior
        run: bash scripts/ci/test-git-credential-gsm.sh

  auth-conformance:
    name: Auth/Policy Conformance Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run auth conformance tests
        run: bash scripts/ci/test-auth-conformance.sh
      - name: Upload conformance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-conformance-report
          path: /tmp/auth-conformance-report.json

  iac-security:
    name: Checkov + Tfsec IaC Scans
    uses: ./.github/workflows/TEMPLATE-validate-iac.yml
    with:
      check_checkov: true
      check_terraform: false
      check_docker_compose: false

  snyk:
    name: Snyk dependency scan (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true   # Advisory only — no Snyk auth configured
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Snyk (skipped — no auth configured)
        run: |
          echo "Snyk requires SNYK_TOKEN secret. Set it in GitHub Secrets to enable."
          echo "Coverage: trufflehog + gitleaks + checkov + tfsec are active."
