# alertmanager-production.yml
# Production AlertManager Configuration
#
# COMPOSITION: Uses base route structure from alertmanager-base.yml
# This file extends with PRODUCTION-SPECIFIC receivers (PagerDuty, Vault, etc.)
# Changes to alertmanager-base.yml apply here automatically
#
# IMMUTABILITY: Routing rules are centralized in base config
# See: ADR-004 Configuration Consolidation Patterns

global:
  resolve_timeout: 5m
  slack_api_url: ${VAULT_SLACK_WEBHOOK_URL}
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Route structure inherited from alertmanager-base.yml
# Production-specific: add PagerDuty for critical, detailed Slack channels
route:
  receiver: default-team
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h

  # Route rules (inherited from base pattern — adapted for production)
  routes:
    # Critical → PagerDuty immediately
    - match:
        severity: critical
      receiver: pagerduty-critical
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 1h
      continue: false

    # High → Slack + on-call
    - match:
        severity: high
      receiver: slack-critical
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false

    # Medium → Slack only
    - match:
        severity: medium
      receiver: slack-warnings
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 12h
      continue: false

    # Low → Email daily digest
    - match:
        severity: low
      receiver: email-digest
      group_wait: 1h
      group_interval: 1h
      repeat_interval: 24h
      continue: false

# Inhibit rules (inherited from alertmanager-base.yml)
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'cluster', 'service']

  - source_match:
      severity: medium
    target_match:
      severity: low
    equal: ['alertname', 'cluster', 'service']

  - source_match:
      alertname: ClusterDown
    target_match_re:
      alertname: '.*'
    equal: ['cluster']

# ═════════════════════════════════════════════════════════════════════════════
# RECEIVERS — Production-specific with multi-channel routing
# ═════════════════════════════════════════════════════════════════════════════

receivers:
  # Default team (everyone)
  - name: default-team
    slack_configs:
      - channel: '#alerts-general'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        send_resolved: true

  # PagerDuty for critical incidents
  - name: pagerduty-critical
    slack_configs:
      - channel: '#alerts-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        color: 'danger'
        send_resolved: true
    pagerduty_configs:
      - service_key: ${VAULT_PAGERDUTY_KEY}
        description: '{{ .GroupLabels.alertname }} ({{ .Status | toUpper }})'
        details:
          severity: 'critical'
          timestamp: '{{ now }}'

  # Slack for high-priority
  - name: slack-critical
    slack_configs:
      - channel: '#alerts-critical'
        title: '⚠️ HIGH: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        color: 'warning'
        send_resolved: true

  # Slack for warnings
  - name: slack-warnings
    slack_configs:
      - channel: '#alerts-warnings'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        color: '#FFA500'
        send_resolved: true

  # Email for low-priority digest
  - name: email-digest
    email_configs:
      - to: ${VAULT_ALERT_EMAIL}
        headers:
          Subject: 'Daily Alert Digest'
          Reference: 'https://grafana.ide.kushnir.cloud/d/{{ .GroupLabels.dashboard }}'

  # Slack for medium-priority alerts
  - name: slack-warnings
    slack_configs:
      - channel: '#alerts-warnings'
        title: '⚡️ MEDIUM: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        color: 'good'
        send_resolved: true

  # Email for low-priority daily digest
  - name: email-digest
    email_configs:
      - to: '{{ template "email.to" }}'
        from: 'alerts@ide.kushnir.cloud'
        smarthost: 'smtp.ide.kushnir.cloud:587'
        auth_username: 'alerts@ide.kushnir.cloud'
        auth_password: ${VAULT_SMTP_PASSWORD}
        headers:
          Subject: 'Daily Alert Digest - {{ .GroupLabels.cluster }}'
        html: |
          <h2>Daily Alert Summary</h2>
          {{ range .Alerts }}
          <p><strong>{{ .Labels.alertname }}</strong>: {{ .Annotations.summary }}</p>
          {{ end }}

