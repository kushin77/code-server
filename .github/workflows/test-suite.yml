name: Test Suite & Coverage

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'extensions/agent-farm/**'
      - 'tests/**'
      - '.github/workflows/test-suite.yml'
  push:
    branches: [main, develop]
    paths:
      - 'extensions/agent-farm/**'
      - 'tests/**'
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  CACHE_KEY_DEPS: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
  CACHE_KEY_BUILD: ${{ runner.os }}-build-${{ github.sha }}

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set Test Matrix
        id: set-matrix
        run: |
          echo "matrix={\"test-suite\":[\"unit\",\"integration\",\"security\",\"performance\"]}" >> $GITHUB_OUTPUT

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'extensions/agent-farm/package-lock.json'

      - name: Install Dependencies
        working-directory: extensions/agent-farm
        run: npm ci --prefer-offline --no-audit

      - name: Run Unit Tests
        working-directory: extensions/agent-farm
        run: npm run test:unit -- --coverage --maxWorkers=2
        env:
          CI: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./extensions/agent-farm/coverage/lcov.info
          flags: unit-tests
          name: unit-coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: setup
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'extensions/agent-farm/package-lock.json'

      - name: Install Dependencies
        working-directory: extensions/agent-farm
        run: npm ci

      - name: Run Integration Tests
        working-directory: extensions/agent-farm
        run: npm run test:integration -- --coverage
        env:
          CI: true
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./extensions/agent-farm/coverage/lcov.info
          flags: integration-tests
          name: integration-coverage

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'extensions/agent-farm/package-lock.json'

      - name: Install Dependencies
        working-directory: extensions/agent-farm
        run: npm ci

      - name: Run Security Tests
        working-directory: extensions/agent-farm
        run: npm run test:security -- --coverage
        env:
          CI: true

      - name: NPM Audit
        working-directory: extensions/agent-farm
        run: npm audit --production --audit-level=moderate
        continue-on-error: true

      - name: SAST with Snyk
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./extensions/agent-farm/coverage/lcov.info
          flags: security-tests
          name: security-coverage

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'extensions/agent-farm/package-lock.json'

      - name: Install Dependencies
        working-directory: extensions/agent-farm
        run: npm ci

      - name: Run Performance Tests
        working-directory: extensions/agent-farm
        run: npm run test:performance
        env:
          CI: true

      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: extensions/agent-farm/coverage/performance.json
          retention-days: 30

      - name: Compare Performance
        if: github.event_name == 'pull_request'
        run: |
          cd extensions/agent-farm
          npm run perf:compare -- main

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - name: Download all coverage
        uses: actions/download-artifact@v3

      - name: Merge Coverage Reports
        run: |
          npm install -g nyc
          nyc merge . coverage/merged-coverage.json
          nyc report --reporter=lcov --reporter=text

      - name: Upload Final Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: final-coverage
          name: merged-coverage

      - name: Comment Coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf-8'));
            
            const comment = `## Code Coverage
            | Metric | Value | Target |
            |--------|-------|--------|
            | Statements | ${coverage.total.statements.pct}% | 85% |
            | Branches | ${coverage.total.branches.pct}% | 80% |
            | Functions | ${coverage.total.functions.pct}% | 85% |
            | Lines | ${coverage.total.lines.pct}% | 85% |`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

permissions:
  contents: read
  pull-requests: write
  security-events: write
