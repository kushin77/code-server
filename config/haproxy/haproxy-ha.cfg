global
  maxconn 4096
  daemon
  log stdout local0
  log stdout local1 notice

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5000
  timeout client 50000
  timeout server 50000
  retries 3

# ════════════════════════════════════════════════════════════════════════════
# PostgreSQL Load Balancing (Patroni-managed)
# ════════════════════════════════════════════════════════════════════════════

listen postgresql-ha
  bind 0.0.0.0:5432
  balance roundrobin
  mode tcp
  
  # Patroni health check — only route to healthy nodes
  option httpchk GET /primary HTTP/1.1\r\nHost:\ localhost
  
  # Primary PostgreSQL (read/write)
  server postgresql-primary 192.168.168.31:5432 check port 8008
  
  # Replica PostgreSQL (read-only, for load distribution)
  server postgresql-replica 192.168.168.42:5432 check port 8008 backup

# ════════════════════════════════════════════════════════════════════════════
# Redis HA (Sentinel-managed)
# ════════════════════════════════════════════════════════════════════════════

listen redis-ha
  bind 0.0.0.0:6379
  balance roundrobin
  mode tcp
  
  # Redis health check (PING)
  option tcp-check
  tcp-check connect port 6379
  tcp-check send "PING\r\n"
  tcp-check expect string "+PONG"
  
  # Primary Redis
  server redis-primary 192.168.168.31:6379 check
  
  # Replica Redis (read-only)
  server redis-replica 192.168.168.42:6379 check backup

# ════════════════════════════════════════════════════════════════════════════
# HAProxy Stats Dashboard
# ════════════════════════════════════════════════════════════════════════════

listen stats
  bind 0.0.0.0:8404
  stats enable
  stats uri /stats
  stats refresh 30s
  stats show-legends
  stats admin if TRUE
  
  # Basic auth (optional)
  # stats auth admin:password
