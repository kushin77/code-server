name: Validate Configuration Files

on:
  pull_request:
    paths:
      - 'docker-compose*.yml'
      - 'Caddyfile*'
      - 'alertmanager*.yml'
      - 'prometheus*.yml'
      - '*.tf'
      - '.env*'
      - 'scripts/**/*.sh'
      - 'scripts/**/*.ps1'

permissions:
  contents: read
  pull-requests: write

jobs:
  docker-compose-validate:
    name: Validate docker-compose Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env for validation
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              cp .env.example .env
              echo "✓ Created .env from .env.example"
            else
              touch .env
              echo "⚠ Created empty .env"
            fi
          fi
      
      - name: Validate docker-compose.yml syntax
        run: |
          which docker-compose || which docker || echo "Setting up Docker..."
          if [ -f docker-compose.yml ]; then
            docker-compose config > /dev/null 2>&1 || {
              echo "ERROR: docker-compose validation failed"
              exit 1
            }
            echo "✓ docker-compose.yml syntax valid"
          else
            echo "⚠ No docker-compose.yml found"
          fi

  caddyfile-validate:
    name: Validate Caddyfile Configuration
    runs-on: ubuntu-latest
    container: caddy:2-alpine
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Caddyfile syntax
        run: |
          if [ -f Caddyfile ]; then
            caddy validate --config Caddyfile
            echo "✓ Caddyfile syntax valid"
          else
            echo "⚠ No Caddyfile found"
          fi

  terraform-validate:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0
      
      - name: Terraform format check
        run: terraform fmt -check -recursive . || echo "⚠ Some files need formatting (non-blocking)"
      
      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
          echo "✓ Terraform configuration valid"

  shell-script-validate:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Check bash script syntax
        run: |
          for script in scripts/*.sh; do
            if [ -f "$script" ]; then
              bash -n "$script" && echo "✓ $script syntax OK" || exit 1
            fi
          done
      
      - name: Run ShellCheck
        continue-on-error: true
        run: |
          if find scripts/ -name "*.sh" 2>/dev/null | head -1 | grep -q .; then
            shellcheck scripts/*.sh || echo "⚠ ShellCheck warnings (non-blocking)"
          fi

  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --only-verified --allow-unverified=false 2>/dev/null
        continue-on-error: true
      
      - name: Manual secret pattern check
        run: |
          echo "Checking for hardcoded secrets in .env files..."
          if grep -r '(password|secret|token|key|api_key)\s*[=:]\s*[^${}"]' .env* --include='*.env' 2>/dev/null; then
            echo "❌ FAILED: Potential hardcoded secrets detected in .env files"
            exit 1
          else
            echo "✓ No obvious hardcoded secrets found"
          fi

  no-obsolete-files:
    name: Check for Obsolete Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for phase-specific files at root
        run: |
          OBSOLETE_PATTERNS=(
            'phase-[0-9]*-iac.tf'
            'docker-compose-phase-*.yml'
            'execute-phase-*.sh'
            'Dockerfile.code-server'
          )
          
          FOUND=0
          for pattern in "${OBSOLETE_PATTERNS[@]}"; do
            if find . -maxdepth 1 -name "$pattern" 2>/dev/null | grep -q .; then
              echo "⚠ Found obsolete file pattern: $pattern"
              find . -maxdepth 1 -name "$pattern"
              FOUND=1
            fi
          done
          
          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "These files should be in archived/ directory. See CODE-REVIEW-OVERLAP-GAPS-INCOMPLETE.md"
          else
            echo "✓ No obsolete files at root level"
          fi

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [docker-compose-validate, caddyfile-validate, terraform-validate, shell-script-validate, secrets-scan, no-obsolete-files]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "Configuration Validation Complete"
          echo "=================================="
          echo "All checks completed. Review results above."
          
          if [ "${{ needs.docker-compose-validate.result }}" == "failure" ] || \
             [ "${{ needs.caddyfile-validate.result }}" == "failure" ] || \
             [ "${{ needs.terraform-validate.result }}" == "failure" ] || \
             [ "${{ needs.shell-script-validate.result }}" == "failure" ]; then
            echo ""
            echo "⚠ Some validation failures detected - review above"
            exit 0
          else
            echo ""
            echo "✓ All validations passed"
          fi
