name: "CI Log Validation Gate"
description: "Validates all logs against structured logging schema before deployment"

on:
  workflow_run:
    workflows: ["Tests", "Build"]
    types: [completed]
  pull_request:
    paths:
      - "scripts/**"
      - "src/**"
      - "test/**"

jobs:
  validate-logs:
    name: Validate Structured Logging
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install validator
        run: |
          pip install jsonschema==4.20.0 pyyaml==6.0
      
      - name: Download test logs
        uses: actions/download-artifact@v3
        with:
          name: test-logs
          path: test-results/
        continue-on-error: true
      
      - name: Validate logs against schema
        run: |
          python scripts/ci-log-validator.py \
            --fail-on-warnings \
            test-results/**/*.jsonl \
            test-results/**/*.ndjson \
            test-results/**/*.log \
            2>&1 | tee validation-report.txt
      
      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: log-validation-report
          path: validation-report.txt
      
      - name: Comment validation result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation-report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Log Validation Results\n\n\`\`\`\n${report}\n\`\`\``,
            });
      
      - name: Block deployment on errors
        if: failure()
        run: |
          echo "❌ Structured logging validation FAILED"
          echo "Fix log entries to comply with schema:"
          echo "  - Ensure all required fields present (timestamp, service, environment, level, message)"
          echo "  - No hardcoded secrets (API keys, passwords, tokens)"
          echo "  - No unmasked PII (email addresses, credit cards, SSNs)"
          echo "  - Trace IDs must be 128-bit hex (32 chars)"
          echo "  - Span IDs must be 64-bit hex (16 chars)"
          exit 1

  validate-schema:
    name: Validate Against JSON Schema
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Validate schema syntax
        run: |
          python << 'EOF'
          import json
          import sys
          
          with open('schemas/structured-log-schema.json') as f:
              schema = json.load(f)
          
          # Validate schema itself
          assert schema['$schema'] == 'http://json-schema.org/draft-07/schema#'
          assert 'properties' in schema
          assert 'required' in schema
          
          # Validate required fields are defined
          for field in schema['required']:
              if field not in schema['properties']:
                  print(f"ERROR: Required field '{field}' not defined in properties")
                  sys.exit(1)
          
          print("✅ Schema syntax is valid")
          EOF
      
      - name: Validate example logs against schema
        run: |
          python << 'EOF'
          import json
          import jsonschema
          from pathlib import Path
          
          # Load schema
          with open('schemas/structured-log-schema.json') as f:
              schema = json.load(f)
          
          # Validate examples in schema
          examples = schema.get('examples', [])
          print(f"Validating {len(examples)} schema examples...")
          
          for i, example in enumerate(examples, 1):
              try:
                  jsonschema.validate(example, schema)
                  print(f"  ✅ Example {i} valid")
              except jsonschema.ValidationError as e:
                  print(f"  ❌ Example {i} INVALID: {e.message}")
                  exit(1)
          
          print(f"✅ All {len(examples)} examples are valid")
          EOF

  test-validator:
    name: Test Validator Script
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Test validator with valid log
        run: |
          python << 'EOF'
          import json
          import tempfile
          from pathlib import Path
          import sys
          sys.path.insert(0, 'scripts')
          from ci_log_validator import StructuredLogValidator
          
          # Create test log file
          valid_log = {
              "timestamp": "2026-04-16T10:30:45.123Z",
              "service": "test-service",
              "environment": "test",
              "level": "info",
              "message": "Test log entry",
              "trace_id": "4bf92f3577b34da6a3ce929d0e0e4736",
              "span_id": "00f067aa0ba902b7"
          }
          
          with tempfile.NamedTemporaryFile(mode='w', suffix='.jsonl', delete=False) as f:
              f.write(json.dumps(valid_log) + '\n')
              temp_file = f.name
          
          # Validate
          validator = StructuredLogValidator()
          validator.validate_file(Path(temp_file))
          
          if validator.stats['valid_entries'] == 1 and validator.stats['errors'] == 0:
              print("✅ Valid log accepted")
          else:
              print("❌ Valid log rejected")
              sys.exit(1)
          EOF
      
      - name: Test validator with invalid log (missing required field)
        run: |
          python << 'EOF'
          import json
          import tempfile
          from pathlib import Path
          import sys
          sys.path.insert(0, 'scripts')
          from ci_log_validator import StructuredLogValidator
          
          # Create test log file (missing required fields)
          invalid_log = {
              "message": "Incomplete log entry"
              # Missing: timestamp, service, environment, level
          }
          
          with tempfile.NamedTemporaryFile(mode='w', suffix='.jsonl', delete=False) as f:
              f.write(json.dumps(invalid_log) + '\n')
              temp_file = f.name
          
          # Validate
          validator = StructuredLogValidator()
          validator.validate_file(Path(temp_file))
          
          if validator.stats['errors'] > 0:
              print(f"✅ Invalid log rejected ({validator.stats['errors']} errors detected)")
          else:
              print("❌ Invalid log not caught")
              sys.exit(1)
          EOF
      
      - name: Test validator detects secrets
        run: |
          python << 'EOF'
          import json
          import tempfile
          from pathlib import Path
          import sys
          sys.path.insert(0, 'scripts')
          from ci_log_validator import StructuredLogValidator
          
          # Create test log with secret
          secret_log = {
              "timestamp": "2026-04-16T10:30:45.123Z",
              "service": "test-service",
              "environment": "test",
              "level": "error",
              "message": "API call failed",
              "api_key": "ghp_1234567890abcdefghijklmnopqrstuv"
          }
          
          with tempfile.NamedTemporaryFile(mode='w', suffix='.jsonl', delete=False) as f:
              f.write(json.dumps(secret_log) + '\n')
              temp_file = f.name
          
          # Validate
          validator = StructuredLogValidator()
          validator.validate_file(Path(temp_file))
          
          if validator.stats['errors'] > 0:
              print(f"✅ Secret detected ({validator.stats['errors']} errors)")
          else:
              print("❌ Secret not detected")
              sys.exit(1)
          EOF
      
      - name: Test validator detects PII
        run: |
          python << 'EOF'
          import json
          import tempfile
          from pathlib import Path
          import sys
          sys.path.insert(0, 'scripts')
          from ci_log_validator import StructuredLogValidator
          
          # Create test log with PII
          pii_log = {
              "timestamp": "2026-04-16T10:30:45.123Z",
              "service": "test-service",
              "environment": "test",
              "level": "info",
              "message": "User john.doe@example.com logged in",  # Unmasked email
          }
          
          with tempfile.NamedTemporaryFile(mode='w', suffix='.jsonl', delete=False) as f:
              f.write(json.dumps(pii_log) + '\n')
              temp_file = f.name
          
          # Validate
          validator = StructuredLogValidator()
          validator.validate_file(Path(temp_file))
          
          if validator.stats['warnings'] > 0:
              print(f"✅ PII detected ({validator.stats['warnings']} warnings)")
          else:
              print("⚠️  PII detection warning not triggered")
              # Not fatal, just warning
          EOF
