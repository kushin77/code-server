---
# Performance Alerts
# Latency, throughput, resource utilization
# Load order: 2

groups:
  - name: performance_alerts
    interval: 30s
    rules:
      # P1: High latency spike
      - alert: HighLatencySpike
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Latency spike detected (p99: {{ printf \"%.2f\" $value }}s > 1.0s)"
          description: "code-server p99 latency is above 1 second - investigate slow queries or resource contention"

      # P2: CPU utilization high
      - alert: CPUUtilizationHigh
        expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "CPU utilization is high ({{ humanizePercentage $value }})"
          description: "Host {{ $labels.instance }} CPU usage > 85%"

      # P2: Memory usage high
      - alert: MemoryUtilizationHigh
        expr: |
          (
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          ) > 0.85
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Memory utilization is high ({{ humanizePercentage $value }})"
          description: "Host {{ $labels.instance }} memory usage > 85%"

      # P2: Network saturation
      - alert: NetworkSaturation
        expr: |
          (
            rate(node_network_transmit_bytes_total[5m]) +
            rate(node_network_receive_bytes_total[5m])
          ) > 125000000  # 1 Gbps link × 85% utilization threshold
        for: 5m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          summary: "Network interface is saturated"
          description: "{{ $labels.instance }} network throughput high - possible network bottleneck"

      # P3: Request queue building up
      - alert: RequestQueueDepth
        expr: increase(http_requests_queued_total[1m]) > 100
        for: 5m
        labels:
          severity: info
          team: platform
        annotations:
          summary: "Request queue is building up"
          description: "code-server is queuing requests - may be resource constrained"
