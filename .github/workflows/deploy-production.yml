name: Deploy to Production (Blue-Green)

on:
  push:
    branches: [ main ]
    paths:
      - 'deployment/**'
      - 'services/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DEPLOYMENT_TIMEOUT: 300
  HEALTH_CHECK_RETRIES: 30
  HEALTH_CHECK_INTERVAL: 10
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  fetch-secrets:
    runs-on: ubuntu-latest
    name: Fetch Deployment Secrets from GSM
    outputs:
      staging-host: ${{ steps.secrets.outputs.staging_host }}
      prod-host: ${{ steps.secrets.outputs.prod_host }}
    permissions:
      contents: read
      id-token: write  # For OIDC to GCP

    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch deployment secrets from GSM
        id: secrets
        run: |
          if [ -n "${{ steps.auth.outputs.access_token }}" ]; then
            gcloud config set project ${{ env.GCP_PROJECT_ID }}
            
            # Fetch deployment hosts and credentials from GSM
            STAGING_HOST=$(gcloud secrets versions access latest --secret="prod-staging-host" 2>/dev/null || echo "staging.code-server.local")
            PROD_HOST=$(gcloud secrets versions access latest --secret="prod-host" 2>/dev/null || echo "code-server.local")
            DEPLOY_USER=$(gcloud secrets versions access latest --secret="prod-deploy-user" 2>/dev/null || echo "deployer")
            DEPLOY_KEY=$(gcloud secrets versions access latest --secret="prod-deploy-ssh-key" 2>/dev/null || echo "")
            
            # Mask sensitive outputs
            echo "::add-mask::$STAGING_HOST"
            echo "::add-mask::$PROD_HOST"
            echo "::add-mask::$DEPLOY_USER"
            echo "::add-mask::$DEPLOY_KEY"
            
            echo "staging_host=$STAGING_HOST" >> $GITHUB_OUTPUT
            echo "prod_host=$PROD_HOST" >> $GITHUB_OUTPUT
            echo "deploy_user=$DEPLOY_USER" >> $GITHUB_OUTPUT
          else
            echo "warning: Could not authenticate to GCP, using fallback secrets" >&2
            echo "staging_host=${{ secrets.STAGING_HOST }}" >> $GITHUB_OUTPUT
            echo "prod_host=${{ secrets.PROD_HOST }}" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  pre-deployment:
    runs-on: ubuntu-latest
    name: Pre-Deployment Validation
    needs: fetch-secrets
    outputs:
      deployment-id: ${{ steps.deploy-id.outputs.id }}
      services-changed: ${{ steps.changes.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Deployment ID
        id: deploy-id
        run: |
          DEPLOY_ID="deploy-$(date +%s)-${GITHUB_SHA::8}"
          echo "id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deployment ID: $DEPLOY_ID"

      - name: Check service changes
        id: changes
        run: |
          CHANGED_SERVICES=$(git diff --name-only origin/main..HEAD | grep '^services/' | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n")[:-1]')
          echo "services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
          echo "Changed services: $CHANGED_SERVICES"

      - name: Validate docker-compose
        run: |
          sudo apt-get update && sudo apt-get install -y docker-compose
          docker-compose config > /dev/null
          echo "✓ Docker Compose validation passed"

      - name: Validate deployment scripts
        run: |
          bash -n deployment/scripts/blue-green-deploy.sh || exit 1
          echo "✓ Deployment script validation passed"

      - name: Pre-flight checks
        run: |
          echo "## Pre-Deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Docker Compose validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Deployment scripts validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Deployment ID: ${{ steps.deploy-id.outputs.id }}" >> $GITHUB_STEP_SUMMARY

  staging-deployment:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [ fetch-secrets, pre-deployment ]
    environment:
      name: staging
      url: https://staging.code-server.local
    permissions:
      contents: read
      id-token: write  # For OIDC to GCP

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch application secrets from GSM for .env
        id: app-secrets
        run: |
          if [ -n "${{ steps.auth.outputs.access_token }}" ]; then
            gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
            
            # Fetch all required .env variables from GSM
            echo "Fetching staging environment secrets from GSM..."
            
            GOOGLE_CLIENT_ID=$(gcloud secrets versions access latest --secret="prod-portal-google-oauth-client-id" 2>/dev/null || echo "")
            GOOGLE_CLIENT_SECRET=$(gcloud secrets versions access latest --secret="prod-portal-google-oauth-client-secret" 2>/dev/null || echo "")
            GITHUB_TOKEN=$(gcloud secrets versions access latest --secret="prod-github-pat-code-server" 2>/dev/null || echo "")
            OAUTH2_COOKIE_SECRET=$(gcloud secrets versions access latest --secret="prod-portal-oauth2-cookie-secret" 2>/dev/null || echo "")
            GODADDY_KEY=$(gcloud secrets versions access latest --secret="prod-godaddy-api-key" 2>/dev/null || echo "")
            GODADDY_SECRET=$(gcloud secrets versions access latest --secret="prod-godaddy-api-secret" 2>/dev/null || echo "")
            
            # Mask all secrets
            echo "::add-mask::$GOOGLE_CLIENT_ID"
            echo "::add-mask::$GOOGLE_CLIENT_SECRET"
            echo "::add-mask::$GITHUB_TOKEN"
            echo "::add-mask::$OAUTH2_COOKIE_SECRET"
            echo "::add-mask::$GODADDY_KEY"
            echo "::add-mask::$GODADDY_SECRET"
            
            # Export for deployment
            {
              echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
              echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
              echo "GITHUB_TOKEN=$GITHUB_TOKEN"
              echo "OAUTH2_PROXY_COOKIE_SECRET=$OAUTH2_COOKIE_SECRET"
              echo "GODADDY_KEY=$GODADDY_KEY"
              echo "GODADDY_SECRET=$GODADDY_SECRET"
            } >> $GITHUB_ENV
            
            echo "✓ Secrets fetched from GSM"
          fi
        continue-on-error: true

      - name: Configure deployment credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ needs.fetch-secrets.outputs.staging-host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to staging environment
        run: |
          ssh -i ~/.ssh/deploy_key deployer@${{ needs.fetch-secrets.outputs.staging-host }} << 'EOF'
          set -e
          cd /opt/code-server
          
          # Fetch current .env or create from template
          if [ ! -f .env ]; then
            echo "Creating .env from template with GSM values..."
            cp .env.template .env
          fi
          
          # Update .env with current GSM values
          {
            grep -v "^GOOGLE_CLIENT" .env || true
            grep -v "^GITHUB_TOKEN" .env || true
            grep -v "^OAUTH2_PROXY_COOKIE_SECRET" .env || true
            grep -v "^GODADDY" .env || true
          } > .env.tmp && mv .env.tmp .env
          
          cat >> .env << ENVEOF
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          GITHUB_TOKEN=${GITHUB_TOKEN}
          OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
          GODADDY_KEY=${GODADDY_KEY}
          GODADDY_SECRET=${GODADDY_SECRET}
          ENVEOF
          
          git pull origin main || git fetch origin main && git reset --hard origin/main
          docker-compose -f deployment/production/docker-compose.yml pull
          docker-compose -f deployment/production/docker-compose.yml down || true
          docker-compose -f deployment/production/docker-compose.yml up -d
          sleep 30
          bash deployment/tests/smoke-tests.sh || exit 1
          echo "✓ Staging deployment successful"
          EOF
        continue-on-error: false

      - name: Staging health check
        run: |
          for i in {1..10}; do
            if curl -f https://staging.code-server.local/health 2>/dev/null; then
              echo "✓ Staging health check passed"
              exit 0
            fi
            echo "Waiting for staging... ($i/10)"
            sleep 5
          done
          echo "✗ Staging health check failed"
          exit 1

      - name: Staging validation
        if: success()
        run: |
          curl -s https://staging.code-server.local/api/health | jq .
          echo "✓ Staging validation passed"

  production-deployment:
    runs-on: ubuntu-latest
    name: Deploy to Production (Blue-Green)
    needs: [ pre-deployment, staging-deployment ]
    if: success()
    environment:
      name: production
      url: https://code-server.local

    steps:
      - uses: actions/checkout@v4

      - name: Configure production deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Execute blue-green deployment
        id: blue-green
        run: |
          ssh -i ~/.ssh/deploy_key deployer@${{ secrets.PROD_HOST }} << 'EOF'
          set -e
          cd /opt/code-server
          
          # Get active environment
          ACTIVE=$(docker ps --filter "label=deployment-active" --format "{{.Label \"deployment-env\"}}" | head -1)
          INACTIVE=$([ "$ACTIVE" = "blue" ] && echo "green" || echo "blue")
          
          echo "Active: $ACTIVE, Deploying to: $INACTIVE"
          
          # Pull latest images
          docker-compose -f deployment/production/docker-compose.yml pull
          
          # Deploy to inactive environment with new tag
          DEPLOY_TAG="deploy-$(date +%s)" \
          docker-compose -f deployment/production/docker-compose.yml -p "$INACTIVE" up -d
          
          sleep 30
          
          # Run smoke tests
          bash deployment/tests/smoke-tests.sh || {
            echo "Smoke tests failed, rolling back..."
            docker-compose -p "$INACTIVE" down
            exit 1
          }
          
          # Health check
          for i in {1..${HEALTH_CHECK_RETRIES}}; do
            if curl -f http://localhost:8443/health 2>/dev/null; then
              echo "Health check passed"
              break
            fi
            echo "Health check attempt $i/${HEALTH_CHECK_RETRIES}"
            sleep ${HEALTH_CHECK_INTERVAL}
            [ $i -eq ${HEALTH_CHECK_RETRIES} ] && exit 1
          done
          
          # Traffic switch (update load balancer)
          # In production, this would update Caddy reverse proxy config or load balancer
          docker exec code-server-caddy caddy reload 2>/dev/null || true
          
          # Wait for soak period
          echo "Soak period: 5 minutes"
          sleep 300
          
          # Cleanup old environment
          docker-compose -p "$ACTIVE" down || true
          
          echo "DEPLOY_ENV=$INACTIVE" >> $GITHUB_OUTPUT
          echo "DEPLOY_ID=${{ needs.pre-deployment.outputs.deployment-id }}" >> $GITHUB_OUTPUT
          EOF
        continue-on-error: false

      - name: Production health check
        run: |
          for i in {1..10}; do
            if curl -f https://code-server.local/health 2>/dev/null; then
              echo "✓ Production health check passed"
              exit 0
            fi
            echo "Waiting for production... ($i/10)"
            sleep 10
          done
          echo "✗ Production health check failed"
          exit 1

      - name: Verify SLO metrics
        run: |
          # Check that monitoring is collecting metrics
          sleep 30
          curl -s http://localhost:9090/api/v1/query?query=up | jq '.data.result | length'
          echo "✓ SLO metric collection verified"
        continue-on-error: true

      - name: Deployment summary
        if: always()
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID**: ${{ needs.pre-deployment.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Active Environment**: ${{ steps.blue-green.outputs.DEPLOY_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

  post-deployment:
    runs-on: ubuntu-latest
    name: Post-Deployment Validation
    needs: [ pre-deployment, production-deployment ]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Collect deployment metrics
        run: |
          echo "## Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID**: ${{ needs.pre-deployment.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Overall Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = context.payload.workflow_run?.conclusion || 'success';
            const message = `Deployment ${{ needs.pre-deployment.outputs.deployment-id }}: ${status}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            }).catch(() => {
              console.log('Could not post comment (no PR context)');
            });
