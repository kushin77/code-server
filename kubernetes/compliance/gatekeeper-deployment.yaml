apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
  labels:
    gatekeeper.sh/system: "yes"
    phase: "22-e"
    purpose: compliance-automation
    managed-by: terraform
    immutable-version: "3.14.0"
  annotations:
    description: "Compliance automation and policy enforcement infrastructure"
---
apiVersion: v1
kind: Service
metadata:
  name: gatekeeper-webhook-service
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    component: gatekeeper-webhook
spec:
  ports:
  - name: webhook
    port: 443
    targetPort: 8888
    protocol: TCP
  - name: metrics
    port: 8888
    targetPort: 8091
    protocol: TCP
  selector:
    app.kubernetes.io/name: gatekeeper
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper-controller-manager
  namespace: gatekeeper-system
  labels:
    phase: "22-e"
    app.kubernetes.io/name: gatekeeper
    app.kubernetes.io/version: "3.14.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gatekeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gatekeeper
        phase: "22-e"
      annotations:
        description: "Gatekeeper policy controller"
    spec:
      serviceAccountName: gatekeeper-admin
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: manager
        image: openpolicyagent/gatekeeper:3.14.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
          name: webhook
          protocol: TCP
        - containerPort: 8090
          name: health
          protocol: TCP
        - containerPort: 8091
          name: metrics
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gatekeeper-controller-manager
  namespace: gatekeeper-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gatekeeper
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gatekeeper-admin
  namespace: gatekeeper-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gatekeeper-admin
  labels:
    phase: "22-e"
    gatekeeper.sh/system: "yes"
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
- apiGroups: ["constraints.gatekeeper.sh"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gatekeeper-admin-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gatekeeper-admin
subjects:
- kind: ServiceAccount
  name: gatekeeper-admin
  namespace: gatekeeper-system
