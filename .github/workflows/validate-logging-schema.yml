name: Structured Logging Schema Validation

on:
  push:
    branches: ["**"]
    paths:
      - "src/**/*.js"
      - "src/**/*.ts"
      - "src/**/*.py"
      - "extensions/**/*.js"
      - "extensions/**/*.ts"
      - "scripts/logging*.sh"
      - "scripts/lib/logging.sh"
  pull_request:
    branches: [main, phase-7-deployment]

permissions:
  contents: read

jobs:
  validate-logging-schema:
    name: Validate Structured Logging Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validation tools
        run: |
          npm install -g ajv-cli@5 2>/dev/null || true
          pip3 install jsonschema 2>/dev/null || true

      - name: Validate log schema definitions
        run: |
          echo "=== Validating structured log schema definitions ==="

          # Check if log schema file exists
          if [ -f "config/logging/log-schema.json" ]; then
            echo "✅ log-schema.json found"
            # Validate JSON syntax
            python3 -c "import json; json.load(open('config/logging/log-schema.json'))" && \
              echo "✅ log-schema.json is valid JSON"
          else
            echo "ℹ️  config/logging/log-schema.json not found — skipping schema file validation"
          fi

      - name: Check required log fields in application code
        run: |
          echo "=== Checking for required structured log fields ==="

          REQUIRED_FIELDS=("trace_id" "span_id" "level" "service" "timestamp")
          ISSUES=0

          # Scan JS/TS logging calls
          for field in "${REQUIRED_FIELDS[@]}"; do
            # Check that the field appears in logging config or library
            if find src/ extensions/ -name "*.js" -o -name "*.ts" 2>/dev/null | \
              xargs grep -l "logger\|logging\|log\." 2>/dev/null | head -5 | \
              xargs grep -l "$field" 2>/dev/null | head -1; then
              echo "✅ Field '$field' referenced in logging code"
            else
              echo "ℹ️  Field '$field' not found in logging code (may be injected at middleware level)"
            fi
          done

      - name: Validate no PII in log examples
        run: |
          echo "=== Checking for PII patterns in log configurations ==="

          # Check for common PII patterns in log configs/schemas
          PII_PATTERNS=(
            "password"
            "secret"
            "api_key"
            "access_token"
            "credit_card"
            "ssn"
            "social_security"
          )

          ISSUES=0
          for pattern in "${PII_PATTERNS[@]}"; do
            FOUND=$(grep -rn \
              --include="*.json" \
              --include="*.yml" \
              --include="*.yaml" \
              -i "$pattern" \
              config/logging/ 2>/dev/null || true)

            if [ -n "$FOUND" ]; then
              echo "⚠️  WARNING: Potential PII pattern '$pattern' in logging config:"
              echo "$FOUND"
              ISSUES=$((ISSUES + 1))
            fi
          done

          if [ "$ISSUES" -gt 0 ]; then
            echo "⚠️  Review logging config for PII exposure"
          else
            echo "✅ No PII patterns in logging configuration"
          fi

      - name: Check trace context propagation headers
        run: |
          echo "=== Checking W3C Trace Context header references ==="

          # Look for trace context header names
          TRACE_HEADERS=(
            "traceparent"
            "tracestate"
            "X-B3-TraceId"
            "X-Request-Id"
          )

          for header in "${TRACE_HEADERS[@]}"; do
            if grep -rn \
              --include="*.js" \
              --include="*.ts" \
              --include="*.py" \
              --include="*.yml" \
              -i "$header" \
              --exclude-dir="node_modules" \
              --exclude-dir="deprecated" \
              . 2>/dev/null | head -1; then
              echo "✅ Trace header '$header' referenced"
            else
              echo "ℹ️  Header '$header' not found (may not be needed)"
            fi
          done

      - name: Check Loki log aggregation config
        run: |
          echo "=== Checking Loki configuration for structured log parsing ==="

          if [ -f "config/loki/loki.yml" ] || [ -f "config/loki/config.yml" ]; then
            echo "✅ Loki configuration found"

            # Check for pipeline_stages (JSON parsing)
            if grep -q "pipeline_stages\|json\|labels" config/loki/*.yml 2>/dev/null; then
              echo "✅ Loki has log parsing pipeline configured"
            else
              echo "⚠️  Loki config may be missing json parsing pipeline"
            fi
          else
            echo "ℹ️  Loki config not found at config/loki/ — skipping"
          fi

      - name: Validate OpenTelemetry collector config
        run: |
          echo "=== Checking OpenTelemetry collector configuration ==="

          OTEL_CONFIGS=$(find config/ -name "otel*.yml" -o -name "*opentelemetry*.yml" -o -name "otel-collector*.yml" 2>/dev/null || true)

          if [ -n "$OTEL_CONFIGS" ]; then
            echo "✅ OpenTelemetry config found: $OTEL_CONFIGS"

            for config in $OTEL_CONFIGS; do
              # Validate YAML syntax
              python3 -c "import yaml; yaml.safe_load(open('$config'))" 2>/dev/null && \
                echo "✅ $config is valid YAML" || \
                echo "❌ $config has YAML syntax error"
            done
          else
            echo "ℹ️  No OpenTelemetry config found — skipping"
          fi

      - name: Check correlation ID propagation in Caddy
        run: |
          echo "=== Checking Caddy for correlation ID header injection ==="

          if grep -q "X-Request-Id\|traceparent\|header.*trace\|request_id" Caddyfile 2>/dev/null; then
            echo "✅ Caddy configured for correlation ID propagation"
          elif [ -f "Caddyfile" ]; then
            echo "⚠️  Caddyfile exists but may not propagate trace headers"
            echo "   Consider adding: header_up X-Request-Id {http.request.uuid}"
          else
            echo "ℹ️  No Caddyfile found — skipping"
          fi

      - name: Summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════════"
          echo "  ✅ STRUCTURED LOGGING SCHEMA VALIDATION COMPLETE"
          echo "══════════════════════════════════════════════════════"
          echo ""
          echo "Required fields: trace_id, span_id, level, service, timestamp"
          echo "Standard:        W3C Trace Context (traceparent/tracestate)"
          echo "Pipeline:        App → Loki → Grafana"
          echo "Tracing:         App → OTEL Collector → Jaeger"
          echo ""
          echo "Ref: docs/TELEMETRY-ARCHITECTURE.md"
