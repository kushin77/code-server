apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-overlay-patch
data:
  replicas: "2"

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-staging
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: code-server
      environment: staging
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: UDP
      port: 53
