name: Deploy to Replica (192.168.168.42)

on:
  workflow_run:
    workflows: [Deploy to Primary]
    types: [completed]
    branches: [phase-7-deployment, main]

permissions:
  contents: read
  deployments: write

jobs:
  deploy-replica:
    name: Deploy to Replica Host
    runs-on: [self-hosted, on-prem, replica]
    timeout-minutes: 30
    environment:
      name: replica
      url: https://metrics.kushnir.cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate docker-compose
        run: |
          docker-compose config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: Pull latest changes
        run: |
          cd /home/akushnir/code-server-enterprise
          git pull origin phase-7-deployment || git pull origin main
          echo "✅ Repository updated on replica"

      - name: Deploy services
        run: |
          cd /home/akushnir/code-server-enterprise
          
          # Source .env to ensure variables are available
          set -a
          [ -f .env ] && source .env
          set +a
          
          # Stop existing containers gracefully
          echo "🔄 Stopping existing services..."
          docker-compose down --remove-orphans || true
          sleep 5
          
          # Pull latest images
          echo "📦 Pulling latest images..."
          docker-compose pull
          
          # Start services
          echo "🚀 Starting services..."
          docker-compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to become healthy..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            healthy=$(docker-compose ps --format json | \
              jq -r '.[] | select(.State | startswith("running")) | select(.Health == "healthy" or .Health == null) | .Service' | \
              wc -l)
            total=$(docker-compose ps --format json | jq -r '.[] | .Service' | wc -l)
            
            if [ $healthy -eq $total ] && [ $total -gt 0 ]; then
              echo "✅ All services are healthy on replica"
              break
            fi
            
            echo "  Healthy: $healthy/$total services"
            sleep 2
            attempt=$((attempt + 1))
          done

      - name: Verify replication
        run: |
          cd /home/akushnir/code-server-enterprise
          
          echo "📋 Replica Service Status:"
          docker-compose ps
          
          echo ""
          echo "🔄 Replication Status:"
          
          # Check PostgreSQL replication
          if docker-compose exec -T postgresql psql -U postgres -c "SELECT pg_last_xlog_receive_location(), pg_last_xact_replay_timestamp();" > /dev/null 2>&1; then
            echo "✅ PostgreSQL replication is active"
          else
            echo "⚠️  PostgreSQL replication check inconclusive"
          fi

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'replica',
              description: 'Deployment to 192.168.168.42 (replica)',
              production_environment: false,
            });
            
            const status = context.job.status === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: status,
              environment_url: 'https://metrics.kushnir.cloud',
              description: 'Replica deployment ' + status
            });
