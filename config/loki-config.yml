auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

ingester:
  chunk_idle_period: 3m
  max_chunk_age: 1h

limits_config:
  ingestion_rate_mb: 8

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks
