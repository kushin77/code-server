name: Branch Cleanup

on:
  pull_request:
    types: [closed]
  # Run weekly to catch any lingering branches
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  delete-merged-branch:
    name: Delete merged branch
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Delete head branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const branch = context.payload.pull_request.head.ref;
            // Never delete protected branches
            const protected_branches = ['main', 'master', 'develop'];
            if (protected_branches.includes(branch)) {
              console.log(`Skipping protected branch: ${branch}`);
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (err) {
              if (err.status === 422) {
                console.log(`Branch ${branch} already deleted.`);
              } else {
                throw err;
              }
            }

  stale-branch-report:
    name: Stale branch audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
    steps:
      - name: Audit and auto-delete stale branches
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const WARN_DAYS = 14;   // Report after 14 days of inactivity
            const AUTO_DELETE_DAYS = 60; // Auto-delete after 60 days
            const PROTECTED = ['main', 'master', 'develop'];
            const now = Date.now();

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner, repo, protected: false, per_page: 100
            });

            const warn = [], deleted = [];
            for (const branch of branches) {
              if (PROTECTED.includes(branch.name)) continue;
              const commit = await github.rest.repos.getCommit({
                owner, repo, ref: branch.commit.sha
              });
              const age = (now - new Date(commit.data.commit.committer.date)) / 86400000;
              const date = new Date(commit.data.commit.committer.date).toISOString().split('T')[0];

              if (age >= AUTO_DELETE_DAYS) {
                try {
                  await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch.name}` });
                  deleted.push(`- \`${branch.name}\` — ${Math.floor(age)}d old (auto-deleted)`);
                } catch(e) {
                  deleted.push(`- \`${branch.name}\` — delete failed: ${e.message}`);
                }
              } else if (age >= WARN_DAYS) {
                warn.push(`- \`${branch.name}\` — last commit: ${date} (${Math.floor(age)}d ago)`);
              }
            }

            if (warn.length === 0 && deleted.length === 0) {
              console.log('No stale branches found.');
              return;
            }

            let body = `## Stale Branch Audit — ${new Date().toISOString().split('T')[0]}\n\n`;
            if (deleted.length > 0) {
              body += `### 🗑️ Auto-deleted (>${AUTO_DELETE_DAYS} days stale)\n${deleted.join('\n')}\n\n`;
            }
            if (warn.length > 0) {
              body += `### ⚠️ Needs attention (>${WARN_DAYS} days stale, will auto-delete at ${AUTO_DELETE_DAYS}d)\n${warn.join('\n')}\n\n`;
              body += `> Merge or delete these branches to avoid automatic deletion.`;
            }

            await github.rest.issues.create({
              owner, repo,
              title: `[Branch Hygiene] ${deleted.length} deleted, ${warn.length} stale branch(es)`,
              body,
              labels: ['hygiene', 'tech-debt']
            });
