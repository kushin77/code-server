port 26379
bind 0.0.0.0

# Sentinel monitoring (primary redis instance)
sentinel monitor mymaster redis 6379 1

# Time to wait for replica to respond
sentinel down-after-milliseconds mymaster 5000

# Parallel failover attempts
sentinel parallel-syncs mymaster 1

# Failover timeout
sentinel failover-timeout mymaster 10000

# Notification scripts (optional)
# sentinel notification-script mymaster /path/to/notification.sh
# sentinel client-reconfig-script mymaster /path/to/reconfig.sh

# Loglevel
loglevel notice

# Logfile
logfile ""

# Dir
dir /data

# Deny all connections by default
deny-scripts-reconfig yes
