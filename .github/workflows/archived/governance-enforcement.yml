name: Global Governance Enforcement Framework

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Scan for Leaked Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  iac-security:
    name: Validate Infrastructure as Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform,dockerfile,docker
          output_format: sarif
          output_file_path: reports/checkov.sarif
          skip_check: CKV_DOCKER_38
        continue-on-error: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: reports/checkov.sarif
          category: checkov

  script-validation:
    name: Validate Shell Scripts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shellcheck
        id: shellcheck
        run: |
          find scripts/ -type f -name "*.sh" 2>/dev/null | while read script; do
            echo "Checking: $script"
            shellcheck --severity=warning "$script" || exit 1
          done
          echo "✅ All scripts passed shellcheck"

  config-validation:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose files
        run: |
          for file in docker-compose*.yml docker-compose*.yaml; do
            if [ -f "$file" ]; then
              docker-compose -f "$file" config > /dev/null || exit 1
            fi
          done

      - name: Validate JSON files
        run: |
          find . -type f -name "*.json" -not -path "./node_modules/*" | while read json_file; do
            jq empty "$json_file" || exit 1
          done

  governance-summary:
    name: Governance Enforcement Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, iac-security, script-validation, config-validation]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate Summary
        run: |
          echo "## 🏛️ Governance Enforcement Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secrets | ${{ needs.secrets-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Security | ${{ needs.iac-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Scripts | ${{ needs.script-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Config | ${{ needs.config-validation.result }} |" >> $GITHUB_STEP_SUMMARY
