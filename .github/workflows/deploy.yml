name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose*.yml'
      - 'config/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'primary'
        type: choice
        options:
          - primary
          - replica
          - both

permissions:
  contents: read
  deployments: write

jobs:
  pre-deploy:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          for f in docker-compose*.yml; do
            if [ -f "$f" ]; then
              echo "Validating $f..."
              docker-compose -f "$f" config > /dev/null || exit 1
            fi
          done
          echo "✅ Docker Compose files valid"

  deploy-primary:
    name: Deploy Primary
    needs: pre-deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'primary' || github.event.inputs.target == 'both' || github.event_name == 'push' }}
    environment:
      name: production-primary
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Primary (${{ secrets.PRIMARY_HOST_IP }})
        run: |
          ssh -o StrictHostKeyChecking=no akushnir@${{ secrets.PRIMARY_HOST_IP }} << 'EOF'
            cd code-server-enterprise
            git fetch origin && git reset --hard origin/phase-7-deployment
            docker-compose pull
            docker-compose up -d
            sleep 30
            docker-compose ps
          EOF

  deploy-replica:
    name: Deploy Replica
    needs: pre-deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.target == 'replica' || github.event.inputs.target == 'both' }}
    environment:
      name: production-replica
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Replica (${{ secrets.REPLICA_HOST_IP }})
        run: |
          ssh -o StrictHostKeyChecking=no akushnir@${{ secrets.REPLICA_HOST_IP }} << 'EOF'
            cd code-server-enterprise
            git fetch origin && git reset --hard origin/phase-7-deployment
            docker-compose pull
            docker-compose up -d
            sleep 30
            docker-compose ps
          EOF

  post-deploy:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [deploy-primary]
    if: always()
    steps:
      - name: Smoke Tests
        run: |
          echo "✅ Deployment complete"
name: Deploy Code-Server Enterprise IaC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      target:
        description: 'Deployment target'
        required: true
        default: 'primary'
        type: choice
        options:
          - primary
          - replica
          - both

env:
  TF_VERSION: 1.6.0
  TERRAFORM_DIR: terraform

permissions:
  contents: read
  deployments: write

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (validation mode)
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform validate

      - name: Terraform Format Check
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform fmt -check -recursive

  deploy-primary:
    name: Deploy to Primary (${{ secrets.PRIMARY_HOST_IP }})
    runs-on: [self-hosted, on-prem, primary]
    needs: validate
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'primary' || github.event.inputs.target == 'both')))
    environment:
      name: primary
      url: https://ide.kushnir.cloud
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init -upgrade

      - name: Terraform Validate
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform validate

      - name: Terraform Plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan -out=tfplan -lock=false \
            -var-file=../terraform.production.tfvars \
            -var="deployment_host=${{ secrets.PRIMARY_HOST_IP }}" \
            -var="is_primary=true"

      - name: Display Plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform show -no-color tfplan | head -100

      - name: Terraform Apply
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform apply -auto-approve -lock=false tfplan

      - name: Verify Deployment
        run: |
          cd /home/akushnir/code-server-enterprise
          
          echo "📋 Service Status:"
          docker-compose ps --format 'table {{.Service}}\t{{.Status}}'
          
          echo ""
          echo "🔍 Health Checks:"
          
          # Check code-server
          if docker-compose exec -T code-server curl -sf http://localhost:8080 > /dev/null 2>&1; then
            echo "✅ code-server responsive"
          else
            echo "❌ code-server check failed"
            exit 1
          fi
          
          # Check Prometheus
          if docker-compose exec -T prometheus curl -sf http://localhost:9090/-/healthy > /dev/null 2>&1; then
            echo "✅ Prometheus healthy"
          else
            echo "⚠️  Prometheus not ready yet"
          fi

      - name: Update Deployment Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
              state: '${{ job.status }}',
              description: 'Terraform deployment to primary (${{ secrets.PRIMARY_HOST_IP }}),'
              environment_url: 'https://ide.kushnir.cloud'
            });

  deploy-replica:
    name: Deploy to Replica (192.168.168.42)
    runs-on: [self-hosted, on-prem, replica]
    needs: deploy-primary
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.target == 'replica' || github.event.inputs.target == 'both')))
    environment:
      name: replica
      url: https://metrics.kushnir.cloud
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Terraform Init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init -upgrade

      - name: Terraform Validate
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform validate

      - name: Terraform Plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan -out=tfplan -lock=false \
            -var-file=../terraform.replica.tfvars \
            -var="deployment_host=192.168.168.42" \
            -var="is_primary=false"

      - name: Terraform Apply
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform apply -auto-approve -lock=false tfplan

      - name: Verify Deployment
        run: |
          cd /home/akushnir/code-server-enterprise
          
          echo "📋 Replica Service Status:"
          docker-compose ps --format 'table {{.Service}}\t{{.Status}}'
          
          echo ""
          echo "🔍 Health Checks:"
          
          # Check Prometheus/Grafana (replica runs monitoring)
          if docker-compose exec -T prometheus curl -sf http://localhost:9090/-/healthy > /dev/null 2>&1; then
            echo "✅ Prometheus healthy on replica"
          else
            echo "⚠️  Prometheus not ready yet"
          fi

      - name: Slack Notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Deployed ✅",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC deployment successful\n*URL:* https://ide.kushnir.cloud\n*Deployment:* ${{ github.sha }}"
                  }
                }
              ]
            }

  destroy:
    name: Destroy (Manual Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Slack Notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Destroyed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC resources destroyed"
                  }
                }
              ]
            }
