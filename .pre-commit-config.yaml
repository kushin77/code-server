repos:
  - repo: local
    hooks:
      - id: mandatory-redeploy
        name: mandatory-redeploy
        entry: pwsh -NoProfile -File ./scripts/mandatory-redeploy.ps1
        language: system
        pass_filenames: false
        # Only run manually or on local push — not in CI (Linux runners don't have docker.exe)
        stages: [manual]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # nas-ingress.yaml is a valid multi-document YAML (Kubernetes manifests)
        exclude: 'scripts/nas-ingress\.yaml'
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.74.0
    hooks:
      - id: terraform_fm
        # Only run when terraform is available locally — not enforced in CI
        stages: [manual]
      - id: terraform_validate
        stages: [manual]
