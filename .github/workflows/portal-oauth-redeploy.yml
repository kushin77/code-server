name: Portal OAuth Redeploy

# Issue #692: Production portal OAuth callback redeploy execution path
# Syncs docker-compose.yml to production host and redeploysvservices with split redirect URLs
# Apex (kushnir.cloud) vs. IDE (ide.kushnir.cloud) share cookie domain but use distinct OAuth callbacks

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry-run only (no docker compose changes)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: portal-oauth-redeploy-production
  cancel-in-progress: false

jobs:
  redeploy-portal-oauth:
    name: Redeploy portal OAuth routing
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Bootstrap ephemeral env file from GSM
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .env ]]; then
            echo "DEPLOY_ENV_CREATED=false" >> "$GITHUB_ENV"
            echo "Using existing .env from runner workspace"
            exit 0
          fi

          if ! command -v gcloud >/dev/null 2>&1; then
            echo "gcloud is required to fetch GSM-backed secrets when .env is absent" >&2
            exit 1
          fi

          bash scripts/fetch-gsm-secrets.sh > .env
          chmod 600 .env
          echo "DEPLOY_ENV_CREATED=true" >> "$GITHUB_ENV"
          echo "Generated ephemeral .env from GSM secrets"

      - name: Validate callback split in source compose
        shell: bash
        run: |
          set -euo pipefail
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_IDE_REDIRECT_URL:-${OAUTH2_REDIRECT_URL:-https://ide.kushnir.cloud/oauth2/callback}}"' docker-compose.yml
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_PORTAL_REDIRECT_URL:-https://kushnir.cloud/oauth2/callback}"' docker-compose.yml

      - name: Dry-run portal OAuth redeploy
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/deploy/redeploy-portal-oauth-routing.sh --dry-run --local

      - name: Redeploy portal services
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/deploy/redeploy-portal-oauth-routing.sh --local

      - name: Verify live redirects
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          apex_location="$(curl -skI 'https://kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          ide_location="$(curl -skI 'https://ide.kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          echo "$apex_location"
          echo "$ide_location"
          echo "$apex_location" | grep -qi 'redirect_uri=https%3A%2F%2Fkushnir.cloud%2Foauth2%2Fcallback'
          echo "$ide_location" | grep -qi 'redirect_uri=https%3A%2F%2Fide.kushnir.cloud%2Foauth2%2Fcallback'

      - name: Summarize deployment mode
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Portal OAuth Redeploy"
            echo "- Runner: self-hosted"
            echo "- Execution: scripts/deploy/redeploy-portal-oauth-routing.sh --local"
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              echo "- Mode: dry-run"
            else
              echo "- Mode: apply"
            fi
            if [[ "${DEPLOY_ENV_CREATED:-false}" == "true" ]]; then
              echo "- Env bootstrap: ephemeral .env generated from GSM"
            else
              echo "- Env bootstrap: existing .env reused"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup ephemeral env file
        if: always() && env.DEPLOY_ENV_CREATED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .env
