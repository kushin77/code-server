auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info
  grpc_listen_port: 9095
  grpc_server_max_recv_msg_size: 67108864
  grpc_server_max_send_msg_size: 67108864

# Disable all HA/distributed features
analytics:
  reporting_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_encoding: snappy

# Disable distributed components
ingester_client:
  grpc_client_config:
    max_recv_msg_size: 67108864
    max_send_msg_size: 67108864

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Minimal storage config
storage_config:
  boltdb:
    directory: /loki/boltdb
  filesystem:
    directory: /loki/chunks

# Disable querier and other HA features
querier:
  engine: prometheus

# Disable ruler
ruler:
  enable_api: false
  rule_path: /loki/rules

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  poll_interval: 10m
  retention_deletes_enabled: false
  retention_period: 0s
