# prometheus-production.yml — Enterprise Prometheus Configuration
# Full observability with 1-year retention, remote storage, HA support

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: production
    region: us-central1
    environment: prod
    replica: '0'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Caddy reverse proxy
  - job_name: caddy
    static_configs:
      - targets: ['caddy:2019']
    metrics_path: /metrics
    scrape_interval: 30s

  # Code-Server application
  - job_name: code-server
    static_configs:
      - targets: ['code-server:8080']
    metrics_path: /metrics
    scrape_interval: 30s

  # Ollama LLM backend
  - job_name: ollama
    static_configs:
      - targets: ['ollama:11434']
    metrics_path: /metrics
    scrape_interval: 60s

  # Redis cache
  - job_name: redis
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # PostgreSQL database
  - job_name: postgres
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  # OAuth2-Proxy authentication
  - job_name: oauth2-proxy
    static_configs:
      - targets: ['oauth2-proxy:4180']
    metrics_path: /metrics
    scrape_interval: 30s

  # Node exporter (system metrics)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
    metric_relabel_configs:
      # Drop some verbose metrics
      - source_labels: [__name__]
        regex: 'node_textfile_mtime_seconds'
        action: drop

  # cAdvisor (container metrics)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scrape_interval: 30s

  # AlertManager self-monitoring
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
    scrape_interval: 30s

