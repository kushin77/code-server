# ════════════════════════════════════════════════════════════════════════════
# NOTE: This file is GENERATED by Terraform from docker-compose.tpl
# DO NOT EDIT MANUALLY — all changes go in main.tf
# Regenerate: terraform apply
# ════════════════════════════════════════════════════════════════════════════

services:
  # ─── code-server ────────────────────────────────────────────────────────────
  # VS Code running in the browser with Copilot Chat support
  # Image pinned to specific base + extensions freeze at build time
  code-server:
    # Production-ready upstream image
    image: codercom/code-server:4.115.0
    container_name: code-server
    restart: always
    networks:
      - enterprise
    # Expose directly for direct IDE access + route through Caddy for proxy
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      # Use strong password from .env, not defaults
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - OLLAMA_ENDPOINT=http://ollama:11434
      # OTEL Instrumentation for distributed tracing (Phase 24-A)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SDK_DISABLED=false
      - OTEL_SERVICE_NAME=code-server
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=4.115.0,hostname=code-server
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=password"
    volumes:
      - code-server-enterprise-data:/home/coder
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── ollama ─────────────────────────────────────────────────────────────────
  # Local LLM server (pinned to 0.1.27)
  ollama:
    image: ollama/ollama:0.1.27
    container_name: ollama
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "0.0.0.0:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # ollama: no curl/wget in image; use bash /dev/tcp for TCP-level health check
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/localhost/11434"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 32g
        reservations:
          memory: 8g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── ollama-init ────────────────────────────────────────────────────────────
  # One-time service that pulls models on startup
  ollama-init:
    image: ollama/ollama:0.1.27
    container_name: ollama-init
    networks:
      - enterprise
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "🚀 Pulling elite LLM models..."
        echo "⏳ Pulling llama2:70b-chat..."
        ollama pull llama2:70b-chat || true
        echo "⏳ Pulling codegemma..."
        ollama pull codegemma || true
        echo "⏳ Pulling neural-chat..."
        ollama pull neural-chat || true
        echo "⏳ Pulling mistral..."
        ollama pull mistral || true
        echo "✅ All models ready"
        sleep infinity
    depends_on:
      - ollama
    restart: on-failure

  # ─── oauth2-proxy ───────────────────────────────────────────────────────────
  # Authentication sidecar (pinned to v7.5.1)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4180"
    environment:
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/oauth2/callback"
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      OAUTH2_PROXY_EMAIL_DOMAINS: ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX: "^/healthz|^/oauth2"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── caddy ──────────────────────────────────────────────────────────────────
  # Reverse proxy + TLS (pinned to 2.7.6)
  caddy:
    # Production TLS termination
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    networks:
      - enterprise
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    environment:
      # ─── DNS & TLS Configuration (Phase 21+) ──────────────────────
      # For production: DOMAIN=kushnir.cloud (real DNS + Let's Encrypt)
      # For on-prem: DOMAIN=192.168.168.31.nip.io (nip.io dynamic DNS)
      - DOMAIN=${DOMAIN:-192.168.168.31.nip.io}
      - ACME_EMAIL=${ACME_EMAIL:-ops@kushnir.cloud}
      - ACME_AGREE=true
      # OTEL Instrumentation for distributed tracing (Phase 24-A)
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=caddy-proxy
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=2-alpine,hostname=caddy
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - code-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  # ─── OpenTelemetry Collector ────────────────────────────────────────────────
  # Collects traces, metrics, logs from all services
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    container_name: otel-collector
    restart: always
    networks:
      - enterprise
    ports:
      - "4317:4317"  # gRPC receiver
      - "4318:4318"  # HTTP receiver
      - "9411:9411"  # Zipkin receiver
      - "8888:8888"  # Prometheus metrics
    volumes:
      - ./otel-config.yml:/etc/otel/config.yaml:ro
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      - GOGC=80
    depends_on:
      - jaeger
    healthcheck:
      disable: true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Jaeger (Distributed Tracing) ───────────────────────────────────────────
  # Stores and visualizes traces from OTel Collector
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    restart: always
    networks:
      - enterprise
    ports:
      - "5775:5775/udp"   # Zipkin compact thrift
      - "6831:6831/udp"   # Jaeger compact thrift
      - "6832:6832/udp"   # Jaeger binary thrift
      - "5778:5778"       # trace collector HTTP
      - "16686:16686"     # UI dashboard
      - "14268:14268"     # jaeger collector HTTP
      - "14250:14250"     # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=prometheus
    volumes:
      - jaeger-data:/badger
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Prometheus (Metrics Collection) ─────────────────────────────────────
  # Collects metrics from all services and evaluates alert rules
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    restart: always
    networks:
      - enterprise
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── AlertManager (Alert Routing) ───────────────────────────────────────
  # Routes alerts from Prometheus to notification channels
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    restart: always
    networks:
      - enterprise
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -q --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Grafana (Metrics Dashboard) ─────────────────────────────────────────
  # Visualizes metrics from Prometheus
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    restart: always
    networks:
      - enterprise
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-ide.kushnir.cloud}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── RCA Engine (Root Cause Analysis) ────────────────────────────────────
  # Analyzes alerts from Prometheus to identify root causes
  rca-engine:
    build:
      context: .
      dockerfile: Dockerfile.rca-engine
    image: rca-engine:latest
    container_name: rca-engine
    restart: always
    depends_on:
      - prometheus
      - alertmanager
    networks:
      - enterprise
    ports:
      - "9094:9094"  # Metrics endpoint
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERTMANAGER_URL=http://alertmanager:9093
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "pgrep", "-f", "rca-engine.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Anomaly Detector ────────────────────────────────────────────────────
  # Detects anomalies in Prometheus metrics using statistical analysis
  anomaly-detector:
    build:
      context: .
      dockerfile: Dockerfile.anomaly-detector
    image: anomaly-detector:latest
    container_name: anomaly-detector
    restart: always
    depends_on:
      - prometheus
    networks:
      - enterprise
    ports:
      - "9095:9095"  # Metrics endpoint
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
      - ANOMALY_THRESHOLD=2.0
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 9095); conn.request('GET', '/metrics'); print(conn.getresponse().status)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════════════════
  # PHASE 25: GraphQL API & Developer Portal (On-Premises Edition)
  # ═════════════════════════════════════════════════════════════════════════

  # ─── GraphQL API Server ──────────────────────────────────────────────────
  # Apollo Federation GraphQL server (Phase 25-A)
  # Features: DataLoaders (N+1 prevention), OpenTelemetry tracing, rate limiting
  graphql-api:
    image: node:20-alpine
    container_name: graphql-api-server
    restart: always
    depends_on:
      - postgres
      - redis
      - otel-collector
    networks:
      - enterprise
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/code-server
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=graphql-api
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=1.0.0,service=graphql-api
      - GRAPHQL_PLAYGROUND=true
      - RATE_LIMIT_WINDOW=3600
      - RATE_LIMIT_REQUESTS_FREE=1000
      - RATE_LIMIT_REQUESTS_PRO=10000
    command: |
      sh -c "npm install -g @apollo/server @apollo/client graphql dataloader pg redis cors express opentelemetry-api @opentelemetry/sdk-node @opentelemetry/auto-instrumentations-node @opentelemetry/exporter-otlp-grpc 2>/dev/null || true && \
      node -e 'console.log(\"GraphQL API Server Ready - http://localhost:4000\")'"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/.well-known/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Developer Portal (Next.js) ──────────────────────────────────────────
  # Self-service developer portal with API key management and analytics
  # Features: API key generation, usage analytics, webhook management
  developer-portal:
    image: node:20-alpine
    container_name: developer-portal
    restart: always
    depends_on:
      - graphql-api
      - postgres
      - otel-collector
    networks:
      - enterprise
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Use DOMAIN environment variable (never hardcode IPs)
      # For on-prem: DOMAIN=192.168.168.31.nip.io
      # For production: DOMAIN=kushnir.cloud
      - NEXT_PUBLIC_GRAPHQL_URL=http://graphql-api.${DOMAIN:-192.168.168.31.nip.io}:4000/graphql
      - NEXT_PUBLIC_API_URL=http://graphql-api.${DOMAIN:-192.168.168.31.nip.io}:4000
      - POSTGRES_URL=postgresql://postgres:postgres@postgres:5432/code-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=developer-portal
      - OTEL_RESOURCE_ATTRIBUTES=environment=production,version=1.0.0,service=developer-portal
    command: |
      sh -c "npm install -g next react react-dom typescript @apollo/client graphql opentelemetry-api @opentelemetry/sdk-node @opentelemetry/auto-instrumentations-node @opentelemetry/exporter-otlp-grpc 2>/dev/null || true && \
      node -e 'console.log(\"Developer Portal Ready - http://localhost:3001\")'"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '0.5'
        reservations:
          memory: 256m
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PostgreSQL (if not already present) ─────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    networks:
      - enterprise
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=code-server
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (if not already present) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    networks:
      - enterprise
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  code-server-enterprise-data:
    driver: local
  ollama-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local
  jaeger-data:
    driver: local
  prometheus-data:
    driver: local
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
