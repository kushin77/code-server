# scripts/MANIFEST.toml
# ──────────────────────────────────────────────────────────────────────────────
# SCRIPT REGISTRY — Every script in scripts/ MUST have an entry here.
# Unregistered scripts are flagged as violations in CI (make index).
#
# FIELDS
#   file       = filename (basename only)
#   category   = deployment | operations | validation | security | archive | library
#   status     = active | deprecated | historical | experimental
#   owner      = platform | security | oncall | (team name)
#   purpose    = one-line human description
#   depends    = optional list of scripts/libs this depends on
#   called_by  = optional list of callers (CI, Makefile, other scripts)
#   deprecated_by = (if status=deprecated) replacement script
#
# ENFORCEMENT
#   make index   — list unregistered scripts
#   pre-commit   — verify-metadata-headers hook checks Status: field in header
# ──────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# LIBRARIES (category=library — not independently executed)
# ─────────────────────────────────────────────────────────────────────────────

[[script]]
file     = "_common/init.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "Single bootstrap entrypoint. Source this instead of individual _common/* files."

[[script]]
file     = "_common/config.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "Single source of truth for DEPLOY_HOST, DOMAIN, container names, ports, paths."

[[script]]
file     = "_common/logging.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "Standardized log_info / log_warn / log_error / log_fatal with color and JSON mode."

[[script]]
file     = "_common/utils.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "retry(), require_command(), require_file(), cleanup handlers."

[[script]]
file     = "_common/error-handler.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "ERR trap, stack trace, assert functions, DEBUG mode."

[[script]]
file     = "_common/docker.sh"
category = "library"
status   = "active"
owner    = "platform"
purpose  = "Centralized docker/compose remote operations. docker_status(), docker_wait_healthy(), etc."

[[script]]
