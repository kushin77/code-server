# code-server enterprise stack — domain/ide with Google OAuth
# All config via .env (copy from .env.template, populate via scripts/fetch-gsm-secrets.sh)
# Portable: docker compose up on any host with a valid .env — no hardcoded IPs or paths

services:
  # ─── code-server ────────────────────────────────────────────────────────────
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
      args:
        # Pin VSIX versions — override: make deploy COPILOT_VERSION=x.y.z COPILOT_CHAT_VERSION=a.b.c
        COPILOT_VERSION: ${COPILOT_VERSION:-1.299.0}
        COPILOT_CHAT_VERSION: ${COPILOT_CHAT_VERSION:-0.27.2}
    image: code-server-patched:local
    container_name: code-server
    restart: unless-stopped
    networks:
      - enterprise
    # NOT exposed to host — traffic comes only through oauth2-proxy
    expose:
      - "8080"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-change-me-in-env}
      - SERVICE_URL=https://marketplace.visualstudio.com/_apis/public/gallery
      - ITEM_URL=https://marketplace.visualstudio.com/items
      - CACHEURL=https://vscode.blob.core.windows.net/gallery/index
      - CS_DISABLE_FILE_DOWNLOADS=false
      # --no-experimental-global-navigator was removed in Node.js 22 (bundled in code-server 4.109+).
      # The navigator shim is patched out at image build time (see Dockerfile.code-server).
      # --enable-source-maps gives human-readable stack traces for extension crashes.
      - NODE_OPTIONS=--enable-source-maps
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Ollama integration
      - OLLAMA_ENDPOINT=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=llama2:70b-chat
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"           # TLS handled by Caddy externally
      - "--auth=none"            # Auth handled by oauth2-proxy
    volumes:
      - coder-data:/home/coder
      - ${WORKSPACE_PATH:-./workspace}:/home/coder/workspace
      # Enterprise settings: seeded into user settings on first launch (see entrypoint.sh)
      - ./config/settings.json:/etc/code-server/settings.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.25'
    depends_on:
      - ollama
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Ollama ─────────────────────────────────────────────────────────────────
  # Elite local LLM server with models rivaling Claude Opus
  # Serves high-quality code analysis and repository learning
  # Pinned to v0.1.27 for immutability and reproducible builds
  ollama:
    image: ollama/ollama:0.1.27
    container_name: ollama
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "11434"
    environment:
      # Enable GPU acceleration (optional, will fall back to CPU if unavailable)
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_NUM_THREAD=${OLLAMA_NUM_THREAD:-8}
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}
    volumes:
      - ollama-data:/root/.ollama
      - ${WORKSPACE_PATH:-./workspace}:/workspace:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    # Resource limits — adjust based on available RAM
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 8G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── ollama-init ────────────────────────────────────────────────────────────
  # One-time service that pulls elite models and shares them with ollama
  # Models selected for code intelligence and learning capability
  # Pinned to v0.1.27 for immutability and reproducible builds
  ollama-init:
    image: ollama/ollama:0.1.27
    container_name: ollama-init
    networks:
      - enterprise
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-data:/root/.ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "🚀 Pulling elite LLM models..."
        # Main model: llama2:70b-chat (rivals Claude Opus)
        echo "⏳ Pulling llama2:70b-chat (elite reasoning model)..."
        ollama pull llama2:70b-chat || true
        
        # Code-specific models
        echo "⏳ Pulling codegemma (Google's code reasoning)..."
        ollama pull codegemma || true
        
        echo "⏳ Pulling neural-chat (code-optimized)..."
        ollama pull neural-chat || true
        
        # Fast model for real-time feedback
        echo "⏳ Pulling mistral (fast reasoning)..."
        ollama pull mistral || true
        
        echo "✅ All models pulled successfully"
        sleep infinity
    depends_on:
      - ollama
    restart: on-failure

  # ─── oauth2-proxy ───────────────────────────────────────────────────────────
  # Eiq-org pattern: OIDC sidecar for zero-trust authentication
  # Validates Google OAuth tokens before passing to code-server
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks:
      - enterprise
    expose:
      - "4180"
    environment:
      # Credentials from GSM (injected by scripts/fetch-gsm-secrets.sh)
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      # Provider
      OAUTH2_PROXY_PROVIDER: "google"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://accounts.google.com"
      # Redirect configuration — domain driven by DOMAIN env var
      OAUTH2_PROXY_REDIRECT_URL: "https://${DOMAIN}/oauth2/callback"
      # Upstream: code-server serves /ide (cert:false inside Docker)
      OAUTH2_PROXY_UPSTREAMS: "http://code-server:8080/"
      # Access control — only allow specific email
      OAUTH2_PROXY_EMAIL_DOMAINS: ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: "/etc/oauth2-proxy/allowed-emails.txt"
      # Cookie settings
      OAUTH2_PROXY_COOKIE_NAME: "_oauth2_proxy_ide"
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      # Proxy behaviour
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PROXY_PREFIX: "/oauth2"
      OAUTH2_PROXY_PROXY_WEBSOCKETS: "true"     # code-server requires WebSocke
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Headers
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      # Logging
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      # Skip auth for health checks and GitHub OAuth callback
      # /callback is the GitHub OAuth redirect target used by the github-authentication
      # VS Code extension — it must reach code-server directly or the OAuth state/code
      # is consumed before the IDE can exchange it (causing "Sign in" to loop forever).
      OAUTH2_PROXY_SKIP_AUTH_ROUTES: "^/health$$|^/oauth2/|^/callback$$"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4180/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    depends_on:
      - code-server
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # oauth2-proxy writes nothing to disk — run with read-only root fs
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
        reservations:
          memory: 32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Caddy ──────────────────────────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: caddy-godaddy:local
    container_name: caddy
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy reads DOMAIN via {$DOMAIN} in Caddyfile
      DOMAIN: "${DOMAIN}"
      # GoDaddy DNS-01 challenge credentials (KEY:SECRET format, from GSM via .env)
      GODADDY_API_TOKEN: "${GODADDY_KEY}:${GODADDY_SECRET}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - oauth2-proxy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.50'
        reservations:
          memory: 64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  # ──────────────────────────────────────────────────────────────────────────
  # AGENT FARM SERVICES
  # ──────────────────────────────────────────────────────────────────────────

  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak-db
    restart: unless-stopped
    networks:
      - enterprise
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    networks:
      - enterprise
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "${KEYCLOAK_DB_PASSWORD}"
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN_USER:-admin}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: chroma
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "8005:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "False"
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  embeddings:
    build:
      context: ./services/embeddings
      dockerfile: Dockerfile
    image: agent-farm-embeddings:local
    container_name: embeddings
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "8000:8000"
    environment:
      EMBED_MODEL_NAME: "${EMBED_MODEL_NAME:-nomic-ai/nomic-embed-text-v1.5}"
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    volumes:
      - embeddings-cache:/root/.cache/huggingface
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  agent-api:
    build:
      context: ./services/agent-api
      dockerfile: Dockerfile
    image: agent-farm-api:local
    container_name: agent-api
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "8001:8001"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_DEFAULT_MODEL: "${OLLAMA_DEFAULT_MODEL:-qwen2.5-coder:14b-instruct-q6_K}"
      OLLAMA_FAST_MODEL: "${OLLAMA_FAST_MODEL:-qwen2.5-coder:7b-instruct-q8_0}"
      KEYCLOAK_BASE_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: "enterprise"
      INTROSPECTION_CLIENT_ID: "agent-api"
      INTROSPECTION_CLIENT_SECRET: "${AGENT_API_CLIENT_SECRET}"
      JWT_AUDIENCE: "agent-api"
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      AGENT_MAX_ITERATIONS: "${AGENT_MAX_ITERATIONS:-10}"
      HITL_STRICT: "${HITL_STRICT:-false}"
      DEV_MODE: "${DEV_MODE:-false}"
      CORS_ORIGINS: "https://${DOMAIN:-localhost}"
      COMPUTER_USE_MCP_URL: "http://computer-use-mcp:8008"
    depends_on:
      keycloak:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  computer-use-mcp:
    build:
      context: ./services/computer-use-mcp
      dockerfile: Dockerfile
    image: agent-farm-computer-use-mcp:local
    container_name: computer-use-mcp
    restart: unless-stopped
    networks:
      - enterprise
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  coder-data:
    driver: local
  ollama-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  keycloak-db-data:
    driver: local
  chroma-data:
    driver: local
  embeddings-cache:
    driver: local

networks:
  enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.8.0/24
