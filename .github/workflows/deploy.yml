name: Deploy Code-Server Enterprise IaC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual trigger

# Ref: #390 — least-privilege permissions (deny write by default)
# TODO: pin all action refs to commit SHAs via Renovate (#358)
permissions:
  contents: read

env:
  TF_VERSION: 1.6.0
  TERRAFORM_DIR: .

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

  plan:
    name: Plan Deployment
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: write  # allows posting plan summary as PR comment

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan -lock=false

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    name: Apply Deployment
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Ref: #390 — requires environment protection (branch + reviewer approval)
    # Create a "production" environment in GitHub → Settings → Environments
    environment: production
    permissions:
      contents: read
      id-token: write  # allows OIDC token for cloud provider auth (no long-lived secrets)

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        run: |
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access URL:** $(terraform output -raw code_server_url)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** All containers deployed and running" >> $GITHUB_STEP_SUMMARY

      - name: Slack Notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Deployed ✅",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC deployment successful\n*URL:* https://ide.kushnir.cloud\n*Deployment:* ${{ github.sha }}"
                  }
                }
              ]
            }

  destroy:
    name: Destroy (Manual Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && contains(github.event.inputs.action, 'destroy')
    # Ref: #390 — destructive operation requires explicit approval
    environment: production-destroy
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (destroy preview)
        run: terraform plan -destroy -out=destroy-plan

      - name: Terraform Destroy
        # auto-approve intentionally removed — environment protection gate above
        # provides manual approval; the plan step above previews what will be destroyed
        run: terraform apply destroy-plan

      - name: Slack Notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Destroyed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC resources destroyed"
                  }
                }
              ]
            }
