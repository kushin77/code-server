name: Agent Farm CI/CD

on:
  push:
    branches: [main, fix/copilot-auth-and-user-management]
    paths:
      - 'extensions/agent-farm/**'
      - '.github/workflows/agent-farm-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/agent-farm/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      working-directory: extensions/agent-farm
      run: npm install
    
    - name: Lint TypeScript
      working-directory: extensions/agent-farm
      run: npm run lint
    
    - name: Compile TypeScript
      working-directory: extensions/agent-farm
      run: npm run compile
    
    - name: Run tests
      working-directory: extensions/agent-farm
      run: npm test
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./extensions/agent-farm/coverage/lcov.info
        flags: agent-farm
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
    
    - name: Install dependencies
      working-directory: extensions/agent-farm
      run: npm install
    
    - name: Compile TypeScript
      working-directory: extensions/agent-farm
      run: npm run compile
    
    - name: Build VSIX
      working-directory: extensions/agent-farm
      run: |
        npm install -g vsce
        vsce package
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: agent-farm-vsix
        path: extensions/agent-farm/*.vsix

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: agent-farm-vsix
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: '*.vsix'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
