name: Terraform Validate & Plan

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'terraform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: 1.5.7
  KUBECONFIG: /tmp/kubeconfig
  LOG_DIR: /tmp/terraform-logs

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: |
          cd terraform
          terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
        continue-on-error: false

      - name: TFLint Checks
        run: |
          cd terraform
          docker run --rm \
            -v $(pwd):/tf \
            -w /tf \
            ghcr.io/terraform-linters/tflint:latest
        continue-on-error: true

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create Mock Kubeconfig
        run: |
          mkdir -p $(dirname $KUBECONFIG)
          cat > $KUBECONFIG << 'EOF'
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: https://localhost:6443
            name: test-cluster
          contexts:
          - context:
              cluster: test-cluster
              user: test-user
            name: test-context
          current-context: test-context
          users:
          - name: test-user
            user:
              token: test-token
          EOF

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Plan
        run: |
          cd terraform
          mkdir -p $LOG_DIR
          terraform plan \
            -var-file=terraform.tfvars.example \
            -out=$LOG_DIR/tfplan \
            > $LOG_DIR/tfplan.log 2>&1
        continue-on-error: true

      - name: Upload Plan Artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: ${{ env.LOG_DIR }}/
          retention-days: 5

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planLog = fs.readFileSync('/tmp/terraform-logs/tfplan.log', 'utf-8');
            
            const output = `## Terraform Plan
            \`\`\`
            ${planLog.substring(0, 3000)}
            \`\`\``;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  security-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'terraform'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Checkov
        run: |
          docker run --rm \
            -v $(pwd):/src \
            bridgecrewio/checkov:latest \
            -d /src/terraform \
            --framework terraform \
            --quiet \
            --compact
        continue-on-error: true

permissions:
  contents: read
  pull-requests: write
  security-events: write
