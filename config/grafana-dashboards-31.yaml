---
# GPU Monitoring Dashboard
# Displays real-time GPU metrics: utilization, memory, temperature, power
# Data source: Prometheus with NVIDIA DCGM metrics

dashboard:
  title: "GPU Monitoring - primary.prod.internal"
  description: "Real-time GPU performance, health, and utilization metrics"
  tags: ["gpu", "nvidia", "dcgm", "primary.prod.internal"]
  timezone: "browser"
  refresh: "30s"
  time:
    from: "now-1h"
    to: "now"

  panels:
    # GPU Utilization (Main Display)
    - title: "GPU Utilization %"
      type: "stat"
      gridPos: {x: 0, y: 0, w: 12, h: 8}
      targets:
        - expr: 'dcgm_gpu_utilization'
          legendFormat: "GPU {{gpu_index}}"
      options:
        colorMode: "background"
        graphMode: "area"
        orientation: "auto"
        textMode: "auto"
        thresholds:
          mode: "percentage"
          steps:
            - {color: "green", value: null}
            - {color: "yellow", value: 70}
            - {color: "red", value: 90}

    # GPU Memory Usage
    - title: "GPU Memory Usage"
      type: "gauge"
      gridPos: {x: 12, y: 0, w: 12, h: 8}
      targets:
        - expr: '(dcgm_fb_used / (dcgm_fb_used + dcgm_fb_free)) * 100'
          legendFormat: "GPU {{gpu_index}} Memory %"
      options:
        orientation: "auto"
        showThresholdLabels: false
        showThresholdMarkers: true
        thresholds:
          mode: "absolute"
          steps:
            - {color: "green", value: null}
            - {color: "yellow", value: 70}
            - {color: "red", value: 90}

    # GPU Temperature
    - title: "GPU Temperature (°C)"
      type: "timeseries"
      gridPos: {x: 0, y: 8, w: 12, h: 8}
      targets:
        - expr: 'dcgm_gpu_temp'
          legendFormat: "GPU {{gpu_index}}"
      options:
        legend:
          displayMode: "table"
          placement: "right"
          showLegend: true
        thresholds:
          mode: "percentage"
          steps:
            - {color: "green", value: 50}
            - {color: "yellow", value: 70}
            - {color: "red", value: 85}

    # GPU Power Consumption
    - title: "GPU Power Consumption (W)"
      type: "timeseries"
      gridPos: {x: 12, y: 8, w: 12, h: 8}
      targets:
        - expr: 'dcgm_power_usage'
          legendFormat: "GPU {{gpu_index}}"
      options:
        legend:
          displayMode: "table"
          placement: "right"

    # GPU Memory Trend
    - title: "GPU Memory Free (GB)"
      type: "timeseries"
      gridPos: {x: 0, y: 16, w: 12, h: 8}
      targets:
        - expr: 'dcgm_fb_free / 1024 / 1024 / 1024'
          legendFormat: "GPU {{gpu_index}}"
      options:
        legend:
          displayMode: "table"

    # GPU Clock Speeds
    - title: "GPU Clock Speeds"
      type: "timeseries"
      gridPos: {x: 12, y: 16, w: 12, h: 8}
      targets:
        - expr: 'dcgm_sm_clock'
          legendFormat: "SM Clock GPU {{gpu_index}}"
        - expr: 'dcgm_mem_clock'
          legendFormat: "Memory Clock GPU {{gpu_index}}"

    # GPU ECC Error Count
    - title: "GPU ECC Errors (Last Hour)"
      type: "stat"
      gridPos: {x: 0, y: 24, w: 12, h: 6}
      targets:
        - expr: 'increase(dcgm_ecc_errors_corrected[1h])'
          legendFormat: "GPU {{gpu_index}}"

    # GPU Thermal Throttling
    - title: "Thermal Throttle Events"
      type: "stat"
      gridPos: {x: 12, y: 24, w: 12, h: 6}
      targets:
        - expr: 'increase(dcgm_throttle_thermal[1h])'
          legendFormat: "GPU {{gpu_index}}"

---
# System Monitoring Dashboard
# Displays CPU, memory, disk, network metrics

dashboard:
  title: "System Monitoring - primary.prod.internal"
  description: "Host system resource utilization and health"
  tags: ["system", "node", "primary.prod.internal"]
  timezone: "browser"
  refresh: "15s"

  panels:
    # CPU Utilization
    - title: "CPU Utilization"
      type: "stat"
      gridPos: {x: 0, y: 0, w: 8, h: 8}
      targets:
        - expr: '100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)'
          legendFormat: "CPU {{instance}}"
      options:
        colorMode: "background"
        thresholds:
          mode: "percentage"
          steps:
            - {color: "green", value: 60}
            - {color: "yellow", value: 75}
            - {color: "red", value: 90}

    # Memory Utilization
    - title: "Memory Utilization"
      type: "gauge"
      gridPos: {x: 8, y: 0, w: 8, h: 8}
      targets:
        - expr: '(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100'
          legendFormat: "Memory %"
      options:
        thresholds:
          mode: "percentage"
          steps:
            - {color: "green", value: 70}
            - {color: "yellow", value: 80}
            - {color: "red", value: 90}

    # Disk Usage
    - title: "Disk Usage"
      type: "piechart"
      gridPos: {x: 16, y: 0, w: 8, h: 8}
      targets:
        - expr: 'node_filesystem_avail_bytes{mountpoint="/"}'
        - expr: 'node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}'

    # System Load
    - title: "System Load Average"
      type: "timeseries"
      gridPos: {x: 0, y: 8, w: 12, h: 8}
      targets:
        - expr: 'node_load1'
          legendFormat: "1m load"
        - expr: 'node_load5'
          legendFormat: "5m load"
        - expr: 'node_load15'
          legendFormat: "15m load"

    # Network Traffic
    - title: "Network Traffic (In/Out)"
      type: "timeseries"
      gridPos: {x: 12, y: 8, w: 12, h: 8}
      targets:
        - expr: 'rate(node_network_receive_bytes_total[5m])'
          legendFormat: "RX {{device}}"
        - expr: 'rate(node_network_transmit_bytes_total[5m])'
          legendFormat: "TX {{device}}"

---
# NAS/Storage Monitoring Dashboard
# Displays NAS health, capacity, latency, IOPS

dashboard:
  title: "NAS Storage Monitoring - primary.prod.internal"
  description: "NAS mount points, capacity, latency, and backup status"
  tags: ["nas", "storage", "primary.prod.internal"]
  timezone: "browser"
  refresh: "60s"

  panels:
    # NAS Mount Status
    - title: "NAS Mount Points Status"
      type: "stat"
      gridPos: {x: 0, y: 0, w: 12, h: 6}
      targets:
        - expr: 'nas_mount_up'
          legendFormat: "{{mount_path}}"

    # NAS Capacity Utilization
    - title: "NAS Capacity by Mount Point"
      type: "piechart"
      gridPos: {x: 12, y: 0, w: 12, h: 6}
      targets:
        - expr: 'nas_fs_used bytes'
          legendFormat: "Used {{mount_path}}"
        - expr: 'nas_fs_avail bytes'
          legendFormat: "Available {{mount_path}}"

    # NAS Latency (p99)
    - title: "NAS I/O Latency (p99)"
      type: "timeseries"
      gridPos: {x: 0, y: 6, w: 12, h: 8}
      targets:
        - expr: 'histogram_quantile(0.99, nas_io_latency_seconds)'
          legendFormat: "p99 {{mount_path}}"
      options:
        thresholds:
          mode: "absolute"
          steps:
            - {color: "green", value: 0.01}
            - {color: "yellow", value: 0.05}
            - {color: "red", value: 0.1}

    # NAS IOPS
    - title: "NAS IOPS (Read/Write)"
      type: "timeseries"
      gridPos: {x: 12, y: 6, w: 12, h: 8}
      targets:
        - expr: 'rate(nas_io_operations_total{operation="read"}[5m])'
          legendFormat: "Read {{mount_path}}"
        - expr: 'rate(nas_io_operations_total{operation="write"}[5m])'
          legendFormat: "Write {{mount_path}}"

    # NAS Backup Status
    - title: "NAS Backup Success Rate"
      type: "stat"
      gridPos: {x: 0, y: 14, w: 12, h: 6}
      targets:
        - expr: '(sum(increase(nas_backup_succeeded_total[24h])) / (sum(increase(nas_backup_succeeded_total[24h])) + sum(increase(nas_backup_failed_total[24h])))) * 100'
          legendFormat: "Success %"

    # NAS Free Space Trend
    - title: "NAS Free Space Trend (30 days)"
      type: "timeseries"
      gridPos: {x: 12, y: 14, w: 12, h: 6}
      targets:
        - expr: 'nas_fs_avail bytes'
          legendFormat: "Free {{mount_path}}"
