name: Automatic Branch Cleanup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Delete merged feature branches
        run: |
          # Delete local branches that have been merged into main
          git checkout main
          git pull origin main

          # Delete merged feature branches (pattern: feat/*, bugfix/*, etc.)
          git branch --merged main | grep -E '^\s+(feat|bugfix|hotfix|chore|docs|refactor)/' | sed 's/^\s*//' | xargs -r git branch -d

          echo "Deleted merged local feature branches"

      - name: Delete stale remote branches
        run: |
          # Delete remote branches that haven't been updated in 30 days
          cutoff_date=$(date -d '30 days ago' +%s)

          for branch in $(git branch -r | grep -v 'origin/HEAD\|origin/main\|origin/develop' | sed 's/origin\///'); do
            last_commit_date=$(git log -1 --format=%ct origin/$branch 2>/dev/null || echo 0)

            if [ $last_commit_date -lt $cutoff_date ]; then
              echo "Deleting stale branch: $branch (last commit: $(git log -1 --format=%ai origin/$branch))"
              git push origin --delete $branch 2>/dev/null || true
            fi
          done

          echo "Stale remote branches cleaned up"

      - name: Prune remote-tracking references
        run: |
          git fetch origin --prune --quiet
          echo "Remote-tracking references pruned"

      - name: Verify final state
        run: |
          echo "=== Final Branch State ==="
          git branch -a
          echo "=== Cleanup Complete ==="

      - name: Report status
        if: always()
        run: |
          echo "Branch cleanup workflow completed successfully"
