# Redis Instrumentation Prometheus Metrics Configuration
# Generated by: Phase 3 observability spine - TASK 8 (Redis Instrumentation)
# Date: April 16, 2026
# Version: 1.0.0

# ─────────────────────────────────────────────────────────────────────────────
# Prometheus Scrape Configuration for Redis Metrics
# ─────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'redis-instrumentation'
    static_configs:
      - targets: ['localhost:9187']  # redis_exporter port
    scrape_interval: 30s
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme
        replacement: 'http'

  - job_name: 'redis-custom-metrics'
    static_configs:
      - targets: ['localhost:9189']  # Custom metrics exporter port
    scrape_interval: 30s

# ─────────────────────────────────────────────────────────────────────────────
# Alert Rules for Redis Instrumentation
# ─────────────────────────────────────────────────────────────────────────────

rules:
  - name: redis_instrumentation
    interval: 30s
    rules:
      # Cache Performance Alerts
      - alert: RedisLowCacheHitRate
        expr: |
          (
            rate(redis_cache_hits_total[5m]) / 
            (rate(redis_cache_hits_total[5m]) + rate(redis_cache_misses_total[5m]))
          ) < 0.7
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis cache hit rate below 70%"
          description: |
            Redis cache hit rate is {{ $value | humanizePercentage }}
            Consider optimizing cache strategy or increasing cache size.
      
      - alert: RedisHighCacheMissRate
        expr: |
          (
            rate(redis_cache_misses_total[5m]) / 
            (rate(redis_cache_hits_total[5m]) + rate(redis_cache_misses_total[5m]))
          ) > 0.3
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis cache miss rate above 30%"
          description: |
            Redis cache miss rate is {{ $value | humanizePercentage }}
            High miss rate may indicate cache invalidation issues or TTL problems.
      
      # Operation Performance Alerts
      - alert: RedisOperationLatencyHigh
        expr: |
          histogram_quantile(0.99, rate(redis_operation_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis operation p99 latency > 100ms"
          description: |
            Redis p99 latency is {{ $value | humanizeDuration }}
            Investigate network issues or Redis resource constraints.
      
      - alert: RedisOperationErrors
        expr: |
          rate(redis_operations_total{status="error"}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis operation error rate > 1%"
          description: |
            Error rate is {{ $value | humanizePercentage }}
            Check Redis logs and client error handling.
      
      # Connection Pool Alerts
      - alert: RedisHighConnectionCount
        expr: |
          redis_connected_clients > 80
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis connected clients > 80"
          description: |
            Current connections: {{ $value }}
            Consider implementing connection pooling in clients.
      
      # Memory Alerts
      - alert: RedisHighMemoryUsage
        expr: |
          (redis_memory_used_bytes / redis_memory_max_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis memory usage > 85%"
          description: |
            Memory usage is {{ $value | humanizePercentage }}
            Increase maxmemory or implement eviction strategy.
      
      - alert: RedisEvictionsDetected
        expr: |
          increase(redis_evicted_keys_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis is evicting keys due to memory pressure"
          description: |
            Keys evicted in last 5m: {{ $value }}
            Increase maxmemory or optimize cache strategy.
      
      # Replication Alerts
      - alert: RedisReplicationDown
        expr: |
          redis_connected_slaves < 1
        for: 5m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis replication down"
          description: |
            No slave connections detected. Replication may be broken.
      
      - alert: RedisSlaveReplicationLag
        expr: |
          redis_slave_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Redis slave replication lag > 30s"
          description: |
            Replication lag is {{ $value | humanizeDuration }}
            Master may be overloaded or network issues present.

# ─────────────────────────────────────────────────────────────────────────────
# Key Metrics and SLO Targets
# ─────────────────────────────────────────────────────────────────────────────

# Cache Performance Metrics
metrics:
  cache_performance:
    - metric: redis_cache_hits_total
      description: Total number of cache hits
      slo_target: N/A (tracking metric)
      
    - metric: redis_cache_misses_total
      description: Total number of cache misses
      slo_target: N/A (tracking metric)
      
    - metric: redis_cache_hit_rate
      description: Cache hit rate (0.0-1.0)
      slo_target: "> 0.70 (70%)"
      
    - metric: redis_operation_duration_seconds
      description: Operation latency in seconds
      slo_target:
        p50: "< 5ms"
        p95: "< 20ms"
        p99: "< 100ms"
  
  operation_metrics:
    - metric: redis_operations_total
      description: Total operations by type and status
      labels: [operation, status]
      slo_target: "99%+ success rate"
      
    - metric: redis_operation_duration_seconds_bucket
      description: Operation duration histograms
      labels: [operation, le]
      slo_target: "Track p50/p95/p99 latencies"
  
  memory_metrics:
    - metric: redis_memory_used_bytes
      description: Memory currently used by Redis
      slo_target: "< 85% of maxmemory"
      
    - metric: redis_memory_max_bytes
      description: Maximum memory allowed
      slo_target: "Stable (not changing)"
      
    - metric: redis_evicted_keys_total
      description: Keys evicted due to memory pressure
      slo_target: "0 evictions (optimal)"
  
  connection_metrics:
    - metric: redis_connected_clients
      description: Number of connected clients
      slo_target: "< 80"
      
    - metric: redis_commands_processed_total
      description: Total commands processed
      slo_target: "Track throughput"
  
  replication_metrics:
    - metric: redis_connected_slaves
      description: Number of slave replicas connected
      slo_target: "> 0 (at least one)"
      
    - metric: redis_slave_replication_lag_seconds
      description: Replication lag in seconds
      slo_target: "< 30 seconds"

# ─────────────────────────────────────────────────────────────────────────────
# Grafana Dashboard Specification
# ─────────────────────────────────────────────────────────────────────────────

dashboard:
  name: "Redis Instrumentation & Cache Performance"
  description: "Real-time monitoring of Redis cache operations with distributed tracing"
  tags: ["redis", "cache", "observability", "performance"]
  timezone: "browser"
  refresh: "30s"
  time:
    from: "now-1h"
    to: "now"
  
  panels:
    - title: "Cache Hit Rate (SLO Target: >70%)"
      type: "gauge"
      targets:
        - expr: |
            (
              rate(redis_cache_hits_total[5m]) / 
              (rate(redis_cache_hits_total[5m]) + rate(redis_cache_misses_total[5m]))
            )
        - legendFormat: "Hit Rate"
      thresholds: [0.5, 0.7, 0.9]
      threshold_colors: ["red", "yellow", "green"]
      unit: "percentunit"
      gridPos: {h: 8, w: 12, x: 0, y: 0}
    
    - title: "Operation Latency Distribution"
      type: "histogram"
      targets:
        - expr: |
            histogram_quantile(0.99, rate(redis_operation_duration_seconds_bucket[5m]))
        - legendFormat: "p99"
      gridPos: {h: 8, w: 12, x: 12, y: 0}
    
    - title: "Cache Operations Per Second"
      type: "graph"
      targets:
        - expr: |
            rate(redis_operations_total[1m])
        - legendFormat: "{{ operation }} {{ status }}"
      gridPos: {h: 8, w: 12, x: 0, y: 8}
    
    - title: "Memory Usage"
      type: "graph"
      targets:
        - expr: |
            redis_memory_used_bytes
        - legendFormat: "Used"
        - expr: |
            redis_memory_max_bytes
        - legendFormat: "Max"
      unit: "bytes"
      gridPos: {h: 8, w: 12, x: 12, y: 8}
    
    - title: "Cache Evictions"
      type: "graph"
      targets:
        - expr: |
            rate(redis_evicted_keys_total[5m])
        - legendFormat: "Keys/sec"
      unit: "short"
      thresholds: [0]  # Alert at any evictions
      gridPos: {h: 8, w: 12, x: 0, y: 16}
    
    - title: "Connected Clients"
      type: "stat"
      targets:
        - expr: |
            redis_connected_clients
        - legendFormat: "Clients"
      gridPos: {h: 8, w: 12, x: 12, y: 16}

# ─────────────────────────────────────────────────────────────────────────────
# Recording Rules for Performance
# ─────────────────────────────────────────────────────────────────────────────

recording_rules:
  - name: redis:cache:hit_rate:5m
    expr: |
      (
        rate(redis_cache_hits_total[5m]) / 
        (rate(redis_cache_hits_total[5m]) + rate(redis_cache_misses_total[5m]))
      )
    labels:
      component: cache
  
  - name: redis:operation:latency:p99:5m
    expr: |
      histogram_quantile(0.99, rate(redis_operation_duration_seconds_bucket[5m]))
    labels:
      component: cache
  
  - name: redis:operation:latency:p95:5m
    expr: |
      histogram_quantile(0.95, rate(redis_operation_duration_seconds_bucket[5m]))
    labels:
      component: cache
  
  - name: redis:operation:latency:p50:5m
    expr: |
      histogram_quantile(0.50, rate(redis_operation_duration_seconds_bucket[5m]))
    labels:
      component: cache
  
  - name: redis:memory:usage:ratio:5m
    expr: |
      redis_memory_used_bytes / redis_memory_max_bytes
    labels:
      component: cache
  
  - name: redis:operations:error_rate:5m
    expr: |
      (
        rate(redis_operations_total{status="error"}[5m]) / 
        rate(redis_operations_total[5m])
      )
    labels:
      component: cache
