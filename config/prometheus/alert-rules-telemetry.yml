# alert-rules-telemetry.yml
#
# Prometheus alert rules for telemetry pipeline monitoring
# Alerts when OTEL Collector or Jaeger becomes unhealthy
#
# Generated by: Phase 3 observability spine implementation

groups:
  - name: telemetry_pipeline
    interval: 10s
    rules:
      # OTEL Collector health checks
      - alert: OTELCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
          component: telemetry
        annotations:
          summary: "OpenTelemetry Collector is down"
          description: "OpenTelemetry Collector ({{ instance }}) is not responding to scrapes for more than 2 minutes."
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/OTEL-COLLECTOR-FAILURE.md"

      - alert: OTELCollectorHighErrorRate
        expr: |
          rate(otel_exporter_sent_failed_spans_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "High error rate in OTEL Collector"
          description: "OTEL Collector export error rate is {{ $value | humanizePercentage }} (threshold: 1%)"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/OTEL-EXPORT-FAILURE.md"

      - alert: OTELCollectorMemoryHigh
        expr: |
          container_memory_usage_bytes{name="otel-collector"} / (1024 * 1024 * 512) > 0.8
        for: 5m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "OTEL Collector memory usage high"
          description: "OTEL Collector memory usage is {{ $value | humanizePercentage }} of limit (512MB)"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/OTEL-MEMORY-HIGH.md"

      # Jaeger health checks
      - alert: JaegerDown
        expr: up{job="jaeger"} == 0
        for: 2m
        labels:
          severity: critical
          component: telemetry
        annotations:
          summary: "Jaeger backend is down"
          description: "Jaeger backend ({{ instance }}) is not responding for more than 2 minutes."
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/JAEGER-FAILURE.md"

      - alert: JaegerHighLatency
        expr: |
          histogram_quantile(0.99, rate(jaeger_query_latency_bucket[5m])) > 1000
        for: 5m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "Jaeger query latency is high"
          description: "Jaeger P99 query latency is {{ $value | humanizeDuration }} (threshold: 1s)"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/JAEGER-LATENCY.md"

      - alert: JaegerStorageFull
        expr: |
          (jaeger_badger_disk_usage_bytes / (1024 * 1024 * 1024)) > 50
        for: 10m
        labels:
          severity: critical
          component: telemetry
        annotations:
          summary: "Jaeger storage is running low"
          description: "Jaeger storage usage is {{ $value | humanize }}GB (check retention policy)"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/JAEGER-STORAGE-FULL.md"

      # Trace quality checks
      - alert: LowTraceCompleteness
        expr: |
          rate(otel_received_spans_total[5m]) > 0 AND
          rate(otel_exported_spans_total[5m]) / rate(otel_received_spans_total[5m]) < 0.99
        for: 10m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "Trace export completeness below target"
          description: "Only {{ $value | humanizePercentage }} of spans are being exported (target: 99%)"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/TRACE-COMPLETENESS-LOW.md"

      - alert: TraceSamplingDisabled
        expr: |
          otel_traces_sampler_drop_rate > 0.99
        for: 5m
        labels:
          severity: warning
          component: telemetry
        annotations:
          summary: "Trace sampling may be too aggressive"
          description: "{{ $value | humanizePercentage }} of spans are being dropped by sampler"
          runbook: "https://github.com/kushnir/code-server/blob/main/docs/runbooks/TRACE-SAMPLING-HIGH.md"
