# Keepalived Configuration for Virtual IP (VIP) Management
# VIP: 192.168.168.100 (active on primary, failover to replica on outage)
# Priority: 101 (primary), 99 (replica)

global_defs {
  notification_email {
    admin@kushnir.cloud
  }
  notification_email_from keepalived@kushnir.cloud
  smtp_server 192.168.168.31
  smtp_connect_timeout 30
  router_id CODESERVER_HA
  script_user root
  enable_script_security
}

# ════════════════════════════════════════════════════════════════════════════
# VRRP Instance: HAProxy Load Balancer VIP
# ════════════════════════════════════════════════════════════════════════════

vrrp_script check_haproxy {
  script "/usr/bin/pgrep -x haproxy"
  interval 5
  weight 2
  fall 2
  rise 1
}

vrrp_instance POSTGRESQL_HA {
  state BACKUP                           # Always BACKUP (automatic election)
  interface eth0
  virtual_router_id 51
  priority ${KEEPALIVED_PRIORITY:-100}   # 101 on primary, 99 on replica
  advert_int 1
  authentication {
    auth_type PASS
    auth_pass ${KEEPALIVED_AUTH_PASS:-codeserver}
  }

  virtual_ipaddress {
    192.168.168.100/24 dev eth0 label eth0:vip
  }

  virtual_routes {
    # Route traffic destined for VIP through eth0
    192.168.168.100/32 dev eth0 scope link
  }

  # Health checks
  track_script {
    check_haproxy
  }

  # Notify on state changes
  notify_master "/bin/logger 'Keepalived: MASTER state on $(hostname)'"
  notify_backup "/bin/logger 'Keepalived: BACKUP state on $(hostname)'"
  notify_fault "/bin/logger 'Keepalived: FAULT state on $(hostname)'"
}

# ════════════════════════════════════════════════════════════════════════════
# VRRP Instance: Redis Sentinel VIP (optional second VIP for Redis)
# ════════════════════════════════════════════════════════════════════════════

vrrp_script check_sentinel {
  script "/usr/bin/pgrep -x redis-sentinel"
  interval 5
  weight 2
  fall 2
  rise 1
}

vrrp_instance REDIS_HA {
  state BACKUP
  interface eth0
  virtual_router_id 52
  priority ${KEEPALIVED_PRIORITY:-100}
  advert_int 1
  authentication {
    auth_type PASS
    auth_pass ${KEEPALIVED_AUTH_PASS:-codeserver}
  }

  virtual_ipaddress {
    192.168.168.101/24 dev eth0 label eth0:vip-redis
  }

  track_script {
    check_sentinel
  }

  notify_master "/bin/logger 'Keepalived Redis: MASTER state on $(hostname)'"
  notify_backup "/bin/logger 'Keepalived Redis: BACKUP state on $(hostname)'"
}
