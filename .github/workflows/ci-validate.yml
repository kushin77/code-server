name: CI Validate

on:
  pull_request:
  push:
    branches: [ main ]

# Ref: #390 — least-privilege permissions
permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit hooks (shellcheck, yamllint, governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install pre-commit + shellcheck
        run: |
          python -m pip install --upgrade pip pre-commit
          sudo apt-get install -y shellcheck

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: mandatory-redeploy,terraform_fmt,terraform_validate

  governance:
    name: Governance audit (library adoption + MANIFEST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install make + bash
        run: sudo apt-get install -y make bash

      - name: Library adoption audit (make lib-check)
        run: make lib-check

      - name: MANIFEST registry validation (make index)
        run: |
          make index
          # Fail if any active script is unregistered
          violations=$(make index 2>&1 | grep -c '✗' || true)
          if [[ "$violations" -gt 0 ]]; then
            echo "::error::$violations script(s) not registered in scripts/MANIFEST.toml"
            echo "Run: make manifest-init to regenerate, then commit"
            exit 1
          fi

      - name: Zero active log_info() governance violations
        run: |
          count=$(grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
            | grep -vE "_common/|logging\.sh|common-functions\.sh" | wc -l || echo 0)
          echo "Active log_info() violations: $count"
          if [[ "$count" -gt 0 ]]; then
            grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
              | grep -vE "_common/|logging\.sh|common-functions\.sh" | sed 's/^/  /'
            echo "::error::$count script(s) define inline log_info() — migrate to _common/init.sh"
            exit 1
          fi
          echo "✅ Zero governance violations"

  # Ref: #400 — explicit shellcheck job (also run via pre-commit above; this gives
  # clear per-file annotations in the PR diff view)
  shellcheck:
    name: Shellcheck — bash-only standards enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all bash scripts
        run: |
          mapfile -t scripts < <(git ls-files --cached '*.sh' '*.bash' \
            | grep -v 'archived/' | grep -v 'node_modules/')
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No shell scripts found"; exit 0
          fi
          echo "Checking ${#scripts[@]} shell scripts..."
          shellcheck --severity=warning --shell=bash "${scripts[@]}"
          echo "✅ Shellcheck passed"

  # Ref: #399 — automated Windows-specific content detection
  linux-mandate:
    name: Linux mandate — no Windows-specific content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Windows-specific content
        run: bash scripts/ci/check-no-windows-content.sh
