version: '3.9'

# Phase 16: Production Database HA + Load Balancing
# Phase 16-A: PostgreSQL Primary + Replicas (Streaming Replication)
# Phase 16-B: HAProxy Load Balancer + pgBouncer Connection Pooling
# Note: Ports 80/443 already in use by Phase 14 Caddy
#       HAProxy uses 8080 (HTTP) and 8443 (HTTPS) instead

services:
  # Phase 16-A: PostgreSQL Primary (Streaming Replication Master)
  postgres-primary:
    image: postgres:15-alpine
    container_name: postgres-primary-ha
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: code_server_db
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: SecureHashPassword123!
      POSTGRES_HOST_AUTH_METHOD: md5
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    volumes:
      - postgres-primary-ha:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d code_server_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - phase-16-network

  # Phase 16-A: PostgreSQL Replica 1 (Read Standby)
  postgres-replica-1:
    image: postgres:15-alpine
    container_name: postgres-replica-1-ha
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: SecureHashPassword123!
      POSTGRES_DB: code_server_db
      PGUSER: replicator
      PGPASSWORD: ReplicatorPass123!
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "recovery_min_apply_delay=0"
    volumes:
      - postgres-replica-1-ha:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d code_server_db -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phase-16-network

  # Phase 16-A: PostgreSQL Replica 2 (Read Standby)
  postgres-replica-2:
    image: postgres:15-alpine
    container_name: postgres-replica-2-ha
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: db_admin
      POSTGRES_PASSWORD: SecureHashPassword123!
      POSTGRES_DB: code_server_db
      PGUSER: replicator
      PGPASSWORD: ReplicatorPass123!
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "hot_standby=on"
      - "-c"
      - "recovery_min_apply_delay=0"
    volumes:
      - postgres-replica-2-ha:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_admin -d code_server_db -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phase-16-network

  # Phase 16-A: pgBouncer Connection Pooling
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer-pool-ha
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: "postgres://db_admin:SecureHashPassword123!@postgres-primary-ha:5432/code_server_db"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
    volumes:
      - pgbouncer-config:/etc/pgbouncer
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-16-network

  # Phase 16-B: HAProxy Load Balancer
  # HTTP on 8080 (Caddy at 80), HTTPS on 8443 (Caddy at 443)
  haproxy:
    image: haproxy:2.8-alpine
    container_name: haproxy-lb-phase16
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8404:8404"
    volumes:
      - ./config/haproxy-phase16.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./certs/:/etc/haproxy/certs/:ro
    environment:
      BACKEND_SERVERS: "postgres-primary-ha:5432 postgres-replica-1-ha:5433 postgres-replica-2-ha:5434"
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8404/stats"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - phase-16-network

volumes:
  postgres-primary-ha:
    driver: local
  postgres-replica-1-ha:
    driver: local
  postgres-replica-2-ha:
    driver: local
  pgbouncer-config:
    driver: local

networks:
  phase-16-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
