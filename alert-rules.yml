---
# Master Alert Rules SSOT (Consolidated)
# Consolidates: alert-rules.yml + config/alert-rules.yml + config/alert-rules-31.yaml
# Updated: 2026-04-14 via Elite-001 consolidation Phase 1.4
# Architecture: All rules in single file, symlink from config/, no duplication

groups:
  # ========== Core SLA Alerts ==========
  - name: core_sla_alerts
    interval: 30s
    rules:
      # P1: Database Failover Detected
      - alert: DatabaseFailoverDetected
        expr: pg_replication_lag_seconds > 60
        for: 1m
        annotations:
          summary: "PostgreSQL replication lag critical"
          description: "Replication lag {{ $value }}s - failover may be triggered"
        labels:
          severity: critical
          page: "true"

      # P1: Database Primary Down
      - alert: DatabasePrimaryDown
        expr: up{job="postgres"} == 0
        for: 30s
        annotations:
          summary: "PostgreSQL primary database unreachable"
          description: "Failed to connect to database primary - failover activated"
        labels:
          severity: critical
          page: "true"

      # P2: Latency Spike
      - alert: LatencySpike
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.2
        for: 5m
        annotations:
          summary: "High latency detected (p99 > 200ms)"
          description: "Latency spike detected - investigate slow queries"
        labels:
          severity: high
          page: "false"

      # P2: Error Rate High
      - alert: ErrorRateHigh
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.001
        for: 5m
        annotations:
          summary: "Error rate above threshold"
          description: "Error rate {{ $value }} - check application logs"
        labels:
          severity: high
          page: "false"

      # P2: Redis Memory Critical
      - alert: RedisMemoryCritical
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        annotations:
          summary: "Redis memory usage critical (>90%)"
          description: "Redis approaching memory limit - eviction policy active"
        labels:
          severity: high
          page: "false"

      # P3: Certificate Expiry
      - alert: CertificateNearExpiry
        expr: ssl_certificate_not_after_seconds - time() < 604800
        for: 1h
        annotations:
          summary: "SSL certificate expires in < 7 days"
          description: "Certificate {{ $labels.certificate }} expires soon"
        labels:
          severity: medium
          page: "false"

      # P3: Disk Space Low
      - alert: DiskSpaceLow
        expr: disk_free_bytes / disk_total_bytes < 0.1
        for: 10m
        annotations:
          summary: "Disk space running low (<10%)"
          description: "Available disk space: {{ $value }}%"
        labels:
          severity: medium
          page: "false"

  # ========== Production SLO Alerts ==========
  - name: production_slos
    interval: 30s
    rules:
      # Error rate alerts (more precise than core_sla_alerts)
      - alert: HighErrorRate
        expr: (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) > 0.001
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected ({{ $value | humanizePercentage }})"
          description: "Error rate is above 0.1% on {{ $labels.instance }}"

      # Latency alerts (more granular than core_sla_alerts)
      - alert: HighP99Latency
        expr: histogram_quantile(0.99, http_request_duration_seconds_bucket) > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High p99 latency detected ({{ $value }}s)"
          description: "p99 latency is above 100ms on {{ $labels.instance }}"

      # CPU alerts
      - alert: HighCPUUsage
        expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage detected ({{ $value | humanize }}%)"
          description: "CPU usage is above 80% on {{ $labels.instance }}"

      # Memory alerts
      - alert: HighMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage detected"
          description: "Available memory is below 10% on {{ $labels.instance }}"

  # ========== GPU Alerts (Host: 192.168.168.31) ==========
  - name: gpu_alerts
    interval: 15s
    rules:
      # GPU Availability
      - alert: GPUUnavailable
        expr: 'dcgm_gpu_active == 0'
        for: 2m
        labels:
          severity: critical
          component: gpu
          sla_impact: "yes"
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} is unavailable"
          description: "GPU {{ $labels.gpu_index }} not responding for 2 minutes. Check NVIDIA driver status."

      # GPU High Temperature
      - alert: GPUHighTemperature
        expr: 'dcgm_gpu_temp > 85'
        for: 5m
        labels:
          severity: warning
          component: gpu
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} temperature is {{ $value }}°C"
          description: "GPU running above 85°C for 5 minutes. Check cooling and reduce load."

      # GPU Critical Temperature
      - alert: GPUCriticalTemperature
        expr: 'dcgm_gpu_temp > 95'
        for: 1m
        labels:
          severity: critical
          component: gpu
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} CRITICAL temperature: {{ $value }}°C"
          description: "GPU exceeded 95°C. Shutting down workloads to prevent damage."

      # GPU Memory Exhaustion
      - alert: GPUMemoryExhaustion
        expr: '(dcgm_fb_free / (dcgm_fb_free + dcgm_fb_used)) < 0.1'
        for: 5m
        labels:
          severity: warning
          component: gpu
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} memory utilization > 90%"
          description: "Less than 10% free VRAM. Reduce batch size or offload inference."

      # GPU Power Limit
      - alert: GPUPowerLimit
        expr: 'dcgm_power_usage / dcgm_power_limit > 0.95'
        for: 5m
        labels:
          severity: warning
          component: gpu
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} power at {{ $value | humanizePercentage }} of limit"
          description: "Power consumption exceeds 95% of limit. Check thermal throttling."

      # GPU ECC Errors
      - alert: GPUECCErrors
        expr: 'increase(dcgm_ecc_errors_corrected[1h]) > 10'
        for: 5m
        labels:
          severity: warning
          component: gpu
          host: "192.168.168.31"
        annotations:
          summary: "GPU {{ $labels.gpu_index }} ECC errors: {{ $value }} in last hour"
          description: "{{ $value }} ECC errors detected. Monitor for hardware degradation."

  # ========== NAS Alerts (Host: 192.168.168.56 + backup 55) ==========
  - name: nas_alerts
    interval: 30s
    rules:
      # NAS Mount Point Down
      - alert: NASMountPointDown
        expr: 'nas_mount_up == 0'
        for: 2m
        labels:
          severity: critical
          component: nas
          sla_impact: "yes"
        annotations:
          summary: "NAS mount {{ $labels.mount_path }} is unavailable"
          description: "NAS mount not responding for 2 minutes. Check network and NAS health."

      # NAS Capacity Critical
      - alert: NASCapacityCritical
        expr: '(1 - (nas_fs_avail / nas_fs_size)) > 0.9'
        for: 5m
        labels:
          severity: critical
          component: nas
        annotations:
          summary: "NAS {{ $labels.mount_path }} capacity at {{ $value | humanizePercentage }}"
          description: "90%+ full. Immediate action required to prevent data loss."

      # NAS Capacity Warning
      - alert: NASCapacityWarning
        expr: '(1 - (nas_fs_avail / nas_fs_size)) > 0.75'
        for: 10m
        labels:
          severity: warning
          component: nas
        annotations:
          summary: "NAS {{ $labels.mount_path }} capacity at {{ $value | humanizePercentage }}"
          description: "75%+ full. Plan capacity expansion or cleanup."

      # NAS Latency Degradation
      - alert: NASLatencyDegraded
        expr: 'histogram_quantile(0.99, nas_io_latency_seconds) > 0.1'
        for: 5m
        labels:
          severity: warning
          component: nas
        annotations:
          summary: "NAS {{ $labels.mount_path }} p99 latency: {{ $value | humanizeDuration }}"
          description: "Latency exceeded 100ms threshold. Check network and NAS performance."

      # NAS IOPS Saturation
      - alert: NASIOPSSaturation
        expr: 'rate(nas_io_operations_total[5m]) > 100000'
        for: 5m
        labels:
          severity: warning
          component: nas
        annotations:
          summary: "NAS {{ $labels.mount_path }} IOPS: {{ $value | humanize }} ops/sec"
          description: ">100k IOPS sustained. Check for workload concentration."

      # NAS Backup Failure
      - alert: NASBackupFailure
        expr: 'nas_backup_last_success_epoch < (time() - 3600)'
        for: 10m
        labels:
          severity: critical
          component: nas
        annotations:
          summary: "NAS backup {{ $labels.backup_name }} failed for >1 hour"
          description: "Backup missing or failed. Check backup logs immediately."

  # ========== Application Alerts ==========
  - name: application_alerts
    interval: 15s
    rules:
      # Code-Server Service Down
      - alert: CodeServerUnhealthy
        expr: 'up{job="code-server"} == 0'
        for: 2m
        labels:
          severity: critical
          component: code-server
          sla_impact: "yes"
        annotations:
          summary: "Code-Server at {{ $labels.instance }} not responding"
          description: "Health check failed for 2 minutes. Check service logs."

      # Ollama Model Load Failure
      - alert: OllamaModelLoadFailure
        expr: 'increase(ollama_model_load_errors_total[5m]) > 0'
        for: 5m
        labels:
          severity: warning
          component: ollama
        annotations:
          summary: "Ollama model load failures detected"
          description: "{{ $value }} load failures in last 5 minutes. Check model availability."

      # Ollama Inference Timeout
      - alert: OllamaInferenceTimeout
        expr: 'histogram_quantile(0.99, ollama_inference_latency_seconds) > 5'
        for: 5m
        labels:
          severity: warning
          component: ollama
        annotations:
          summary: "Ollama p99 latency: {{ $value | humanizeDuration }}"
          description: "Exceeded 5 second target. Check GPU saturation."

  # ========== System Alerts ==========
  - name: system_alerts
    interval: 15s
    rules:
      # System CPU High
      - alert: SystemCPUHigh
        expr: '100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80'
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "System CPU {{ $value | humanize }}%"
          description: "CPU utilization exceeded 80% for 5 minutes."

      # System Memory Pressure
      - alert: SystemMemoryPressure
        expr: '(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85'
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "System memory pressure detected"
          description: "Available memory below 15% for 5 minutes. Potential OOM risk."
