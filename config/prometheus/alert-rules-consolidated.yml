# Prometheus Alert Rules - Single Source of Truth (SSOT)
# Consolidated from 9 separate alert files into single canonical source
# All rules defined here - NO duplication across files
# Updated: April 15, 2026
# Owner: Infrastructure Team
# Policy: Production-first, zero overlap, IaC immutable

# ARCHITECTURE NOTES
# - All alert groups defined in single file
# - Symlinks from all historical locations point to this file
# - No manual rule edits outside this file
# - Changes via git commits only
# - Version controlled + audit trail

groups:
  # =========================================================================
  # GROUP 1: CRITICAL INFRASTRUCTURE ALERTS
  # =========================================================================
  # P0/P1 alerts - immediate paging, automated response
  # SLA: Response within 15 minutes, fix within 1 hour

  - name: critical_infrastructure
    interval: 30s
    rules:
      # Database Health - P0
      - alert: DatabasePrimaryDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
          team: database
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "PostgreSQL primary database unreachable"
          description: "Failed to connect to database primary at {{ $labels.instance }} - failover will be triggered"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/DATABASE-PRIMARY-DOWN.md"
          impact: "Users unable to authenticate or access persisted data"

      - alert: DatabaseReplicationLag
        expr: pg_replication_lag_seconds > 60
        for: 1m
        labels:
          severity: critical
          team: database
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "PostgreSQL replication lag critical (>60s)"
          description: "Replication lag from primary to replica: {{ $value }}s - failover risk"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/REPLICATION-LAG-CRITICAL.md"
          impact: "Data consistency at risk - failover unsafe"

      # Redis Health - P0
      - alert: RedisPrimaryDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
          team: cache
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "Redis primary cache unreachable"
          description: "Redis primary at {{ $labels.instance }} is down - sessions/cache will be lost"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/REDIS-PRIMARY-DOWN.md"
          impact: "Session loss, authentication cache miss, degraded performance"

      - alert: RedisMemoryEviction
        expr: redis_evicted_keys_total > 0
        for: 2m
        labels:
          severity: critical
          team: cache
          oncall: "true"
          sla: "30min-response"
        annotations:
          summary: "Redis memory eviction detected"
          description: "Redis evicting keys due to memory pressure - keys are being lost"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/REDIS-EVICTION.md"
          impact: "Session loss, authentication cache corruption"

      # Ingress/Auth Gateway - P0
      - alert: OAuth2ProxyDown
        expr: up{job="oauth2-proxy"} == 0
        for: 1m
        labels:
          severity: critical
          team: security
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "OAuth2 authentication gateway unreachable"
          description: "oauth2-proxy at {{ $labels.instance }} is not responding - users cannot authenticate"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/OAUTH2-PROXY-DOWN.md"
          impact: "Complete authentication failure - all users locked out"

      - alert: CaddyDown
        expr: up{job="caddy"} == 0
        for: 1m
        labels:
          severity: critical
          team: ingress
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "Caddy reverse proxy down"
          description: "Caddy at {{ $labels.instance }} is not responding to TLS handshakes"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/CADDY-DOWN.md"
          impact: "All external HTTPS traffic blocked - service unavailable"

  # =========================================================================
  # GROUP 2: APPLICATION PERFORMANCE ALERTS
  # =========================================================================
  # P1/P2 alerts - degraded user experience, high latency/errors
  # SLA: Response within 1 hour, fix within 4 hours

  - name: application_performance
    interval: 30s
    rules:
      # Latency - P1
      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.2
        for: 5m
        labels:
          severity: high
          team: platform
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "High latency detected (p99 > 200ms)"
          description: "HTTP request p99 latency: {{ $value | humanizeDuration }} - investigate slow queries"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/HIGH-LATENCY.md"
          impact: "Users experiencing slow page loads (>200ms response time)"

      # Error Rate - P1
      - alert: HighErrorRate
        expr: (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])) > 0.001
        for: 5m
        labels:
          severity: high
          team: platform
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "High error rate detected (>0.1%)"
          description: "Error rate: {{ $value | humanizePercentage }} - check application logs for root cause"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/HIGH-ERROR-RATE.md"
          impact: "Users experiencing failures on ~{{ $value | humanizePercentage }} of requests"

      # Throughput - P2
      - alert: LowThroughput
        expr: rate(http_requests_total[5m]) < 0.1
        for: 10m
        labels:
          severity: high
          team: platform
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Low throughput detected (<0.1 req/s)"
          description: "Throughput dropped to {{ $value | humanize }} req/s - potential traffic issue or service degradation"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/LOW-THROUGHPUT.md"
          impact: "Significantly reduced traffic - potential DDoS or service outage"

      # Queue Depth - P2
      - alert: HighQueueDepth
        expr: code_server_queue_depth > 1000
        for: 5m
        labels:
          severity: high
          team: platform
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Request queue depth high (>1000)"
          description: "Queue depth: {{ $value }} - requests backing up due to slow processing"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/QUEUE-DEPTH-HIGH.md"
          impact: "Request latency increasing, users experiencing delays"

  # =========================================================================
  # GROUP 3: RESOURCE UTILIZATION ALERTS
  # =========================================================================
  # P2/P3 alerts - resource pressure, approaching limits
  # SLA: Response within 4 hours, fix within 24 hours

  - name: resource_utilization
    interval: 60s
    rules:
      # Memory - P2
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_memory_limit_bytes) > 0.85
        for: 10m
        labels:
          severity: high
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Container memory usage high (>85%)"
          description: "Memory usage for {{ $labels.container_name }}: {{ $value | humanizePercentage }} - approaching limit"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/MEMORY-HIGH.md"
          impact: "Potential OOM killer, service crashes if limit exceeded"

      # CPU - P3
      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m]) / container_cpu_limit) > 0.9
        for: 15m
        labels:
          severity: medium
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Container CPU usage high (>90%)"
          description: "CPU usage for {{ $labels.container_name }}: {{ $value | humanizePercentage }} - sustained high usage"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/CPU-HIGH.md"
          impact: "Service performance degraded due to CPU throttling"

      # Disk Space - P2
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 10m
        labels:
          severity: high
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Disk space running low (<10%)"
          description: "Filesystem {{ $labels.mountpoint }} available space: {{ $value | humanizePercentage }} - running out of disk"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/DISK-SPACE-LOW.md"
          impact: "Service may fail to write logs/data - potential data loss"

      # inode Usage - P3
      - alert: InodesRunningLow
        expr: (node_filesystem_files_free / node_filesystem_files) < 0.05
        for: 15m
        labels:
          severity: medium
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Inodes running low (<5%)"
          description: "Filesystem {{ $labels.mountpoint }} free inodes: {{ $value | humanizePercentage }} - cannot create new files"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/INODES-LOW.md"
          impact: "File creation will fail when inodes exhausted"

  # =========================================================================
  # GROUP 4: OBSERVABILITY PIPELINE ALERTS
  # =========================================================================
  # P1/P2 alerts - monitoring system health
  # SLA: Response within 1 hour, fix within 4 hours

  - name: observability_pipeline
    interval: 30s
    rules:
      # Prometheus - P1
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: high
          team: observability
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Prometheus monitoring system down"
          description: "Prometheus at {{ $labels.instance }} is not responding - metrics collection disabled"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/PROMETHEUS-DOWN.md"
          impact: "No metrics being collected - blind to system health"

      # Grafana - P2
      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: high
          team: observability
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Grafana dashboards unavailable"
          description: "Grafana at {{ $labels.instance }} is not responding - dashboards offline"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/GRAFANA-DOWN.md"
          impact: "Cannot view dashboards/metrics - operations team blind"

      # Loki - P2
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: high
          team: observability
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Loki log aggregation system down"
          description: "Loki at {{ $labels.instance }} is not responding - log collection disabled"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/LOKI-DOWN.md"
          impact: "Logs not being collected or queryable"

      # Jaeger - P2
      - alert: JaegerDown
        expr: up{job="jaeger"} == 0
        for: 2m
        labels:
          severity: high
          team: observability
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Jaeger distributed tracing system down"
          description: "Jaeger at {{ $labels.instance }} is not responding - traces are not being collected"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/JAEGER-DOWN.md"
          impact: "Cannot trace request flows through system"

      # OTEL Collector - P2
      - alert: OTELCollectorDown
        expr: up{job="otel-collector"} == 0
        for: 2m
        labels:
          severity: high
          team: observability
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "OpenTelemetry Collector down"
          description: "OTEL Collector at {{ $labels.instance }} is not responding - telemetry data loss"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/OTEL-COLLECTOR-DOWN.md"
          impact: "Traces and metrics not being exported to backends"

      # AlertManager - P1
      - alert: AlertManagerDown
        expr: up{job="alertmanager"} == 0
        for: 1m
        labels:
          severity: high
          team: observability
          oncall: "true"
          sla: "1hour-response"
        annotations:
          summary: "AlertManager alert routing system down"
          description: "AlertManager at {{ $labels.instance }} is down - alerts not being routed to on-call"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/ALERTMANAGER-DOWN.md"
          impact: "Alerts cannot be delivered - on-call teams won't be notified"

  # =========================================================================
  # GROUP 5: SECURITY & COMPLIANCE ALERTS
  # =========================================================================
  # P0/P1 alerts - security breaches, policy violations
  # SLA: Response within 15 minutes, investigation within 1 hour

  - name: security_compliance
    interval: 30s
    rules:
      # Failed Authentication - P1
      - alert: HighAuthenticationFailureRate
        expr: rate(oauth2_proxy_authentication_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: high
          team: security
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "High authentication failure rate detected"
          description: "Auth failure rate: {{ $value | humanize }} failures/sec - possible attack or misconfiguration"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/AUTH-FAILURES-HIGH.md"
          impact: "Potential brute-force attack or credential compromise"

      # Falco Runtime Alerts - P0
      - alert: FalcoRuntimeAlert
        expr: increase(falco_alerts_total[5m]) > 10
        for: 1m
        labels:
          severity: critical
          team: security
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "Falco runtime security alert - possible container escape"
          description: "Falco detected {{ $value | humanize }} security violations in past 5 minutes"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/FALCO-ALERT.md"
          impact: "Potential container escape or privilege escalation attempt"

      # Certificate Expiry - P2
      - alert: CertificateNearExpiry
        expr: (ssl_certificate_not_after_seconds - time()) / 86400 < 7
        for: 1h
        labels:
          severity: high
          team: security
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "SSL certificate expires in < 7 days"
          description: "Certificate {{ $labels.certificate }} expires in {{ (($value) / 86400) | humanize }} days"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/CERT-EXPIRY.md"
          impact: "HTTPS will fail if certificate not renewed"

      # Vault Seal - P1
      - alert: VaultSealed
        expr: vault_core_unsealed == 0
        for: 2m
        labels:
          severity: high
          team: security
          oncall: "true"
          sla: "15min-response"
        annotations:
          summary: "HashiCorp Vault is sealed"
          description: "Vault at {{ $labels.instance }} is sealed - cannot retrieve secrets"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/VAULT-SEALED.md"
          impact: "Cannot issue certificates or rotate secrets"

  # =========================================================================
  # GROUP 6: SLA & BUSINESS METRICS
  # =========================================================================
  # P1/P2 alerts - SLO violations, business impact
  # SLA: Response within 1 hour, fix within 4 hours

  - name: sla_business_metrics
    interval: 60s
    rules:
      # Availability SLO - P1
      - alert: AvailabilitySLOViolation
        expr: |
          (1 - (rate(http_requests_total{status=~"5.."}[1h]) / rate(http_requests_total[1h]))) < 0.9999
        for: 5m
        labels:
          severity: high
          team: platform
          oncall: "true"
          sla: "1hour-response"
        annotations:
          summary: "Availability SLO violation (target: 99.99%)"
          description: "Availability: {{ $value | humanizePercentage }} - below 99.99% SLO"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/SLO-AVAILABILITY-VIOLATION.md"
          impact: "SLO credit owed to customers"

      # Latency SLO - P1
      - alert: LatencySLOViolation
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[1h])) > 0.1
        for: 5m
        labels:
          severity: high
          team: platform
          oncall: "true"
          sla: "1hour-response"
        annotations:
          summary: "Latency SLO violation (p99 target: <100ms)"
          description: "p99 Latency: {{ $value | humanizeDuration }} - above 100ms SLO"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/SLO-LATENCY-VIOLATION.md"
          impact: "SLO credit owed to customers - degraded user experience"

      # Data Freshness - P2
      - alert: DataStaleness
        expr: time() - timestamp(last_data_point) > 3600
        for: 10m
        labels:
          severity: high
          team: platform
          oncall: "false"
          sla: "1hour-response"
        annotations:
          summary: "Data pipeline stale (>1 hour)"
          description: "Last data point: {{ $value | humanizeDuration }} ago - pipeline may be stuck"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/DATA-STALENESS.md"
          impact: "Real-time dashboards/analytics showing stale data"

  # =========================================================================
  # GROUP 7: INFRASTRUCTURE OPERATIONAL ALERTS
  # =========================================================================
  # P2/P3 alerts - operational readiness, maintenance alerts
  # SLA: Response within 4 hours, fix within 24 hours

  - name: infrastructure_operational
    interval: 60s
    rules:
      # Node Health - P2
      - alert: NodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 5m
        labels:
          severity: high
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Kubernetes node not ready"
          description: "Node {{ $labels.node }} is not ready - may be unhealthy"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/NODE-NOT-READY.md"
          impact: "Workloads may not be scheduled on this node"

      # Backup Health - P2
      - alert: BackupFailure
        expr: (time() - backup_completed_timestamp_seconds) > 86400
        for: 1h
        labels:
          severity: high
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Backup not completed in 24 hours"
          description: "Last successful backup: {{ $value | humanizeDuration }} ago - backup may be failing"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/BACKUP-FAILURE.md"
          impact: "Unable to recover from data loss if disaster occurs"

      # Replication Health - P2
      - alert: ReplicationBehind
        expr: pg_replication_lag_seconds > 30
        for: 10m
        labels:
          severity: high
          team: database
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Database replication falling behind (>30s lag)"
          description: "Replication lag: {{ $value }}s - replica not keeping up with primary"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/REPLICATION-BEHIND.md"
          impact: "Failover will result in data loss if lag exceeds threshold"

      # Network Errors - P3
      - alert: HighNetworkErrors
        expr: rate(node_network_receive_errs_total[5m]) > 100
        for: 10m
        labels:
          severity: medium
          team: infrastructure
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "High network errors detected"
          description: "Network errors on {{ $labels.device }}: {{ $value | humanize }} errors/sec"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/NETWORK-ERRORS.md"
          impact: "Network packets being dropped - potential hardware issue"

      # DNS Resolution - P2
      - alert: DNSResolutionFailing
        expr: probe_dns_lookup_time_seconds > 1
        for: 5m
        labels:
          severity: high
          team: network
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "DNS resolution slow (>1s)"
          description: "DNS lookup time: {{ $value | humanizeDuration }} - resolver may be slow"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/DNS-SLOW.md"
          impact: "Service startup and inter-service communication slowed"

  # =========================================================================
  # GROUP 8: EXTERNAL DEPENDENCIES & INTEGRATIONS
  # =========================================================================
  # P2/P3 alerts - third-party service health
  # SLA: Response within 4 hours, escalate within 1 hour

  - name: external_dependencies
    interval: 60s
    rules:
      # Cloudflare Tunnel - P2
      - alert: CloudflareTunnelDown
        expr: cloudflare_tunnel_connector_status == 0
        for: 2m
        labels:
          severity: high
          team: network
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "Cloudflare Tunnel connector disconnected"
          description: "Cloudflare Tunnel at {{ $labels.instance }} is not connected"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/CF-TUNNEL-DOWN.md"
          impact: "Internet-facing traffic cannot reach on-prem infrastructure"

      # External API Rate Limit - P3
      - alert: ExternalAPIRateLimited
        expr: increase(external_api_rate_limit_hits_total[5m]) > 100
        for: 5m
        labels:
          severity: medium
          team: platform
          oncall: "false"
          sla: "4hour-response"
        annotations:
          summary: "External API rate limiting detected"
          description: "Hitting rate limits on {{ $labels.api }} - {{ $value | humanize }} hits in past 5min"
          runbook: "https://github.com/kushin77/code-server/blob/main/docs/runbooks/EXT-API-RATELIMIT.md"
          impact: "API calls being rejected - service functionality degraded"

# =========================================================================
# RECORDING RULES
# =========================================================================
# Precomputed metrics for efficient dashboard rendering & alerting

recording_rules:
  - name: http:metrics
    interval: 15s
    rules:
      # Request rate by status
      - record: http:requests:rate5m
        expr: rate(http_requests_total[5m])

      # Error rate calculation
      - record: http:errors:rate5m
        expr: rate(http_requests_total{status=~"5.."}[5m])

      # Latency percentiles
      - record: http:latency:p50:5m
        expr: histogram_quantile(0.50, rate(http_request_duration_seconds_bucket[5m]))
      
      - record: http:latency:p95:5m
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))
      
      - record: http:latency:p99:5m
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

  - name: database:metrics
    interval: 15s
    rules:
      # Connection pool utilization
      - record: pg:connections:used:ratio
        expr: pg_stat_activity_count / pg_settings_max_connections

      # Transaction rate
      - record: pg:transactions:committed:rate5m
        expr: rate(pg_stat_database_xact_commit[5m])

      # Slow query detection
      - record: pg:slow:queries:rate5m
        expr: rate(pg_stat_statements_mean_exec_time{mean_exec_time > 1000}[5m])

