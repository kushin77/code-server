# HAProxy Load Balancer Configuration
# Load balances between primary (192.168.168.31) and replica (192.168.168.42)

global
  maxconn 4096
  log /dev/log local0 info
  log /dev/log local0 notice
  chroot /var/lib/haproxy
  stats socket /run/haproxy/admin.sock mode 660 level admin
  stats timeout 30s
  user haproxy
  group haproxy
  daemon
  
  # Performance tuning
  tune.ssl.default-dh-param 2048
  tune.maxconn 2048

defaults
  log global
  mode http
  option httplog
  option dontlognull
  option forwardfor except 127.0.0.0/8
  option redispatch
  retries 3
  timeout connect 5s
  timeout client 50s
  timeout server 50s
  
  # Error handling
  errorfile 400 /etc/haproxy/errors/400.http
  errorfile 403 /etc/haproxy/errors/403.http
  errorfile 408 /etc/haproxy/errors/408.http
  errorfile 500 /etc/haproxy/errors/500.http
  errorfile 502 /etc/haproxy/errors/502.http
  errorfile 503 /etc/haproxy/errors/503.http
  errorfile 504 /etc/haproxy/errors/504.http

# ============================================================================
# Frontend: Public HTTP/HTTPS
# ============================================================================

frontend http_front
  bind *:80
  bind *:443 ssl crt /etc/ssl/certs/ide.kushnir.cloud.pem
  
  mode http
  option httpchk GET /healthz HTTP/1.1
  
  # Redirect HTTP to HTTPS
  http-request redirect scheme https code 301 if !{ ssl_fc }
  
  # Session persistence (sticky sessions)
  stick-table type string len 32 size 100k expire 30m
  stick on cookie(JSESSIONID)
  
  # Default backend
  default_backend ide_backend

# ============================================================================
# Frontend: HAProxy Stats (internal only)
# ============================================================================

frontend stats_front
  bind *:8404
  mode http
  option httpclose
  stats enable
  stats uri /stats
  stats refresh 30s
  stats show-legends
  stats admin if TRUE

# ============================================================================
# Backend: Code Server Cluster
# ============================================================================

backend ide_backend
  balance roundrobin
  mode http
  
  # Health checks
  option httpchk GET /healthz HTTP/1.1 Host:\ ide.kushnir.cloud
  http-check expect status 200,307,401
  
  # Primary server (192.168.168.31)
  server primary 192.168.168.31:8080 \
    check port 8080 \
    inter 10s \
    fall 3 \
    rise 2 \
    weight 100 \
    cookie primary \
    slowstart 60s
  
  # Replica server (192.168.168.42) - backup
  server replica 192.168.168.42:8080 \
    check port 8080 \
    inter 10s \
    fall 3 \
    rise 2 \
    weight 100 \
    backup \
    cookie replica \
    slowstart 60s
  
  # Logging format with session ID
  log-format "%ci:%cp [%tr] %ft %b/%s %TR/%Tw/%Tc/%Tr/%Ta %ST %B %CC %CS %tsc %ac/%fc/%bc/%sc/%rc %sq/%bq {%[cookie_value(JSESSIONID)]} %{+Q}o %r"
  
  # Timeout settings
  timeout connect 5s
  timeout server 50s
  timeout queue 30s

# ============================================================================
# Prometheus Metrics Endpoint
# ============================================================================

listen prometheus
  bind *:8405
  mode http
  stats enable
  stats uri /metrics
  stats format prometheus

# ============================================================================
# Backend: PostgreSQL Replication Check
# ============================================================================

backend postgres_backend
  balance roundrobin
  mode tcp
  option tcp-check
  tcp-check connect port 5432
  
  server primary 192.168.168.31:5432 check
  server replica 192.168.168.42:5432 check backup

# ============================================================================
# Backend: Redis Cluster
# ============================================================================

backend redis_backend
  balance roundrobin
  mode tcp
  option tcp-check
  tcp-check connect port 6379
  
  server primary 192.168.168.31:6379 check
  server replica 192.168.168.42:6379 check backup
