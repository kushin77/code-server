---
# Prometheus Configuration for 192.168.168.31
# For: GPU monitoring, NAS health, application metrics, system resource tracking
# Updated: April 13, 2026

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'code-server-enterprise'
    environment: 'on-premises'
    host: '192.168.168.31'
    region: 'internal'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/rules/alert_rules.yml'
  - '/etc/prometheus/rules/recording_rules.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics: CPU, memory, disk, network)
  - job_name: 'node-exporter'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:9100'

  # NVIDIA GPU Metrics (DCGM Exporter)
  - job_name: 'nvidia-dcgm'
    scrape_interval: 30s
    scrape_timeout: 10s
    honor_timestamps: true
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9400']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:9400'

  # Container Metrics (cAdvisor)
  - job_name: 'cadvisor'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:8080'

  # NAS Mount Point Health
  - job_name: 'nas-health'
    scrape_interval: 60s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9100']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'nas_.*|mount_.*'
        action: keep
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:9100'

  # Code-Server Application Metrics
  - job_name: 'code-server'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:8443']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:8443'

  # Ollama LLM Inference Metrics
  - job_name: 'ollama'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:11434']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:11434'

  # Docker Daemon Metrics
  - job_name: 'docker'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9323']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: '192.168.168.31:9323'
