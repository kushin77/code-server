apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: code-server-iam
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: code-server-ca
  namespace: code-server-iam
spec:
  secretName: code-server-ca-secret
  duration: 87600h
  renewBefore: 720h
  commonName: kushin-code-server-ca
  isCA: true
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
