name: "Phase 3: Performance & Load Testing Gate"

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  phase-3-performance-gate:
    name: Verify Phase 3 Performance & Load Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check PR for Phase 3 completion
        id: check-phase-3
        run: |
          BODY=$(cat <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          )
          
          # Check if this is a trivial change (skip Phase 3)
          if echo "$BODY" | grep -q "^\- \[x\] Documentation change only" || \
             echo "$BODY" | grep -q "^\- \[x\] Dependency security patch" || \
             echo "$BODY" | grep -q "^\- \[x\] Test code only"; then
            echo "PHASE_3_REQUIRED=false" >> $GITHUB_OUTPUT
            echo "REASON=Trivial change exemption marked" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for Phase 3 exemption (non-critical changes)
          if echo "$BODY" | grep -q "^\- \[x\] Change is documentation-only" || \
             echo "$BODY" | grep -q "^\- \[x\] Change is test code only" || \
             echo "$BODY" | grep -q "^\- \[x\] Change is non-critical"; then
            echo "PHASE_3_REQUIRED=false" >> $GITHUB_OUTPUT
            echo "REASON=Phase 3 exemption marked (non-critical change)" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check for Phase 3 Performance & Load Testing section
          if echo "$BODY" | grep -q "## Phase 3: Performance & Load Testing"; then
            # Check minimum required items
            if echo "$BODY" | grep -q "Benchmarked against baseline" && \
               echo "$BODY" | grep -q "Load test scenarios defined"; then
              
              # Check that baseline and results are present
              if echo "$BODY" | grep -q "Baseline (before):" && \
                 echo "$BODY" | grep -q "After this PR:"; then
                echo "PHASE_3_COMPLETE=true" >> $GITHUB_OUTPUT
              else
                echo "PHASE_3_COMPLETE=false" >> $GITHUB_OUTPUT
                echo "REASON=Phase 3 section incomplete - missing baseline/results comparison" >> $GITHUB_OUTPUT
              fi
            else
              echo "PHASE_3_COMPLETE=false" >> $GITHUB_OUTPUT
              echo "REASON=Phase 3 section incomplete - missing benchmarking and load test items" >> $GITHUB_OUTPUT
            fi
            echo "PHASE_3_REQUIRED=true" >> $GITHUB_OUTPUT
          else
            echo "PHASE_3_REQUIRED=false" >> $GITHUB_OUTPUT
            echo "REASON=Phase 3 Performance & Load Testing section not found (exemption may apply)" >> $GITHUB_OUTPUT
          fi

      - name: Post guidance comment if Phase 3 incomplete
        if: steps.check-phase-3.outputs.PHASE_3_REQUIRED == 'true' && steps.check-phase-3.outputs.PHASE_3_COMPLETE == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const reason = `${{ steps.check-phase-3.outputs.REASON }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Phase 3 Performance & Load Testing Incomplete',
                '',
                "What's missing:",
                reason,
                '',
                'Complete the Phase 3 section in the PR template with baseline and after values.'
              ].join('\n')
            })

  phase-3-operational-readiness:
    name: Phase 3 Operational Readiness Checklist
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for Phase 3 operational readiness items
        id: check-operational
        run: |
          BODY=$(cat <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          )
          
          # Check for deployment strategy documented
          if echo "$BODY" | grep -q "Deployment strategy:"; then
            echo "DEPLOYMENT_STRATEGY=true" >> $GITHUB_OUTPUT
          else
            echo "DEPLOYMENT_STRATEGY=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for runbook documented
          if echo "$BODY" | grep -q "Runbook updated:" || \
             echo "$BODY" | grep -q "Runbook & Troubleshooting"; then
            echo "RUNBOOK_DOCUMENTED=true" >> $GITHUB_OUTPUT
          else
            echo "RUNBOOK_DOCUMENTED=false" >> $GITHUB_OUTPUT
          fi
          
          # Check for rollback plan
          if echo "$BODY" | grep -q "Rollback Plan:" || \
             echo "$BODY" | grep -q "rollback command"; then
            echo "ROLLBACK_PLAN=true" >> $GITHUB_OUTPUT
          else
            echo "ROLLBACK_PLAN=false" >> $GITHUB_OUTPUT
          fi

      - name: Post operational readiness reminder
        if: steps.check-operational.outputs.DEPLOYMENT_STRATEGY == 'false' || steps.check-operational.outputs.RUNBOOK_DOCUMENTED == 'false' || steps.check-operational.outputs.ROLLBACK_PLAN == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7
        with:
          script: |
            const missing = [];
            if ('${{ steps.check-operational.outputs.DEPLOYMENT_STRATEGY }}' === 'false') {
              missing.push('Deployment strategy (rolling, blue-green, canary, feature-flag)');
            }
            if ('${{ steps.check-operational.outputs.RUNBOOK_DOCUMENTED }}' === 'false') {
              missing.push('Runbook & troubleshooting guide');
            }
            if ('${{ steps.check-operational.outputs.ROLLBACK_PLAN }}' === 'false') {
              missing.push('Rollback plan with time estimate and command');
            }
            const list = missing.map((x) => `- [ ] ${x}`).join('\n');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Phase 3 Operational Readiness Items Needed\n\n${list}`
            })
