name: Deploy to Primary (192.168.168.31)

on:
  push:
    branches: [phase-7-deployment, main]
    paths:
      - 'docker-compose.yml'
      - 'Caddyfile.tpl'
      - '.env*'
      - 'terraform/**'
      - '.github/workflows/deploy-primary.yml'

permissions:
  contents: read
  deployments: write

jobs:
  deploy-primary:
    name: Deploy to Primary Host
    runs-on: [self-hosted, on-prem, primary]
    timeout-minutes: 30
    environment:
      name: primary
      url: https://ide.kushnir.cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate docker-compose
        run: |
          docker-compose config --quiet
          echo "✅ docker-compose.yml is valid"

      - name: Validate Terraform (non-destructive)
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform configuration is valid"

      - name: Pull latest changes
        run: |
          cd /home/akushnir/code-server-enterprise
          git pull origin phase-7-deployment || git pull origin main
          echo "✅ Repository updated"

      - name: Deploy services
        run: |
          cd /home/akushnir/code-server-enterprise
          
          # Source .env to ensure variables are available
          set -a
          [ -f .env ] && source .env
          set +a
          
          # Stop existing containers gracefully
          echo "🔄 Stopping existing services..."
          docker-compose down --remove-orphans || true
          sleep 5
          
          # Pull latest images
          echo "📦 Pulling latest images..."
          docker-compose pull
          
          # Start services with health checks
          echo "🚀 Starting services..."
          docker-compose up -d
          
          # Wait for services to be healthy
          echo "⏳ Waiting for services to become healthy..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            healthy=$(docker-compose ps --format json | \
              jq -r '.[] | select(.State | startswith("running")) | select(.Health == "healthy" or .Health == null) | .Service' | \
              wc -l)
            total=$(docker-compose ps --format json | jq -r '.[] | .Service' | wc -l)
            
            if [ $healthy -eq $total ] && [ $total -gt 0 ]; then
              echo "✅ All services are healthy"
              break
            fi
            
            echo "  Healthy: $healthy/$total services"
            sleep 2
            attempt=$((attempt + 1))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "❌ Timeout waiting for services to become healthy"
            docker-compose logs
            exit 1
          fi

      - name: Verify deployment
        run: |
          cd /home/akushnir/code-server-enterprise
          
          echo "📋 Service Status:"
          docker-compose ps
          
          echo ""
          echo "🔍 Health checks:"
          
          # Check code-server
          if docker-compose exec -T code-server curl -sf http://localhost:8080 > /dev/null 2>&1; then
            echo "✅ code-server is responding"
          else
            echo "❌ code-server health check failed"
            exit 1
          fi
          
          # Check Caddy
          if docker-compose exec -T caddy curl -sf http://localhost:2019/config > /dev/null 2>&1; then
            echo "✅ Caddy is responding"
          else
            echo "❌ Caddy health check failed"
            exit 1
          fi
          
          # Check PostgreSQL
          if docker-compose exec -T postgresql psql -U postgres -c "SELECT 1" > /dev/null 2>&1; then
            echo "✅ PostgreSQL is healthy"
          else
            echo "❌ PostgreSQL health check failed"
            exit 1
          fi
          
          # Check Redis
          if docker-compose exec -T redis redis-cli ping | grep -q PONG; then
            echo "✅ Redis is responding"
          else
            echo "❌ Redis health check failed"
            exit 1
          fi

      - name: Update deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'primary',
              description: 'Deployment to 192.168.168.31',
              production_environment: true,
            });
            
            const status = context.job.status === 'success' ? 'success' : 'failure';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: status,
              environment_url: 'https://ide.kushnir.cloud',
              description: 'Deployment ' + status
            });

      - name: Notify on failure
        if: failure()
        run: |
          cd /home/akushnir/code-server-enterprise
          echo "❌ DEPLOYMENT FAILED on primary (192.168.168.31)"
          echo ""
          echo "Recent logs:"
          docker-compose logs --tail=50
          exit 1
