# docker-compose.telemetry-phase1.yml - Structured Logging Stack
# Loki + Promtail + Redis/PostgreSQL exporters for Telemetry Phase 1
# Usage: docker-compose -f docker-compose.yml -f docker-compose.telemetry-phase1.yml up -d

version: '3.8'

services:

  # Loki - Log aggregation backend
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    restart: always
    networks: [enterprise]
    expose: ["3100"]
    user: "0:0"
    command:
      - -config.file=/etc/loki/loki-config.yml
      - -print-config-stderr=false
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
      - loki-wal:/wal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/loki/api/v1/status/buildinfo || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5

  # Promtail - Log shipper to Loki
  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    restart: always
    networks: [enterprise]
    expose: ["9080"]
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/:/var/log:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.25' }
        reservations: { memory: 128m }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: always
    networks: [enterprise]
    expose: ["9121"]
    command:
      - -redis.addr=redis:6379
      - -redis.password=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9121/metrics | grep -q redis"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.1' }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: always
    networks: [enterprise]
    expose: ["9187"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics | grep -q postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.1' }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

networks:
  enterprise:
    external: true

volumes:
  loki-data:
    driver: local

  loki-wal:
    driver: local
