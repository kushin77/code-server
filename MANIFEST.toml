note = "GPU-enabled, enabled via --profile ollama"
last_verified = "2026-04-15T20:00:00Z"

# ═══════════════════════════════════════════════════════════════════════════
# TERRAFORM MODULES - IaC Versioning
# ═══════════════════════════════════════════════════════════════════════════

[terraform.modules.core]
version = "1.0.0"
source = "terraform/"
files = [
  "terraform/main.tf",
  "terraform/variables.tf",
  "terraform/outputs.tf",
  "terraform/locals.tf"
]
provider = "docker"
idempotency_validated = true
last_tested = "2026-04-15T20:00:00Z"

[terraform.modules.networking]
version = "1.0.0"
source = "terraform/modules/networking"
files = ["terraform/modules/networking/*.tf"]
manages = ["docker_network", "docker_volume"]
idempotency_validated = true

[terraform.modules.users]
version = "1.0.0"
source = "terraform/modules/users"
files = ["terraform/users.tf", "allowed-emails.txt"]
idempotency_validated = true
note = "Managed identity/RBAC"

# ═══════════════════════════════════════════════════════════════════════════
# CONFIGURATION FILES - Source of Truth
# ═══════════════════════════════════════════════════════════════════════════

[config.environment]
file = ".env"
template = "config/_base-config.env"
source_of_truth = true
immutable = false
generated = true
last_updated = "2026-04-15T20:00:00Z"

[config.allowed_users]
file = "allowed-emails.txt"
source_of_truth = true
managed_by = "terraform"
generation_script = "scripts/provision-new-user.sh"
immutable = false

[config.routing]
file = "Caddyfile"
source_of_truth = true
template = "Caddyfile.tpl"
immutable = false
last_updated = "2026-04-15T20:00:00Z"

[config.monitoring]
files = [
  "alert-rules.yml",
  "alertmanager.yml",
  "prometheus.yml"
]
source_of_truth = true
immutable = false

# ═══════════════════════════════════════════════════════════════════════════
# SCRIPTS & AUTOMATION - Execution Authority
# ═══════════════════════════════════════════════════════════════════════════

[scripts.deployment]
version = "1.0.0"
files = [
  "scripts/deploy.sh",
  "scripts/deploy-phase-7-complete.sh"
]
idempotency_validated = true
requires_approval = true

[scripts.governance]
version = "1.0.0"
files = [
  "scripts/governance/duplicate-detector.sh",
  "scripts/governance/idempotency-validator.sh",
  "scripts/governance/drift-detector.sh"
]
runs_in_ci = true
blocks_merge = true

[scripts.user_management]
version = "1.0.0"
files = [
  "scripts/manage-users.sh",
  "scripts/provision-new-user.sh"
]
audit_required = true

# ═══════════════════════════════════════════════════════════════════════════
# GITHUB ACTIONS WORKFLOWS - CI/CD Authority
# ═══════════════════════════════════════════════════════════════════════════

[workflows.iac-validation]
file = ".github/workflows/iac-governance.yml"
triggers = ["push", "pull_request"]
required_for_merge = true
steps = [
  "terraform-validate",
  "duplicate-detection",
  "idempotency-check",
  "drift-detection",
  "security-scan"
]

[workflows.deploy]
file = ".github/workflows/deploy.yml"
triggers = ["push:main"]
requires_iac_validation = true
requires_security_approval = true

# ═══════════════════════════════════════════════════════════════════════════
# IMMUTABILITY RULES - Enforce Zero Duplicates
# ═══════════════════════════════════════════════════════════════════════════

[governance.duplicate_detection]
enforce = true
scope = ["terraform", "docker-compose", "scripts", "config"]
forbidden_patterns = [
  "hardcoded_secrets",
  "duplicate_env_vars",
  "duplicate_service_definitions",
  "duplicate_network_configs"
]
action = "fail_ci"

[governance.idempotency]
enforce = true
validation = "terraform apply twice, compare plans"
acceptable_drift = 0
action = "fail_ci"
test_frequency = "per_pr"

[governance.drift_detection]
enforce = true
detection_method = "terraform plan in prod"
frequency = "daily"
alerting = true
max_drift_tolerance_minutes = 5

# ═══════════════════════════════════════════════════════════════════════════
# ROLLBACK RULES - < 60 Second Target
# ═══════════════════════════════════════════════════════════════════════════

[rollback.versioning]
strategy = "git tag + terraform state rollback"
target_rto = "60 seconds"
tested_frequency = "per_phase"

[[rollback.procedures]]
name = "docker-compose-rollback"
command = "docker-compose down && git checkout <tag> && docker-compose up -d"
rto_actual = "15 seconds"
tested = true

[[rollback.procedures]]
name = "terraform-rollback"
command = "terraform state pull <backup-state> && terraform apply"
rto_actual = "45 seconds"
tested = true

# ═══════════════════════════════════════════════════════════════════════════
# INTEGRITY CHECKSUMS - Detect Unauthorized Changes
# ═══════════════════════════════════════════════════════════════════════════

[checksums]
docker_compose = "sha256:computed_by_ci"
terraform = "sha256:computed_by_ci"
caddyfile = "sha256:computed_by_ci"
allowed_emails = "sha256:computed_by_ci"
last_updated = "2026-04-15T20:00:00Z"
validation_frequency = "per_commit"

# ═══════════════════════════════════════════════════════════════════════════
# DEPLOYMENT LOG - Audit Trail
# ═══════════════════════════════════════════════════════════════════════════

[[deployment_history]]
