name: Weekly Governance Report

on:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate Governance Compliance Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up environment
        run: |
          # Install bash (should be available on ubuntu-latest)
          which bash
          bash --version

      - name: Generate governance report
        id: generate
        run: |
          bash scripts/governance/generate-governance-report.sh \
            --output /tmp/governance-report.md \
            --week-ending "$(date -u +%Y-%m-%d)"

      - name: Archive report
        uses: actions/upload-artifact@v4
        with:
          name: governance-report-${{ github.run_id }}
          path: /tmp/governance-report.md
          retention-days: 90

      - name: Comment on latest PR (if open governance PRs exist)
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const reportPath = '/tmp/governance-report.md';
            
            if (!fs.existsSync(reportPath)) {
              console.log('No report file found, skipping comment');
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf8');
            
            // Find open governance-related issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'governance',
              per_page: 5
            });
            
            if (issues.length === 0) {
              console.log('No open governance issues to update');
              return;
            }
            
            // Comment on the first (highest priority) issue
            const issue = issues[0];
            const comment = `## 📊 Weekly Governance Report\n\n${report}\n\n*Report generated by GitHub Actions at ${new Date().toISOString()}*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });
            
            console.log(`Report commented on issue #${issue.number}`);

      - name: Create summary
        if: always()
        run: |
          echo "## 📊 Governance Report Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Weekly governance compliance report generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Report Contents" >> $GITHUB_STEP_SUMMARY
          cat /tmp/governance-report.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Report file not found" >> $GITHUB_STEP_SUMMARY
