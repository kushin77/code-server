# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION docker-compose.yml — kushin77/code-server [PARAMETERIZED]
# Deploy host : ${DEPLOY_HOST}  (ssh ${DEPLOY_USER}@${DEPLOY_HOST})
# NAS primary : ${NAS_PRIMARY_HOST}:${NAS_PRIMARY_EXPORT}  →  ${NAS_PRIMARY_MOUNT}
# NAS replica : ${NAS_REPLICA_HOST}:${NAS_REPLICA_EXPORT}  →  ${NAS_REPLICA_MOUNT}
# GPU         : NVIDIA T1000 8GB  (device index 1, cuda:1, VRAM 8GB)
#               NVIDIA NVS 510     (device index 0, cuda:0, 2GB — monitoring)
# Caddy       : ${CADDY_VERSION} (TLS internal, all *.${DOMAIN} subdomains)
# Secrets     : all via .env — NEVER hardcoded — see .env.example
# Rollback    : git revert <sha> && git push && ssh to ${DEPLOY_HOST} && make deploy (<60s)
# 
# PRODUCTION-FIRST: ALL values from config/_base-config.env + .env
# Zero hardcoded values. Full parameterization.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Reusable anchors ──────────────────────────────────────────────────────────
x-logging: &logging
  driver: ${DOCKER_LOGGING_DRIVER}
  options:
    max-size: ${DOCKER_LOGGING_MAX_SIZE}
    max-file: ${DOCKER_LOGGING_MAX_FILE}

services:

  # ─── CoreDNS ──────────────────────────────────────────────────────────────────
  # Internal DNS resolver for *.prod.internal service discovery
  # All hosts point to this for .prod.internal domain resolution
  coredns:
    image: coredns/coredns:${COREDNS_VERSION:-1.11.1}
    container_name: coredns
    restart: always
    networks: [enterprise]
    ports:
      - "192.168.168.31:53:53/udp"
      - "192.168.168.31:53:53/tcp"
    volumes:
      - ./config/coredns/Corefile:/etc/coredns/Corefile:ro
      - ./config/coredns/zones:/etc/coredns/zones:ro
    command: -conf /etc/coredns/Corefile
    healthcheck:
      test: ["CMD", "/coredns", "-plugins"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *logging

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    restart: always
    networks: [enterprise]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${NAS_PRIMARY_MOUNT}/postgres-backups:/backups:rw
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "true"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}
      start_period: ${POSTGRES_HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT}
          cpus: '${POSTGRES_CPU_LIMIT}'
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVE}
          cpus: '${POSTGRES_CPU_RESERVE}'
    logging: *logging

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:${REDIS_VERSION}
    container_name: redis
    restart: always
    networks: [enterprise]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY}
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "true"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT}
      retries: ${REDIS_HEALTHCHECK_RETRIES}
      start_period: ${REDIS_HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
          cpus: '${REDIS_CPU_LIMIT}'
        reservations:
          memory: ${REDIS_MEMORY_RESERVE}
    logging: *logging

  # ─── MinIO S3-Compatible Storage (for Terraform remote state) ───────────────
  minio:
    image: minio/minio:${MINIO_VERSION:-RELEASE.2024-03-15T01-07-19Z}
    container_name: minio
    restart: always
    networks: [enterprise]
    profiles: ["storage"]  # Optional: minio is not required for basic deployment
    ports:
      - "0.0.0.0:9000:9000"  # MinIO API server
      - "0.0.0.0:9001:9001"  # MinIO Web Console
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:?MINIO_ROOT_USER required - see .env.example}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required - see .env.example}
    command: server /minio-data --console-address ":9001"
    volumes:
      - minio-data:/minio-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256m
    logging: *logging

  # ─── code-server ─────────────────────────────────────────────────────────────
  code-server:
    image: codercom/code-server:${CODE_SERVER_VERSION}
    container_name: code-server
    restart: always
    networks: [enterprise]
    ports:
      - "127.0.0.1:${CODE_SERVER_PORT}:8080"  # Localhost only - oauth2-proxy gates external access
    environment:
      PASSWORD:        ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD in .env}
      SUDO_PASSWORD:   ${CODE_SERVER_PASSWORD}
      GITHUB_TOKEN:    ${GITHUB_TOKEN:-}
      OLLAMA_ENDPOINT: http://ollama:${OLLAMA_PORT}
    command:
      - "--bind-addr=127.0.0.1:8080"  # Bind to localhost only
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=none"  # Auth handled by oauth2-proxy reverse proxy
    volumes:
      - code-server-data:/home/coder:rw
    healthcheck:
      test: ["CMD", "true"]
      interval: ${CODE_SERVER_HEALTHCHECK_INTERVAL}
      timeout: ${CODE_SERVER_HEALTHCHECK_TIMEOUT}
      retries: ${CODE_SERVER_HEALTHCHECK_RETRIES}
      start_period: ${CODE_SERVER_HEALTHCHECK_START_PERIOD}
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: ${CODE_SERVER_MEMORY_LIMIT}
          cpus: '${CODE_SERVER_CPU_LIMIT}'
        reservations:
          memory: ${CODE_SERVER_MEMORY_RESERVE}
          cpus: '${CODE_SERVER_CPU_RESERVE}'
    logging: *logging

  # ─── Ollama (GPU MAX — T1000 8GB, device 1, full CUDA offload) ─────────────
  # Profile: ollama - Enable with: docker-compose --profile ollama up -d
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    networks: [enterprise]
    ports:
      - "127.0.0.1:${OLLAMA_PORT}:${OLLAMA_PORT}"  # Localhost only - internal service-to-service access only
    profiles: ["ollama"]
    # Explicit device mounts are required with snap Docker nvidia runtime
    # snap's nvidia-container-runtime needs /dev/nvidia<N> explicitly bound
    # to enable CUDA compute (utility-only mode doesn't expose compute context)
    devices:
      - ${OLLAMA_DEVICE_NVIDIA1}:${OLLAMA_DEVICE_NVIDIA1}
      - ${OLLAMA_DEVICE_NVIDIACTL}:${OLLAMA_DEVICE_NVIDIACTL}
      - ${OLLAMA_DEVICE_UVM}:${OLLAMA_DEVICE_UVM}
      - ${OLLAMA_DEVICE_UVM_TOOLS}:${OLLAMA_DEVICE_UVM_TOOLS}
    environment:
      OLLAMA_HOST:              ${OLLAMA_HOST_ADDR}
      CUDA_VISIBLE_DEVICES:     ${OLLAMA_CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES:   ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH:          /var/lib/snapd/hostfs/usr/lib/x86_64-linux-gnu
      OLLAMA_NUM_GPU:           ${OLLAMA_NUM_GPU}
      OLLAMA_GPU_LAYERS:        ${OLLAMA_GPU_LAYERS}
      OLLAMA_KEEP_ALIVE:        ${OLLAMA_KEEP_ALIVE}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS}
      OLLAMA_NUM_THREAD:        ${OLLAMA_NUM_THREAD}
      OLLAMA_FLASH_ATTENTION:   ${OLLAMA_FLASH_ATTENTION}
      OLLAMA_NUM_PARALLEL:      ${OLLAMA_NUM_PARALLEL}
      OLLAMA_MAX_VRAM:          ${OLLAMA_MAX_VRAM}
    volumes:
      - ${NAS_PRIMARY_MOUNT}/ollama:/root/.ollama:rw
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: ${OLLAMA_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${OLLAMA_HEALTHCHECK_TIMEOUT:-10s}
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT}
        reservations:
          memory: 8g
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    logging: *logging

  # ─── Ollama model bootstrap (runs once, then exits) ───────────────────────
  # Profile: ollama - Enable with: docker-compose --profile ollama up -d
  ollama-init:
    image: ollama/ollama:${OLLAMA_VERSION}
    container_name: ollama-init
    restart: on-failure
    networks: [enterprise]
    profiles: ["ollama"]
    environment:
      OLLAMA_HOST: http://ollama:${OLLAMA_PORT}
    volumes:
      - ${NAS_PRIMARY_MOUNT}/ollama:/root/.ollama:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] waiting for ollama..."
        until ollama list >/dev/null 2>&1; do sleep 5; done
        echo "[ollama-init] pulling llama2:7b-chat (fast baseline)"
        ollama pull llama2:7b-chat
        echo "[ollama-init] pulling codellama:7b (code model)"
        ollama pull codellama:7b
        echo "[ollama-init] all models ready"
    depends_on:
      ollama: { condition: service_healthy }
    logging: *logging

  # ─── oauth2-proxy ────────────────────────────────────────────────────────────
  # Central authentication service: Google OAuth2 for SSO across all endpoints
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks: [enterprise]
    expose: ["4180"]
    environment:
      OAUTH2_PROXY_CLIENT_ID:                 ${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}
      OAUTH2_PROXY_CLIENT_SECRET:             ${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}
      OAUTH2_PROXY_COOKIE_SECRET:             ${OAUTH2_PROXY_COOKIE_SECRET:?Set OAUTH2_PROXY_COOKIE_SECRET in .env}
      OAUTH2_PROXY_PROVIDER:                  google
      OAUTH2_PROXY_OIDC_ISSUER_URL:           https://accounts.google.com
      OAUTH2_PROXY_REDIRECT_URL:              https://${DOMAIN}/oauth2/callback
      # Multi-service routing with path-based proxying
      OAUTH2_PROXY_UPSTREAMS:                 http://code-server:8080/=http://code-server:8080|http://grafana:3000/grafana=http://grafana:3000|http://prometheus:9090/prometheus=http://prometheus:9090|http://jaeger:16686/jaeger=http://jaeger:16686|http://alertmanager:9093/alertmanager=http://alertmanager:9093
      OAUTH2_PROXY_EMAIL_DOMAINS:             "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/allowed-emails.txt
      OAUTH2_PROXY_COOKIE_NAME:               _oauth2_proxy_ide
      OAUTH2_PROXY_COOKIE_SECURE:             "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY:           "true"
      OAUTH2_PROXY_COOKIE_SAMESITE:           lax
      OAUTH2_PROXY_COOKIE_REFRESH:            15m
      OAUTH2_PROXY_HTTP_ADDRESS:              0.0.0.0:4180
      OAUTH2_PROXY_PROXY_WEBSOCKETS:          "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON:      "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST:          "true"
      OAUTH2_PROXY_PASS_USER_HEADERS:         "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH:           "false"
      OAUTH2_PROXY_AUTH_LOGGING:              "true"
      OAUTH2_PROXY_REQUEST_LOGGING:           "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX:           "^/healthz|^/oauth2|^/ping"
      # SSO configuration: share session across all subdomains via apex domain
      OAUTH2_PROXY_COOKIE_DOMAIN:             .${APEX_DOMAIN}
      # PKCE for authorization code flow security
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD:     S256
      # Cookie hardening: reduced expiry from 24h to 8h for security
      OAUTH2_PROXY_COOKIE_EXPIRE:             8h
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      code-server: { condition: service_healthy }
    logging: *logging

  # ─── Portal Dashboard (Root Domain Entry Point) ──────────────────────────────
  # Single-page dashboard at kushnir.cloud with links to all services
  portal:
    image: nginx:1.27-alpine
    container_name: portal
    restart: always
    networks: [enterprise]
    expose: ["80"]
    volumes:
      - ./portal/index.html:/usr/share/nginx/html/index.html:ro
      - ./portal/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits: { memory: 128m, cpus: '0.25' }
        reservations: { memory: 32m }
    logging: *logging

  # ─── Caddy (TLS termination + reverse proxy) — v2.9.1 ───────────────────────
  # TLS + reverse proxy for ide.kushnir.cloud → oauth2-proxy → services
  caddy:
    image: caddy:2.9.1-alpine
    container_name: caddy
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      oauth2-proxy: { condition: service_healthy }
    logging: *logging

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: always
    networks: [enterprise]
    expose: ["9090"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=warn'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 256m }
    logging: *logging

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: always
    networks: [enterprise]
    expose: ["3000"]  # Internal network only (routed through oauth2-proxy)
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_SERVER_DOMAIN:           ${DOMAIN:-primary.prod.internal}
      GF_SERVER_ROOT_URL:         "https://grafana.${DOMAIN:-primary.prod.internal}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_LOG_LEVEL:               warn
    volumes:
      - nas-grafana:/var/lib/grafana:rw
      - ./grafana/provisioning:/etc/grafana/provisioning:rw
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── AlertManager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    networks: [enterprise]
    expose: ["9093"]
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=warn'
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Jaeger (Distributed Tracing) ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:16686:16686"   # UI
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "14268"  # Jaeger HTTP
      - "6831"   # Jaeger compact UDP
    environment:
      COLLECTOR_OTLP_ENABLED:    "true"
      METRICS_STORAGE_TYPE:      prometheus
      SPAN_STORAGE_TYPE:         badger
      BADGER_EPHEMERAL:          "true"
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 6 ENHANCEMENTS
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 6a: PgBouncer (Connection Pooling) ────────────────────────────────
  # Profile: pgbouncer - Enable with: docker-compose --profile pgbouncer up -d
  pgbouncer:
    image: pgbouncer/pgbouncer:${PGBOUNCER_VERSION:-1.21.0}
    container_name: pgbouncer
    restart: always
    networks: [enterprise]
    profiles: ["pgbouncer"]
    ports:
      - "0.0.0.0:6432:6432"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER:             ${POSTGRES_USER:-postgres}
      DATABASES_PASSWORD:         ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGBOUNCER_POOL_MODE:        transaction
      PGBOUNCER_MAX_CLIENT_CONN:  1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 100
      PGBOUNCER_MIN_POOL_SIZE:    25
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Phase 6b: HashiCorp Vault (Secret Management) ─────────────────────────
  # Profile: vault - Enable with: docker-compose --profile vault up -d
  vault:
    image: vault:1.15.0
    container_name: vault
    restart: always
    networks: [enterprise]
    profiles: ["vault"]
    environment:
      # Production mode: no dev defaults
      VAULT_ADDR:                 https://localhost:8200
      VAULT_SKIP_VERIFY:          "false"  # Enable TLS verification (change to "true" for self-signed certs during testing)
    volumes:
      - vault-data:/vault/file  # Persistent storage backend
      - ./config/vault/vault.hcl:/vault/config/vault.hcl:ro  # Production configuration
      - ./config/vault-tls:/vault/tls:ro  # TLS certificates (generate with: scripts/vault-setup-tls.sh)
      - vault-audit-logs:/vault/logs  # Audit log persistence
      - vault-plugins:/vault/plugins
    cap_add:
      - IPC_LOCK  # Prevent memory from being swapped to disk
    command: server -config=/vault/config/vault.hcl
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── Phase 6c: Locust (Load Testing) ────────────────────────────────────────
  # Profile: load-test - Enable with: docker-compose --profile load-test up -d
  locust:
    image: locustio/locust:${LOCUST_VERSION:-2.20.0}
    container_name: locust
    restart: "no"
    networks: [enterprise]
    profiles: ["load-test"]
    ports:
      - "0.0.0.0:8089:8089"
    environment:
      TARGET_HOST:     http://caddy:80
      LOCUST_USERS:    ${LOCUST_USERS:-100}
      LOCUST_SPAWN_RATE: ${LOCUST_SPAWN_RATE:-10}
      LOCUST_RUN_TIME: ${LOCUST_RUN_TIME:-5m}
    volumes:
      - ./locustfile.py:/locustfile.py:ro
    command: -f /locustfile.py --web -u $${LOCUST_USERS} -r $${LOCUST_SPAWN_RATE}
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 512m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 8 SECURITY ENHANCEMENTS
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 8e: Falco (Runtime Security — eBPF Syscall Monitoring) ─────────────
  falco:
    image: falcosecurity/falco-no-driver:0.37.1
    container_name: falco
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor=unconfined
    ulimits:
      memlock:
        soft: -1
        hard: -1
    networks: [enterprise]
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - ./config/falco/falco.yaml:/etc/falco/falco.yaml:ro
      - ./config/falco/rules.custom.yaml:/etc/falco/rules.custom.yaml:ro
      - falco-data:/var/lib/falco
    environment:
      DEBUG: "false"
    command:
      - /usr/bin/falco
      - --nodriver
      - -pc
      - -o
      - json_output=true
      - -o
      - json_include_output_property=true
    expose:
      - "8765"
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Phase 8e: Falcosidekick (Falco Alert Forwarding to AlertManager) ────────
  falcosidekick:
    image: falcosecurity/falcosidekick:2.28.0
    container_name: falcosidekick
    restart: unless-stopped
    networks: [enterprise]
    environment:
      ALERTMANAGER_HOSTPORT: http://alertmanager:9093
      ALERTMANAGER_MINIMUMPRIORITY: warning
      PROMETHEUS_HOSTPORT: http://prometheus:9090
      DEBUG: "false"
    expose:
      - "2801"
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - alertmanager
      - prometheus
    deploy:
      resources:
        limits:   { memory: 64m,  cpus: '0.1' }
        reservations: { memory: 32m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 9 OBSERVABILITY & API GATEWAY
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 9-B: Loki (Log Aggregation) ───────────────────────────────────────
  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.4}
    container_name: loki
    restart: unless-stopped
    networks: [enterprise]
    expose: ["3100"]  # Internal network only; no host port binding
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-chunks:/loki/chunks
      - loki-index:/loki/index
      - loki-cache:/loki/cache
      - loki-tsdb:/loki/tsdb
      - loki-compaction:/loki/compaction
    environment:
      TZ: ${TZ:-UTC}
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 512m,  cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── Phase 9-C: Kong API Gateway ────────────────────────────────────────────
  # Kong API Gateway — consolidated to primary PostgreSQL (no separate kong-db)
  # Kong Proxy API: http://0.0.0.0:8000 (external)
  # Kong Admin API: 127.0.0.1:8001 (internal only, NOT exposed)
  # Kong Status: http://0.0.0.0:8000/status
  # 
  # SECURITY: Admin API NOT bound to 0.0.0.0 (prevents external access)
  # FEATURES: Rate-limiting, health checks, Loki logging, Jaeger tracing
  #
  # Database: Uses primary PostgreSQL with dedicated 'kong' database
  # Migrations: Idempotent (safe to run multiple times)
  # Config: Declarative (db.yml) for routes, upstreams, plugins

  kong-migration:
    image: kong:${KONG_VERSION:-3.4.0}
    container_name: kong-migration
    restart: "no"
    networks: [enterprise]
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:?Set KONG_DB_PASSWORD in .env}
      KONG_PG_DATABASE: kong
    command: sh -c 'kong migrations up && kong migrations finish'
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:   { memory: 256m,  cpus: '0.25' }
        reservations: { memory: 128m }
    logging: *logging

  kong:
    image: kong:${KONG_VERSION:-3.4.0}
    container_name: kong
    restart: unless-stopped
    networks: [enterprise]
    ports:
      - "0.0.0.0:8000:8000"  # Kong Proxy API (external)
      - "0.0.0.0:8443:8443"  # Kong Proxy SSL (external)
      # NOTE: Admin API (8001) NOT exposed — only accessible from within Docker network
      # Admin API accessible via: docker-compose exec kong kong admin-api-cli
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:?Set KONG_DB_PASSWORD in .env}
      KONG_PG_DATABASE: kong
      # Admin API restricted to loopback only
      KONG_ADMIN_LISTEN: 127.0.0.1:8001
      # Logging
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      # Enabled plugins with rate-limiting, correlation, tracing, logging
      KONG_PLUGINS: bundled,opentelemetry,request-transformer,response-transformer,rate-limiting,key-auth,correlation-id,http-log
      # Declarative config for all routes/services/plugins
      KONG_DATABASE_CONFIG: /etc/kong/db.yml
    volumes:
      - ./config/kong/db.yml:/etc/kong/db.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:   { memory: 512m,  cpus: '0.5' }
        reservations: { memory: 256m }
    logging: *logging

  # ─── Cloudflare Tunnel (Edge Security) ───────────────────────────────────────
  # Replaces direct NAT/firewall hole-punch with Cloudflare edge ingress
  # • Tunnel: secure encrypted connection from Cloudflare → $PRIMARY_HOST_IP:8080
  # • WAF: blocks SQL injection, path traversal, scanners at edge
  # • DNS: CNAME ide.kushnir.cloud → tunnel.cfargotunnel.com
  # • Health: Cloudflare monitors tunnel availability + reachability
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARE_TUNNEL_VERSION:-2024.1.5}
    container_name: cloudflared
    restart: "no"
    profiles: ["cloudflare"]   # Only start when CLOUDFLARE_TUNNEL_TOKEN is configured
    networks: [enterprise]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-placeholder-not-configured}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-placeholder-not-configured}
    expose:
      - "7878"   # Prometheus metrics for tunnel status
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 256m,  cpus: '0.25' }
        reservations: { memory: 128m }
    labels:
      service: "cloudflared"
      tier: "edge"
      com.example.description: "Cloudflare Tunnel for edge security + WAF"
    logging: *logging

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    external: true   # pre-created: docker network create enterprise

# ─────────────────────────────────────────────────────────────────────────────
# Volumes  (NAS-backed = /mnt/nas-56 bind mounts above; local SSD below)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  # ── Bind mounts to bypass snap Docker confinement ───────────────────────────
  # Use explicit directories instead of named volumes to avoid snap filesystem
  # restrictions that prevent container entrypoints from executing
  postgres-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/akushnir/.docker-data/postgres
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/akushnir/.docker-data/redis
  minio-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/minio
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/prometheus
  code-server-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/code-server
  caddy-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/caddy/config
  caddy-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/caddy/data
  alertmanager-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/nas-56/alertmanager
  jaeger-data:
    driver: local
  vault-data:
    driver: local
  vault-audit-logs:
    driver: local
  vault-plugins:
    driver: local
  falco-data:
    driver: local
  loki-chunks:
    driver: local
  loki-index:
    driver: local
  loki-cache:
    driver: local
  loki-tsdb:
    driver: local
  loki-compaction:
    driver: local

  # ── NAS-backed volumes ($STORAGE_IP:$STORAGE_NAS_EXPORT) ───────────────────────────
  nas-ollama:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=${STORAGE_IP:-192.168.168.56},rw,hard,intr,timeo=30,retrans=3,rsize=1048576,wsize=1048576"
      device: ":/export/ollama"
  nas-code-server:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=${STORAGE_IP:-192.168.168.56},rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/code-server"
  nas-prometheus:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=${STORAGE_IP:-192.168.168.56},rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/prometheus"
  nas-grafana:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=${STORAGE_IP:-192.168.168.56},rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/grafana"
  nas-postgres-backups:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=${STORAGE_IP:-192.168.168.56},rw,hard,intr,timeo=30,retrans=3,rsize=1048576,wsize=1048576"
      device: ":/export/backups/postgres"
