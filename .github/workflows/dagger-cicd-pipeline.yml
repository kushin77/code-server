name: "Code Server CI/CD Pipeline"
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: 192.168.168.31:8443
  IMAGE_NAME: code-server
  VERSION: ${{ github.sha }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/code-server/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=${{ env.VERSION }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/code-server/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/code-server/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/code-server/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run unit tests
        run: |
          docker run --rm ${{ env.REGISTRY }}/code-server/${{ env.IMAGE_NAME }}:${{ env.VERSION }} npm test -- --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: https://dev.code-server.192.168.168.31.nip.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update ArgoCD application
        run: |
          kubectl patch application code-server -n argocd \
            --type='json' \
            -p='[{"op": "replace", "path": "/spec/source/kustomize/images/0/newTag", "value":"${{ env.VERSION }}"}]'

      - name: Sync ArgoCD application
        run: |
          argocd app sync code-server --insecure \
            --server argocd-server.argocd.svc.cluster.local:443 \
            --auth-token=${{ secrets.ARGOCD_TOKEN }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/code-server -n code-server --timeout=5m

      - name: Post deployment notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Development deployment: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

  deploy-prod:
    name: Deploy to Production (Canary)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://code-server.192.168.168.31.nip.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create canary rollout
        run: |
          kubectl patch application code-server-prod -n argocd \
            --type='json' \
            -p='[{"op": "replace", "path": "/spec/source/kustomize/images/0/newTag", "value":"${{ env.VERSION }}"}]'

      - name: Trigger Argo Rollout canary
        run: |
          kubectl argo rollouts promote code-server-canary -n code-server --full=false

      - name: Monitor canary (5 minute window)
        run: |
          for i in {1..30}; do
            ERROR_RATE=$(kubectl get pods -n code-server -l app=code-server-canary -o jsonpath='{.items[0].status.containerStatuses[0].state.running}')
            echo "Canary health check: $i/30"
            sleep 10
          done

      - name: Promote to stable (if canary passed)
        run: |
          kubectl argo rollouts promote code-server-canary -n code-server --full

      - name: Verify production deployment
        run: |
          kubectl rollout status deployment/code-server -n code-server --timeout=10m

      - name: Post production deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "🚀 Production deployment: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author

  regression-tests:
    name: Regression & Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Run smoke tests
        run: |
          POD=$(kubectl get pods -n code-server -l app=code-server -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -it $POD -n code-server -- npm run test:smoke

      - name: Run performance benchmarks
        run: |
          POD=$(kubectl get pods -n code-server -l app=code-server -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -it $POD -n code-server -- npm run bench

      - name: Collect metrics
        run: |
          kubectl top nodes
          kubectl top pods -n code-server

      - name: Report results
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Regression tests: ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: failure()
    environment:
      name: production-recovery

    steps:
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Abort canary rollout
        run: |
          kubectl argo rollouts abort code-server-canary -n code-server

      - name: Trigger automatic rollback
        run: |
          kubectl argo rollouts undo code-server-canary -n code-server

      - name: Verify rollback
        run: |
          kubectl rollout status deployment/code-server -n code-server --timeout=5m

      - name: Alert on-call team
        uses: 8398a7/action-slack@v3
        with:
          status: 'failure'
          text: '🚨 Production deployment FAILED - Automatic rollback executed. On-call team notified.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
