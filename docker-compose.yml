# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION docker-compose.yml — kushin77/code-server
# Deploy host : 192.168.168.31
# NAS         : 192.168.168.56:/export  →  /mnt/nas-56  (host-mounted)
# GPU         : NVIDIA T1000 8GB  (device 1, CUDA_VISIBLE_DEVICES=1)
# Secrets     : all via .env — NEVER hardcoded — see .env.example
# Rollback    : git revert + make deploy  (<60 seconds)
# ═══════════════════════════════════════════════════════════════════════════════

# ── Reusable anchors ──────────────────────────────────────────────────────────
x-logging: &logging
  driver: json-file
  options: { max-size: "10m", max-file: "5" }

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15.6-alpine
    container_name: postgres
    restart: always
    networks: [enterprise]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-codeserver}
      POSTGRES_USER:     ${POSTGRES_USER:-codeserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - /mnt/nas-56/backups/postgres:/backups:rw
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeserver} -d ${POSTGRES_DB:-codeserver}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 256m, cpus: '0.25' }

    logging: *logging

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: always
    networks: [enterprise]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 768m, cpus: '0.5' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── code-server ─────────────────────────────────────────────────────────────
  code-server:
    image: codercom/code-server:4.115.0
    container_name: code-server
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      PASSWORD:       ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD in .env}
      SUDO_PASSWORD:  ${CODE_SERVER_PASSWORD}
      GITHUB_TOKEN:   ${GITHUB_TOKEN:-}
      OLLAMA_ENDPOINT: http://ollama:11434
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=password"
    volumes:
      - nas-code-server:/home/coder:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 4g,    cpus: '2.0' }
        reservations: { memory: 512m, cpus: '0.25' }
    logging: *logging

  # ─── Ollama (GPU MAX — T1000 8GB, device 1) ───────────────────────────────
  ollama:
    image: ollama/ollama:0.1.27
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    networks: [enterprise]
    ports:
      - "0.0.0.0:11434:11434"
    environment:
      OLLAMA_HOST:             0.0.0.0:11434
      CUDA_VISIBLE_DEVICES:    "1"          # T1000 8GB only
      OLLAMA_NUM_GPU:          "1"
      OLLAMA_GPU_LAYERS:       "99"         # full GPU offload
      OLLAMA_KEEP_ALIVE:       "24h"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_THREAD:       ${OLLAMA_NUM_THREAD:-8}
    volumes:
      - nas-ollama:/root/.ollama:rw  # models on NAS (large files)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:   { memory: 12g }
        reservations:
          memory: 8g
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    logging: *logging

  # ─── Ollama model bootstrap (runs once, then exits) ───────────────────────
  ollama-init:
    image: ollama/ollama:0.1.27
    container_name: ollama-init
    restart: on-failure
    networks: [enterprise]
    environment:
      OLLAMA_HOST: ollama:11434
    volumes:
      - nas-ollama:/root/.ollama:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] waiting for ollama..."
        until curl -sf http://ollama:11434/api/tags; do sleep 3; done
        echo "[ollama-init] pulling llama2:7b-chat (fast baseline)"
        ollama pull llama2:7b-chat
        echo "[ollama-init] pulling codellama:7b (code model)"
        ollama pull codellama:7b
        echo "[ollama-init] all models ready"
    depends_on:
      ollama: { condition: service_healthy }
    logging: *logging

  # ─── oauth2-proxy ────────────────────────────────────────────────────────────
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks: [enterprise]
    expose: ["4180"]
    environment:
      OAUTH2_PROXY_CLIENT_ID:                 ${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}
      OAUTH2_PROXY_CLIENT_SECRET:             ${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}
      OAUTH2_PROXY_COOKIE_SECRET:             ${OAUTH2_PROXY_COOKIE_SECRET:?Set OAUTH2_PROXY_COOKIE_SECRET in .env}
      OAUTH2_PROXY_PROVIDER:                  google
      OAUTH2_PROXY_OIDC_ISSUER_URL:           https://accounts.google.com
      OAUTH2_PROXY_REDIRECT_URL:              https://${DOMAIN}/oauth2/callback
      OAUTH2_PROXY_UPSTREAMS:                 http://code-server:8080/
      OAUTH2_PROXY_EMAIL_DOMAINS:             ""
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/allowed-emails.txt
      OAUTH2_PROXY_COOKIE_NAME:               _oauth2_proxy_ide
      OAUTH2_PROXY_COOKIE_SECURE:             "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY:           "true"
      OAUTH2_PROXY_COOKIE_SAMESITE:           lax
      OAUTH2_PROXY_COOKIE_EXPIRE:             24h
      OAUTH2_PROXY_COOKIE_REFRESH:            15m
      OAUTH2_PROXY_HTTP_ADDRESS:              0.0.0.0:4180
      OAUTH2_PROXY_PROXY_WEBSOCKETS:          "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON:      "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST:          "true"
      OAUTH2_PROXY_PASS_USER_HEADERS:         "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH:           "false"
      OAUTH2_PROXY_AUTH_LOGGING:              "true"
      OAUTH2_PROXY_REQUEST_LOGGING:           "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX:           "^/healthz|^/oauth2"
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      code-server: { condition: service_healthy }
    logging: *logging

  # ─── Caddy (TLS termination + reverse proxy) ─────────────────────────────
  caddy:
    image: caddy:2.7.6-alpine
    container_name: caddy
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      code-server:  { condition: service_healthy }
      oauth2-proxy: { condition: service_healthy }
    logging: *logging

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: always
    networks: [enterprise]
    expose: ["9090"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=warn'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - nas-prometheus:/prometheus:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 256m }
    logging: *logging

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_SERVER_DOMAIN:           ${DOMAIN:-192.168.168.31}
      GF_SERVER_ROOT_URL:         "https://grafana.${DOMAIN:-192.168.168.31}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_LOG_LEVEL:               warn
    volumes:
      - nas-grafana:/var/lib/grafana:rw
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── AlertManager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    networks: [enterprise]
    expose: ["9093"]
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=warn'
    volumes:
      - ./alertmanager-production.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Jaeger (Distributed Tracing) ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:16686:16686"   # UI
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "14268"  # Jaeger HTTP
      - "6831"   # Jaeger compact UDP
    environment:
      COLLECTOR_OTLP_ENABLED:    "true"
      METRICS_STORAGE_TYPE:      prometheus
      SPAN_STORAGE_TYPE:         badger
      BADGER_EPHEMERAL:          "false"
      BADGER_DIRECTORY_VALUE:    /badger/data
      BADGER_DIRECTORY_KEY:      /badger/key
    volumes:
      - jaeger-data:/badger
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    external: true   # pre-created: docker network create enterprise

# ─────────────────────────────────────────────────────────────────────────────
# Volumes  (NAS-backed = /mnt/nas-56 bind mounts above; local SSD below)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  # ── Local SSD volumes (fast I/O for databases) ───────────────────────────
  postgres-data:
    driver: local
  redis-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local
  alertmanager-data:
    driver: local
  jaeger-data:
    driver: local

  # ── NAS-backed volumes (192.168.168.56:/export) ───────────────────────────
  nas-ollama:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3,rsize=1048576,wsize=1048576"
      device: ":/export/ollama"
  nas-code-server:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/code-server"
  nas-prometheus:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/prometheus"
  nas-grafana:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/grafana"
