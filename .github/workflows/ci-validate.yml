name: CI Validate

on:
  pull_request:
  push:
    branches: [ main ]

# Ref: #390 — least-privilege permissions
permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit hooks (shellcheck, yamllint, governance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c  # v4
        with:
          python-version: '3.12'

      - name: Install pre-commit + shellcheck
        run: |
          python -m pip install --upgrade pip pre-commit
          sudo apt-get install -y shellcheck

      - name: Cache pre-commit envs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (all files)
        continue-on-error: true
        run: pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: mandatory-redeploy,terraform_fmt,terraform_validate

  governance:
    name: Governance audit (library adoption + MANIFEST)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install make + bash
        run: sudo apt-get install -y make bash

      - name: Library adoption audit (make lib-check)
        run: make lib-check

      - name: MANIFEST registry validation (make index)
        run: |
          make SHELL=/bin/bash index
          # Fail if any active script is unregistered
          violations=$(make SHELL=/bin/bash index 2>&1 | grep -c '✗' || true)
          if [[ "$violations" -gt 0 ]]; then
            echo "::warning::$violations script(s) not registered in scripts/MANIFEST.toml"
            echo "Run: make manifest-init to regenerate, then commit"
          fi

      - name: Zero active log_info() governance violations
        run: |
          count=$(grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
            | grep -vE "_common/|logging\.sh|common-functions\.sh" | wc -l || echo 0)
          echo "Active log_info() violations: $count"
          if [[ "$count" -gt 0 ]]; then
            grep -rl "^log_info() {" scripts/*.sh 2>/dev/null \
              | grep -vE "_common/|logging\.sh|common-functions\.sh" | sed 's/^/  /'
            echo "::warning::$count script(s) define inline log_info() — migrate to _common/init.sh"
            echo "Advisory mode: does not block unrelated PRs."
            exit 0
          fi
          echo "✅ Zero governance violations"

  readme-docs-integrity:
    name: README docs integrity (markdown + local links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install markdownlint-cli
        run: |
          set -euo pipefail
          sudo npm install -g markdownlint-cli@0.39.0

      - name: Lint README markdown structure
        run: |
          set -euo pipefail
          markdownlint README.md

      - name: Validate README local markdown links
        run: |
          set -euo pipefail
          failures=0
          # Validate only local relative links: [text](path)
          while IFS= read -r raw; do
            target=$(echo "$raw" | sed -E 's/^.*\]\(([^)#]+)(#[^)]+)?\).*/\1/')
            # Skip URLs, mailto, and empty anchors.
            if [[ "$target" =~ ^https?:// ]] || [[ "$target" =~ ^mailto: ]] || [[ -z "$target" ]]; then
              continue
            fi
            if [[ ! -e "$target" ]]; then
              echo "::error::README link target does not exist: $target"
              failures=1
            fi
          done < <(grep -oE '\[[^]]+\]\(([^)]+)\)' README.md || true)

          if [[ "$failures" -ne 0 ]]; then
            exit 1
          fi
          echo "README local link check passed"

  # Ref: #400 — explicit shellcheck job (also run via pre-commit above; this gives
  # clear per-file annotations in the PR diff view)
  shellcheck:
    name: Shellcheck — bash-only standards enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all bash scripts
        run: |
          mapfile -t scripts < <(git ls-files --cached '*.sh' '*.bash' \
            | grep -v 'archived/' | grep -v '_archive/' | grep -v 'node_modules/' \
            | grep -v 'scripts/automated-iac-validation.sh' \
            | grep -v 'scripts/ollama-init.sh' \
            | grep -v 'scripts/pre-flight-checklist.sh' \
            | grep -v 'scripts/priority-issue-cli.sh' \
            | grep -v 'scripts/redeploy.sh' \
            | grep -v 'scripts/security-audit.sh' \
            | grep -v 'scripts/validate-topology.sh' \
            | grep -v 'scripts/ci/admin-merge.sh' \
            | grep -v 'scripts/configure-workload-federation-phase2.sh' \
            | grep -v 'scripts/memory-budget-guard.sh')
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No shell scripts found"; exit 0
          fi
          echo "Checking ${#scripts[@]} shell scripts..."
          shellcheck --severity=error --shell=bash "${scripts[@]}"
          echo "✅ Shellcheck passed"

  # Ref: #399 — automated Windows-specific content detection
  linux-mandate:
    name: Linux mandate — no Windows-specific content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for Windows-specific content
        run: bash scripts/ci/check-no-windows-content.sh

  credentials-governance:
    name: Governance — no hardcoded credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check active scripts for hardcoded credential literals
        run: bash scripts/ci/check-no-hardcoded-credentials.sh

  config-drift-detection:
    name: Governance — no config drift (SSOT validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Detect hardcoded config values (IPs, domains, ports)
        run: bash scripts/ci/detect-config-drift.sh

  dockerfile-lint:
    name: Dockerfile lint (hadolint v2.12.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install hadolint
        run: |
          set -euo pipefail
          curl -fsSL -o /usr/local/bin/hadolint \
            "https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64"
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Lint active Dockerfiles
        run: |
          set -euo pipefail
          hadolint Dockerfile Dockerfile.code-server Dockerfile.caddy Dockerfile.ssh-proxy Dockerfile.token-microservice
          echo "✅ Dockerfile linting passed"

  file-header-coverage:
    name: GOV-002 — @file header coverage (active scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check active scripts satisfy GOV-002 metadata policy
        run: bash scripts/ci/check-metadata-headers.sh

  root-hygiene:
    name: Repository root taxonomy check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Check root-level file hygiene
        run: bash scripts/ci/check-root-hygiene.sh --warn-only
