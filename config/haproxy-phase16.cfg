global
  log stdout local0
  log stdout local1 notice
  chroot /var/lib/haproxy
  stats socket /run/haproxy/admin.sock mode 660 level admin
  stats timeout 30s
  user haproxy
  group haproxy
  daemon
  maxconn 50000
  tune.ssl.default-dh-param 2048

defaults
  log     global
  mode    http
  option  httplog
  option  dontlognull
  timeout connect 10000
  timeout client  300000
  timeout server  300000
  timeout http-request 10000
  timeout http-keep-alive 10000
  errorfile 400 /usr/local/etc/haproxy/errors/400.http
  errorfile 403 /usr/local/etc/haproxy/errors/403.http
  errorfile 408 /usr/local/etc/haproxy/errors/408.http
  errorfile 500 /usr/local/etc/haproxy/errors/500.http
  errorfile 502 /usr/local/etc/haproxy/errors/502.http
  errorfile 503 /usr/local/etc/haproxy/errors/503.http
  errorfile 504 /usr/local/etc/haproxy/errors/504.http

# Phase 16: PostgreSQL Load Balancing
frontend postgres_frontend
  bind 0.0.0.0:8080
  mode tcp
  default_backend postgres_backend

backend postgres_backend
  mode tcp
  balance roundrobin
  option tcp-check
  tcp-check connect port 5432
  server postgres-primary postgres-primary-ha:5432 check inter 10s fall 3 rise 1
  server postgres-replica1 postgres-replica-1-ha:5432 check inter 10s fall 3 rise 1 backup
  server postgres-replica2 postgres-replica-2-ha:5432 check inter 10s fall 3 rise 1 backup

# Phase 16: pgBouncer Load Balancing
frontend pgbouncer_frontend
  bind 0.0.0.0:8443
  mode tcp
  default_backend pgbouncer_backend

backend pgbouncer_backend
  mode tcp
  balance leastconn
  server pgbouncer pgbouncer-pool-ha:6432 check inter 10s fall 3 rise 1

# Phase 16: HAProxy Management Interface
listen stats
  bind 0.0.0.0:8404
  stats enable
  stats uri /stats
  stats refresh 30s
  stats show-legends
  stats show-node
  stats admin if TRUE
