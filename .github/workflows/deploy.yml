name: Deploy Code-Server Enterprise IaC

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action to run'
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

# Ref: #390 — least-privilege permissions (deny write by default)
# TODO: pin all action refs to commit SHAs via Renovate (#358)
permissions:
  contents: read

env:
  TF_VERSION: 1.6.0
  TERRAFORM_DIR: .

jobs:
  terraform-validate:
    name: Terraform Validation
    uses: ./.github/workflows/TEMPLATE-validate-iac.yml
    with:
      check_checkov: false
      check_terraform: true
      check_docker_compose: false

  plan:
    name: Plan Deployment
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    permissions:
      contents: read
      pull-requests: write  # allows posting plan summary as PR comment

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan -lock=false

      - name: Upload Plan
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4.3.3
        with:
          name: tfplan
          path: tfplan

  apply:
    name: Apply Deployment
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    # Ref: #390 — requires environment protection (branch + reviewer approval)
    # Create a "production" environment in GitHub -> Settings -> Environments
    environment: production
    concurrency:
      group: deploy-production-control
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write  # allows OIDC token for cloud provider auth (no long-lived secrets)

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: tfplan

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Get Outputs
        run: |
          access_url="$(terraform output -raw code_server_url 2>/dev/null || echo 'https://ide.kushnir.cloud')"
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access URL:** ${access_url}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** All containers deployed and running" >> $GITHUB_STEP_SUMMARY

      - name: Slack Notification
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001  # v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Deployed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC deployment successful\n*URL:* https://ide.kushnir.cloud\n*Deployment:* ${{ github.sha }}"
                  }
                }
              ]
            }

  destroy:
    name: Destroy (Manual Only)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    # Ref: #390 — destructive operation requires explicit approval
    environment: production-destroy
    concurrency:
      group: deploy-production-control
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (destroy preview)
        run: terraform plan -destroy -out=destroy-plan

      - name: Terraform Destroy
        # auto-approve intentionally removed — environment protection gate above
        # provides manual approval; the plan step above previews what will be destroyed
        run: terraform apply destroy-plan

      - name: Slack Notification
        if: success() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@6c661ce58804a1a20f6dc5fbee7f0381b469e001  # v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "Code-Server Enterprise Destroyed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Code-Server Enterprise IaC resources destroyed"
                  }
                }
              ]
            }

  final-status:
    name: Final Deploy Status
    runs-on: ubuntu-latest
    needs: [terraform-validate, plan, apply, destroy]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Evaluate workflow result
        run: |
          validate_result="${{ needs.terraform-validate.result }}"
          plan_result="${{ needs.plan.result }}"
          apply_result="${{ needs.apply.result }}"
          destroy_result="${{ needs.destroy.result }}"

          event="${{ github.event_name }}"
          action="${{ github.event.inputs.action || '' }}"

          echo "## Deploy Workflow Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Event: $event" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: ${action:-n/a}" >> "$GITHUB_STEP_SUMMARY"
          echo "- validate: $validate_result" >> "$GITHUB_STEP_SUMMARY"
          echo "- plan: $plan_result" >> "$GITHUB_STEP_SUMMARY"
          echo "- apply: $apply_result" >> "$GITHUB_STEP_SUMMARY"
          echo "- destroy: $destroy_result" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$event" == "push" ]]; then
            [[ "$validate_result" == "success" && "$plan_result" == "success" && "$apply_result" == "success" ]] || {
              echo "Push deployment path failed" >&2
              exit 1
            }
            exit 0
          fi

          if [[ "$event" == "workflow_dispatch" && "$action" == "deploy" ]]; then
            [[ "$validate_result" == "success" && "$plan_result" == "success" && "$apply_result" == "success" && "$destroy_result" == "skipped" ]] || {
              echo "Manual deploy path failed" >&2
              exit 1
            }
            exit 0
          fi

          if [[ "$event" == "workflow_dispatch" && "$action" == "destroy" ]]; then
            [[ "$destroy_result" == "success" && "$validate_result" == "skipped" && "$plan_result" == "skipped" && "$apply_result" == "skipped" ]] || {
              echo "Manual destroy path failed" >&2
              exit 1
            }
            exit 0
          fi

          echo "Unhandled event/action combination" >&2
          exit 1

  portal-oauth-redeploy:
    name: Portal OAuth Callback Redeploy
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Resolve deployment directory
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "/home/akushnir/code-server-enterprise" ]]; then
            echo "DEPLOY_DIR=/home/akushnir/code-server-enterprise" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          fi

      - name: Validate callback split in compose
        shell: bash
        run: |
          set -euo pipefail
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_IDE_REDIRECT_URL:-${OAUTH2_REDIRECT_URL:-https://ide.kushnir.cloud/oauth2/callback}}"' docker-compose.yml
          grep -qF 'OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_PORTAL_REDIRECT_URL:-https://kushnir.cloud/oauth2/callback}"' docker-compose.yml

      - name: Sync compose and redeploy portal services
        shell: bash
        run: |
          set -euo pipefail
          install -m 0644 docker-compose.yml "$DEPLOY_DIR/docker-compose.yml"
          cd "$DEPLOY_DIR"
          COMPOSE_PROFILES=portal docker compose up -d --remove-orphans oauth2-proxy-portal caddy appsmith

      - name: Verify apex and IDE callbacks
        shell: bash
        run: |
          set -euo pipefail
          apex_location="$(curl -skI 'https://kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          ide_location="$(curl -skI 'https://ide.kushnir.cloud/oauth2/start?rd=%2F' | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^location:/ {print $0}')"
          echo "$apex_location"
          echo "$ide_location"
          echo "$apex_location" | grep -qi 'redirect_uri=https%3A%2F%2Fkushnir.cloud%2Foauth2%2Fcallback'
          echo "$ide_location" | grep -qi 'redirect_uri=https%3A%2F%2Fide.kushnir.cloud%2Foauth2%2Fcallback'
