# Prometheus Configuration for Global Orchestration
# ✅ Immutable, idempotent metrics collection
#
# NOTE: This file is a supplementary scrape config for orchestration services.
# The main prometheus scrape config is in prometheus.yml at the repo root.
# global-orchestrator service (port 9205) is not yet deployed.
# Scrape targets below will be activated when the service is running.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    component: 'global-orchestration-framework'
    monitor: 'prometheus'

# ✅ Alertmanager configurations
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ✅ Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'
  - '/etc/prometheus/rules/*.yaml'

# ========================================
# Scrape Configurations
# ========================================
scrape_configs:
  # ========================================
  # 🟢 Prometheus self-monitoring
  # ========================================
  - job_name: 'prometheus'
    scrape_interval: 30s
    scrape_timeout: 15s
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          region: 'local'

  # ========================================
  # 🟡 Global Orchestrator - PENDING DEPLOYMENT
  # Uncomment after adding global-orchestrator service to docker-compose.tpl
  # ========================================
  # - job_name: 'global-orchestrator'
  #   scrape_interval: 30s
  #   scrape_timeout: 15s
  #   metrics_path: '/metrics'
  #   scheme: 'http'
  #   static_configs:
  #     - targets: ['global-orchestrator:9205']
  #       labels:
  #         service: 'global-orchestrator'
  #         component: 'orchestration-engine'
  #         region: 'primary'
  #   metric_relabel_configs:
  #     - source_labels: [__name__]
  #       regex: '^(orchestrator_.*|global_.*)'
  #       action: keep


# ========================================
# Remote Storage Configuration (optional)
# ========================================
remote_write: []
  # Example for long-term storage:
  # - url: http://thanos:19291/api/v1/receive
  #   queue_config:
  #     capacity: 10000
  #     max_shards: 200
  #     min_shards: 1
  #     max_samples_per_send: 500
  #     batch_send_wait: 5s
  #     min_back_off: 30ms
  #     max_back_off: 100ms

remote_read: []
  # Example for reading from remote storage:
  # - url: http://thanos:10901/api/v1/query

