# otel-collector-config.yaml
#
# OpenTelemetry Collector Configuration
# Aggregates traces from all services and exports to Jaeger backend
#
# Components:
# - Receivers: OTLP/gRPC + OTLP/HTTP
# - Processors: Batch, Memory Limit, Attributes
# - Exporters: Jaeger (local or remote)
#
# Generated by: Phase 3 observability spine implementation

---

receivers:
  # OTLP/gRPC Receiver - Standard protocol for OTEL SDKs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        # Production TLS settings (can be added)
        # tls:
        #   cert_file: /etc/ssl/certs/cert.pem
        #   key_file: /etc/ssl/certs/key.pem
        
      http:
        endpoint: 0.0.0.0:4318
        # Enable compression
        http2_settings:
          max_concurrent_streams: 2000

processors:
  # Memory Limiter - Prevent OOMKill on high cardinality
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
    # Recommended: limit = 80% of container memory
    # spike_limit = 25% of limit
    # For 1GB container: limit=800, spike=200

  # Batch Processor - Reduce overhead of exporting
  batch:
    # Spans are sent when either condition is met:
    # 1. send_batch_size spans accumulated
    # 2. timeout seconds have passed
    send_batch_size: 512
    timeout: 10s
    send_batch_max_size: 1024
    
  # Attributes Processor - Add metadata to all spans
  attributes:
    actions:
      # Add environment tag
      - key: service.environment
        value: "${ENVIRONMENT:development}"
        action: insert
        
      # Add deployment identifier
      - key: deployment.id
        value: "${DEPLOYMENT_ID:local}"
        action: insert
        
      # Add version information
      - key: service.version
        value: "${SERVICE_VERSION:0.1.0}"
        action: insert
        
      # Add region/zone information
      - key: service.namespace
        value: "${NAMESPACE:default}"
        action: insert

exporters:
  # Jaeger Exporter - gRPC protocol (preferred)
  jaeger:
    endpoint: ${JAEGER_ENDPOINT:localhost:14250}
    tls:
      insecure: true
      # Production settings:
      # insecure: false
      # cert_file: /etc/ssl/certs/ca-bundle.crt
    # Retry configuration
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    # Timeout for export requests
    timeout: 10s
    
  # Optional: Console exporter for debugging
  logging:
    loglevel: debug
    # Uncomment for detailed logging
    # sampling_initial: 100
    # sampling_thereafter: 10

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133
    
  # Prometheus metrics for the collector itself
  prometheus:
    address: 0.0.0.0:8888
    
  # Profiling support (pprof)
  pprof:
    endpoint: 0.0.0.0:1777

service:
  # Pipeline configuration
  pipelines:
    # Traces pipeline: Collect all traces
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch
        - attributes
      exporters:
        - jaeger
        # Uncomment for debugging
        # - logging
  
  # Extensions enabled
  extensions:
    - health_check
    - prometheus
    - pprof
  
  # Telemetry settings for the collector itself
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      # Send collector metrics every 30s
      interval: 30s

---

# Environment Variables Reference
# Set these in docker-compose.yml or container environment:
#
# JAEGER_ENDPOINT: Jaeger backend endpoint (default: localhost:14250)
# ENVIRONMENT: Deployment environment tag (development/staging/production)
# DEPLOYMENT_ID: Unique deployment identifier
# SERVICE_VERSION: Service version for traces
# NAMESPACE: Kubernetes namespace or region identifier
#
# Example docker-compose environment:
# environment:
#   - JAEGER_ENDPOINT=jaeger-backend:14250
#   - ENVIRONMENT=production
#   - DEPLOYMENT_ID=prod-us-west-2-01
#   - SERVICE_VERSION=1.0.0
#   - NAMESPACE=production
