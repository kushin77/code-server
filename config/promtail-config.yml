server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: varlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          env: production
    file_sd_configs:
      - files:
          - /var/log/*.log
    relabel_configs:
      - source_labels: ['__path__']
        target_label: 'path'
    pipeline_stages:
      - multiline:
          line_start_pattern: '^\d{4}-\d{2}-\d{2}'
      - json:
          expressions:
            output: log
          skip_parse_error_log: true
      - regex:
          expression: '(?P<json_log>.*)'
          skip_parse_error_log: true
