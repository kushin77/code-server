apiVersion: v1
kind: Service
metadata:
  name: code-server-metrics
  namespace: code-server
  labels:
    app: code-server
    component: metrics
spec:
  selector:
    app: code-server
  ports:
  - name: metrics
    port: 8443
    targetPort: 8443
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: agent-api-metrics
  namespace: code-server
  labels:
    app: agent-api
    component: metrics
spec:
  selector:
    app: agent-api
  ports:
  - name: metrics
    port: 3000
    targetPort: 3000
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: embeddings-metrics
  namespace: code-server
  labels:
    app: embeddings
    component: metrics
spec:
  selector:
    app: embeddings
  ports:
  - name: metrics
    port: 5000
    targetPort: 5000
    protocol: TCP

---
# ServiceMonitor CRD (requires Prometheus Operator to be installed)
# If using standard Prometheus Deployment, remove this section
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: code-server-monitor
  namespace: code-server
  labels:
    app: code-server
    prometheus: monitoring
spec:
  selector:
    matchLabels:
      app: code-server
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-api-monitor
  namespace: code-server
  labels:
    app: agent-api
    prometheus: monitoring
spec:
  selector:
    matchLabels:
      app: agent-api
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: embeddings-monitor
  namespace: code-server
  labels:
    app: embeddings
    prometheus: monitoring
spec:
  selector:
    matchLabels:
      app: embeddings
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics

---
# PrometheusRule CRD for alerting rules (requires Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: code-server-rules
  namespace: code-server
  labels:
    prometheus: monitoring
spec:
  groups:
  - name: code-server.rules
    interval: 30s
    rules:
    - alert: CodeServerDown
      expr: up{job="code-server"} == 0
      for: 5m
      annotations:
        summary: "Code Server is down"
        description: "Code Server pod {{ $labels.pod }} has been down for more than 5 minutes"
    
    - alert: CodeServerHighCPU
      expr: rate(container_cpu_usage_seconds_total{pod=~"code-server.*"}[5m]) > 0.8
      for: 5m
      annotations:
        summary: "Code Server high CPU usage"
        description: "Code Server pod {{ $labels.pod }} CPU usage is above 80%"
    
    - alert: CodeServerHighMemory
      expr: container_memory_usage_bytes{pod=~"code-server.*"} / container_spec_memory_limit_bytes > 0.8
      for: 5m
      annotations:
        summary: "Code Server high memory usage"
        description: "Code Server pod {{ $labels.pod }} memory usage is above 80%"

  - name: agent-api.rules
    interval: 30s
    rules:
    - alert: AgentAPIDown
      expr: up{job="agent-api"} == 0
      for: 5m
      annotations:
        summary: "Agent API is down"
        description: "Agent API pod {{ $labels.pod }} has been down for more than 5 minutes"
    
    - alert: AgentAPIHighLatency
      expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{service="agent-api"}[5m])) > 1
      for: 5m
      annotations:
        summary: "Agent API high latency"
        description: "Agent API P99 latency is above 1 second"

  - name: embeddings.rules
    interval: 30s
    rules:
    - alert: EmbeddingsDown
      expr: up{job="embeddings"} == 0
      for: 5m
      annotations:
        summary: "Embeddings service is down"
        description: "Embeddings pod {{ $labels.pod }} has been down for more than 5 minutes"
    
    - alert: EmbeddingsHighMemory
      expr: container_memory_usage_bytes{pod=~"embeddings.*"} / container_spec_memory_limit_bytes > 0.9
      for: 3m
      annotations:
        summary: "Embeddings service high memory"
        description: "Embeddings pod {{ $labels.pod }} memory usage is critical (>90%)"
