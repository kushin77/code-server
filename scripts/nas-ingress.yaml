# NAS k8s ingress: SSL passthrough for ide.kushnir.cloud → Windows PC (192.168.168.174:443)
# Apply on NAS: kubectl apply -f nas-ingress.yaml
#
# Requires nginx-ingress with --enable-ssl-passthrough
# Check: kubectl -n ingress-nginx get deploy ingress-nginx-controller -o jsonpath='{.spec.template.spec.containers[0].args}' | tr , '\n' | grep ssl-passthrough
# Enable: kubectl -n ingress-nginx patch deploy ingress-nginx-controller --type=json \
#   -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--enable-ssl-passthrough"}]'
---
apiVersion: v1
kind: Service
metadata:
  name: ide-windows-backend
  namespace: defaul
spec:
  ports:
    - port: 443
      targetPort: 443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ide-windows-backend
  namespace: defaul
subsets:
  - addresses:
      - ip: 192.168.168.174
    ports:
      - port: 443
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ide-kushnir-cloud
  namespace: defaul
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: ide.kushnir.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ide-windows-backend
                port:
                  number: 443
