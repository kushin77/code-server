---
# Phase 26-C: Organizations API Deployment
# Production-ready Kubernetes manifest with auto-scaling, health checks, and monitoring

apiVersion: v1
kind: ServiceAccount
metadata:
  name: organization-api
  namespace: code-server
  labels:
    app: organization-api
    phase: 26-c

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: organization-api-config
  namespace: code-server
  labels:
    app: organization-api
data:
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  DB_SSL_ENABLED: "true"
  RATE_LIMITER_ENDPOINT: "http://rate-limiter:3000/check"
  ANALYTICS_ENDPOINT: "http://analytics-api:3000/api/metrics"
  CACHE_ENABLED: "true"
  CACHE_REDIS_HOST: "redis.code-server"
  CACHE_REDIS_PORT: "6379"
  CACHE_TTL_SECONDS: "3600"

---
apiVersion: v1
kind: Service
metadata:
  name: organization-api
  namespace: code-server
  labels:
    app: organization-api
    phase: 26-c
spec:
  type: ClusterIP
  selector:
    app: organization-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  sessionAffinity: None

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: organization-api
  namespace: code-server
  labels:
    app: organization-api
    phase: 26-c
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: organization-api
  
  template:
    metadata:
      labels:
        app: organization-api
        phase: 26-c
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    
    spec:
      serviceAccountName: organization-api
      
      # Pod disruption budget (maintain at least 1 healthy pod)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - organization-api
                topologyKey: kubernetes.io/hostname
      
      # Security context
      securityContext:
        fsGroup: 1000
      
      containers:
        - name: organization-api
          image: "node:20.10-alpine"  # Base image (override with custom image in production)
          imagePullPolicy: IfNotPresent
          
          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
          
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          
          env:
            # PostgreSQL connection
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: name
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: database-config
                  key: user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: password
            
            # Configuration from ConfigMap
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: organization-api-config
                  key: LOG_LEVEL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: organization-api-config
                  key: NODE_ENV
            - name: DB_SSL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: organization-api-config
                  key: DB_SSL_ENABLED
            - name: RATE_LIMITER_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: organization-api-config
                  key: RATE_LIMITER_ENDPOINT
            - name: ANALYTICS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: organization-api-config
                  key: ANALYTICS_ENDPOINT
          
          # Resource limits
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          # Liveliness probe (restart if unhealthy)
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe (remove from load balancer if not ready)
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Lifecycle hooks
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Graceful shutdown delay

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: organization-api
  namespace: code-server
  labels:
    app: organization-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: organization-api
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: organization-api
  namespace: code-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: organization-api

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: organization-api
  namespace: code-server
  labels:
    app: organization-api
spec:
  selector:
    matchLabels:
      app: organization-api
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
