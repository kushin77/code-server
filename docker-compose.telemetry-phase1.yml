# docker-compose.telemetry-phase1.yml
# TELEMETRY PHASE 1 ADDITIONS: Structured Logging (Loki + Promtail)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.telemetry-phase1.yml up -d
# Status: READY FOR IMMEDIATE DEPLOYMENT
# Date: April 15, 2026

# Add to existing services for Telemetry Phase 1:
# - Loki: Log aggregation backend (replaces syslog)
# - Promtail: Log shipper (collects Docker container logs → Loki)
# - Trace propagation: Caddy adds X-Trace-ID headers
# - OpenTelemetry: Application-level instrumentation

version: '3.8'

services:

  # ─── Loki (Log Aggregation Backend) ──────────────────────────────────────────
  # Stores all application and infrastructure logs in queryable format
  # Queried via LogQL from Grafana datasource
  loki:
    image: grafana/loki:2.10.0
    container_name: loki
    restart: always
    networks: [enterprise]
    expose: ["3100"]
    command:
      - -config.file=/etc/loki/loki-config.yml
      - -print-config-stderr=false
    volumes:
      - ./config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 256m }
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5

  # ─── Promtail (Log Shipper) ──────────────────────────────────────────────────
  # Collects all container logs and sends to Loki
  # Adds labels: container_name, service, environment, trace_id
  promtail:
    image: grafana/promtail:2.10.0
    container_name: promtail
    restart: always
    networks: [enterprise]
    expose: ["9080"]
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/:/var/log:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      loki: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.25' }
        reservations: { memory: 128m }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

  # ─── Redis Exporter (Metrics for Redis) ──────────────────────────────────────
  # Exports Redis metrics to Prometheus for monitoring
  # Enables: memory usage, hits/misses, replication lag, etc.
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: always
    networks: [enterprise]
    expose: ["9121"]
    command:
      - -redis.addr=redis:6379
      - -redis.password=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      - -namespace=redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9121/metrics | grep -q redis"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.1' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

  # ─── PostgreSQL Exporter (Metrics for PostgreSQL) ──────────────────────────────
  # Exports PostgreSQL metrics to Prometheus for monitoring
  # Enables: query latency, connection count, cache hit ratio, replication lag, etc.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: always
    networks: [enterprise]
    expose: ["9187"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics | grep -q postgres"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.1' }
        reservations: { memory: 64m }
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3

networks:
  enterprise:
    external: true

volumes:
  loki-data:
    driver: local
