name: CI - Lint & Format

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'

permissions:
  contents: read

env:
  COST_CATEGORY: "ci-lint"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 5

      - name: Run linter
        run: npm run lint
        timeout-minutes: 5

      - name: Format check
        run: npm run format:check || npm run prettier -- --check . || true
        timeout-minutes: 5

      - name: Report metrics
        if: always()
        run: |
          echo "::notice::Cost-Category: ci-lint"
          echo "::notice::Runner: ${{ runner.os }}-${{ runner.arch }}"

      - name: Cleanup
        if: always()
        run: |
          npm cache clean --force 2>/dev/null || true
          docker system prune -af 2>/dev/null || true

  spell-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Spell check
        uses: crate-ci/typos@8e2e20556d0ec4fe80ca703f6fb5d89ed3ef2596  # master
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: docker system prune -af 2>/dev/null || true
