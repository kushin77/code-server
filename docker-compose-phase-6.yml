version: '3.9'

services:
  # Phase 6a: PgBouncer Connection Pooling
  pgbouncer:
    image: edoburu/pgbouncer:1.18-latest
    container_name: pgbouncer
    networks:
      - backend
    ports:
      - "6432:6432"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER: postgres
      DATABASES_PASSWORD: ${DB_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 500
      PGBOUNCER_DEFAULT_POOL_SIZE: 100
      PGBOUNCER_MIN_POOL_SIZE: 25
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "psql", "-U", "postgres", "-c", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Phase 6b: HashiCorp Vault for Secret Management
  vault:
    image: vault:1.15.0
    container_name: vault
    networks:
      - backend
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://localhost:8200
    volumes:
      - vault_data:/vault/data
      - ./vault-config.hcl:/vault/config/vault-config.hcl:ro
    cap_add:
      - IPC_LOCK
    command: server -config=/vault/config/vault-config.hcl
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Phase 6c: Load Testing Agent (runs on-demand)
  locust:
    image: locustio/locust:latest
    container_name: locust
    networks:
      - frontend
    ports:
      - "8089:8089"
    environment:
      TARGET_HOST: http://caddy
      LOCUST_USERS: 100
      LOCUST_SPAWN_RATE: 10
    volumes:
      - ./locustfile.py:/locustfile.py:ro
    command: -f /locustfile.py --headless -u ${LOCUST_USERS:-100} -r ${LOCUST_SPAWN_RATE:-10}
    depends_on:
      - caddy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend:
    name: backend
    driver: bridge
  frontend:
    name: frontend
    driver: bridge
  monitoring:
    name: monitoring
    driver: bridge

volumes:
  vault_data:
    driver: local
