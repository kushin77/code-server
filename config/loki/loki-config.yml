# ════════════════════════════════════════════════════════════════
# Loki Configuration - On-Prem Production
# Version: 2.9.4 single-node (common config pattern)
# Date: April 15, 2026
# ════════════════════════════════════════════════════════════════

auth_enabled: true  # Authentication REQUIRED - each service has auth token

# Basic auth credentials for per-service access (override in deployment)
# Each service uses unique tenant_id to isolate logs
auth:
  type: basic
  basic_auth:
    realm: "Loki Production"

server:
  http_listen_port: 3100
  log_level: warn
  http_server_read_timeout: 600s
  http_server_write_timeout: 600s

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 15
  max_streams_per_user: 10000
  # Retention policy: keep logs for 30 days
  retention_period: 720h

analytics:
  reporting_enabled: false

# Compaction and retention cleanup
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 100
  delete_request_cancel_period: 24h
