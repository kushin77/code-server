version: '3.8'

services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD:-}
      - SUDO_PASSWORD=${CODE_SERVER_PASSWORD:-}
      - NODE_OPTIONS=--max-workers=8 --expose-gc
      - NODE_ENV=production
    volumes:
      - ${CODE_SERVER_DATA:-./data}:/home/coder
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8443"
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 3.0
    tmpfs:
      - /tmp
      - /run
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - code-server-net
    labels:
      - "com.example.tier=1-optimized"
      - "com.example.version=2026-04-13"
    sysctls:
      - net.ipv4.tcp_keepalives_intvl=15
      - net.ipv4.tcp_keepalives_probes=5

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ${CADDY_CONFIG:-./Caddyfile}:/etc/caddy/Caddyfile
      - ${CADDY_DATA:-caddy-data}:/data
      - ${CADDY_CONFIG:.}:/config
    environment:
      - CADDY_ADMIN=127.0.0.1:2019
    expose:
      - "3000"
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    depends_on:
      code-server:
        condition: service_healthy
    networks:
      - code-server-net
    labels:
      - "com.example.tier=1-optimized"
      - "com.example.version=2026-04-13"

networks:
  code-server-net:
    driver: bridge
    driver_opts:
      com.docker.driver.mtu: 1450

volumes:
  caddy-data:
    driver: local

