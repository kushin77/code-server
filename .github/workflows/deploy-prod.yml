name: Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'services/**'
      - 'extensions/**'
      - '.github/workflows/deploy-prod.yml'
  workflow_run:
    workflows: ["Test Suite & Coverage", "Deploy to Staging"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - rollback
          - canary
          - emergency-rollback

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TF_VERSION: 1.5.7
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  approval:
    name: Require Approval
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: production
    
    steps:
      - name: Approval Granted
        run: echo "Approved for production deployment"

  pre-deploy-checks:
    name: Pre-Deployment Checks
    runs-on: ubuntu-latest
    needs: [approval]
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - name: Check Git Tags
        run: |
          echo "Latest tag: $(git describe --latest --tags || echo 'none')"
          git log --oneline -5

      - name: Verify Release Notes
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "Warning: CHANGELOG.md missing"
          fi

      - name: Check Dependencies
        run: |
          cd extensions/agent-farm
          npm audit --production --audit-level=moderate
        continue-on-error: true

      - name: Verify Terraform State
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          
          cd terraform
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
          terraform state list | head -20

  security-gate:
    name: Production Security Gate
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Check SLSA Provenance
        run: |
          echo "Verifying supply chain security"
          # Add SLSA verification when ready

      - name: Fail on Critical Vulns
        run: |
          if grep -q '"level": "CRITICAL"' trivy-results.sarif; then
            echo "Critical vulnerabilities found - blocking deployment"
            exit 1
          fi

  build-production:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, security-gate]
    if: always() && needs.pre-deploy-checks.result == 'success'
    permissions:
      contents: read
      packages: write
      id-token: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=prod-
            type=raw,value=prod-latest

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tags }}
          format: cyclonedx
          output-file: sbom-cyclonedx.json

      - name: Sign Image
        run: |
          echo "Setting up cosign for image signing"
          # cosign sign --key ${{ secrets.COSIGN_PRIVATE_KEY }} \
          #   ${{ steps.meta.outputs.tags }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build-production]
    if: needs.build-production.result == 'success'
    environment:
      name: production
      url: https://code-server.external
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -upgrade

      - name: Backup Current State
        run: |
          cd terraform
          terraform state pull > state.backup.json
          aws s3 cp state.backup.json \
            s3://${{ secrets.TF_STATE_BUCKET }}/backups/$(date +%Y%m%d-%H%M%S).json

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan \
            -var-file=terraform.tfvars.production \
            -var="code_server_image=${{ needs.build-production.outputs.image-tag }}" \
            -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply tfplan

      - name: Blue-Green Rollout
        run: |
          kubectl patch deployment code-server -n code-server \
            -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxSurge":1,"maxUnavailable":0}}}}'
          kubectl rollout status deployment/code-server -n code-server --timeout=10m

      - name: Production Health Checks
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh production
          ./scripts/comprehensive-test.sh
        continue-on-error: true

      - name: Smoke Tests
        run: |
          npm run test:smoke:production || true
        continue-on-error: true

      - name: Performance Validation
        run: |
          npm run perf:validate:production || true
        continue-on-error: true

      - name: Notify Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Production Deploy Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\n*Branch:* main\n*Commit:* ${{ github.sha }}\n*Image:* ${{ needs.build-production.outputs.image-tag }}"
                  }
                }
              ]
            }

      - name: Notify Failure & Rollback
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Production Deploy Failed - Initiating Rollback",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Failed*\n*Branch:* main\n*Commit:* ${{ github.sha }}\nInitiating automatic rollback..."
                  }
                }
              ]
            }

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Rollback Deployment
        run: |
          kubectl rollout undo deployment/code-server -n code-server
          kubectl rollout status deployment/code-server -n code-server --timeout=5m

      - name: Verify Rollback
        run: |
          chmod +x scripts/health-check.sh
          ./scripts/health-check.sh production

      - name: Notify Rollback
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ env.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🔄 Production Rollback Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Automatic rollback completed*\n*Previous version restored*"
                  }
                }
              ]
            }

permissions:
  contents: read
  packages: write
  id-token: write
