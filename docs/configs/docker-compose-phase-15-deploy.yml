version: '3.9'

services:
  # Phase 15: Redis Cluster for Advanced Caching
  redis-1:
    image: redis:7-alpine
    container_name: redis-phase15-1
    ports:
      - "6379:6379"
    command: >
      redis-server --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    volumes:
      - redis-phase15-1:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-2:
    image: redis:7-alpine
    container_name: redis-phase15-2
    ports:
      - "6380:6379"
    command: >
      redis-server --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    volumes:
      - redis-phase15-2:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-3:
    image: redis:7-alpine
    container_name: redis-phase15-3
    ports:
      - "6381:6379"
    command: >
      redis-server --cluster-enabled yes
      --cluster-config-file /data/nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    volumes:
      - redis-phase15-3:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Phase 15: Prometheus Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-phase15
    ports:
      - "9090:9090"
    volumes:
      - prometheus-phase15:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=5m'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Phase 15: Load Testing - Locust
  locust:
    image: locustio/locust:latest
    container_name: locust-phase15
    ports:
      - "8089:8089"
    environment:
      - LOCUST_MODE=master
      - LOCUST_HEADLESS=1
      - LOCUST_USERS=500
      - LOCUST_SPAWN_RATE=50
      - LOCUST_RUN_TIME=1h
    volumes:
      - ./locustfiles:/home/locust
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/"]
      interval: 20s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis-phase15-1:
    driver: local
  redis-phase15-2:
    driver: local
  redis-phase15-3:
    driver: local
  prometheus-phase15:
    driver: local

networks:
  default:
    name: phase-15-network
