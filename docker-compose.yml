# ═══════════════════════════════════════════════════════════════════════════════
# PRODUCTION docker-compose.yml — kushin77/code-server [PARAMETERIZED]
# Deploy host : ${DEPLOY_HOST}  (ssh ${DEPLOY_USER}@${DEPLOY_HOST})
# NAS primary : ${NAS_PRIMARY_HOST}:${NAS_PRIMARY_EXPORT}  →  ${NAS_PRIMARY_MOUNT}
# NAS replica : ${NAS_REPLICA_HOST}:${NAS_REPLICA_EXPORT}  →  ${NAS_REPLICA_MOUNT}
# GPU         : NVIDIA T1000 8GB  (device index 1, cuda:1, VRAM 8GB)
#               NVIDIA NVS 510     (device index 0, cuda:0, 2GB — monitoring)
# Caddy       : ${CADDY_VERSION} (TLS internal, all *.${DOMAIN} subdomains)
# Secrets     : all via .env — NEVER hardcoded — see .env.example
# Rollback    : git revert <sha> && git push && ssh to ${DEPLOY_HOST} && make deploy (<60s)
# 
# PRODUCTION-FIRST: ALL values from config/_base-config.env + .env
# Zero hardcoded values. Full parameterization.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Reusable anchors ──────────────────────────────────────────────────────────
x-logging: &logging
  driver: ${DOCKER_LOGGING_DRIVER}
  options:
    max-size: ${DOCKER_LOGGING_MAX_SIZE}
    max-file: ${DOCKER_LOGGING_MAX_FILE}

services:

  # ─── CoreDNS ──────────────────────────────────────────────────────────────────
  # Internal DNS resolver for *.prod.internal service discovery
  # All hosts point to this for .prod.internal domain resolution
  coredns:
    image: coredns/coredns:${COREDNS_VERSION:-1.11.1}
    container_name: coredns
    restart: always
    networks: [enterprise]
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./config/coredns/Corefile:/etc/coredns/Corefile:ro
      - ./config/coredns/zones:/etc/coredns/zones:ro
    command: -conf /etc/coredns/Corefile
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 primary.prod.internal +short | grep -q 192.168.168.31"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *logging

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    restart: always
    networks: [enterprise]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ${NAS_PRIMARY_MOUNT}/postgres-backups:/backups:rw
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${POSTGRES_HEALTHCHECK_INTERVAL}
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT}
      retries: ${POSTGRES_HEALTHCHECK_RETRIES}
      start_period: ${POSTGRES_HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT}
          cpus: '${POSTGRES_CPU_LIMIT}'
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVE}
          cpus: '${POSTGRES_CPU_RESERVE}'
    logging: *logging

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:${REDIS_VERSION}
    container_name: redis
    restart: always
    networks: [enterprise]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY}
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: ${REDIS_HEALTHCHECK_INTERVAL}
      timeout: ${REDIS_HEALTHCHECK_TIMEOUT}
      retries: ${REDIS_HEALTHCHECK_RETRIES}
      start_period: ${REDIS_HEALTHCHECK_START_PERIOD}
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT}
          cpus: '${REDIS_CPU_LIMIT}'
        reservations:
          memory: ${REDIS_MEMORY_RESERVE}
    logging: *logging

  # ─── code-server ─────────────────────────────────────────────────────────────
  code-server:
    image: codercom/code-server:${CODE_SERVER_VERSION}
    container_name: code-server
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:${CODE_SERVER_PORT}:8080"
    environment:
      PASSWORD:        ${CODE_SERVER_PASSWORD:?Set CODE_SERVER_PASSWORD in .env}
      SUDO_PASSWORD:   ${CODE_SERVER_PASSWORD}
      GITHUB_TOKEN:    ${GITHUB_TOKEN:-}
      OLLAMA_ENDPOINT: http://ollama:${OLLAMA_PORT}
    command:
      - "--bind-addr=0.0.0.0:8080"
      - "--disable-telemetry"
      - "--cert=false"
      - "--auth=none"
    volumes:
      - code-server-data:/home/coder:rw
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${CODE_SERVER_PORT}/healthz"]
      interval: ${CODE_SERVER_HEALTHCHECK_INTERVAL}
      timeout: ${CODE_SERVER_HEALTHCHECK_TIMEOUT}
      retries: ${CODE_SERVER_HEALTHCHECK_RETRIES}
      start_period: ${CODE_SERVER_HEALTHCHECK_START_PERIOD}
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
    deploy:
      resources:
        limits:
          memory: ${CODE_SERVER_MEMORY_LIMIT}
          cpus: '${CODE_SERVER_CPU_LIMIT}'
        reservations:
          memory: ${CODE_SERVER_MEMORY_RESERVE}
          cpus: '${CODE_SERVER_CPU_RESERVE}'
    logging: *logging

  # ─── Ollama (GPU MAX — T1000 8GB, device 1, full CUDA offload) ─────────────
  # Profile: ollama - Enable with: docker-compose --profile ollama up -d
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION}
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    networks: [enterprise]
    ports:
      - "0.0.0.0:${OLLAMA_PORT}:${OLLAMA_PORT}"
    profiles: ["ollama"]
    # Explicit device mounts are required with snap Docker nvidia runtime
    # snap's nvidia-container-runtime needs /dev/nvidia<N> explicitly bound
    # to enable CUDA compute (utility-only mode doesn't expose compute context)
    devices:
      - ${OLLAMA_DEVICE_NVIDIA1}:${OLLAMA_DEVICE_NVIDIA1}
      - ${OLLAMA_DEVICE_NVIDIACTL}:${OLLAMA_DEVICE_NVIDIACTL}
      - ${OLLAMA_DEVICE_UVM}:${OLLAMA_DEVICE_UVM}
      - ${OLLAMA_DEVICE_UVM_TOOLS}:${OLLAMA_DEVICE_UVM_TOOLS}
    environment:
      OLLAMA_HOST:              ${OLLAMA_HOST_ADDR}
      CUDA_VISIBLE_DEVICES:     ${OLLAMA_CUDA_VISIBLE_DEVICES}
      NVIDIA_VISIBLE_DEVICES:   ${OLLAMA_NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH:          /var/lib/snapd/hostfs/usr/lib/x86_64-linux-gnu
      OLLAMA_NUM_GPU:           ${OLLAMA_NUM_GPU}
      OLLAMA_GPU_LAYERS:        ${OLLAMA_GPU_LAYERS}
      OLLAMA_KEEP_ALIVE:        ${OLLAMA_KEEP_ALIVE}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS}
      OLLAMA_NUM_THREAD:        ${OLLAMA_NUM_THREAD}
      OLLAMA_FLASH_ATTENTION:   ${OLLAMA_FLASH_ATTENTION}
      OLLAMA_NUM_PARALLEL:      ${OLLAMA_NUM_PARALLEL}
      OLLAMA_MAX_VRAM:          ${OLLAMA_MAX_VRAM}
    volumes:
      - ${NAS_PRIMARY_MOUNT}/ollama:/root/.ollama:rw
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: ${OLLAMA_HEALTHCHECK_INTERVAL:-30s}
      timeout: ${OLLAMA_HEALTHCHECK_TIMEOUT:-10s}
      retries: 3
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT}
        reservations:
          memory: 8g
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    logging: *logging

  # ─── Ollama model bootstrap (runs once, then exits) ───────────────────────
  # Profile: ollama - Enable with: docker-compose --profile ollama up -d
  ollama-init:
    image: ollama/ollama:${OLLAMA_VERSION}
    container_name: ollama-init
    restart: on-failure
    networks: [enterprise]
    profiles: ["ollama"]
    environment:
      OLLAMA_HOST: http://ollama:${OLLAMA_PORT}
    volumes:
      - ${NAS_PRIMARY_MOUNT}/ollama:/root/.ollama:rw
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[ollama-init] waiting for ollama..."
        until ollama list >/dev/null 2>&1; do sleep 5; done
        echo "[ollama-init] pulling llama2:7b-chat (fast baseline)"
        ollama pull llama2:7b-chat
        echo "[ollama-init] pulling codellama:7b (code model)"
        ollama pull codellama:7b
        echo "[ollama-init] all models ready"
    depends_on:
      ollama: { condition: service_healthy }
    logging: *logging

  # ─── oauth2-proxy ────────────────────────────────────────────────────────────
  # Central authentication service: Google OAuth2 for SSO across all endpoints
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    restart: unless-stopped
    networks: [enterprise]
    expose: ["4180"]
    environment:
      OAUTH2_PROXY_CLIENT_ID:                 ${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}
      OAUTH2_PROXY_CLIENT_SECRET:             ${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}
      OAUTH2_PROXY_COOKIE_SECRET:             ${OAUTH2_PROXY_COOKIE_SECRET:?Set OAUTH2_PROXY_COOKIE_SECRET in .env}
      OAUTH2_PROXY_PROVIDER:                  google
      OAUTH2_PROXY_OIDC_ISSUER_URL:           https://accounts.google.com
      OAUTH2_PROXY_REDIRECT_URL:              https://${DOMAIN}/oauth2/callback
      # Multi-service routing with path-based proxying
      OAUTH2_PROXY_UPSTREAMS:                 http://code-server:8080/=http://code-server:8080|http://grafana:3000/grafana=http://grafana:3000|http://prometheus:9090/prometheus=http://prometheus:9090|http://jaeger:16686/jaeger=http://jaeger:16686|http://alertmanager:9093/alertmanager=http://alertmanager:9093
      OAUTH2_PROXY_EMAIL_DOMAINS:             "*"
      OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE: /etc/oauth2-proxy/allowed-emails.txt
      OAUTH2_PROXY_COOKIE_NAME:               _oauth2_proxy_ide
      OAUTH2_PROXY_COOKIE_SECURE:             "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY:           "true"
      OAUTH2_PROXY_COOKIE_SAMESITE:           lax
      OAUTH2_PROXY_COOKIE_EXPIRE:             24h
      OAUTH2_PROXY_COOKIE_REFRESH:            15m
      OAUTH2_PROXY_HTTP_ADDRESS:              0.0.0.0:4180
      OAUTH2_PROXY_PROXY_WEBSOCKETS:          "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON:      "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST:          "true"
      OAUTH2_PROXY_PASS_USER_HEADERS:         "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH:           "false"
      OAUTH2_PROXY_AUTH_LOGGING:              "true"
      OAUTH2_PROXY_REQUEST_LOGGING:           "true"
      OAUTH2_PROXY_SKIP_AUTH_REGEX:           "^/healthz|^/oauth2|^/ping"
      # SSO configuration: share session across subpaths
      OAUTH2_PROXY_COOKIE_DOMAIN:             .${DOMAIN}
    volumes:
      - ./allowed-emails.txt:/etc/oauth2-proxy/allowed-emails.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4180/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      code-server: { condition: service_healthy }
    logging: *logging

  # ─── Caddy (TLS termination + reverse proxy) — v2.9.1 ───────────────────────
  # TLS + reverse proxy for ide.kushnir.cloud → oauth2-proxy → services
  caddy:
    image: caddy:2.9.1-alpine
    container_name: caddy
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-config:/config
      - caddy-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      oauth2-proxy: { condition: service_healthy }
    logging: *logging

  # ─── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: always
    networks: [enterprise]
    expose: ["9090"]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=warn'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - ./alert-rules-gaps-374.yml:/etc/prometheus/alert-rules-gaps-374.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 256m }
    logging: *logging

  # ─── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_SERVER_DOMAIN:           ${DOMAIN:-192.168.168.31}
      GF_SERVER_ROOT_URL:         "https://grafana.${DOMAIN:-192.168.168.31}"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_LOG_LEVEL:               warn
    volumes:
      - nas-grafana:/var/lib/grafana:rw
      - ./grafana/provisioning:/etc/grafana/provisioning:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus: { condition: service_healthy }
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── AlertManager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: always
    networks: [enterprise]
    expose: ["9093"]
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=warn'
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Jaeger (Distributed Tracing) ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: jaeger
    restart: always
    networks: [enterprise]
    ports:
      - "0.0.0.0:16686:16686"   # UI
    expose:
      - "4317"   # OTLP gRPC
      - "4318"   # OTLP HTTP
      - "14268"  # Jaeger HTTP
      - "6831"   # Jaeger compact UDP
    environment:
      COLLECTOR_OTLP_ENABLED:    "true"
      METRICS_STORAGE_TYPE:      prometheus
      SPAN_STORAGE_TYPE:         badger
      BADGER_EPHEMERAL:          "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 6 ENHANCEMENTS
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 6a: PgBouncer (Connection Pooling) ────────────────────────────────
  # Profile: pgbouncer - Enable with: docker-compose --profile pgbouncer up -d
  pgbouncer:
    image: pgbouncer/pgbouncer:1.21-latest
    container_name: pgbouncer
    restart: always
    networks: [enterprise]
    profiles: ["pgbouncer"]
    ports:
      - "0.0.0.0:6432:6432"
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_USER:             ${POSTGRES_USER:-postgres}
      DATABASES_PASSWORD:         ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGBOUNCER_POOL_MODE:        transaction
      PGBOUNCER_MAX_CLIENT_CONN:  1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 100
      PGBOUNCER_MIN_POOL_SIZE:    25
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -U ${POSTGRES_USER:-postgres} -c 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 512m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Phase 6b: HashiCorp Vault (Secret Management) ─────────────────────────
  # Profile: vault - Enable with: docker-compose --profile vault up -d
  vault:
    image: vault:1.15.0
    container_name: vault
    restart: always
    networks: [enterprise]
    profiles: ["vault"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID:    ${VAULT_ROOT_TOKEN:?Set VAULT_ROOT_TOKEN in .env}
      VAULT_DEV_LISTEN_ADDRESS:   0.0.0.0:8200
      VAULT_ADDR:                 http://localhost:8200
      VAULT_UI:                   "true"
    volumes:
      - vault-data:/vault/data
    cap_add:
      - IPC_LOCK
    command: server -dev -dev-root-token-id=$${VAULT_DEV_ROOT_TOKEN_ID}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/v1/sys/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 1g,    cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── Phase 6c: Locust (Load Testing) ────────────────────────────────────────
  # Profile: load-test - Enable with: docker-compose --profile load-test up -d
  locust:
    image: locustio/locust:latest
    container_name: locust
    restart: "no"
    networks: [enterprise]
    profiles: ["load-test"]
    ports:
      - "0.0.0.0:8089:8089"
    environment:
      TARGET_HOST:     http://caddy:80
      LOCUST_USERS:    ${LOCUST_USERS:-100}
      LOCUST_SPAWN_RATE: ${LOCUST_SPAWN_RATE:-10}
      LOCUST_RUN_TIME: ${LOCUST_RUN_TIME:-5m}
    volumes:
      - ./locustfile.py:/locustfile.py:ro
    command: -f /locustfile.py --web -u $${LOCUST_USERS} -r $${LOCUST_SPAWN_RATE}
    depends_on:
      caddy:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8089/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 2g,    cpus: '1.0' }
        reservations: { memory: 512m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 8 SECURITY ENHANCEMENTS
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 8e: Falco (Runtime Security — eBPF Syscall Monitoring) ─────────────
  falco:
    image: falcosecurity/falco-no-driver:0.37.1
    container_name: falco
    restart: unless-stopped
    privileged: true
    networks: [enterprise]
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - ./config/falco:/etc/falco:ro
      - falco-data:/var/lib/falco
    environment:
      FALCO_GRPC_ENABLED: "true"
      FALCO_GRPC_BIND_ADDRESS: "0.0.0.0:5060"
      DEBUG: "false"
    command:
      - /usr/bin/falco
      - --modern-bpf
      - -pc
      - -o json_output=true
      - -o json_include_output_property=true
    expose:
      - "5060"
      - "8765"
    healthcheck:
      test: ["CMD-SHELL", "falco --version"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 256m, cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  # ─── Phase 8e: Falcosidekick (Falco Alert Forwarding to AlertManager) ────────
  falcosidekick:
    image: falcosecurity/falcosidekick:2.28.0
    container_name: falcosidekick
    restart: unless-stopped
    networks: [enterprise]
    environment:
      ALERTMANAGER_HOSTPORT: http://alertmanager:9093
      ALERTMANAGER_MINIMUMPRIORITY: warning
      PROMETHEUS_HOSTPORT: http://prometheus:9090
      DEBUG: "false"
    expose:
      - "2801"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2801/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - alertmanager
      - prometheus
    deploy:
      resources:
        limits:   { memory: 64m,  cpus: '0.1' }
        reservations: { memory: 32m }
    logging: *logging

  # ═══════════════════════════════════════════════════════════════════════════════
  # PHASE 9 OBSERVABILITY & API GATEWAY
  # ═══════════════════════════════════════════════════════════════════════════════

  # ─── Phase 9-B: Loki (Log Aggregation) ───────────────────────────────────────
  loki:
    image: grafana/loki:${LOKI_VERSION:-2.9.4}
    container_name: loki
    restart: unless-stopped
    networks: [enterprise]
    ports:
      - "0.0.0.0:3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-chunks:/loki/chunks
      - loki-index:/loki/index
      - loki-cache:/loki/cache
    environment:
      TZ: ${TZ:-UTC}
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/loki/api/v1/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:   { memory: 512m,  cpus: '0.5' }
        reservations: { memory: 128m }
    logging: *logging

  # ─── Phase 9-C: Kong API Gateway ────────────────────────────────────────────
  # Kong Admin API: http://localhost:8001
  # Kong Proxy API: http://localhost:8000
  # Kong Status: http://localhost:8000/status
  kong-db:
    image: postgres:${POSTGRES_VERSION}
    container_name: kong-db
    restart: unless-stopped
    networks: [enterprise]
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_POSTGRES_PASSWORD:-kong_secure_password}
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kong -d kong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:   { memory: 256m,  cpus: '0.25' }
        reservations: { memory: 64m }
    logging: *logging

  kong-migration:
    image: kong:${KONG_VERSION:-3.4.0}
    container_name: kong-migration
    restart: "no"
    networks: [enterprise]
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_POSTGRES_PASSWORD:-kong_secure_password}
      KONG_PG_DATABASE: kong
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    deploy:
      resources:
        limits:   { memory: 256m,  cpus: '0.25' }
        reservations: { memory: 128m }
    logging: *logging

  kong:
    image: kong:${KONG_VERSION:-3.4.0}
    container_name: kong
    restart: unless-stopped
    networks: [enterprise]
    ports:
      - "0.0.0.0:8000:8000"  # Proxy
      - "0.0.0.0:8443:8443"  # Proxy SSL
      - "0.0.0.0:8001:8001"  # Admin API
      - "0.0.0.0:8444:8444"  # Admin SSL
      - "0.0.0.0:8002:8002"  # Admin GUI
      - "0.0.0.0:8445:8445"  # Admin GUI SSL
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: 5432
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_POSTGRES_PASSWORD:-kong_secure_password}
      KONG_PG_DATABASE: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: notice
      KONG_PLUGINS: bundled,opentelemetry,request-transformer,response-transformer,rate-limiting,authentication,correlation-id
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      kong-migration:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:   { memory: 512m,  cpus: '0.5' }
        reservations: { memory: 256m }
    logging: *logging

  # ─── Cloudflare Tunnel (Edge Security) ───────────────────────────────────────
  # Replaces direct NAT/firewall hole-punch with Cloudflare edge ingress
  # • Tunnel: secure encrypted connection from Cloudflare → 192.168.168.31:8080
  # • WAF: blocks SQL injection, path traversal, scanners at edge
  # • DNS: CNAME ide.kushnir.cloud → tunnel.cfargotunnel.com
  # • Health: Cloudflare monitors tunnel availability + reachability
  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARE_TUNNEL_VERSION:-2024.1.5}
    container_name: cloudflared
    restart: unless-stopped
    networks: [enterprise]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    expose:
      - "7878"   # Prometheus metrics for tunnel status
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:   { memory: 256m,  cpus: '0.25' }
        reservations: { memory: 128m }
    labels:
      service: "cloudflared"
      tier: "edge"
      com.example.description: "Cloudflare Tunnel for edge security + WAF"
    logging: *logging

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  enterprise:
    external: true   # pre-created: docker network create enterprise

# ─────────────────────────────────────────────────────────────────────────────
# Volumes  (NAS-backed = /mnt/nas-56 bind mounts above; local SSD below)
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  # ── Local SSD volumes (fast I/O for databases) ───────────────────────────
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  code-server-data:
    driver: local
  caddy-config:
    driver: local
  caddy-data:
    driver: local
  alertmanager-data:
    driver: local
  jaeger-data:
    driver: local
  vault-data:
    driver: local
  falco-data:
    driver: local
  loki-chunks:
    driver: local
  loki-index:
    driver: local
  loki-cache:
    driver: local
  kong-db-data:
    driver: local

  # ── NAS-backed volumes (192.168.168.56:/export) ───────────────────────────
  nas-ollama:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3,rsize=1048576,wsize=1048576"
      device: ":/export/ollama"
  nas-code-server:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/code-server"
  nas-prometheus:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/prometheus"
  nas-grafana:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3"
      device: ":/export/grafana"
  nas-postgres-backups:
    driver: local
    driver_opts:
      type: nfs4
      o: "addr=192.168.168.56,rw,hard,intr,timeo=30,retrans=3,rsize=1048576,wsize=1048576"
      device: ":/export/backups/postgres"
