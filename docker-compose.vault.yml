version: '3.9'

# Vault Service Configuration for Code-Server Enterprise
# Phase 4: Secrets Management - Docker-based deployment
# This is merged into the main docker-compose.yml during terraform apply

services:
  vault:
    image: vault:1.17.0
    container_name: vault
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_ADDR: "https://127.0.0.1:8200"
      VAULT_API_ADDR: "https://127.0.0.1:8200"
      VAULT_CLUSTER_ADDR: "https://127.0.0.1:8201"
      VAULT_LOG_LEVEL: "info"
      VAULT_DISABLE_MLOCK: "false"
      VAULT_DEV_LISTEN_ADDRESS: "127.0.0.1:8200"
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
      - ./vault-config.hcl:/vault/config/config.hcl:ro
      - ./vault-tls:/vault/config/tls:ro
    cap_add:
      - IPC_LOCK
    entrypoint: >
      sh -c 'vault server -config=/vault/config/config.hcl'
    networks:
      - code-server-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'vault', 'status']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  vault-data:
    driver: local
  vault-logs:
    driver: local

networks:
  code-server-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/8
