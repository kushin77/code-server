# Canonical Production Topology - SOURCE OF TRUTH
# ================================================
# This is the SINGLE source of truth for all production host and network configuration.
# All other files (scripts, terraform, configs, alert rules) MUST derive from or reference this file.
# Do NOT hardcode IPs or FQDNs anywhere else in the codebase.
#
# Modification Process:
#   1. Update this file
#   2. Run: make generate-tfvars (generates terraform.tfvars from this file)
#   3. Run: make regenerate-configs (applies changes to prometheus.yml, alert-rules.yml, etc.)
#   4. Run: scripts/validate-topology.sh (verify SSH reachability and DNS resolution)
#   5. Commit both this file and generated outputs

environment: production
cluster_name: code-server-enterprise
domain_internal: prod.internal
domain_external: kushnir.cloud

# ============================================================================
# PHYSICAL HOSTS
# ============================================================================

hosts:

  # Primary production node — runs all services
  primary:
    ip: 192.168.168.31
    fqdn: primary.prod.internal
    ssh_user: akushnir
    ssh_port: 22
    status: online
    roles:
      - code-server          # IDE server
      - postgres-primary     # Primary database (replication master)
      - redis-primary        # Primary cache (sentinel master)
      - prometheus           # Prometheus metrics scraper
      - alertmanager         # Alert routing and management
      - grafana              # Monitoring dashboard
      - jaeger               # Distributed tracing
      - caddy                # Reverse proxy and TLS termination
      - oauth2-proxy         # OIDC authentication proxy
      - keepalived-master    # VRRP primary (manages VIP)
    resources:
      cpu_cores: 16
      memory_gb: 64
      disk_gb: 500
      gpu: rtx3090
    monitoring:
      prometheus_target: primary.prod.internal:9090
      node_exporter_target: primary.prod.internal:9100
      postgres_exporter_target: primary.prod.internal:9187

  # Replica/standby node — read-only replica + failover candidate
  replica:
    ip: 192.168.168.42
    fqdn: replica.prod.internal
    ssh_user: akushnir
    ssh_port: 22
    status: online
    roles:
      - postgres-replica     # Read-only database replica
      - redis-sentinel       # Redis Sentinel for failover
      - haproxy              # Load balancer (standby)
      - coredns-secondary    # Secondary DNS resolver
      - keepalived-backup    # VRRP backup (ready to take VIP)
    resources:
      cpu_cores: 8
      memory_gb: 32
      disk_gb: 250
    monitoring:
      node_exporter_target: replica.prod.internal:9100
      postgres_exporter_target: replica.prod.internal:9187

# ============================================================================
# VIRTUAL IP (Layer 2 VRRP failover)
# ============================================================================
# The VIP floats between primary and replica using Keepalived/VRRP.
# When primary goes down, replica automatically claims the VIP in <2s.
# All external traffic and DNS points to this VIP, NOT to physical host IPs.

vip:
  ip: 192.168.168.30
  fqdn: prod.internal
  type: virtual
  managed_by: keepalived
  vrrp:
    router_id: 51
    auth_type: PASS
    interval_sec: 1
    dead_interval_multiplier: 3
  description: "Production VIP - floats between primary (.31) and replica (.42)"

# ============================================================================
# NETWORK TOPOLOGY
# ============================================================================

networks:
  prod_subnet:
    cidr: 192.168.168.0/24
    gateway: 192.168.168.1
    broadcast: 192.168.168.255
    description: "Physical production network segment"

  docker_internal:
    cidr: 172.20.0.0/16
    description: "Docker internal bridge network for container-to-container communication"

  docker_ingress:
    cidr: 10.0.9.0/24
    description: "Docker ingress network for load balancing (if applicable)"

# ============================================================================
# SERVICE ENDPOINTS (DNS records that resolve to these IPs)
# ============================================================================
# These FQDN mappings are created in CoreDNS and should be used instead of IP addresses.

dns_records:
  # Canonical endpoints
  prod.internal:
    target: "{{ vip.ip }}"  # Points to VIP (floating IP)
    type: A
    purpose: "Primary service endpoint (code-server, oauth2-proxy, caddy)"

  primary.prod.internal:
    target: "{{ hosts.primary.ip }}"
    type: A
    purpose: "Direct reference to primary node (used by replica for replication)"

  replica.prod.internal:
    target: "{{ hosts.replica.ip }}"
    type: A
    purpose: "Direct reference to replica node"

  # Service aliases
  db.prod.internal:
    target: "primary.prod.internal"
    type: CNAME
    purpose: "Database service alias (points to primary PostgreSQL)"

  cache.prod.internal:
    target: "primary.prod.internal"
    type: CNAME
    purpose: "Redis cache service alias"

  monitoring.prod.internal:
    target: "primary.prod.internal"
    type: CNAME
    purpose: "Prometheus and Grafana monitoring stack"

  prometheus.prod.internal:
    target: "primary.prod.internal:9090"
    type: CNAME
    purpose: "Prometheus metrics endpoint"

  grafana.prod.internal:
    target: "primary.prod.internal:3000"
    type: CNAME
    purpose: "Grafana dashboard endpoint"

  alertmanager.prod.internal:
    target: "primary.prod.internal:9093"
    type: CNAME
    purpose: "AlertManager webhook endpoint"

  jaeger.prod.internal:
    target: "primary.prod.internal:16686"
    type: CNAME
    purpose: "Jaeger tracing UI"

  # Reverse DNS
  31.168.168.192.in-addr.arpa:
    target: "primary.prod.internal"
    type: PTR
    purpose: "Reverse DNS for primary"

  42.168.168.192.in-addr.arpa:
    target: "replica.prod.internal"
    type: PTR
    purpose: "Reverse DNS for replica"

# ============================================================================
# CREDENTIALS & SECRETS (referenced by name, values in .env or SOPS-encrypted)
# ============================================================================
# DO NOT store actual secrets in this file. Reference them by key name.
# Actual values come from:
#   - .env file (local development, CI/CD)
#   - SOPS-encrypted .env.sops.yaml (production)
#   - Vault (long-term secret storage)

secrets:
  postgres:
    username_var: "POSTGRES_USER"
    password_var: "POSTGRES_PASSWORD"
    port_var: "POSTGRES_PORT"
    admin_user: "postgres"
    admin_password_var: "POSTGRES_ADMIN_PASSWORD"

  redis:
    password_var: "REDIS_PASSWORD"
    port_var: "REDIS_PORT"
    sentinel_password_var: "REDIS_SENTINEL_PASSWORD"

  keepalived:
    vrrp_auth_pass_var: "KEEPALIVED_VRRP_AUTH_PASS"

  oauth2:
    client_id_var: "OAUTH2_CLIENT_ID"
    client_secret_var: "OAUTH2_CLIENT_SECRET"
    cookie_secret_var: "OAUTH2_COOKIE_SECRET"

# ============================================================================
# VALIDATION & HEALTH CHECK TARGETS
# ============================================================================

health_checks:
  ssh_connectivity:
    primary: "{{ hosts.primary.ssh_user }}@{{ hosts.primary.ip }}"
    replica: "{{ hosts.replica.ssh_user }}@{{ hosts.replica.ip }}"
    timeout_sec: 5

  service_health:
    code_server: "http://{{ vip.ip }}:8080/healthz"
    postgres_primary: "{{ hosts.primary.ip }}:5432"
    postgres_replica: "{{ hosts.replica.ip }}:5432"
    redis_primary: "{{ hosts.primary.ip }}:6379"
    redis_replica: "{{ hosts.replica.ip }}:6379"
    prometheus: "http://{{ hosts.primary.ip }}:9090/-/healthy"
    grafana: "http://{{ hosts.primary.ip }}:3000/api/health"

