---
# Phase 12.2: CRDT Synchronization Engine Deployment
# Implements conflict-free replicated data types for cross-region data consistency

apiVersion: v1
kind: ConfigMap
metadata:
  name: crdt-engine-config
  namespace: phase-12
spec:
  crdt-config.json: |
    {
      "replication": {
        "mode": "multi-primary",
        "conflict_resolution": "last-write-wins",
        "vector_clock_enabled": true,
        "max_clock_skew_ms": 5000,
        "sync_interval_ms": 1000
      },
      "data_types": {
        "counter": {
          "type": "lww-counter",
          "operation": "increment"
        },
        "set": {
          "type": "or-set",
          "operation": "add-remove"
        },
        "register": {
          "type": "lww-register",
          "operation": "assign"
        },
        "map": {
          "type": "or-map",
          "operation": "nested"
        }
      },
      "regions": [
        {
          "name": "us-west",
          "endpoint": "postgres.us-west.multi-region.example.com:5432",
          "replica_id": "us-west-primary"
        },
        {
          "name": "eu-west",
          "endpoint": "postgres.eu-west.multi-region.example.com:5432",
          "replica_id": "eu-west-primary"
        },
        {
          "name": "ap-south",
          "endpoint": "postgres.ap-south.multi-region.example.com:5432",
          "replica_id": "ap-south-primary"
        }
      ],
      "monitoring": {
        "metrics_enabled": true,
        "metrics_port": 9090,
        "trace_enabled": true
      }
    }

  crdt-logic.sql: |
    -- CRDT Merge Functions for Conflict Resolution
    
    -- LWW Counter: Keep highest value with timestamp
    CREATE OR REPLACE FUNCTION crdt.merge_counter(
      p_key TEXT,
      p_value BIGINT,
      p_timestamp TIMESTAMPTZ,
      p_replica_id TEXT
    ) RETURNS VOID AS $$
    BEGIN
      INSERT INTO crdt.crdt_counters (key, value, timestamp, replica_id)
      VALUES (p_key, p_value, p_timestamp, p_replica_id)
      ON CONFLICT (key, replica_id) DO UPDATE SET
        value = CASE 
          WHEN EXCLUDED.timestamp > crdt_counters.timestamp THEN EXCLUDED.value
          ELSE crdt_counters.value
        END,
        timestamp = GREATEST(EXCLUDED.timestamp, crdt_counters.timestamp);
    END;
    $$ LANGUAGE plpgsql;
    
    -- OR-Set Union: Add new elements, remove tombstoned
    CREATE OR REPLACE FUNCTION crdt.merge_set(
      p_key TEXT,
      p_element TEXT,
      p_is_added BOOLEAN,
      p_timestamp TIMESTAMPTZ,
      p_replica_id TEXT
    ) RETURNS VOID AS $$
    BEGIN
      INSERT INTO crdt.crdt_sets (key, element, timestamp, replica_id, is_added)
      VALUES (p_key, p_element, p_timestamp, p_replica_id, p_is_added)
      ON CONFLICT (key, element, replica_id) DO UPDATE SET
        is_added = CASE
          WHEN EXCLUDED.timestamp >= crdt_sets.timestamp THEN EXCLUDED.is_added
          ELSE crdt_sets.is_added
        END,
        timestamp = GREATEST(EXCLUDED.timestamp, crdt_sets.timestamp);
    END;
    $$ LANGUAGE plpgsql;
    
    -- LWW Register: Keep most recent write
    CREATE OR REPLACE FUNCTION crdt.merge_register(
      p_key TEXT,
      p_value TEXT,
      p_timestamp TIMESTAMPTZ,
      p_replica_id TEXT
    ) RETURNS VOID AS $$
    BEGIN
      INSERT INTO crdt.crdt_registers (key, value, timestamp, replica_id)
      VALUES (p_key, p_value, p_timestamp, p_replica_id)
      ON CONFLICT (key, replica_id) DO UPDATE SET
        value = CASE
          WHEN EXCLUDED.timestamp > crdt_registers.timestamp THEN EXCLUDED.value
          ELSE crdt_registers.value
        END,
        version = crdt_registers.version + 1,
        timestamp = GREATEST(EXCLUDED.timestamp, crdt_registers.timestamp);
    END;
    $$ LANGUAGE plpgsql;
    
    -- View for querying eventual consistency state
    CREATE OR REPLACE VIEW crdt.counter_view AS
    SELECT key, SUM(value) as total_value
    FROM crdt.crdt_counters
    GROUP BY key;
    
    CREATE OR REPLACE VIEW crdt.set_view AS
    SELECT key, array_agg(DISTINCT element) as elements
    FROM crdt.crdt_sets
    WHERE is_added = TRUE
    GROUP BY key;
    
    CREATE OR REPLACE VIEW crdt.register_view AS
    SELECT DISTINCT ON (key) key, value, timestamp
    FROM crdt.crdt_registers
    ORDER BY key, timestamp DESC;

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: crdt-engine
  namespace: phase-12

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: crdt-engine
  namespace: phase-12
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: crdt-engine
  namespace: phase-12
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: crdt-engine
subjects:
  - kind: ServiceAccount
    name: crdt-engine
    namespace: phase-12

---
apiVersion: v1
kind: Service
metadata:
  name: crdt-engine
  namespace: phase-12
spec:
  selector:
    app: crdt-engine
  ports:
    - port: 9090
      name: metrics
    - port: 8080
      name: api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crdt-engine
  namespace: phase-12
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: crdt-engine
  template:
    metadata:
      labels:
        app: crdt-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: crdt-engine
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - crdt-engine
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: crdt-engine
          image: node:20-alpine
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 9090
              name: metrics
          
          env:
            - name: NODE_ENV
              value: "production"
            - name: CRDT_MODE
              value: "multi-primary"
            - name: LOG_LEVEL
              value: "info"
            - name: METRICS_PORT
              value: "9090"
            - name: API_PORT
              value: "8080"
            - name: REPLICA_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: CONFIG_PATH
              value: /etc/crdt-config/crdt-config.json
          
          volumeMounts:
            - name: crdt-config
              mountPath: /etc/crdt-config
            - name: crdt-logic
              mountPath: /etc/crdt-logic
          
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      
      volumes:
        - name: crdt-config
          configMap:
            name: crdt-engine-config
            items:
              - key: crdt-config.json
                path: crdt-config.json
        - name: crdt-logic
          configMap:
            name: crdt-engine-config
            items:
              - key: crdt-logic.sql
                path: crdt-logic.sql

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crdt-engine-hpa
  namespace: phase-12
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crdt-engine
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: crdt-engine-monitor
  namespace: phase-12
spec:
  selector:
    matchLabels:
      app: crdt-engine
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
