name: Secretsless AI Access

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'config/code-server/ai/ai-access-profiles.yml'
      - 'config/code-server/ai/model-entitlements.yml'
      - 'config/code-server/ai/quota-policy.yml'
      - 'scripts/ai-runtime-env'
      - 'docs/ai/SECRETSLESS-AI-ACCESS.md'
      - 'docs/SECRETLESS-AI-ACCESS-632.md'
      - 'scripts/ci/validate-secretsless-ai-access.sh'
      - '.github/workflows/secretsless-ai-access.yml'
  push:
    branches:
      - main
    paths:
      - 'config/code-server/ai/ai-access-profiles.yml'
      - 'config/code-server/ai/model-entitlements.yml'
      - 'config/code-server/ai/quota-policy.yml'
      - 'scripts/ai-runtime-env'
      - 'docs/ai/SECRETSLESS-AI-ACCESS.md'
      - 'docs/SECRETLESS-AI-ACCESS-632.md'
      - 'scripts/ci/validate-secretsless-ai-access.sh'
      - '.github/workflows/secretsless-ai-access.yml'

permissions:
  contents: read

jobs:
  validate-access:
    name: Validate secretsless AI access
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate secretsless access contract
        shell: bash
        run: bash scripts/ci/validate-secretsless-ai-access.sh
