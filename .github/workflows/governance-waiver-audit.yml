name: Governance Waiver Audit

on:
  issues:
    types: [opened, edited, reopened]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate-waiver-request:
    name: Validate governance waiver requests
    if: github.event_name == 'issues' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Validate waiver issue template fields
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";
            const marker = "<!-- governance-waiver-request -->";
            const commentMarker = "<!-- governance-waiver-validation -->";

            if (!body.includes(marker)) {
              core.info("Issue is not a governance waiver request.");
              return;
            }

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description,
                });
              }
            };

            await ensureLabel("governance", "0e8a16", "Governance policy and enforcement work");
            await ensureLabel("waiver", "fbca04", "Time-limited governance policy exception");

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ["governance", "waiver"],
            });

            const extract = (pattern) => {
              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            };

            const isBlank = (value) => !value || /^<.*>$/.test(value) || /^(tbd|pending)$/i.test(value);

            const fields = [
              ["Requested by", extract(/^- Requested by:\s*(.*)$/m)],
              ["PR/Issue", extract(/^- PR\/Issue:\s*(.*)$/m)],
              ["Policy violated", extract(/^- Policy violated:\s*(.*)$/m)],
              ["Scope (repos/paths/users)", extract(/^- Scope \(repos\/paths\/users\):\s*(.*)$/m)],
              ["Violation details", extract(/^- Violation details:\s*(.*)$/m)],
              ["Justification", extract(/^- Justification:\s*(.*)$/m)],
              ["Expiration (YYYY-MM-DD)", extract(/^- Expiration \(YYYY-MM-DD\):\s*(.*)$/m)],
              ["Impact", extract(/^- Impact:\s*(.*)$/m)],
              ["Owner for remediation", extract(/^- Owner for remediation:\s*(.*)$/m)],
              ["Security impact", extract(/^- Security impact:\s*(.*)$/m)],
              ["Compensating controls", extract(/^- Compensating controls:\s*(.*)$/m)],
              ["On-prem impact on 192.168.168.31", extract(/^- On-prem impact on 192\.168\.168\.31:\s*(.*)$/m)],
            ];

            const approvalFields = [
              ["Approved by", extract(/^- Approved by:\s*(.*)$/m)],
              ["Approval date (YYYY-MM-DD)", extract(/^- Approval date \(YYYY-MM-DD\):\s*(.*)$/m)],
              ["Approval signature (sha256:<64-hex>)", extract(/^- Approval signature \(sha256:<64-hex>\):\s*(.*)$/m)],
              ["Approval notes", extract(/^- Approval notes:\s*(.*)$/m)],
            ];

            const missing = fields.filter(([, value]) => isBlank(value)).map(([name]) => name);
            const missingApproval = approvalFields.filter(([, value]) => isBlank(value)).map(([name]) => name);
            const signatureValue = extract(/^- Approval signature \(sha256:<64-hex>\):\s*(.*)$/m);
            const invalidSignature = !!signatureValue && !/^sha256:[a-f0-9]{64}$/i.test(signatureValue);
            const registryChecked = /- \[x\] Registry entry added to docs\/governance\/WAIVERS\.md/i.test(body);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === "github-actions[bot]" && comment.body?.includes(commentMarker)
            );

            const lines = [
              commentMarker,
              "## Governance Waiver Validation",
              "",
            ];

            if (missing.length > 0) {
              lines.push("Request is incomplete. Fill the missing required fields:");
              lines.push(...missing.map((field) => `- [ ] ${field}`));
            } else {
              lines.push("Request metadata is complete.");
            }

            lines.push("");

            if (missingApproval.length > 0) {
              lines.push("Approval metadata is still pending:");
              lines.push(...missingApproval.map((field) => `- [ ] ${field}`));
            } else {
              lines.push("Approval metadata is complete.");
            }

            if (invalidSignature) {
              lines.push("- [ ] Approval signature format invalid. Expected: sha256:<64-hex>");
            }

            lines.push("");
            lines.push(registryChecked
              ? "- [x] Registry entry checkbox marked complete"
              : "- [ ] Add approved waiver to docs/governance/WAIVERS.md and mark the registry checkbox");
            lines.push("- Use docs/governance/WAIVER-REQUEST.md for policy and approval guidance.");

            const bodyText = lines.join("\n");

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: bodyText,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: bodyText,
              });
            }

  audit-waivers:
    name: Audit open governance waivers
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Verify script syntax
        run: |
          bash -n scripts/governance/generate-waiver-report.sh
          bash -n scripts/governance/validate-waiver-registry.sh

      - name: Validate centralized waiver registry
        id: registry
        continue-on-error: true
        run: |
          set +e
          chmod +x scripts/governance/validate-waiver-registry.sh
          scripts/governance/validate-waiver-registry.sh \
            --registry config/governance-waivers.json \
            --report .github/reports/governance/waiver_registry_validation.json \
            --events .github/reports/governance/waiver_audit_events.jsonl \
            --expired .github/reports/governance/waiver_expired_active.json
          rc=$?
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [[ -f .github/reports/governance/waiver_registry_validation.json ]]; then
            echo "invalid_count=$(jq -r '.summary.invalid_count' .github/reports/governance/waiver_registry_validation.json)" >> "$GITHUB_OUTPUT"
            echo "expired_count=$(jq -r '.summary.expired_active_count' .github/reports/governance/waiver_registry_validation.json)" >> "$GITHUB_OUTPUT"
          else
            echo "invalid_count=0" >> "$GITHUB_OUTPUT"
            echo "expired_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate waiver audit report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/governance/generate-waiver-report.sh
          scripts/governance/generate-waiver-report.sh "${{ github.repository }}" 380
          REPORT_FILE=$(ls -1 .github/reports/governance/governance_waiver_report_*.md | tail -n 1)
          METRICS_FILE=$(ls -1 .github/reports/governance/governance_waiver_metrics_*.prom | tail -n 1)
          {
            echo "## Governance Waiver Audit"
            echo
            cat "$REPORT_FILE"
            echo
            echo "### Prometheus Metrics File"
            echo
            echo '```prometheus'
            cat "$METRICS_FILE"
            echo '```'
            echo
            echo "### Centralized Registry Validation"
            echo
            if [[ -f .github/reports/governance/waiver_registry_validation.json ]]; then
              cat .github/reports/governance/waiver_registry_validation.json
            else
              echo "Registry validation report not found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on expired active waivers
        if: steps.registry.outputs.expired_count != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- expired-waiver-alert -->';
            const report = JSON.parse(fs.readFileSync('.github/reports/governance/waiver_registry_validation.json', 'utf8'));
            const title = `P1: Expired active governance waivers detected (${report.summary.expired_active_count})`;
            const lines = [
              marker,
              '',
              `Generated: ${report.generated_at}`,
              `Expired active waivers: ${report.summary.expired_active_count}`,
              '',
              'Expired entries:',
              ...report.expired_active_entries.map((w) => `- ${w.id} (issue #${w.issue_number}, expired ${w.expires_at})`),
              '',
              'Required action: revoke/update entries in config/governance-waivers.json and close/update linked issues.'
            ];
            const body = lines.join('\n');

            const { owner, repo } = context.repo;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((i) => i.title.startsWith('P1: Expired active governance waivers detected'));
            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['P1', 'governance', 'waiver'] });
            }

      - name: Upload waiver audit artifacts
        uses: actions/upload-artifact@5d5d22fc38ceea83b5bc9c7ff5a5109b73852e9f  # v4.3.1
        with:
          name: governance-waiver-audit
          path: |
            .github/reports/governance/governance_waiver_*
            .github/reports/governance/waiver_registry_validation.json
            .github/reports/governance/waiver_expired_active.json
            .github/reports/governance/waiver_audit_events.jsonl

      - name: Post waiver audit to canonical governance issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT_FILE=$(ls -1 .github/reports/governance/governance_waiver_report_*.md | tail -n 1)
          gh issue comment 380 --repo "${{ github.repository }}" --body-file "$REPORT_FILE"

      - name: Fail if registry invalid or expired active waivers exist
        run: |
          rc='${{ steps.registry.outputs.exit_code }}'
          if [[ "$rc" != "0" ]]; then
            echo "Waiver registry gate failed with exit code: $rc"
            exit 1
          fi
