name: Enforce Branch Naming Convention

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-branch-naming:
    name: Validate branch name matches issue-centric policy
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          PATTERN='^(feat|fix|chore|docs|refactor|ci|revert)/[0-9]+-[a-z0-9-]+$'
          # Allow release branches
          RELEASE_PATTERN='^release/v[0-9]+\.[0-9]+\.[0-9]+$'
          # Allow hotfix branches
          HOTFIX_PATTERN='^hotfix/[0-9]+-[a-z0-9-]+$'

          if echo "$BRANCH" | grep -qE "$PATTERN"; then
            echo "✅ Branch name '$BRANCH' follows policy: <type>/<issue>-<slug>"
          elif echo "$BRANCH" | grep -qE "$RELEASE_PATTERN"; then
            echo "✅ Release branch: $BRANCH"
          elif echo "$BRANCH" | grep -qE "$HOTFIX_PATTERN"; then
            echo "✅ Hotfix branch: $BRANCH"
          else
            echo "❌ Branch name '$BRANCH' does not follow naming convention."
            echo ""
            echo "Required format: <type>/<issue-number>-<slug>"
            echo "Examples:"
            echo "  feat/624-issue-centric-workflow"
            echo "  fix/621-hadolint-warnings"
            echo "  chore/580-ci-baseline"
            echo ""
            echo "Use: bash scripts/dev/start-work-from-issue.sh <issue-number>"
            exit 1
          fi

  enforce-issue-linkage:
    name: Validate PR body references a GitHub issue
    runs-on: ubuntu-latest
    steps:
      - name: Check for issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          if echo "$PR_BODY" | grep -qiE '(fixes|closes|resolves) #[0-9]+'; then
            echo "✅ PR body contains issue reference (Fixes/Closes/Resolves #N)"
          else
            echo "❌ PR body must reference a GitHub issue."
            echo ""
            echo "Add one of:"
            echo "  Fixes #<issue-number>"
            echo "  Closes #<issue-number>"
            echo "  Resolves #<issue-number>"
            echo ""
            echo "This is required by the issue-centric workflow policy. See .github/ISSUE-WORKFLOW-POLICY.md"
            exit 1
          fi
